<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>विलोम शब्द – Antonym Arena | GyanPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0F0C29; --dark:#1A1A2E; --gold:#FFB800;
    --sky:#00AEEF; --green:#00C853; --pink:#FF4081; --purple:#7C3AED;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:#fff;
    font-family:'Nunito',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    animation:fadeIn .4s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .top-bar{
    width:100%;max-width:700px;
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:18px;flex-wrap:wrap;gap:10px;
  }
  .back-btn{
    background:rgba(255,255,255,.1);
    border:none;color:#fff;
    padding:8px 20px;border-radius:999px;
    font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;
    cursor:pointer;transition:background .2s;
  }
  .back-btn:hover{background:rgba(255,255,255,.2);}
  .subject-badge{
    background:var(--pink);
    padding:6px 18px;border-radius:999px;
    font-size:.85rem;font-weight:800;letter-spacing:.5px;
    font-family:'Baloo 2',sans-serif;
  }
  .lang-toggle{
    display:flex;gap:6px;
  }
  .lang-btn{
    background:rgba(255,255,255,.1);
    border:none;color:#fff;
    padding:6px 14px;border-radius:999px;
    font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;
    cursor:pointer;transition:all .2s;
  }
  .lang-btn.active{background:var(--gold);color:#000;}
  .lang-btn:hover:not(.active){background:rgba(255,255,255,.2);}

  .game-card{
    background:var(--dark);
    border-radius:20px;
    padding:32px 28px;
    width:100%;max-width:700px;
    box-shadow:0 8px 40px rgba(0,0,0,.4);
  }
  .game-title{
    font-family:'Baloo 2',sans-serif;
    font-size:2rem;font-weight:800;
    text-align:center;
    color:var(--gold);
    margin-bottom:6px;
  }
  .score-bar{
    display:flex;justify-content:space-between;align-items:center;
    margin:14px 0 10px;
    font-size:.9rem;font-weight:700;color:rgba(255,255,255,.7);
  }
  .progress-wrap{
    background:rgba(255,255,255,.1);
    border-radius:999px;height:8px;margin-bottom:20px;
  }
  .progress-fill{
    height:8px;border-radius:999px;
    background:linear-gradient(90deg,var(--sky),var(--green));
    transition:width .4s ease;
  }
  .question-label{
    font-size:.85rem;font-weight:700;
    color:var(--sky);letter-spacing:.5px;
    text-transform:uppercase;margin-bottom:10px;
  }
  .question-word{
    font-family:'Baloo 2',sans-serif;
    font-size:3rem;font-weight:800;
    text-align:center;
    color:#fff;
    background:rgba(255,255,255,.07);
    border-radius:16px;
    padding:18px 10px;
    margin-bottom:22px;
    letter-spacing:2px;
  }
  .choices{
    display:grid;grid-template-columns:1fr;gap:12px;
  }
  .choice-btn{
    background:rgba(255,255,255,.08);
    border:2px solid rgba(255,255,255,.15);
    color:#fff;
    padding:14px 20px;
    border-radius:14px;
    font-family:'Nunito',sans-serif;
    font-size:1.3rem;font-weight:700;
    cursor:pointer;
    transition:all .2s;
    text-align:center;
    letter-spacing:.5px;
  }
  .choice-btn:hover:not(:disabled){
    background:rgba(0,174,239,.2);
    border-color:var(--sky);
    transform:translateY(-2px);
  }
  .choice-btn.correct{
    background:rgba(0,200,83,.25);
    border-color:var(--green);
    color:#fff;
  }
  .choice-btn.wrong{
    background:rgba(255,64,129,.2);
    border-color:var(--pink);
    color:#fff;
  }
  .choice-btn:disabled{cursor:not-allowed;}
  .feedback{
    margin-top:16px;
    padding:12px 18px;
    border-radius:12px;
    font-weight:700;font-size:1rem;
    text-align:center;
    animation:fadeIn .3s ease;
    display:none;
  }
  .feedback.show{display:block;}
  .feedback.correct-fb{background:rgba(0,200,83,.2);color:#00C853;}
  .feedback.wrong-fb{background:rgba(255,64,129,.15);color:#FF4081;}
  .next-btn{
    margin-top:18px;
    width:100%;
    background:var(--purple);
    border:none;color:#fff;
    padding:14px;border-radius:14px;
    font-family:'Baloo 2',sans-serif;
    font-size:1.1rem;font-weight:700;
    cursor:pointer;transition:all .2s;
    display:none;
  }
  .next-btn.show{display:block;}
  .next-btn:hover{background:#6d28d9;transform:translateY(-1px);}

  /* Result screen */
  .result-screen{display:none;text-align:center;}
  .result-screen.show{display:block;}
  .stars{font-size:3rem;margin:16px 0;}
  .result-score{
    font-family:'Baloo 2',sans-serif;
    font-size:2.5rem;font-weight:800;color:var(--gold);
    margin-bottom:8px;
  }
  .result-msg{font-size:1.1rem;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:24px;}
  .restart-btn{
    background:var(--gold);
    color:#000;border:none;
    padding:14px 36px;border-radius:999px;
    font-family:'Baloo 2',sans-serif;
    font-size:1.1rem;font-weight:800;
    cursor:pointer;transition:all .2s;
  }
  .restart-btn:hover{background:#e6a600;transform:scale(1.04);}
  .quiz-area{animation:fadeIn .4s ease;}
</style>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <span class="subject-badge">📚 Hindi – Class 7</span>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<div class="game-card">
  <div class="game-title">विलोम शब्द 🔄</div>

  <!-- Quiz area -->
  <div class="quiz-area" id="quizArea">
    <div class="score-bar">
      <span id="qCounter">Question 1 / 10</span>
      <span id="scoreDisplay">Score: 0</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="question-label" id="qLabel">Pick the opposite word (विलोम)</div>
    <div class="question-word" id="questionWord">दिन</div>
    <div class="choices" id="choicesContainer"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
  </div>

  <!-- Result screen -->
  <div class="result-screen" id="resultScreen">
    <div class="stars" id="starsDisplay">⭐⭐⭐</div>
    <div class="result-score" id="resultScore">10 / 10</div>
    <div class="result-msg" id="resultMsg">Excellent! शानदार! 🎉</div>
    <button class="restart-btn" onclick="restartGame()">🔄 Play Again</button>
  </div>
</div>

<script>
const questions = [
  { word:"दिन", answer:"रात", choices:["रात","सुबह","शाम"] },
  { word:"सुख", answer:"दुख", choices:["दुख","आनंद","प्रेम"] },
  { word:"उठना", answer:"बैठना", choices:["चलना","बैठना","सोना"] },
  { word:"अच्छा", answer:"बुरा", choices:["बुरा","सुंदर","बड़ा"] },
  { word:"आना", answer:"जाना", choices:["जाना","रुकना","सोना"] },
  { word:"गर्म", answer:"ठंडा", choices:["ठंडा","गीला","सूखा"] },
  { word:"जीत", answer:"हार", choices:["हार","खेल","दौड़"] },
  { word:"प्यार", answer:"नफ़रत", choices:["नफ़रत","दोस्ती","रिश्ता"] },
  { word:"सुबह", answer:"शाम", choices:["दोपहर","शाम","रात"] },
  { word:"खुला", answer:"बंद", choices:["बंद","टूटा","पुराना"] },
];

const labels = {
  en: { qlabel:"Pick the opposite word (विलोम)", counter:"Question", score:"Score", next:"Next →", correct:"✅ Correct! ", wrong:"❌ Wrong! The answer is: ", play:"🔄 Play Again", result:["Excellent! शानदार! 🎉","Great effort! अच्छा प्रयास!","Keep practicing! अभ्यास जारी रखो!","Try again! फिर कोशिश करो!"] },
  hi: { qlabel:"विलोम शब्द चुनें", counter:"प्रश्न", score:"अंक", next:"आगे →", correct:"✅ सही! ", wrong:"❌ गलत! सही उत्तर: ", play:"🔄 फिर खेलें", result:["शानदार! बहुत बढ़िया! 🎉","बहुत अच्छा! शाबाश!","अभ्यास जारी रखो!","फिर कोशिश करो!"] },
  as: { qlabel:"বিপৰীত শব্দ বাছক", counter:"প্ৰশ্ন", score:"নম্বৰ", next:"পৰৱৰ্তী →", correct:"✅ শুদ্ধ! ", wrong:"❌ ভুল! উত্তৰ: ", play:"🔄 পুনৰ খেলক", result:["অসাধাৰণ! 🎉","বহুত ভাল!","অভ্যাস জাৰি ৰাখক!","আকৌ চেষ্টা কৰক!"] },
};

let current=0, score=0, lang='en', answered=false;

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{
    b.classList.toggle('active',['en','hi','as'][i]===l);
  });
  renderQuestion();
}

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5);}

function renderQuestion(){
  if(current>=questions.length){showResult();return;}
  answered=false;
  const q=questions[current];
  const L=labels[lang];
  document.getElementById('qLabel').textContent=L.qlabel;
  document.getElementById('qCounter').textContent=`${L.counter} ${current+1} / ${questions.length}`;
  document.getElementById('scoreDisplay').textContent=`${L.score}: ${score}`;
  document.getElementById('questionWord').textContent=q.word;
  document.getElementById('progressFill').style.width=`${(current/questions.length)*100}%`;

  const shuffled=shuffle(q.choices);
  const cont=document.getElementById('choicesContainer');
  cont.innerHTML='';
  shuffled.forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=ch;
    btn.onclick=()=>handleAnswer(ch,q.answer,btn);
    cont.appendChild(btn);
  });
  const fb=document.getElementById('feedback');
  fb.className='feedback';
  fb.textContent='';
  document.getElementById('nextBtn').className='next-btn';
}

function handleAnswer(chosen,correct,btn){
  if(answered)return;
  answered=true;
  const L=labels[lang];
  const allBtns=document.querySelectorAll('.choice-btn');
  allBtns.forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
  });
  const fb=document.getElementById('feedback');
  if(chosen===correct){
    score++;
    btn.classList.add('correct');
    fb.textContent=L.correct+correct;
    fb.className='feedback show correct-fb';
  } else {
    btn.classList.add('wrong');
    fb.textContent=L.wrong+correct;
    fb.className='feedback show wrong-fb';
  }
  document.getElementById('scoreDisplay').textContent=`${L.score}: ${score}`;
  document.getElementById('nextBtn').className='next-btn show';
  document.getElementById('nextBtn').textContent=current===questions.length-1?'See Results 🏆':L.next;
}

function nextQuestion(){
  current++;
  renderQuestion();
}

function showResult(){
  document.getElementById('quizArea').style.display='none';
  const rs=document.getElementById('resultScreen');
  rs.className='result-screen show';
  const pct=(score/questions.length)*100;
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=40?'⭐':'';
  const L=labels[lang];
  const msgIdx=pct>=90?0:pct>=70?1:pct>=40?2:3;
  document.getElementById('starsDisplay').textContent=stars||'💪';
  document.getElementById('resultScore').textContent=`${score} / ${questions.length}`;
  document.getElementById('resultMsg').textContent=L.result[msgIdx];
  document.querySelector('.restart-btn').textContent=L.play;
}

function restartGame(){
  current=0;score=0;answered=false;
  document.getElementById('quizArea').style.display='block';
  document.getElementById('resultScreen').className='result-screen';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
