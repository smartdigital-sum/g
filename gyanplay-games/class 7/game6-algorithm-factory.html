<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algorithm Factory – GyanPlay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#eee;min-height:100vh;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageOut{from{opacity:1}to{opacity:0}}
.page-out{animation:pageOut .3s ease forwards}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(76,201,240,.4)}50%{box-shadow:0 0 0 8px rgba(76,201,240,0)}}

header{background:linear-gradient(135deg,#0077b6,#023e8a);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.back-btn{color:#fff;text-decoration:none;font-size:1rem;opacity:.85;transition:opacity .2s}
.back-btn:hover{opacity:1}
h1{font-size:1.2rem;color:#fff;flex:1}
.subject-tag{background:rgba(255,255,255,.2);color:#fff;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;letter-spacing:.5px}

.lang-bar{display:flex;justify-content:center;gap:8px;padding:10px}
.lb{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#ccc;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:.8rem;transition:all .2s}
.lb.active{background:#0077b6;border-color:#0077b6;color:#fff;font-weight:700}

.container{max-width:580px;margin:0 auto;padding:16px}

.progress-wrap{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin-bottom:6px}
.progress-fill{background:linear-gradient(90deg,#0077b6,#4cc9f0);height:100%;border-radius:10px;transition:width .4s ease}
.progress-text{text-align:center;font-size:.78rem;color:#aaa;margin-bottom:16px}

.stars{text-align:center;font-size:1.6rem;margin-bottom:16px}
.star{opacity:.3;transition:opacity .3s,filter .3s}
.star.lit{opacity:1;filter:drop-shadow(0 0 6px gold)}

.task-card{background:rgba(255,255,255,.06);border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid rgba(255,255,255,.1)}
.task-title{font-size:.75rem;color:#4cc9f0;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.task-desc{font-size:1.05rem;font-weight:600;line-height:1.5;margin-bottom:8px}
.task-icon{font-size:2.2rem;text-align:center;margin-bottom:4px;animation:bounce 2s ease-in-out infinite}

.steps-label{font-size:.75rem;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

/* Scrambled pool */
.pool-area{display:flex;flex-wrap:wrap;gap:8px;background:rgba(255,255,255,.04);border-radius:12px;padding:12px;min-height:64px;margin-bottom:14px;border:1px solid rgba(255,255,255,.08)}
.step-chip{background:rgba(0,119,182,.2);border:1px solid rgba(0,119,182,.5);border-radius:10px;padding:8px 12px;font-size:.88rem;cursor:pointer;transition:all .2s;user-select:none;animation:slideIn .2s ease}
.step-chip:hover{background:rgba(0,119,182,.4);transform:scale(1.03)}
.step-chip.placed{opacity:.3;pointer-events:none;background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}

/* Answer slots */
.answer-slots{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.slot{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:2px dashed rgba(255,255,255,.2);border-radius:10px;padding:10px 12px;min-height:48px;cursor:pointer;transition:all .2s}
.slot.filled{border-style:solid;border-color:#4cc9f0;background:rgba(76,201,240,.1)}
.slot.correct{border-color:#06d6a0;background:rgba(6,214,160,.1)}
.slot.wrong{border-color:#ef476f;background:rgba(239,71,111,.1);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.slot-num{width:26px;height:26px;background:rgba(0,119,182,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:#4cc9f0;flex-shrink:0}
.slot-text{font-size:.9rem;color:#ccc;font-style:italic}
.slot.filled .slot-text{color:#fff;font-style:normal}
.slot.correct .slot-text{color:#06d6a0}
.slot.wrong .slot-text{color:#ef476f}
.slot-remove{margin-left:auto;color:rgba(255,255,255,.3);font-size:.9rem;display:none}
.slot.filled .slot-remove{display:block}

.check-btn{width:100%;padding:12px;background:linear-gradient(135deg,#0077b6,#4cc9f0);border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.check-btn:disabled{opacity:.4;cursor:not-allowed}
.check-btn:not(:disabled):hover{opacity:.9}

.feedback{text-align:center;padding:10px;border-radius:10px;margin:10px 0;font-weight:600;font-size:.95rem;display:none}
.feedback.correct{background:rgba(6,214,160,.15);color:#06d6a0}
.feedback.wrong{background:rgba(239,71,111,.15);color:#ef476f}

.next-btn{width:100%;padding:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:12px;color:#fff;font-size:1rem;cursor:pointer;margin-top:8px;transition:all .2s;display:none}
.next-btn:hover{background:rgba(255,255,255,.15)}

/* Result overlay */
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .4s}
.result-overlay.show{opacity:1;pointer-events:all}
.result-card{background:#0d1117;border-radius:20px;padding:30px;text-align:center;max-width:360px;width:90%;border:2px solid #0077b6}
.result-emoji{font-size:3rem;margin-bottom:10px}
.result-title{font-size:1.5rem;font-weight:800;color:#4cc9f0;margin-bottom:6px}
.result-score{font-size:1.1rem;color:#ccc;margin-bottom:16px}
.result-stars{font-size:2rem;margin-bottom:16px}
.fact-box{background:rgba(0,119,182,.1);border-radius:12px;padding:14px;margin-bottom:16px;text-align:left}
.fact-label{font-size:.7rem;color:#4cc9f0;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fact-text{font-size:.9rem;color:#ddd;line-height:1.5}
.play-again-btn{width:100%;padding:12px;background:linear-gradient(135deg,#0077b6,#4cc9f0);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:1rem;cursor:pointer}

.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<header>
  <a href="../../classroom.html?class=class-7" class="back-btn" onclick="navBack(event,this)">← Back</a>
  <h1 id="hTitle">Algorithm Factory</h1>
  <span class="subject-tag" id="hSubject">Computer</span>
</header>

<div class="lang-bar">
  <button class="lb" id="lbEn" onclick="setLang('en')">EN</button>
  <button class="lb" id="lbHi" onclick="setLang('hi')">हि</button>
  <button class="lb" id="lbAs" onclick="setLang('as')">অ</button>
</div>

<div class="container">
  <div class="progress-wrap"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <div class="progress-text" id="progText">0 / 8</div>
  <div class="stars">
    <span class="star" id="s1">⭐</span>
    <span class="star" id="s2">⭐</span>
    <span class="star" id="s3">⭐</span>
  </div>

  <div class="task-card">
    <div class="task-icon" id="taskIcon">🍚</div>

    <div class="task-desc" id="taskDesc">–</div>
  </div>

  <div class="steps-label" id="poolLabel">SCRAMBLED STEPS — tap to place:</div>
  <div class="pool-area" id="poolArea"></div>

  <div class="steps-label" id="slotsLabel">YOUR ALGORITHM:</div>
  <div class="answer-slots" id="answerSlots"></div>

  <div class="feedback" id="feedback">–</div>
  <button class="check-btn" id="checkBtn" onclick="checkAnswer()" disabled>✓ Check Algorithm</button>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji" id="resEmoji">🎊</div>
    <div class="result-title" id="resTitle">Excellent!</div>

    <div class="fact-box">
      <div class="fact-label" id="factLabel">Did you know?</div>
      <div class="fact-text" id="factText">–</div>
    </div>
    <button class="play-again-btn" onclick="restartGame()" id="replayBtn">Play Again 🔄</button>
  </div>
</div>

      as:["প্ৰথম সংখ্যাটোক 'max' হিচাপে ল'ব","পৰৱৰ্তী সংখ্যাটো চাওক","যদি সেয়া ডাঙৰ হয়, 'max' আপডেট কৰক","নহ'লে বৰ্তমান 'max' ৰাখক","সকলো সংখ্যাৰ বাবে পুনৰাবৃত্তি কৰক","চূড়ান্ত 'max' প্ৰিণ্ট কৰক"]

    steps:{
      en:["Divide the park into zones","Assign a team to each zone","Each team counts rhinos seen","Record count on paper","Teams report to the base","Add all counts for total"],
      hi:["पार्क को क्षेत्रों में बाँटें","प्रत्येक क्षेत्र में एक टीम लगाएँ","हर टीम गैंडे गिने","कागज़ पर दर्ज करें","टीमें बेस को रिपोर्ट करें","सभी गिनती जोड़ें"],
      as:["উদ্যানখন অঞ্চলত ভাগ কৰক","প্ৰতিটো অঞ্চলত এটা দল নিযুক্ত কৰক","প্ৰতিটো দলে গঁড় গণনা কৰক","কাগজত লিপিবদ্ধ কৰক","দলবোৰে বেছলৈ ৰিপোৰ্ট কৰক","সকলো গণনা যোগ কৰক"]

    steps:{
      en:["Show question to the player","Player selects an answer","Check if answer is correct","If correct → add 10 points","If wrong → show correct answer","Check if more questions remain — if yes, go back to step 1"],
      hi:["खिलाड़ी को प्रश्न दिखाएँ","खिलाड़ी उत्तर चुनता है","जाँचें कि उत्तर सही है या नहीं","सही → 10 अंक जोड़ें","गलत → सही उत्तर दिखाएँ","अगर और प्रश्न हैं तो चरण 1 पर वापस जाएँ"],
      as:["খেলুৱৈক প্ৰশ্ন দেখুৱাওক","খেলুৱৈয়ে উত্তৰ বাছনি কৰে","উত্তৰ সঠিক নে নহয় পৰীক্ষা কৰক","সঠিক → ১০ পইণ্ট যোগ কৰক","ভুল → সঠিক উত্তৰ দেখুৱাওক","আৰু প্ৰশ্ন আছে নে — থাকিলে ১ নং পদক্ষেপলৈ যাওক"]

let lang='en', qIdx=0, score=0;
let userOrder=[], correctOrder=[], totalSteps=0;

function setLang(l){
  lang=l;
  localStorage.setItem('gyanplay_lang',l);
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('active'));
  document.getElementById('lb'+l.charAt(0).toUpperCase()+l.slice(1)).classList.add('active');
  updateStaticText();
  renderQuestion();
}

function updateStaticText(){
  const t=T[lang];
  document.getElementById('hTitle').textContent=t.title;
  document.getElementById('hSubject').textContent=t.subject;
  document.getElementById('taskTitle').textContent=t.taskTitle;
  document.getElementById('poolLabel').textContent=t.poolLabel;
  document.getElementById('slotsLabel').textContent=t.slotsLabel;
  document.getElementById('checkBtn').textContent=t.check;
  document.getElementById('progText').textContent=t.progress.replace('{q}',qIdx);
}

function litStar(n){
  for(let i=1;i<=3;i++){
    document.getElementById('s'+i).classList.toggle('lit',i<=n);
  }
}

function playTone(freq,dur=0.15,type='sine'){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;o.type=type;
    g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function renderQuestion(){
  const q=QUESTIONS[qIdx];
  const t=T[lang];
  document.getElementById('taskIcon').textContent=q.icon;
  document.getElementById('taskDesc').textContent=q.task[lang];

  const steps=q.steps[lang];
  totalSteps=steps.length;
  correctOrder=[...Array(totalSteps).keys()]; // 0,1,2,...
  userOrder=new Array(totalSteps).fill(null);

  const prog=(qIdx/8)*100;
  document.getElementById('progFill').style.width=prog+'%';
  document.getElementById('progText').textContent=t.progress.replace('{q}',qIdx);

  // Scramble pool
  const scrambled=shuffle([...Array(totalSteps).keys()]);
  const pool=document.getElementById('poolArea');
  pool.innerHTML='';
  scrambled.forEach(i=>{
    const chip=document.createElement('div');
    chip.className='step-chip';
    chip.dataset.idx=i;
    chip.textContent=steps[i];
    chip.onclick=()=>placeStep(i);
    pool.appendChild(chip);
  });

  // Empty slots
  const slotsEl=document.getElementById('answerSlots');
  slotsEl.innerHTML='';
  for(let i=0;i<totalSteps;i++){
    const slot=document.createElement('div');
    slot.className='slot';
    slot.id='slot'+i;
    slot.onclick=()=>removeFromSlot(i);
    slot.innerHTML=`<span class="slot-num">${i+1}</span><span class="slot-text" id="slotText${i}">${t.empty}</span><span class="slot-remove">✕</span>`;
    slotsEl.appendChild(slot);
  }

  document.getElementById('feedback').style.display='none';
  document.getElementById('checkBtn').disabled=true;
  document.getElementById('nextBtn').style.display='none';
  litStar(Math.max(0,Math.ceil((qIdx/8)*3)-1));
}

function placeStep(idx){
  const t=T[lang];
  // Find first empty slot
  const firstEmpty=userOrder.indexOf(null);
  if(firstEmpty===-1)return;

  userOrder[firstEmpty]=idx;
  const slot=document.getElementById('slot'+firstEmpty);
  slot.classList.add('filled');
  document.getElementById('slotText'+firstEmpty).textContent=QUESTIONS[qIdx].steps[lang][idx];

  // Mark chip as placed
  document.querySelector(`.step-chip[data-idx="${idx}"]`).classList.add('placed');

  if(!userOrder.includes(null)){
    document.getElementById('checkBtn').disabled=false;
  }
}

function removeFromSlot(slotIdx){
  const stepIdx=userOrder[slotIdx];
  if(stepIdx===null)return;
  // Check slot not already correct/wrong (after check)
  const slot=document.getElementById('slot'+slotIdx);
  if(slot.classList.contains('correct'))return;

  // Return chip
  document.querySelector(`.step-chip[data-idx="${stepIdx}"]`).classList.remove('placed');
  userOrder[slotIdx]=null;
  const t=T[lang];
  slot.classList.remove('filled','wrong');
  document.getElementById('slotText'+slotIdx).textContent=t.empty;
  document.getElementById('checkBtn').disabled=true;

  // Shift remaining down
  const remaining=userOrder.filter(v=>v!==null);
  userOrder=new Array(totalSteps).fill(null);
  remaining.forEach((v,i)=>userOrder[i]=v);

  // Re-render slots
  for(let i=0;i<totalSteps;i++){
    const sl=document.getElementById('slot'+i);
    if(userOrder[i]!==null){
      sl.classList.add('filled');
      document.getElementById('slotText'+i).textContent=QUESTIONS[qIdx].steps[lang][userOrder[i]];
    } else {
      sl.classList.remove('filled','wrong','correct');
      document.getElementById('slotText'+i).textContent=t.empty;
    }
  }

  if(!userOrder.includes(null)) document.getElementById('checkBtn').disabled=false;
}

function checkAnswer(){
  const t=T[lang];
  let allCorrect=true;
  for(let i=0;i<totalSteps;i++){
    const slot=document.getElementById('slot'+i);
    slot.classList.remove('filled');
    if(userOrder[i]===correctOrder[i]){
      slot.classList.add('correct');
    } else {
      slot.classList.add('wrong');
      allCorrect=false;
    }
  }

  const fb=document.getElementById('feedback');
  if(allCorrect){
    playTone(660);setTimeout(()=>playTone(880),150);setTimeout(()=>playTone(1100),300);
    fb.textContent=t.feedback_ok;
    fb.className='feedback correct';
    score++;
  } else {
    playTone(200,0.3,'sawtooth');
    fb.textContent=t.feedback_wrong;
    fb.className='feedback wrong';
  }
  fb.style.display='block';
  document.getElementById('checkBtn').disabled=true;

  setTimeout(()=>{
    document.getElementById('nextBtn').style.display='block';
    document.getElementById('nextBtn').textContent=(qIdx+1>=8)?t.again.replace('🔄','').trim():t.next;
  },600);
}

function nextQuestion(){
  qIdx++;
  if(qIdx>=8){showResult();return;}
  renderQuestion();
  document.getElementById('feedback').style.display='none';
}

function showResult(){
  const t=T[lang];
  const pct=score/8;
  let stars,title,emoji;
  if(pct>=.875){stars=3;title=t.great;emoji='🎊';}
  else if(pct>=.625){stars=2;title=t.good;emoji='👍';}
  else{stars=1;title=t.ok;emoji='💪';}

  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('resScore').textContent=t.score.replace('{c}',score);
  document.getElementById('resStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('factLabel').textContent=t.factlabel;
  document.getElementById('factText').textContent=t.fact;
  document.getElementById('replayBtn').textContent=t.again;
  document.getElementById('resultOverlay').classList.add('show');
  document.getElementById('progFill').style.width='100%';
  litStar(stars);
  if(stars>=2)launchConfetti();
}

function restartGame(){
  document.getElementById('resultOverlay').classList.remove('show');
  qIdx=0;score=0;
  renderQuestion();
}

function launchConfetti(){
  const colors=['#0077b6','#4cc9f0','#023e8a','#00b4d8','#90e0ef','#06d6a0'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  }
}

function navBack(e,a){
  e.preventDefault();
  document.body.classList.add('page-out');
  setTimeout(()=>location.href=a.href,300);
}

window.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('gyanplay_lang')||'en';
  lang=saved;
  document.getElementById('lb'+lang.charAt(0).toUpperCase()+lang.slice(1)).classList.add('active');
  updateStaticText();
  renderQuestion();
});
</script>
