<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Angle Hunter – GyanPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0F0C29;--dark:#1A1A2E;--gold:#FFB800;--sky:#00AEEF;
    --green:#00C853;--pink:#FF4081;--purple:#7C3AED;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:20px;animation:fadeIn .6s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  .topbar{width:100%;max-width:640px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
  .back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.85rem;}
  .back-btn:hover{background:rgba(255,255,255,.2);}
  .badge{background:var(--green);color:#000;padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:800;letter-spacing:1px;}
  .lang-bar{display:flex;gap:6px;}
  .lang-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:5px 12px;border-radius:16px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;}
  .lang-btn.active{background:var(--gold);color:#000;}

  h1{font-family:'Baloo 2',cursive;font-size:2.2rem;color:var(--green);text-align:center;line-height:1.2;}
  .subtitle{font-size:.9rem;color:#aaa;margin-top:4px;text-align:center;}

  .stars{display:flex;justify-content:center;gap:10px;margin:14px 0;}
  .star{font-size:2rem;color:#444;transition:color .4s;}
  .star.lit{color:var(--gold);}

  .score-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:640px;background:var(--dark);border-radius:12px;padding:10px 20px;margin-bottom:18px;}
  .score-label{font-size:.85rem;color:#aaa;}
  .score-val{font-family:'Baloo 2',cursive;font-size:1.6rem;color:var(--gold);}
  .round-info{font-size:.85rem;color:#aaa;}

  .progress-wrap{width:100%;max-width:640px;background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin-bottom:18px;}
  .progress-fill{height:8px;border-radius:10px;background:linear-gradient(90deg,var(--green),var(--sky));transition:width .4s;}

  .card{background:var(--dark);border-radius:20px;padding:30px 24px;width:100%;max-width:640px;text-align:center;}

  /* Angle diagram / emoji art */
  .angle-art{font-size:5rem;margin:10px 0 6px;line-height:1;}

  /* question text */
  .q-text{
    background:rgba(0,200,83,.08);border:1.5px solid rgba(0,200,83,.3);
    border-radius:14px;padding:18px 16px;margin:0 auto 24px;
    font-size:1.2rem;font-weight:700;color:#fff;max-width:480px;line-height:1.5;
  }
  .q-text .deg{color:var(--gold);font-family:'Baloo 2',cursive;}

  /* choices */
  .choices{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .choice-btn{
    background:linear-gradient(135deg,rgba(0,200,83,.15),rgba(0,174,239,.1));
    border:2px solid var(--green);color:#fff;border-radius:14px;
    padding:13px 20px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;
    transition:transform .15s,border-color .15s;
  }
  .choice-btn:hover{transform:scale(1.06);border-color:var(--gold);}
  .choice-btn:disabled{cursor:not-allowed;transform:none;}
  .choice-btn.correct{border-color:var(--green);background:rgba(0,200,83,.3);color:#00C853;}
  .choice-btn.wrong{border-color:var(--pink);background:rgba(255,64,129,.25);color:var(--pink);}

  .feedback{min-height:36px;font-size:1.1rem;font-weight:800;margin-bottom:10px;}
  .feedback.correct{color:var(--green);}
  .feedback.wrong{color:var(--pink);}
  .explanation{font-size:.85rem;color:#aaa;margin-bottom:14px;min-height:18px;}

  .next-btn{background:linear-gradient(135deg,var(--green),var(--sky));border:none;color:#000;padding:12px 36px;border-radius:24px;font-family:'Baloo 2',cursive;font-size:1.1rem;cursor:pointer;display:none;font-weight:800;}
  .next-btn:hover{opacity:.9;}

  .end-screen{display:none;text-align:center;}
  .end-screen h2{font-family:'Baloo 2',cursive;font-size:2rem;color:var(--green);margin-bottom:10px;}
  .end-screen p{font-size:1.1rem;margin-bottom:20px;color:#ddd;}
  .restart-btn{background:linear-gradient(135deg,var(--gold),var(--pink));border:none;color:#000;padding:12px 36px;border-radius:24px;font-family:'Baloo 2',cursive;font-size:1.1rem;cursor:pointer;font-weight:800;}

  [data-lang]{display:none;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <span class="badge">MATHS</span>
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<h1>📐 <span data-lang="en">Angle Hunter</span><span data-lang="hi">कोण शिकारी</span><span data-lang="as">কোণ চিকাৰী</span></h1>
<p class="subtitle">NCERT Class 7 · Lines &amp; Angles</p>

<div class="stars">
  <span class="star" id="s1">★</span>
  <span class="star" id="s2">★</span>
  <span class="star" id="s3">★</span>
</div>

<div class="score-bar">
  <div>
    <div class="score-label"><span data-lang="en">Score</span><span data-lang="hi">अंक</span><span data-lang="as">নম্বৰ</span></div>
    <div class="score-val" id="scoreVal">0</div>
  </div>
  <div class="round-info" id="roundInfo">Q 1 / 10</div>
</div>

<div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="card" id="gameArea">
  <div class="angle-art" id="artEmoji">📐</div>

  <div class="q-text" id="qText"></div>

  <div class="choices" id="choicesDiv"></div>

  <div class="feedback" id="feedback"></div>
  <div class="explanation" id="explanation"></div>

  <button class="next-btn" id="nextBtn" onclick="nextRound()">
    <span data-lang="en">Next →</span><span data-lang="hi">अगला →</span><span data-lang="as">পৰৱৰ্তী →</span>
  </button>
</div>

<div class="card end-screen" id="endScreen">
  <h2 id="endTitle"></h2>
  <p id="endMsg"></p>
  <div class="stars">
    <span class="star" id="es1">★</span>
    <span class="star" id="es2">★</span>
    <span class="star" id="es3">★</span>
  </div>
  <p style="font-size:1.3rem;color:var(--gold);font-weight:800;margin-bottom:18px;" id="finalScore"></p>
  <button class="restart-btn" onclick="restart()">
    <span data-lang="en">Play Again</span><span data-lang="hi">फिर खेलो</span><span data-lang="as">আকৌ খেলক</span>
  </button>
</div>

<script>
const questions=[
  {
    emoji:'🔺',
    en:'Two angles add up to <span class="deg">90°</span>. They are ___',
    hi:'दो कोण मिलकर <span class="deg">90°</span> बनाते हैं। वे ___ हैं',
    as:'দুটা কোণৰ সমষ্টি <span class="deg">90°</span>। সিহঁত ___',
    ans:'Complementary',
    choices:['Complementary','Supplementary','Vertically Opposite'],
    exp:'Complementary angles sum = 90°'
  },
  {
    emoji:'📏',
    en:'Two angles add up to <span class="deg">180°</span>. They are ___',
    hi:'दो कोण मिलकर <span class="deg">180°</span> बनाते हैं। वे ___ हैं',
    as:'দুটা কোণৰ সমষ্টি <span class="deg">180°</span>। সিহঁত ___',
    ans:'Supplementary',
    choices:['Complementary','Supplementary','Adjacent'],
    exp:'Supplementary angles sum = 180°'
  },
  {
    emoji:'✖️',
    en:'When two lines cross, the opposite angles are ___',
    hi:'जब दो रेखाएँ मिलती हैं, सामने के कोण ___ होते हैं',
    as:'দুটা ৰেখা কাটিলে বিপৰীত কোণবোৰ ___',
    ans:'Vertically Opposite',
    choices:['Complementary','Supplementary','Vertically Opposite'],
    exp:'Vertically opposite angles are equal'
  },
  {
    emoji:'📐',
    en:'Angle = <span class="deg">35°</span>. Its complement = ___',
    hi:'कोण = <span class="deg">35°</span>. इसका पूरक = ___',
    as:'কোণ = <span class="deg">35°</span>। ইয়াৰ পূৰক = ___',
    ans:'55°',
    choices:['45°','55°','65°'],
    exp:'90° − 35° = 55°'
  },
  {
    emoji:'📏',
    en:'Angle = <span class="deg">70°</span>. Its supplement = ___',
    hi:'कोण = <span class="deg">70°</span>. इसका संपूरक = ___',
    as:'কোণ = <span class="deg">70°</span>। ইয়াৰ সংপূৰক = ___',
    ans:'110°',
    choices:['100°','110°','120°'],
    exp:'180° − 70° = 110°'
  },
  {
    emoji:'🚥',
    en:'Alternate interior angles form when a transversal cuts ___ lines',
    hi:'एकांतर अंतः कोण तब बनते हैं जब एक तिर्यक रेखा ___ रेखाओं को काटती है',
    as:'বিকল্প অন্তৰ কোণ হয় যেতিয়া তীৰ্যক ৰেখাই ___ ৰেখা কাটে',
    ans:'Parallel',
    choices:['Parallel','Perpendicular','Equal'],
    exp:'Alternate interior angles are formed by a transversal cutting parallel lines'
  },
  {
    emoji:'↕️',
    en:'Corresponding angles are ___',
    hi:'संगत कोण ___ होते हैं',
    as:'সংগত কোণবোৰ ___',
    ans:'Equal',
    choices:['Equal','Supplementary','Complementary'],
    exp:'Corresponding angles are equal when lines are parallel'
  },
  {
    emoji:'📐',
    en:'Angle = <span class="deg">45°</span>. Its supplement = ___',
    hi:'कोण = <span class="deg">45°</span>. इसका संपूरक = ___',
    as:'কোণ = <span class="deg">45°</span>। ইয়াৰ সংপূৰক = ___',
    ans:'135°',
    choices:['125°','135°','145°'],
    exp:'180° − 45° = 135°'
  },
  {
    emoji:'🔲',
    en:'Co-interior angles (same-side interior) sum = ___',
    hi:'सह-अंतः कोणों का योग = ___',
    as:'সহ-অন্তৰ কোণৰ সমষ্টি = ___',
    ans:'180°',
    choices:['90°','180°','270°'],
    exp:'Co-interior angles are supplementary (sum = 180°)'
  },
  {
    emoji:'✖️',
    en:'Vertically opposite angles are always ___',
    hi:'शीर्षाभिमुख कोण हमेशा ___ होते हैं',
    as:'শীৰ্ষাভিমুখ কোণবোৰ সদায় ___',
    ans:'Equal',
    choices:['Equal','Supplementary','Complementary'],
    exp:'Vertically opposite angles are always equal'
  }
];

const msgs={
  en:{correct:'✅ Correct! Well done!',wrong:'❌ Incorrect!',endWin:'🎉 Well done!',endLose:'Keep practising!',score:'Your score:'},
  hi:{correct:'✅ सही! शाबाश!',wrong:'❌ गलत!',endWin:'🎉 शाबाश!',endLose:'अभ्यास जारी रखो!',score:'तुम्हारा स्कोर:'},
  as:{correct:'✅ শুদ্ধ! বাহ!',wrong:'❌ ভুল!',endWin:'🎉 বাহ বাহ!',endLose:'অনুশীলন জাৰি ৰাখক!',score:'তোমাৰ নম্বৰ:'}
};

let cur=0,score=0,lang='en',answered=false;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-lang]').forEach(el=>el.style.display='none');
  document.querySelectorAll(`[data-lang="${l}"]`).forEach(el=>el.style.display='inline');
  document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.remove('active');if(b.textContent.trim()===(l==='en'?'EN':l==='hi'?'हि':'অ'))b.classList.add('active');});
  if(!answered) loadQuestionText();
}

function loadQuestionText(){
  const q=questions[cur];
  document.getElementById('artEmoji').textContent=q.emoji;
  document.getElementById('qText').innerHTML=q[lang];
}

function loadQuestion(){
  const q=questions[cur];
  loadQuestionText();
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('explanation').textContent='';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('roundInfo').textContent=`Q ${cur+1} / 10`;
  document.getElementById('progress').style.width=`${cur*10}%`;
  answered=false;

  const div=document.getElementById('choicesDiv');
  div.innerHTML='';
  q.choices.forEach(c=>{
    const b=document.createElement('button');
    b.className='choice-btn';
    b.textContent=c;
    b.onclick=()=>answer(c,b);
    div.appendChild(b);
  });
}

function answer(val,btn){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const fb=document.getElementById('feedback');
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);

  if(val===q.ans){
    score+=10;
    fb.textContent=msgs[lang].correct;
    fb.className='feedback correct';
    btn.classList.add('correct');
  } else {
    fb.textContent=msgs[lang].wrong;
    fb.className='feedback wrong';
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.textContent===q.ans)b.classList.add('correct');});
  }
  document.getElementById('explanation').textContent=q.exp;
  document.getElementById('scoreVal').textContent=score;
  updateStars(score);
  document.getElementById('nextBtn').style.display='inline-block';
}

function nextRound(){
  cur++;
  if(cur>=questions.length){showEnd();return;}
  loadQuestion();
}

function updateStars(s){
  const pct=s;
  document.getElementById('s1').className='star'+(pct>=40?' lit':'');
  document.getElementById('s2').className='star'+(pct>=70?' lit':'');
  document.getElementById('s3').className='star'+(pct>=90?' lit':'');
}

function showEnd(){
  document.getElementById('gameArea').style.display='none';
  const pct=score;
  document.getElementById('endScreen').style.display='block';
  document.getElementById('endTitle').textContent=pct>=70?msgs[lang].endWin:msgs[lang].endLose;
  document.getElementById('endMsg').textContent=msgs[lang].score+' '+score+' / 100';
  document.getElementById('finalScore').textContent=score+' pts';
  document.getElementById('progress').style.width='100%';
  ['es1','es2','es3'].forEach((id,i)=>{
    document.getElementById(id).className='star'+([40,70,90][i]<=pct?' lit':'');
  });
  setLang(lang);
}

function restart(){
  cur=0;score=0;
  document.getElementById('gameArea').style.display='block';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('scoreVal').textContent='0';
  updateStars(0);
  loadQuestion();
  setLang(lang);
}

setLang('en');
loadQuestion();
</script>
</body>
</html>
