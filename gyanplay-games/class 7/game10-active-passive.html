<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Voice Changer – GyanPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0F0C29;--dark:#1A1A2E;--gold:#FFB800;--sky:#00AEEF;
    --green:#00C853;--pink:#FF4081;--purple:#7C3AED;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:20px;animation:fadeIn .6s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}

  .topbar{width:100%;max-width:640px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
  .back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.85rem;}
  .back-btn:hover{background:rgba(255,255,255,.2);}
  .badge{background:var(--pink);color:#fff;padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:800;letter-spacing:1px;}
  .lang-bar{display:flex;gap:6px;}
  .lang-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:5px 12px;border-radius:16px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;}
  .lang-btn.active{background:var(--gold);color:#000;}

  h1{font-family:'Baloo 2',cursive;font-size:2.2rem;color:var(--pink);text-align:center;line-height:1.2;}
  .subtitle{font-size:.9rem;color:#aaa;margin-top:4px;text-align:center;}

  .stars{display:flex;justify-content:center;gap:10px;margin:14px 0;}
  .star{font-size:2rem;color:#444;transition:color .4s;}
  .star.lit{color:var(--gold);}

  .score-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:640px;background:var(--dark);border-radius:12px;padding:10px 20px;margin-bottom:18px;}
  .score-label{font-size:.85rem;color:#aaa;}
  .score-val{font-family:'Baloo 2',cursive;font-size:1.6rem;color:var(--gold);}
  .round-info{font-size:.85rem;color:#aaa;}

  .progress-wrap{width:100%;max-width:640px;background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin-bottom:18px;}
  .progress-fill{height:8px;border-radius:10px;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .4s;}

  .card{background:var(--dark);border-radius:20px;padding:30px 24px;width:100%;max-width:640px;text-align:center;}

  /* question label */
  .q-label{font-size:.95rem;color:#bbb;margin-bottom:18px;font-weight:700;}

  /* sentence box */
  .sentence-box{
    background:rgba(255,64,129,.08);border:2px solid rgba(255,64,129,.35);
    border-radius:16px;padding:22px 20px;margin:0 auto 28px;
    font-size:1.3rem;font-weight:700;color:#fff;max-width:480px;line-height:1.5;
    font-style:italic;
  }

  /* round indicator dots */
  .dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
  .dot{width:14px;height:14px;border-radius:50%;background:#333;transition:background .3s;}
  .dot.correct{background:var(--green);}
  .dot.wrong{background:var(--pink);}
  .dot.current{background:var(--gold);animation:pulse 1s infinite;}

  /* two big choice buttons */
  .voice-choices{display:flex;gap:16px;justify-content:center;margin-bottom:22px;flex-wrap:wrap;}
  .voice-btn{
    flex:1;min-width:140px;max-width:220px;
    padding:22px 16px;border-radius:18px;border:2px solid;
    font-family:'Baloo 2',cursive;font-size:1.5rem;cursor:pointer;
    transition:transform .15s,opacity .15s;
  }
  .voice-btn.active-voice{background:rgba(0,174,239,.15);border-color:var(--sky);color:var(--sky);}
  .voice-btn.passive-voice{background:rgba(124,58,237,.15);border-color:var(--purple);color:#c4b5fd;}
  .voice-btn:hover{transform:scale(1.05);}
  .voice-btn:disabled{cursor:not-allowed;transform:none;opacity:.7;}
  .voice-btn.correct{border-color:var(--green)!important;background:rgba(0,200,83,.2)!important;color:var(--green)!important;}
  .voice-btn.wrong{border-color:var(--pink)!important;background:rgba(255,64,129,.2)!important;color:var(--pink)!important;}

  .feedback{min-height:36px;font-size:1.1rem;font-weight:800;margin-bottom:10px;}
  .feedback.correct{color:var(--green);}
  .feedback.wrong{color:var(--pink);}
  .tip{font-size:.82rem;color:#aaa;margin-bottom:14px;min-height:18px;}

  .next-btn{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;color:#fff;padding:12px 36px;border-radius:24px;font-family:'Baloo 2',cursive;font-size:1.1rem;cursor:pointer;display:none;}
  .next-btn:hover{opacity:.9;}

  .end-screen{display:none;text-align:center;}
  .end-screen h2{font-family:'Baloo 2',cursive;font-size:2rem;color:var(--pink);margin-bottom:10px;}
  .end-screen p{font-size:1.1rem;margin-bottom:20px;color:#ddd;}
  .restart-btn{background:linear-gradient(135deg,var(--gold),var(--pink));border:none;color:#000;padding:12px 36px;border-radius:24px;font-family:'Baloo 2',cursive;font-size:1.1rem;cursor:pointer;font-weight:800;}

  [data-lang]{display:none;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <span class="badge">ENGLISH</span>
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<h1>🎙️ <span data-lang="en">Voice Changer</span><span data-lang="hi">वाच्य पहचानो</span><span data-lang="as">বাচ্য চিনক</span></h1>
<p class="subtitle">NCERT Class 7 · Active &amp; Passive Voice</p>

<div class="stars">
  <span class="star" id="s1">★</span>
  <span class="star" id="s2">★</span>
  <span class="star" id="s3">★</span>
</div>

<div class="score-bar">
  <div>
    <div class="score-label"><span data-lang="en">Score</span><span data-lang="hi">अंक</span><span data-lang="as">নম্বৰ</span></div>
    <div class="score-val" id="scoreVal">0</div>
  </div>
  <div class="round-info" id="roundInfo">Q 1 / 10</div>
</div>

<div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="card" id="gameArea">
  <div class="q-label">
    <span data-lang="en">🎯 Active or Passive Voice?</span>
    <span data-lang="hi">🎯 कर्तृवाच्य या कर्मवाच्य?</span>
    <span data-lang="as">🎯 কৰ্তৃবাচ্য নে কৰ্মবাচ্য?</span>
  </div>

  <div class="dots" id="dots"></div>

  <div class="sentence-box" id="sentenceBox"></div>

  <div class="voice-choices">
    <button class="voice-btn active-voice" id="btnActive" onclick="answer('Active')">
      ⚡ <span data-lang="en">Active</span><span data-lang="hi">कर्तृवाच्य</span><span data-lang="as">কৰ্তৃবাচ্য</span>
    </button>
    <button class="voice-btn passive-voice" id="btnPassive" onclick="answer('Passive')">
      🔄 <span data-lang="en">Passive</span><span data-lang="hi">कर्मवाच्य</span><span data-lang="as">কৰ্মবাচ্য</span>
    </button>
  </div>

  <div class="feedback" id="feedback"></div>
  <div class="tip" id="tip"></div>

  <button class="next-btn" id="nextBtn" onclick="nextRound()">
    <span data-lang="en">Next →</span><span data-lang="hi">अगला →</span><span data-lang="as">পৰৱৰ্তী →</span>
  </button>
</div>

<div class="card end-screen" id="endScreen">
  <h2 id="endTitle"></h2>
  <p id="endMsg"></p>
  <div class="stars">
    <span class="star" id="es1">★</span>
    <span class="star" id="es2">★</span>
    <span class="star" id="es3">★</span>
  </div>
  <p style="font-size:1.3rem;color:var(--gold);font-weight:800;margin-bottom:18px;" id="finalScore"></p>
  <button class="restart-btn" onclick="restart()">
    <span data-lang="en">Play Again</span><span data-lang="hi">फिर खेलो</span><span data-lang="as">আকৌ খেলক</span>
  </button>
</div>

<script>
const questions=[
  {sentence:'The cat chased the mouse.',ans:'Active',tip:'Subject (cat) performs the action → Active'},
  {sentence:'The letter was written by John.',ans:'Passive',tip:'"was written" — past participle with "by" → Passive'},
  {sentence:'She baked a cake.',ans:'Active',tip:'Subject (she) performs the action → Active'},
  {sentence:'The book was read by the student.',ans:'Passive',tip:'"was read by" → Passive Voice'},
  {sentence:'Ram plays cricket.',ans:'Active',tip:'Subject (Ram) acts directly → Active'},
  {sentence:'The road was cleaned by workers.',ans:'Passive',tip:'"was cleaned by" → Passive Voice'},
  {sentence:'They built a new school.',ans:'Active',tip:'Subject (they) performs action → Active'},
  {sentence:'The song is sung by her.',ans:'Passive',tip:'"is sung by" → Passive Voice'},
  {sentence:'The dog bit the child.',ans:'Active',tip:'Subject (dog) performs action → Active'},
  {sentence:'A goal was scored by Rohit.',ans:'Passive',tip:'"was scored by" → Passive Voice'}
];

const msgs={
  en:{correct:'✅ Correct! Well done!',wrong:'❌ Incorrect! Try again.',endWin:'🎉 Excellent!',endLose:'Keep practising!',score:'Your score:'},
  hi:{correct:'✅ सही! शाबाश!',wrong:'❌ गलत! फिर कोशिश करो।',endWin:'🎉 बहुत अच्छे!',endLose:'अभ्यास जारी रखो!',score:'तुम्हारा स्कोर:'},
  as:{correct:'✅ শুদ্ধ! বাহ!',wrong:'❌ ভুল! পুনৰ চেষ্টা কৰক।',endWin:'🎉 অতি উত্তম!',endLose:'অনুশীলন জাৰি ৰাখক!',score:'তোমাৰ নম্বৰ:'}
};

let cur=0,score=0,lang='en',answered=false;
const results=Array(10).fill(null);

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-lang]').forEach(el=>el.style.display='none');
  document.querySelectorAll(`[data-lang="${l}"]`).forEach(el=>el.style.display='inline');
  document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.remove('active');if(b.textContent.trim()===(l==='en'?'EN':l==='hi'?'हि':'অ'))b.classList.add('active');});
}

function buildDots(){
  const div=document.getElementById('dots');
  div.innerHTML='';
  results.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===cur?' current':r===true?' correct':r===false?' wrong':'');
    div.appendChild(d);
  });
}

function loadQuestion(){
  const q=questions[cur];
  document.getElementById('sentenceBox').textContent='"'+q.sentence+'"';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('tip').textContent='';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('btnActive').disabled=false;
  document.getElementById('btnPassive').disabled=false;
  document.getElementById('btnActive').className='voice-btn active-voice';
  document.getElementById('btnPassive').className='voice-btn passive-voice';
  document.getElementById('roundInfo').textContent=`Q ${cur+1} / 10`;
  document.getElementById('progress').style.width=`${cur*10}%`;
  answered=false;
  buildDots();
}

function answer(val){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const fb=document.getElementById('feedback');
  const btnA=document.getElementById('btnActive');
  const btnP=document.getElementById('btnPassive');
  btnA.disabled=true; btnP.disabled=true;

  const clickedBtn=val==='Active'?btnA:btnP;
  const correctBtn=q.ans==='Active'?btnA:btnP;

  if(val===q.ans){
    score+=10;
    fb.textContent=msgs[lang].correct;
    fb.className='feedback correct';
    clickedBtn.classList.add('correct');
    results[cur]=true;
  } else {
    fb.textContent=msgs[lang].wrong;
    fb.className='feedback wrong';
    clickedBtn.classList.add('wrong');
    correctBtn.classList.add('correct');
    results[cur]=false;
  }
  document.getElementById('tip').textContent=q.tip;
  document.getElementById('scoreVal').textContent=score;
  updateStars(score);
  document.getElementById('nextBtn').style.display='inline-block';
  buildDots();
}

function nextRound(){
  cur++;
  if(cur>=questions.length){showEnd();return;}
  loadQuestion();
}

function updateStars(s){
  const pct=s;
  document.getElementById('s1').className='star'+(pct>=40?' lit':'');
  document.getElementById('s2').className='star'+(pct>=70?' lit':'');
  document.getElementById('s3').className='star'+(pct>=90?' lit':'');
}

function showEnd(){
  document.getElementById('gameArea').style.display='none';
  const pct=score;
  document.getElementById('endScreen').style.display='block';
  document.getElementById('endTitle').textContent=pct>=70?msgs[lang].endWin:msgs[lang].endLose;
  document.getElementById('endMsg').textContent=msgs[lang].score+' '+score+' / 100';
  document.getElementById('finalScore').textContent=score+' pts';
  document.getElementById('progress').style.width='100%';
  ['es1','es2','es3'].forEach((id,i)=>{
    document.getElementById(id).className='star'+([40,70,90][i]<=pct?' lit':'');
  });
  setLang(lang);
}

function restart(){
  cur=0;score=0;results.fill(null);
  document.getElementById('gameArea').style.display='block';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('scoreVal').textContent='0';
  updateStars(0);
  loadQuestion();
  setLang(lang);
}

setLang('en');
loadQuestion();
</script>
</body>
</html>
