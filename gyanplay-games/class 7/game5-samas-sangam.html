<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>समास संगम – GyanPlay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#eee;min-height:100vh;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageOut{from{opacity:1}to{opacity:0}}
.page-out{animation:pageOut .3s ease forwards}

header{background:linear-gradient(135deg,#b5179e,#7209b7);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.back-btn{color:#fff;text-decoration:none;font-size:1rem;opacity:.85;transition:opacity .2s}
.back-btn:hover{opacity:1}
h1{font-size:1.2rem;color:#fff;flex:1}
.subject-tag{background:rgba(255,255,255,.2);color:#fff;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;letter-spacing:.5px}

.lang-bar{display:flex;justify-content:center;gap:8px;padding:10px}
.lb{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#ccc;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:.8rem;transition:all .2s}
.lb.active{background:#b5179e;border-color:#b5179e;color:#fff;font-weight:700}

.container{max-width:560px;margin:0 auto;padding:16px}

.progress-wrap{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin-bottom:6px}
.progress-fill{background:linear-gradient(90deg,#b5179e,#f72585);height:100%;border-radius:10px;transition:width .4s ease}
.progress-text{text-align:center;font-size:.78rem;color:#aaa;margin-bottom:16px}

.stars{text-align:center;font-size:1.6rem;margin-bottom:16px}
.star{opacity:.3;transition:opacity .3s,filter .3s}
.star.lit{opacity:1;filter:drop-shadow(0 0 6px gold)}

.question-card{background:rgba(255,255,255,.06);border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,.1)}
.q-label{font-size:.7rem;color:#f72585;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.q-text{font-size:1.15rem;font-weight:600;line-height:1.6}
.q-type-badge{display:inline-block;background:rgba(247,37,133,.15);color:#f72585;padding:3px 10px;border-radius:20px;font-size:.75rem;margin-top:8px;font-weight:700}

/* Matching layout */
.match-wrap{display:flex;gap:12px;margin-top:16px}
.col{flex:1;display:flex;flex-direction:column;gap:8px}
.col-title{text-align:center;font-size:.75rem;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:700}
.item{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .2s;font-size:.95rem;text-align:center;font-weight:600;min-height:44px;display:flex;align-items:center;justify-content:center}
.item:hover{background:rgba(181,23,158,.15);border-color:#b5179e}
.item.selected{background:rgba(181,23,158,.3);border-color:#b5179e;color:#fff}
.item.matched-correct{background:rgba(6,214,160,.15);border-color:#06d6a0;color:#06d6a0;cursor:default}
.item.matched-wrong{background:rgba(239,71,111,.15);border-color:#ef476f;color:#ef476f}
.item.disabled{cursor:default;opacity:.5}

.check-btn{width:100%;padding:12px;background:linear-gradient(135deg,#b5179e,#f72585);border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;margin-top:12px;transition:opacity .2s;display:none}
.check-btn:disabled{opacity:.5;cursor:not-allowed}
.check-btn:not(:disabled):hover{opacity:.9}

.feedback{text-align:center;padding:10px;border-radius:10px;margin-top:10px;font-weight:600;font-size:.95rem;display:none}
.feedback.correct{background:rgba(6,214,160,.15);color:#06d6a0}
.feedback.wrong{background:rgba(239,71,111,.15);color:#ef476f}

.next-btn{width:100%;padding:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:12px;color:#fff;font-size:1rem;cursor:pointer;margin-top:10px;transition:all .2s;display:none}
.next-btn:hover{background:rgba(255,255,255,.15)}

/* Result overlay */
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .4s}
.result-overlay.show{opacity:1;pointer-events:all}
.result-card{background:#1a1a2e;border-radius:20px;padding:30px;text-align:center;max-width:360px;width:90%;border:2px solid #b5179e}
.result-emoji{font-size:3rem;margin-bottom:10px}
.result-title{font-size:1.5rem;font-weight:800;color:#b5179e;margin-bottom:6px}
.result-score{font-size:1.1rem;color:#ccc;margin-bottom:16px}
.result-stars{font-size:2rem;margin-bottom:16px}
.fact-box{background:rgba(181,23,158,.1);border-radius:12px;padding:14px;margin-bottom:16px;text-align:left}
.fact-label{font-size:.7rem;color:#b5179e;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fact-text{font-size:.9rem;color:#ddd;line-height:1.5}
.play-again-btn{width:100%;padding:12px;background:linear-gradient(135deg,#b5179e,#f72585);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:1rem;cursor:pointer}

/* Confetti */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<header>
  <a href="../../classroom.html?class=class-7" class="back-btn" onclick="navBack(event,this)">← Back</a>
  <h1 id="hTitle">समास संगम</h1>
  <span class="subject-tag" id="hSubject">हिंदी</span>
</header>

<div class="lang-bar">
  <button class="lb" id="lbEn" onclick="setLang('en')">EN</button>
  <button class="lb" id="lbHi" onclick="setLang('hi')">हि</button>
  <button class="lb" id="lbAs" onclick="setLang('as')">অ</button>
</div>

<div class="container">
  <div class="progress-wrap"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <div class="progress-text" id="progText">0 / 8</div>
  <div class="stars">
    <span class="star" id="s1">⭐</span>
    <span class="star" id="s2">⭐</span>
    <span class="star" id="s3">⭐</span>
  </div>

  <div class="question-card">
    <div class="q-label" id="qLabel">समास का प्रकार बताइए</div>

  </div>

  <div class="match-wrap">
    <div class="col">
      <div class="col-title" id="colLeft">समास</div>
      <div id="leftCol"></div>
    </div>
    <div class="col">
      <div class="col-title" id="colRight">अर्थ</div>
      <div id="rightCol"></div>
    </div>
  </div>

  <div class="feedback" id="feedback">–</div>
  <button class="check-btn" id="checkBtn" onclick="checkAnswer()">जाँचें</button>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">अगला →</button>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji" id="resEmoji">🎊</div>
    <div class="result-title" id="resTitle">शाबाश!</div>
    <div class="result-score" id="resScore">–</div>
    <div class="result-stars" id="resStars">⭐⭐⭐</div>
    <div class="fact-box">
      <div class="fact-label" id="factLabel">क्या आप जानते हैं?</div>
      <div class="fact-text" id="factText">–</div>
    </div>
    <button class="play-again-btn" onclick="restartGame()" id="replayBtn">फिर खेलें 🔄</button>
  </div>
</div>

// 8 rounds, each has 4 pairs to match (compound word → meaning)
const ROUNDS=[

      {left:{en:"Pathshala",hi:"पाठशाला",as:"পাঠশালা"},right:{en:"School",hi:"पाठ की शाला",as:"পাঠৰ শালা"}},
      {left:{en:"Vidyalaya",hi:"विद्यालय",as:"বিদ্যালয়"},right:{en:"Temple of Learning",hi:"विद्या का आलय",as:"বিদ্যাৰ আলয়"}}

      {left:{en:"Desh-Videsh",hi:"देश-विदेश",as:"দেশ-বিদেশ"},right:{en:"Country and Abroad",hi:"देश और विदेश",as:"দেশ আৰু বিদেশ"}},
      {left:{en:"Ram-Lakshman",hi:"राम-लक्ष्मण",as:"ৰাম-লক্ষ্মণ"},right:{en:"Ram and Lakshman",hi:"राम और लक्ष्मण",as:"ৰাম আৰু লক্ষ্মণ"}},

      {left:{en:"Yathashakti",hi:"यथाशक्ति",as:"যথাশক্তি"},right:{en:"As per ability",hi:"शक्ति के अनुसार",as:"শক্তি অনুযায়ী"}},
      {left:{en:"Aajeevan",hi:"आजीवन",as:"আজীৱন"},right:{en:"Throughout life",hi:"जीवन भर",as:"সমগ্ৰ জীৱন"}},
      {left:{en:"Nirjanvana",hi:"निर्जनवन",as:"নিৰ্জনবন"},right:{en:"Deserted forest",hi:"सुनसान जंगल",as:"জনমানৱহীন অৰণ্য"}}

  {
    type:{en:"Dvigu",hi:"द्विगु",as:"দ্বিগু"},

      {left:{en:"Chaturvarna",hi:"चतुर्वर्ण",as:"চতুৰ্বৰ্ণ"},right:{en:"Four varnas",hi:"चार वर्ण",as:"চাৰিটা বৰ্ণ"}},
      {left:{en:"Navratna",hi:"नवरत्न",as:"নৱৰত্ন"},right:{en:"Nine gems",hi:"नौ रत्न",as:"ন'টা ৰত্ন"}},

      {left:{en:"Shankardev",hi:"शंकरदेव",as:"শংকৰদেৱ"},right:{en:"Shankara's grace",hi:"शंकर की कृपा",as:"শংকৰৰ দেৱতা"}}

let lang='hi', qIdx=0, score=0, selectedLeft=null, selectedRight=null;
let matchedPairs=[], wrongPairs=[];
let roundData=null;

function setLang(l){
  lang=l;
  localStorage.setItem('gyanplay_lang',l);
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('active'));
  document.getElementById('lb'+l.charAt(0).toUpperCase()+l.slice(1)).classList.add('active');
  updateUI();
}

function updateUI(){
  const t=T[lang];
  document.getElementById('hTitle').textContent=t.title;
  document.getElementById('hSubject').textContent=t.subject;
  document.getElementById('qLabel').textContent=t.qlabel;
  document.getElementById('colLeft').textContent=t.colleft;
  document.getElementById('colRight').textContent=t.colright;
  document.getElementById('checkBtn').textContent=t.check;
  document.getElementById('nextBtn').textContent=t.next;
  document.getElementById('progText').textContent=t.progress.replace('{q}',qIdx);
  if(roundData){
    document.getElementById('qText').textContent=roundData.type[lang];
    document.getElementById('qBadge').textContent=roundData.type[lang];
  }
}

function litStar(n){
  for(let i=1;i<=3;i++){
    const s=document.getElementById('s'+i);
    s.classList.toggle('lit',i<=n);
  }
}

function playTone(freq,dur=0.15,type='sine'){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;o.type=type;
    g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function renderRound(){
  roundData=ROUNDS[qIdx];
  const t=T[lang];
  document.getElementById('qText').textContent=roundData.type[lang];
  document.getElementById('qBadge').textContent=roundData.type[lang];

  const prog=((qIdx)/8)*100;
  document.getElementById('progFill').style.width=prog+'%';
  document.getElementById('progText').textContent=t.progress.replace('{q}',qIdx);

  matchedPairs=[];wrongPairs=[];
  selectedLeft=null;selectedRight=null;

  const pairs=roundData.pairs;
  const shuffledRight=shuffle(pairs.map((_,i)=>i));

  const leftCol=document.getElementById('leftCol');
  const rightCol=document.getElementById('rightCol');
  leftCol.innerHTML='';rightCol.innerHTML='';

  pairs.forEach((p,i)=>{
    const li=document.createElement('div');
    li.className='item';li.dataset.idx=i;li.dataset.side='left';
    li.textContent=p.left[lang];
    li.onclick=()=>selectItem(li,'left',i);
    leftCol.appendChild(li);
  });

  shuffledRight.forEach(i=>{
    const ri=document.createElement('div');
    ri.className='item';ri.dataset.idx=i;ri.dataset.side='right';
    ri.textContent=pairs[i].right[lang];
    ri.onclick=()=>selectItem(ri,'right',i);
    rightCol.appendChild(ri);
  });

  document.getElementById('feedback').style.display='none';
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('nextBtn').style.display='none';

  const star=Math.ceil(((qIdx+1)/8)*3);
  litStar(Math.max(0,star-1));
}

function selectItem(el,side,idx){
  if(el.classList.contains('matched-correct')||el.classList.contains('disabled'))return;

  if(side==='left'){
    document.querySelectorAll('#leftCol .item').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected');
    selectedLeft=idx;
  } else {
    document.querySelectorAll('#rightCol .item').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected');
    selectedRight=idx;
  }

  if(selectedLeft!==null && selectedRight!==null){
    checkPair();
  }
}

function checkPair(){
  const t=T[lang];
  const leftEl=document.querySelector(`#leftCol .item[data-idx="${selectedLeft}"]`);
  const rightEl=document.querySelector(`#rightCol .item[data-idx="${selectedRight}"]`);
  const fb=document.getElementById('feedback');

  if(selectedLeft===selectedRight){
    // correct
    playTone(660);
    leftEl.classList.remove('selected');rightEl.classList.remove('selected');
    leftEl.classList.add('matched-correct');rightEl.classList.add('matched-correct');
    leftEl.onclick=null;rightEl.onclick=null;
    matchedPairs.push(selectedLeft);
    fb.textContent=t.feedback_ok;
    fb.className='feedback correct';
    fb.style.display='block';
    score++;
  } else {
    // wrong
    playTone(200,0.3,'sawtooth');
    leftEl.classList.add('matched-wrong');rightEl.classList.add('matched-wrong');
    fb.textContent=t.feedback_wrong;
    fb.className='feedback wrong';
    fb.style.display='block';
    setTimeout(()=>{
      leftEl.classList.remove('matched-wrong','selected');
      rightEl.classList.remove('matched-wrong','selected');
      fb.style.display='none';
    },900);
  }

  selectedLeft=null;selectedRight=null;

  // Check if all matched
  if(matchedPairs.length===roundData.pairs.length){
    setTimeout(()=>{
      document.getElementById('nextBtn').style.display='block';
      if(qIdx+1===8) document.getElementById('nextBtn').textContent=T[lang].again.replace('🔄','').trim();
    },400);
  }
}

function nextQuestion(){
  qIdx++;
  if(qIdx>=8){showResult();return;}
  renderRound();
}

function showResult(){
  const t=T[lang];
  const pct=score/8;
  let stars,title,emoji;
  if(pct>=0.875){stars=3;title=t.great;emoji='🎊';}
  else if(pct>=0.625){stars=2;title=t.good;emoji='👍';}
  else{stars=1;title=t.ok;emoji='💪';}

  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('resScore').textContent=t.score.replace('{c}',score);
  document.getElementById('resStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('factLabel').textContent=t.factlabel;
  document.getElementById('factText').textContent=t.fact;
  document.getElementById('replayBtn').textContent=t.again;
  document.getElementById('resultOverlay').classList.add('show');
  document.getElementById('progFill').style.width='100%';
  litStar(stars);
  if(stars>=2)launchConfetti();
}

function restartGame(){
  document.getElementById('resultOverlay').classList.remove('show');
  qIdx=0;score=0;
  renderRound();
}

function launchConfetti(){
  const colors=['#b5179e','#f72585','#7209b7','#3a0ca3','#4cc9f0','#06d6a0'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  }
}

function navBack(e,a){
  e.preventDefault();
  document.body.classList.add('page-out');
  setTimeout(()=>location.href=a.href,300);
}

// Init
window.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('gyanplay_lang')||'hi';
  lang=saved;
  document.getElementById('lb'+lang.charAt(0).toUpperCase()+lang.slice(1)).classList.add('active');
  renderRound();
  updateUI();
});
</script>
