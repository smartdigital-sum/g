<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Article Adventure – GyanPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0F0C29;--dark:#1A1A2E;--gold:#FFB800;--sky:#00AEEF;
    --green:#00C853;--pink:#FF4081;--purple:#7C3AED;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:20px;animation:fadeIn .6s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

  .topbar{width:100%;max-width:660px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
  .back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.85rem;}
  .back-btn:hover{background:rgba(255,255,255,.2);}
  .badge{background:var(--purple);color:#fff;padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:800;letter-spacing:1px;}
  .lang-bar{display:flex;gap:6px;}
  .lang-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:5px 12px;border-radius:16px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;}
  .lang-btn.active{background:var(--gold);color:#000;}

  h1{font-family:'Baloo 2',cursive;font-size:2.2rem;color:var(--purple);text-align:center;line-height:1.2;}
  .subtitle{font-size:.9rem;color:#aaa;margin-top:4px;text-align:center;}

  .stars{display:flex;justify-content:center;gap:10px;margin:14px 0;}
  .star{font-size:2rem;color:#444;transition:color .4s;}
  .star.lit{color:var(--gold);}

  .score-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:660px;background:var(--dark);border-radius:12px;padding:10px 20px;margin-bottom:18px;}
  .score-label{font-size:.85rem;color:#aaa;}
  .score-val{font-family:'Baloo 2',cursive;font-size:1.6rem;color:var(--gold);}
  .round-info{font-size:.85rem;color:#aaa;}

  .progress-wrap{width:100%;max-width:660px;background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin-bottom:18px;}
  .progress-fill{height:8px;border-radius:10px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .4s;}

  .card{background:var(--dark);border-radius:20px;padding:30px 24px;width:100%;max-width:660px;text-align:center;}

  /* question type badge */
  .type-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:800;margin-bottom:14px;letter-spacing:.5px;}
  .type-article{background:rgba(0,174,239,.2);border:1.5px solid var(--sky);color:var(--sky);}
  .type-adjective{background:rgba(124,58,237,.2);border:1.5px solid var(--purple);color:#c4b5fd;}

  /* sentence display */
  .sentence-box{
    background:rgba(124,58,237,.1);border:2px solid rgba(124,58,237,.35);
    border-radius:16px;padding:22px 20px;margin:0 auto 26px;
    font-size:1.35rem;font-weight:700;color:#fff;max-width:520px;line-height:1.6;
  }
  .blank-slot{
    display:inline-block;min-width:54px;border-bottom:3px solid var(--gold);
    color:var(--gold);font-family:'Baloo 2',cursive;font-size:1.5rem;
    padding:0 6px;margin:0 4px;vertical-align:middle;animation:bounce 1.2s infinite;
  }

  /* choices */
  .choices{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .choice-btn{
    background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(0,174,239,.1));
    border:2px solid var(--purple);color:#fff;border-radius:14px;
    padding:14px 24px;cursor:pointer;font-family:'Baloo 2',cursive;font-size:1.4rem;
    transition:transform .15s,border-color .15s;min-width:80px;
  }
  .choice-btn.long-text{font-family:'Nunito',sans-serif;font-size:.92rem;padding:12px 16px;}
  .choice-btn:hover{transform:scale(1.08);border-color:var(--gold);}
  .choice-btn:disabled{cursor:not-allowed;transform:none;}
  .choice-btn.correct{border-color:var(--green);background:rgba(0,200,83,.25);color:#00ff88;}
  .choice-btn.wrong{border-color:var(--pink);background:rgba(255,64,129,.25);color:var(--pink);}

  .feedback{min-height:36px;font-size:1.1rem;font-weight:800;margin-bottom:10px;}
  .feedback.correct{color:var(--green);}
  .feedback.wrong{color:var(--pink);}
  .explanation{font-size:.85rem;color:#aaa;margin-bottom:14px;min-height:18px;line-height:1.4;}

  .next-btn{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;padding:12px 36px;border-radius:24px;font-family:'Baloo 2',cursive;font-size:1.1rem;cursor:pointer;display:none;}
  .next-btn:hover{opacity:.9;}

  .end-screen{display:none;text-align:center;}
  .end-screen h2{font-family:'Baloo 2',cursive;font-size:2rem;color:var(--purple);margin-bottom:10px;}
  .end-screen p{font-size:1.1rem;margin-bottom:20px;color:#ddd;}
  .restart-btn{background:linear-gradient(135deg,var(--gold),var(--purple));border:none;color:#fff;padding:12px 36px;border-radius:24px;font-family:'Baloo 2',cursive;font-size:1.1rem;cursor:pointer;font-weight:800;}

  /* article showcase on end screen */
  .article-showcase{display:flex;gap:14px;justify-content:center;margin:16px 0;flex-wrap:wrap;}
  .article-pill{background:rgba(124,58,237,.25);border:2px solid var(--purple);color:#c4b5fd;padding:8px 22px;border-radius:20px;font-family:'Baloo 2',cursive;font-size:1.4rem;}

  [data-lang]{display:none;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <span class="badge">ENGLISH</span>
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<h1>🗺️ <span data-lang="en">Article Adventure</span><span data-lang="hi">लेखनीय साहसिक</span><span data-lang="as">আৰ্টিকেল অভিযান</span></h1>
<p class="subtitle">NCERT Class 7 · Articles &amp; Adjectives</p>

<div class="stars">
  <span class="star" id="s1">★</span>
  <span class="star" id="s2">★</span>
  <span class="star" id="s3">★</span>
</div>

<div class="score-bar">
  <div>
    <div class="score-label"><span data-lang="en">Score</span><span data-lang="hi">अंक</span><span data-lang="as">নম্বৰ</span></div>
    <div class="score-val" id="scoreVal">0</div>
  </div>
  <div class="round-info" id="roundInfo">Q 1 / 10</div>
</div>

<div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="card" id="gameArea">
  <div class="type-tag" id="typeTag">ARTICLE</div>

  <div class="sentence-box" id="sentenceBox"></div>

  <div class="choices" id="choicesDiv"></div>

  <div class="feedback" id="feedback"></div>
  <div class="explanation" id="explanation"></div>

  <button class="next-btn" id="nextBtn" onclick="nextRound()">
    <span data-lang="en">Next →</span><span data-lang="hi">अगला →</span><span data-lang="as">পৰৱৰ্তী →</span>
  </button>
</div>

<div class="card end-screen" id="endScreen">
  <div style="font-size:3rem;margin-bottom:8px;">📚</div>
  <h2 id="endTitle"></h2>
  <p id="endMsg"></p>
  <div class="article-showcase">
    <span class="article-pill">a</span>
    <span class="article-pill">an</span>
    <span class="article-pill">the</span>
  </div>
  <div class="stars">
    <span class="star" id="es1">★</span>
    <span class="star" id="es2">★</span>
    <span class="star" id="es3">★</span>
  </div>
  <p style="font-size:1.3rem;color:var(--gold);font-weight:800;margin-bottom:18px;" id="finalScore"></p>
  <button class="restart-btn" onclick="restart()">
    <span data-lang="en">Play Again</span><span data-lang="hi">फिर खेलो</span><span data-lang="as">আকৌ খেলক</span>
  </button>
</div>

<script>
// Each question: type = 'article' or 'adjective'
// sentence uses ___ as placeholder
// choices may be short (a/an/the) or longer adjective type names
const questions=[
  {
    type:'article',
    en:'___ elephant is a large animal.',
    hi:'___ हाथी एक बड़ा जानवर है।',
    as:'___ হাতী এটা ডাঙৰ জন্তু।',
    ans:'An', choices:['A','An','The'],
    exp:'"An" is used before words starting with a vowel sound (elephant → e).'
  },
  {
    type:'article',
    en:'___ sun rises in the east.',
    hi:'___ सूरज पूर्व में उगता है।',
    as:'___ সূৰ্য পূবত উদয় হয়।',
    ans:'The', choices:['A','An','The'],
    exp:'"The" is used for unique nouns — there is only one sun!'
  },
  {
    type:'article',
    en:'She is ___ honest person.',
    hi:'वह ___ ईमानदार इंसान है।',
    as:'তেওঁ ___ সৎ মানুহ।',
    ans:'an', choices:['a','an','the'],
    exp:'"An" is used because "honest" starts with a vowel sound (silent h, sounds like "onest").'
  },
  {
    type:'article',
    en:'I saw ___ bird in the garden.',
    hi:'मैंने बगीचे में ___ पक्षी देखा।',
    as:'মই বাগিচাত ___ চৰাই দেখিলোঁ।',
    ans:'a', choices:['a','an','the'],
    exp:'"A" is used before singular countable nouns starting with a consonant sound.'
  },
  {
    type:'article',
    en:'___ Ganga is a holy river.',
    hi:'___ गंगा एक पवित्र नदी है।',
    as:'___ গংগা এখন পবিত্ৰ নদী।',
    ans:'The', choices:['A','An','The'],
    exp:'"The" is used with names of rivers, seas, and mountain ranges.'
  },
  {
    type:'adjective',
    en:'"Beautiful" is what type of adjective?',
    hi:'"सुंदर" किस प्रकार का विशेषण है?',
    as:'"Beautiful" কি ধৰণৰ বিশেষণ?',
    ans:'Adjective of Quality',
    choices:['Adjective of Quality','Adjective of Number','Demonstrative Adjective'],
    exp:'Adjective of Quality describes the quality of a noun — beautiful, tall, honest.'
  },
  {
    type:'adjective',
    en:'In "Five books" — "five" is a ___ adjective.',
    hi:'"पाँच किताबें" में "पाँच" एक ___ विशेषण है।',
    as:'"Five books"-ত "five" এটা ___ বিশেষণ।',
    ans:'Adjective of Number',
    choices:['Adjective of Quality','Adjective of Number','Possessive Adjective'],
    exp:'Adjective of Number tells us how many — five, ten, first, second.'
  },
  {
    type:'adjective',
    en:'In "This bag" — "this" is a ___ adjective.',
    hi:'"यह बैग" में "यह" एक ___ विशेषण है।',
    as:'"This bag"-ত "this" এটা ___ বিশেষণ।',
    ans:'Demonstrative Adjective',
    choices:['Adjective of Quality','Adjective of Number','Demonstrative Adjective'],
    exp:'Demonstrative adjectives point to nouns — this, that, these, those.'
  },
  {
    type:'article',
    en:'___ owl is a wise bird.',
    hi:'___ उल्लू एक बुद्धिमान पक्षी है।',
    as:'___ পেঁচা এটা বুদ্ধিমান চৰাই।',
    ans:'An', choices:['A','An','The'],
    exp:'"An" is used before words starting with a vowel sound (owl → o).'
  },
  {
    type:'article',
    en:'He is ___ best student in class.',
    hi:'वह कक्षा में ___ सबसे अच्छा छात्र है।',
    as:'তেওঁ শ্ৰেণীত ___ সৰ্বশ্ৰেষ্ঠ ছাত্ৰ।',
    ans:'the', choices:['a','an','the'],
    exp:'"The" is used with superlatives — the best, the tallest, the most.'
  }
];

const msgs={
  en:{correct:'✅ Correct! Well done!',wrong:'❌ Incorrect!',endWin:'🎉 Grammar Star!',endLose:'Keep practising!',score:'Your score:'},
  hi:{correct:'✅ सही! शाबाश!',wrong:'❌ गलत!',endWin:'🎉 व्याकरण विद्वान!',endLose:'अभ्यास जारी रखो!',score:'तुम्हारा स्कोर:'},
  as:{correct:'✅ শুদ্ধ! বাহ!',wrong:'❌ ভুল!',endWin:'🎉 ব্যাকৰণ তাৰকা!',endLose:'অনুশীলন জাৰি ৰাখক!',score:'তোমাৰ নম্বৰ:'}
};

let cur=0,score=0,lang='en',answered=false;

function setLang(l){
  lang=l;
  document.querySelectorAll('[data-lang]').forEach(el=>el.style.display='none');
  document.querySelectorAll(`[data-lang="${l}"]`).forEach(el=>el.style.display='inline');
  document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.remove('active');if(b.textContent.trim()===(l==='en'?'EN':l==='hi'?'हि':'অ'))b.classList.add('active');});
  if(!answered) renderSentence();
}

function renderSentence(){
  const q=questions[cur];
  const raw=q[lang];
  // replace ___ with animated blank slot
  const html=raw.replace('___','<span class="blank-slot">___</span>');
  document.getElementById('sentenceBox').innerHTML=html;
}

function loadQuestion(){
  const q=questions[cur];
  const tag=document.getElementById('typeTag');
  if(q.type==='article'){
    tag.className='type-tag type-article';
    tag.textContent='📌 ARTICLE';
  } else {
    tag.className='type-tag type-adjective';
    tag.textContent='🏷️ ADJECTIVE';
  }
  renderSentence();
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('explanation').textContent='';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('roundInfo').textContent=`Q ${cur+1} / 10`;
  document.getElementById('progress').style.width=`${cur*10}%`;
  answered=false;

  const div=document.getElementById('choicesDiv');
  div.innerHTML='';
  q.choices.forEach(c=>{
    const b=document.createElement('button');
    // long text choices (adjective types) get smaller font
    b.className='choice-btn'+(c.length>6?' long-text':'');
    b.textContent=c;
    b.onclick=()=>answer(c,b);
    div.appendChild(b);
  });
}

function answer(val,btn){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const fb=document.getElementById('feedback');
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);

  // case-insensitive comparison
  if(val.toLowerCase()===q.ans.toLowerCase()){
    score+=10;
    fb.textContent=msgs[lang].correct;
    fb.className='feedback correct';
    btn.classList.add('correct');
    // fill in the blank
    const slot=document.querySelector('.blank-slot');
    if(slot){slot.textContent=q.ans;slot.style.color='#00ff88';slot.style.animation='none';}
  } else {
    fb.textContent=msgs[lang].wrong;
    fb.className='feedback wrong';
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(b.textContent.toLowerCase()===q.ans.toLowerCase())b.classList.add('correct');
    });
    const slot=document.querySelector('.blank-slot');
    if(slot){slot.textContent=q.ans;slot.style.color='#00ff88';slot.style.animation='none';}
  }
  document.getElementById('explanation').textContent='💡 '+q.exp;
  document.getElementById('scoreVal').textContent=score;
  updateStars(score);
  document.getElementById('nextBtn').style.display='inline-block';
}

function nextRound(){
  cur++;
  if(cur>=questions.length){showEnd();return;}
  loadQuestion();
}

function updateStars(s){
  const pct=s;
  document.getElementById('s1').className='star'+(pct>=40?' lit':'');
  document.getElementById('s2').className='star'+(pct>=70?' lit':'');
  document.getElementById('s3').className='star'+(pct>=90?' lit':'');
}

function showEnd(){
  document.getElementById('gameArea').style.display='none';
  const pct=score;
  document.getElementById('endScreen').style.display='block';
  document.getElementById('endTitle').textContent=pct>=70?msgs[lang].endWin:msgs[lang].endLose;
  document.getElementById('endMsg').textContent=msgs[lang].score+' '+score+' / 100';
  document.getElementById('finalScore').textContent=score+' pts';
  document.getElementById('progress').style.width='100%';
  ['es1','es2','es3'].forEach((id,i)=>{
    document.getElementById(id).className='star'+([40,70,90][i]<=pct?' lit':'');
  });
  setLang(lang);
}

function restart(){
  cur=0;score=0;
  document.getElementById('gameArea').style.display='block';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('scoreVal').textContent='0';
  updateStars(0);
  loadQuestion();
  setLang(lang);
}

setLang('en');
loadQuestion();
</script>
</body>
</html>
