<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>व्याकरण गुरु – Grammar Guru | GyanPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0F0C29;--dark:#1A1A2E;--gold:#FFB800;--sky:#00AEEF;--green:#00C853;--pink:#FF4081;--purple:#7C3AED;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .top-bar{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:8px 20px;border-radius:999px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s;}
  .back-btn:hover{background:rgba(255,255,255,.2);}
  .subject-badge{background:var(--purple);padding:6px 18px;border-radius:999px;font-size:.85rem;font-weight:800;letter-spacing:.5px;font-family:'Baloo 2',sans-serif;}
  .lang-toggle{display:flex;gap:6px;}
  .lang-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:6px 14px;border-radius:999px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .lang-btn.active{background:var(--gold);color:#000;}
  .lang-btn:hover:not(.active){background:rgba(255,255,255,.2);}
  .game-card{background:var(--dark);border-radius:20px;padding:32px 28px;width:100%;max-width:700px;box-shadow:0 8px 40px rgba(0,0,0,.4);}
  .game-title{font-family:'Baloo 2',sans-serif;font-size:2rem;font-weight:800;text-align:center;color:var(--gold);margin-bottom:6px;}
  .score-bar{display:flex;justify-content:space-between;align-items:center;margin:14px 0 10px;font-size:.9rem;font-weight:700;color:rgba(255,255,255,.7);}
  .progress-wrap{background:rgba(255,255,255,.1);border-radius:999px;height:8px;margin-bottom:20px;}
  .progress-fill{height:8px;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .4s ease;}
  .question-label{font-size:.85rem;font-weight:700;color:var(--purple);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-family:'Baloo 2',sans-serif;font-size:1.4rem;font-weight:700;text-align:center;color:#fff;background:rgba(255,255,255,.07);border-radius:16px;padding:20px 16px;margin-bottom:22px;line-height:1.5;}
  .choices{display:grid;grid-template-columns:1fr;gap:12px;}
  .choice-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);color:#fff;padding:14px 20px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;}
  .choice-btn:hover:not(:disabled){background:rgba(124,58,237,.2);border-color:var(--purple);transform:translateY(-2px);}
  .choice-btn.correct{background:rgba(0,200,83,.25);border-color:var(--green);}
  .choice-btn.wrong{background:rgba(255,64,129,.2);border-color:var(--pink);}
  .choice-btn:disabled{cursor:not-allowed;}
  .feedback{margin-top:16px;padding:12px 18px;border-radius:12px;font-weight:700;font-size:1rem;text-align:center;animation:fadeIn .3s ease;display:none;}
  .feedback.show{display:block;}
  .feedback.correct-fb{background:rgba(0,200,83,.2);color:#00C853;}
  .feedback.wrong-fb{background:rgba(255,64,129,.15);color:#FF4081;}
  .next-btn{margin-top:18px;width:100%;background:var(--purple);border:none;color:#fff;padding:14px;border-radius:14px;font-family:'Baloo 2',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .2s;display:none;}
  .next-btn.show{display:block;}
  .next-btn:hover{background:#6d28d9;transform:translateY(-1px);}
  .result-screen{display:none;text-align:center;}
  .result-screen.show{display:block;}
  .stars{font-size:3rem;margin:16px 0;}
  .result-score{font-family:'Baloo 2',sans-serif;font-size:2.5rem;font-weight:800;color:var(--gold);margin-bottom:8px;}
  .result-msg{font-size:1.1rem;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:24px;}
  .restart-btn{background:var(--gold);color:#000;border:none;padding:14px 36px;border-radius:999px;font-family:'Baloo 2',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;transition:all .2s;}
  .restart-btn:hover{background:#e6a600;transform:scale(1.04);}
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <span class="subject-badge">📖 Hindi Grammar – Class 7</span>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<div class="game-card">
  <div class="game-title">व्याकरण गुरु 📝</div>

  <div class="quiz-area" id="quizArea">
    <div class="score-bar">
      <span id="qCounter">Question 1 / 10</span>
      <span id="scoreDisplay">Score: 0</span>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="question-label" id="qLabel">Choose the correct answer</div>
    <div class="question-text" id="questionText"></div>
    <div class="choices" id="choicesContainer"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="stars" id="starsDisplay">⭐⭐⭐</div>
    <div class="result-score" id="resultScore">10 / 10</div>
    <div class="result-msg" id="resultMsg">Excellent! 🎉</div>
    <button class="restart-btn" onclick="restartGame()">🔄 Play Again</button>
  </div>
</div>

<script>
const questions = [
  { q:"संज्ञा किसे कहते हैं?", ans:"किसी व्यक्ति, वस्तु या स्थान के नाम को", choices:["क्रिया के नाम को","किसी व्यक्ति, वस्तु या स्थान के नाम को","विशेषण को"] },
  { q:"'सुंदर' शब्द का भेद है —", ans:"विशेषण", choices:["संज्ञा","विशेषण","क्रिया"] },
  { q:"'दौड़ना' शब्द का भेद है —", ans:"क्रिया", choices:["संज्ञा","विशेषण","क्रिया"] },
  { q:"सर्वनाम का उदाहरण है —", ans:"मैं, तुम, वह", choices:["मैं, तुम, वह","राम, श्याम","किताब, कलम"] },
  { q:"वाक्य के कितने अंग होते हैं?", ans:"दो", choices:["तीन","दो","चार"] },
  { q:"'राम ने सेब खाया' — इस वाक्य में कर्ता है —", ans:"राम", choices:["राम","सेब","खाया"] },
  { q:"'लड़का' का बहुवचन है —", ans:"लड़के", choices:["लड़के","लड़की","लड़कियाँ"] },
  { q:"'नेता' का स्त्रीलिंग है —", ans:"नेत्री", choices:["नेत्री","नेतानी","नेतिन"] },
  { q:"भूतकाल का उदाहरण है —", ans:"राम गया", choices:["राम जाता है","राम गया","राम जाएगा"] },
  { q:"क्रिया-विशेषण किसकी विशेषता बताता है?", ans:"क्रिया की", choices:["संज्ञा की","क्रिया की","सर्वनाम की"] },
];

const labels = {
  en:{qlabel:"Choose the correct answer",counter:"Question",score:"Score",next:"Next →",correct:"✅ Correct! ",wrong:"❌ Wrong! Answer: ",play:"🔄 Play Again",result:["Excellent! 🎉","Great effort!","Keep practicing!","Try again!"]},
  hi:{qlabel:"सही उत्तर चुनें",counter:"प्रश्न",score:"अंक",next:"आगे →",correct:"✅ सही! ",wrong:"❌ गलत! सही उत्तर: ",play:"🔄 फिर खेलें",result:["शानदार! 🎉","बहुत अच्छा!","अभ्यास जारी रखो!","फिर कोशिश करो!"]},
  as:{qlabel:"শুদ্ধ উত্তৰ বাছক",counter:"প্ৰশ্ন",score:"নম্বৰ",next:"পৰৱৰ্তী →",correct:"✅ শুদ্ধ! ",wrong:"❌ ভুল! উত্তৰ: ",play:"🔄 পুনৰ খেলক",result:["অসাধাৰণ! 🎉","বহুত ভাল!","অভ্যাস জাৰি ৰাখক!","আকৌ চেষ্টা কৰক!"]},
};

let current=0,score=0,lang='en',answered=false;

function setLang(l){lang=l;document.querySelectorAll('.lang-btn').forEach((b,i)=>{b.classList.toggle('active',['en','hi','as'][i]===l);});renderQuestion();}
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}

function renderQuestion(){
  if(current>=questions.length){showResult();return;}
  answered=false;
  const q=questions[current],L=labels[lang];
  document.getElementById('qLabel').textContent=L.qlabel;
  document.getElementById('qCounter').textContent=`${L.counter} ${current+1} / ${questions.length}`;
  document.getElementById('scoreDisplay').textContent=`${L.score}: ${score}`;
  document.getElementById('questionText').textContent=q.q;
  document.getElementById('progressFill').style.width=`${(current/questions.length)*100}%`;
  const shuffled=shuffle(q.choices);
  const cont=document.getElementById('choicesContainer');
  cont.innerHTML='';
  shuffled.forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';btn.textContent=ch;
    btn.onclick=()=>handleAnswer(ch,q.ans,btn);
    cont.appendChild(btn);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
}

function handleAnswer(chosen,correct,btn){
  if(answered)return;answered=true;
  const L=labels[lang];
  document.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('correct');});
  const fb=document.getElementById('feedback');
  if(chosen===correct){score++;btn.classList.add('correct');fb.textContent=L.correct+correct;fb.className='feedback show correct-fb';}
  else{btn.classList.add('wrong');fb.textContent=L.wrong+correct;fb.className='feedback show wrong-fb';}
  document.getElementById('scoreDisplay').textContent=`${L.score}: ${score}`;
  const nb=document.getElementById('nextBtn');nb.className='next-btn show';nb.textContent=current===questions.length-1?'See Results 🏆':L.next;
}

function nextQuestion(){current++;renderQuestion();}

function showResult(){
  document.getElementById('quizArea').style.display='none';
  const rs=document.getElementById('resultScreen');rs.className='result-screen show';
  const pct=(score/questions.length)*100;
  const L=labels[lang];
  document.getElementById('starsDisplay').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=40?'⭐':'💪';
  document.getElementById('resultScore').textContent=`${score} / ${questions.length}`;
  document.getElementById('resultMsg').textContent=L.result[pct>=90?0:pct>=70?1:pct>=40?2:3];
  document.querySelector('.restart-btn').textContent=L.play;
}

function restartGame(){
  current=0;score=0;answered=false;
  document.getElementById('quizArea').style.display='block';
  document.getElementById('resultScreen').className='result-screen';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
