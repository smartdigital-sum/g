<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mughal Mission — Class 7 Social Studies</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--gold:#FFB800;--sky:#00AEEF;--green:#00C853;--pink:#FF4081;--dark:#1A1A2E;--amber:#D97706}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;
         background:linear-gradient(160deg,#2d1b00,#1a1a0e);
         color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;
         padding:1rem;animation:fadeIn .4s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    .topbar{width:100%;max-width:700px;display:flex;align-items:center;
            justify-content:space-between;padding:.75rem 0;margin-bottom:.5rem}
    .back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:.85rem;
              font-weight:700;padding:6px 14px;border-radius:20px;cursor:pointer;
              text-decoration:none;transition:background .2s}
    .back-btn:hover{background:rgba(255,255,255,.18)}
    .subject-tag{background:#92400E;color:#FDE68A;font-size:.75rem;font-weight:800;
                 padding:4px 12px;border-radius:20px}
    .stars{display:flex;gap:4px;font-size:1.3rem}
    .star{opacity:.3;transition:all .3s}.star.lit{opacity:1;filter:drop-shadow(0 0 6px gold)}

    .lang-row{display:flex;gap:6px;margin-bottom:1rem}
    .lang-btn{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.5);
              font-weight:700;font-size:.75rem;padding:4px 10px;border-radius:16px;cursor:pointer;transition:all .2s}
    .lang-btn.active{background:var(--gold);color:var(--dark)}

    .game-card{width:100%;max-width:680px;background:rgba(255,200,100,.04);
               border:1px solid rgba(255,200,100,.12);border-radius:24px;padding:2rem 1.5rem}

    /* SCROLL VISUAL */
    .scroll-deco{text-align:center;font-size:3.5rem;margin-bottom:.5rem;
                 animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    /* CATEGORY BADGE */
    .cat-badge{display:inline-block;font-size:.72rem;font-weight:800;
               padding:4px 12px;border-radius:20px;margin-bottom:.75rem;
               letter-spacing:.5px;text-transform:uppercase}
    .cat-who{background:rgba(217,119,6,.2);color:#FDE68A}
    .cat-what{background:rgba(0,174,239,.2);color:var(--sky)}
    .cat-when{background:rgba(124,58,237,.2);color:#C4B5FD}

    .question-box{background:rgba(255,255,255,.06);border-radius:16px;
                  padding:1.25rem;margin-bottom:1.25rem;text-align:center}
    .q-text{font-family:'Baloo 2',cursive;font-size:clamp(1.1rem,4vw,1.5rem);
            font-weight:800;color:#fff;line-height:1.4}

    .options{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
    .opt-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,200,100,.15);
             color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;
             padding:.8rem .5rem;border-radius:14px;cursor:pointer;transition:all .2s;text-align:center}
    .opt-btn:hover{background:rgba(255,200,100,.12);transform:scale(1.03)}
    .opt-btn.correct{background:rgba(0,200,83,.2);border-color:var(--green);color:var(--green)}
    .opt-btn.wrong{background:rgba(255,64,129,.15);border-color:var(--pink);color:var(--pink)}

    .progress-bar{width:100%;background:rgba(255,255,255,.08);border-radius:20px;
                  height:7px;margin-bottom:.4rem;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#92400E,var(--gold));
                   border-radius:20px;transition:width .4s}
    .progress-text{font-size:.78rem;color:rgba(255,255,255,.4);text-align:right}

    .streak-bar{display:flex;gap:4px;justify-content:center;margin-bottom:.75rem;flex-wrap:wrap}
    .streak-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s}
    .streak-dot.done{background:var(--gold)}
    .streak-dot.correct{background:var(--green)}
    .streak-dot.wrong{background:var(--pink)}

    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
             backdrop-filter:blur(8px);align-items:center;justify-content:center;z-index:100;padding:1.5rem}
    .overlay.show{display:flex}
    .result-box{background:linear-gradient(135deg,#2d1b00,#1a1a0e);
                border:1px solid rgba(255,200,100,.2);border-radius:28px;
                padding:2.5rem 2rem;text-align:center;max-width:420px;width:100%;
                animation:popIn .35s ease}
    @keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
    .result-emoji{font-size:3.5rem;margin-bottom:.75rem}
    .result-title{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.8rem;color:var(--gold);margin-bottom:.5rem}
    .result-score{font-size:1rem;color:rgba(255,255,255,.6);margin-bottom:.75rem}
    .result-fact{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.2);
                 border-radius:14px;padding:.75rem 1rem;font-size:.83rem;color:rgba(255,255,255,.8);
                 line-height:1.5;margin-bottom:1.5rem;text-align:left}
    .btn-play-again{background:var(--gold);color:var(--dark);font-family:'Baloo 2',cursive;
                    font-weight:800;font-size:1rem;padding:.8rem 2rem;border:none;
                    border-radius:50px;cursor:pointer;width:100%;transition:transform .15s}
    .btn-play-again:hover{transform:scale(1.03)}
    .confetti-piece{position:fixed;width:8px;height:8px;pointer-events:none;
                    animation:fall var(--dur,1.8s) ease-in forwards}
    @keyframes fall{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(100vh) rotate(720deg) translateX(var(--dx));opacity:0}}
  </style>
</head>
<body>

  <div class="topbar">
    <a href="../../classroom.html?class=class-7" class="back-btn">← Back</a>
    <span class="subject-tag">🌍 Social Studies · Class 7</span>
    <div class="stars">
      <span class="star" id="s1">⭐</span>
      <span class="star" id="s2">⭐</span>
      <span class="star" id="s3">⭐</span>
    </div>
  </div>

  <div class="lang-row">
    <button class="lang-btn active" onclick="setLang('en')" id="lbEn">EN</button>
    <button class="lang-btn" onclick="setLang('hi')" id="lbHi">हि</button>
    <button class="lang-btn" onclick="setLang('as')" id="lbAs">অ</button>
  </div>

  <div class="game-card">
    <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    <div class="progress-text" id="pText">1 / 10</div>

    <div class="streak-bar" id="streakBar"></div>

    <div class="scroll-deco">🕌</div>

    <div id="catBadge" class="cat-badge cat-who"></div>
    <div class="question-box">
      <div class="q-text" id="qText"></div>
    </div>
    <div class="options" id="options"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="result-box">
      <div class="result-emoji" id="rEmoji">🏆</div>
      <div class="result-title" id="rTitle"></div>
      <div class="result-score" id="rScore"></div>
      <div class="result-fact" id="rFact"></div>
      <button class="btn-play-again" onclick="restartGame()" id="rBtn">Play Again</button>
    </div>
  </div>

<script>
const T={
  en:{
    who:'Who?',what:'What?',when:'When?',
    playAgain:'Play Again',
    title:['History Expert! 🏆','Excellent! 🎉','Well Done! 👏','Keep Studying! 📚'],
    score:(c,t)=>`${c} out of ${t} correct!`,
    fact:'The Mughal Empire was founded by Babur in 1526 at the First Battle of Panipat. At its height under Aurangzeb, it covered most of the Indian subcontinent. The Mughals contributed greatly to Indian art, architecture, and culture. The Taj Mahal, built by Shah Jahan, is one of the Seven Wonders of the World.',
  },
  hi:{
    who:'कौन?',what:'क्या?',when:'कब?',
    playAgain:'दोबारा खेलें',
    title:['इतिहास विशेषज्ञ! 🏆','शानदार! 🎉','शाबाश! 👏','पढ़ाई जारी रखें! 📚'],
    score:(c,t)=>`${t} में से ${c} सही!`,
    fact:'मुगल साम्राज्य की स्थापना 1526 में बाबर ने पानीपत की पहली लड़ाई में की थी। शाहजहाँ द्वारा बनाया गया ताजमहल विश्व के सात अजूबों में से एक है।',
  },
  as:{
    who:'কোন?',what:'কি?',when:'কেতিয়া?',
    playAgain:'পুনৰ খেলক',
    title:['ইতিহাস বিশেষজ্ঞ! 🏆','অসাধাৰণ! 🎉','শাবাশ! 👏','পঢ়া-শুনা চলাই যাওক! 📚'],
    score:(c,t)=>`${t}ৰ মাজত ${c}টা শুদ্ধ!`,
    fact:'মোগল সাম্ৰাজ্য ১৫২৬ চনত বাবৰে পানিপথৰ প্ৰথম যুদ্ধত স্থাপনা কৰিছিল। শ্বাহজাহানে নিৰ্মাণ কৰা তাজমহল বিশ্বৰ সাতটা আশ্চৰ্যৰ এটা।',
  }
};

const QUESTIONS=[
  {q:'Who founded the Mughal Empire?',         a:'Babur',       opts:['Akbar','Babur','Humayun','Jahangir'],       cat:'who'},
  {q:'Which Mughal emperor built the Taj Mahal?',a:'Shah Jahan', opts:['Akbar','Babur','Shah Jahan','Aurangzeb'],   cat:'who'},
  {q:'When did the First Battle of Panipat take place?',a:'1526',opts:['1526','1556','1605','1658'],               cat:'when'},
  {q:'Who was Akbar\'s famous finance minister?',a:'Todar Mal',  opts:['Birbal','Todar Mal','Abul Fazl','Tansen'],  cat:'who'},
  {q:'What does "Mughal" mean?',               a:'Mongol',       opts:['Brave','Ruler','Mongol','Persian'],         cat:'what'},
  {q:'Which Mughal emperor introduced the Din-i-Ilahi religion?',a:'Akbar',opts:['Babur','Akbar','Jahangir','Aurangzeb'],cat:'who'},
  {q:'Humayun lost the Mughal throne to which ruler?',a:'Sher Shah Suri',opts:['Babur','Akbar','Sher Shah Suri','Bairam Khan'],cat:'who'},
  {q:'Which famous book was written during Akbar\'s reign?',a:'Akbarnama',opts:['Baburnama','Akbarnama','Tuzuk-i-Jahangiri','Ain-i-Akbari only'],cat:'what'},
  {q:'The Mughal Empire reached its greatest extent under which emperor?',a:'Aurangzeb',opts:['Akbar','Shah Jahan','Aurangzeb','Jahangir'],cat:'who'},
  {q:'The Taj Mahal was built in memory of whom?',a:'Mumtaz Mahal',opts:['Nur Jahan','Mumtaz Mahal','Razia Sultana','Gulbadan Begum'],cat:'who'},
];

let lang='en', current=0, correct=0, stars=0, answered=false;
const results=[];

function buildStreakBar(){
  const bar=document.getElementById('streakBar');
  bar.innerHTML=QUESTIONS.map((_,i)=>
    `<div class="streak-dot${results[i]==='correct'?' correct':results[i]==='wrong'?' wrong':''}" id="dot${i}"></div>`
  ).join('');
}

function renderQ(){
  answered=false;
  const t=T[lang], q=QUESTIONS[current];
  document.getElementById('pFill').style.width=(current/QUESTIONS.length*100)+'%';
  document.getElementById('pText').textContent=`${current+1} / ${QUESTIONS.length}`;
  document.getElementById('qText').textContent=q.q;

  const badge=document.getElementById('catBadge');
  badge.textContent=t[q.cat]||q.cat;
  badge.className=`cat-badge cat-${q.cat}`;

  buildStreakBar();

  const shuffled=[...q.opts].sort(()=>Math.random()-.5);
  document.getElementById('options').innerHTML=shuffled.map(o=>
    `<button class="opt-btn" onclick="checkAnswer('${o.replace(/'/g,"\\'")}',this)">${o}</button>`
  ).join('');
}

function checkAnswer(val,btn){
  if(answered) return;
  answered=true;
  const q=QUESTIONS[current];
  if(val===q.a){
    btn.classList.add('correct');
    correct++;
    results[current]='correct';
    if(correct>=4&&stars<1){stars=1;litStar(1);}
    if(correct>=7&&stars<2){stars=2;litStar(2);}
    if(correct>=10&&stars<3){stars=3;litStar(3);}
    playTone(660,'sine',.18,.3);playTone(880,'sine',.22,.25,.1);
  } else {
    btn.classList.add('wrong');
    results[current]='wrong';
    document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent===q.a)b.classList.add('correct');});
    playTone(280,'sawtooth',.15,.2);
  }
  buildStreakBar();
  setTimeout(()=>{current++;current<QUESTIONS.length?renderQ():showResult();},1100);
}

function litStar(n){const el=document.getElementById('s'+n);el.classList.add('lit');el.animate([{transform:'scale(1.5)'},{transform:'scale(1)'}],{duration:400});}

function showResult(){
  const t=T[lang],pct=correct/QUESTIONS.length;
  const idx=pct>=.9?0:pct>=.7?1:pct>=.5?2:3;
  document.getElementById('rEmoji').textContent=['🏆','🎉','👏','📚'][idx];
  document.getElementById('rTitle').textContent=t.title[idx];
  document.getElementById('rScore').textContent=t.score(correct,QUESTIONS.length);
  document.getElementById('rFact').textContent=t.fact;
  document.getElementById('rBtn').textContent=t.playAgain;
  document.getElementById('overlay').classList.add('show');
  if(pct>=.7)launchConfetti();
}

function restartGame(){
  current=correct=stars=0;answered=false;results.length=0;
  ['s1','s2','s3'].forEach(id=>document.getElementById(id).classList.remove('lit'));
  document.getElementById('overlay').classList.remove('show');
  renderQ();
}

function setLang(l){
  lang=l;localStorage.setItem('gyanplay_lang',l);
  ['en','hi','as'].forEach(x=>document.getElementById(`lb${x.charAt(0).toUpperCase()+x.slice(1)}`).classList.toggle('active',x===l));
  if(current<QUESTIONS.length)renderQ();
}

let _ctx;
function getCtx(){return _ctx||(_ctx=new(window.AudioContext||window.webkitAudioContext)());}
function playTone(f,t,d,g,dl){try{const c=getCtx(),dly=dl||0,o=c.createOscillator(),gn=c.createGain();o.type=t;o.frequency.setValueAtTime(f,c.currentTime+dly);gn.gain.setValueAtTime(0,c.currentTime+dly);gn.gain.linearRampToValueAtTime(g||.2,c.currentTime+dly+.01);gn.gain.exponentialRampToValueAtTime(.001,c.currentTime+dly+d);o.connect(gn);gn.connect(c.destination);o.start(c.currentTime+dly);o.stop(c.currentTime+dly+d+.05);}catch(e){}}
document.addEventListener('click',()=>{try{getCtx().resume();}catch(e){}},{once:true});
function launchConfetti(){const cols=['#FFB800','#00AEEF','#FF4081','#00C853','#7C3AED'];for(let i=0;i<30;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[i%cols.length]};--dur:${1.4+Math.random()*1.2}s;--dx:${(Math.random()-.5)*160}px;border-radius:${Math.random()>.5?'50%':'3px'}`;document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());}}

setLang(lang);
renderQ();
</script>
</body>
</html>
