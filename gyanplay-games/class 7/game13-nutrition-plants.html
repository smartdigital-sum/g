<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nutrition Quest — Class 7 Science</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0F0C29;--dark:#1A1A2E;--gold:#FFB800;--sky:#00AEEF;--green:#00C853;--pink:#FF4081;--purple:#7C3AED;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:#fff;min-height:100vh;
         display:flex;flex-direction:column;align-items:center;padding:1rem;animation:fadeIn .4s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    .topbar{width:100%;max-width:700px;display:flex;align-items:center;
            justify-content:space-between;padding:.75rem 0;margin-bottom:.5rem}
    .back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:.85rem;
              font-weight:700;padding:6px 14px;border-radius:20px;cursor:pointer;
              text-decoration:none;transition:background .2s}
    .back-btn:hover{background:rgba(255,255,255,.18)}
    .subject-tag{background:var(--green);color:#fff;font-size:.75rem;font-weight:800;
                 padding:4px 12px;border-radius:20px;letter-spacing:.5px}
    .stars{display:flex;gap:4px;font-size:1.3rem}
    .star{opacity:.3;transition:all .3s}
    .star.lit{opacity:1;filter:drop-shadow(0 0 6px var(--gold))}

    .lang-row{display:flex;gap:6px;margin-bottom:1rem}
    .lang-btn{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.5);
              font-weight:700;font-size:.75rem;padding:4px 10px;border-radius:16px;
              cursor:pointer;transition:all .2s}
    .lang-btn.active{background:var(--gold);color:var(--dark)}

    .game-card{width:100%;max-width:680px;background:rgba(255,255,255,.05);
               border:1px solid rgba(255,255,255,.1);border-radius:24px;
               padding:2rem 1.5rem;text-align:center}

    .q-header{font-size:.82rem;color:rgba(255,255,255,.5);margin-bottom:1.2rem;font-style:italic}

    .progress-bar{width:100%;background:rgba(255,255,255,.08);border-radius:20px;
                  height:7px;margin-bottom:.4rem;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--sky));
                   border-radius:20px;transition:width .4s}
    .progress-text{font-size:.78rem;color:rgba(255,255,255,.4);text-align:right;margin-bottom:1.2rem}

    .q-number{font-size:.75rem;font-weight:800;color:var(--gold);letter-spacing:1px;
              text-transform:uppercase;margin-bottom:.5rem}
    .q-text{font-family:'Baloo 2',cursive;font-weight:700;font-size:1.25rem;
             line-height:1.4;margin-bottom:1.5rem;color:#fff}

    .choices{display:flex;flex-direction:column;gap:.65rem;margin-bottom:1rem}
    .choice-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);
                border-radius:14px;padding:.75rem 1.2rem;font-family:'Nunito',sans-serif;
                font-size:.95rem;font-weight:700;color:#fff;cursor:pointer;
                text-align:left;transition:all .2s;position:relative}
    .choice-btn:hover:not(:disabled){background:rgba(255,255,255,.13);
                                      border-color:rgba(255,255,255,.3);transform:translateX(4px)}
    .choice-btn.correct{background:rgba(0,200,83,.18);border-color:var(--green);color:#fff}
    .choice-btn.wrong{background:rgba(255,64,129,.15);border-color:var(--pink);color:#fff}
    .choice-btn:disabled{cursor:default}

    .feedback{font-size:.85rem;font-weight:700;min-height:1.4rem;margin-bottom:.5rem;
              transition:opacity .2s}
    .feedback.correct{color:var(--green)}
    .feedback.wrong{color:var(--pink)}

    .next-btn{background:var(--sky);color:var(--dark);font-family:'Baloo 2',cursive;
              font-weight:800;font-size:1rem;padding:.7rem 2rem;border:none;
              border-radius:50px;cursor:pointer;display:none;transition:transform .15s}
    .next-btn:hover{transform:scale(1.04)}

    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
             backdrop-filter:blur(8px);align-items:center;justify-content:center;
             z-index:100;padding:1.5rem}
    .overlay.show{display:flex}
    .result-box{background:linear-gradient(135deg,#0d1f12,#0F0C29);
                border:1px solid rgba(255,255,255,.12);border-radius:28px;
                padding:2.5rem 2rem;text-align:center;max-width:420px;width:100%;
                animation:popIn .35s ease}
    @keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
    .result-emoji{font-size:3.5rem;margin-bottom:.75rem}
    .result-title{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.8rem;
                  color:#fff;margin-bottom:.5rem}
    .result-score{font-size:1rem;color:rgba(255,255,255,.6);margin-bottom:.75rem}
    .result-stars{font-size:2rem;margin-bottom:.75rem}
    .result-fact{background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.25);
                 border-radius:14px;padding:.75rem 1rem;font-size:.82rem;
                 color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:1.5rem;text-align:left}
    .btn-play-again{background:var(--gold);color:var(--dark);font-family:'Baloo 2',cursive;
                    font-weight:800;font-size:1rem;padding:.8rem 2rem;border:none;
                    border-radius:50px;cursor:pointer;width:100%;transition:transform .15s}
    .btn-play-again:hover{transform:scale(1.03)}

    .confetti-piece{position:fixed;width:8px;height:8px;pointer-events:none;
                    animation:fall var(--dur,1.8s) ease-in forwards}
    @keyframes fall{0%{transform:translateY(0) rotate(0)}
                    100%{transform:translateY(100vh) rotate(720deg) translateX(var(--dx));opacity:0}}
  </style>
</head>
<body>

  <div class="topbar">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <span class="subject-tag">🌿 Science · Class 7</span>
    <div class="stars">
      <span class="star" id="s1">⭐</span>
      <span class="star" id="s2">⭐</span>
      <span class="star" id="s3">⭐</span>
    </div>
  </div>

  <div class="lang-row">
    <button class="lang-btn active" onclick="setLang('en')" id="lbEn">EN</button>
    <button class="lang-btn" onclick="setLang('hi')" id="lbHi">हि</button>
    <button class="lang-btn" onclick="setLang('as')" id="lbAs">অ</button>
  </div>

  <div class="game-card">
    <div class="q-header" id="qHeader">How much do you know about plant nutrition?</div>
    <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    <div class="progress-text" id="pText">1 / 10</div>
    <div class="q-number" id="qNum">Question 1</div>
    <div class="q-text" id="qText"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">Next →</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="result-box">
      <div class="result-emoji" id="rEmoji">🌿</div>
      <div class="result-title" id="rTitle"></div>
      <div class="result-score" id="rScore"></div>
      <div class="result-stars" id="rStars"></div>
      <div class="result-fact" id="rFact"></div>
      <button class="btn-play-again" onclick="restartGame()" id="rBtn">Restart</button>
    </div>
  </div>

<script>
const QUESTIONS = [
  {
    en:"The process by which plants make food using sunlight is called",
    hi:"पौधे सूर्य के प्रकाश का उपयोग करके भोजन बनाने की प्रक्रिया को कहते हैं",
    as:"উদ্ভিদে সূৰ্যৰ পোহৰ ব্যৱহাৰ কৰি খাদ্য প্ৰস্তুত কৰাৰ প্ৰক্ৰিয়াটোক কোৱা হয়",
    choices:["Photosynthesis","Respiration","Transpiration"],
    answer:0
  },
  {
    en:"Which gas do plants absorb during photosynthesis?",
    hi:"प्रकाश संश्लेषण के दौरान पौधे कौन सी गैस अवशोषित करते हैं?",
    as:"সালোক-সংশ্লেষণৰ সময়ত উদ্ভিদে কোনটো গেছ শোষণ কৰে?",
    choices:["CO₂","O₂","N₂"],
    answer:0
  },
  {
    en:"The green pigment in leaves is",
    hi:"पत्तियों में हरा रंगद्रव्य होता है",
    as:"পাতত থকা সেউজীয়া বৰণদ্ৰৱ্যটো হ'ল",
    choices:["Chlorophyll","Carotene","Melanin"],
    answer:0
  },
  {
    en:"Plants store food as",
    hi:"पौधे भोजन किस रूप में संग्रहीत करते हैं?",
    as:"উদ্ভিদে খাদ্য কোন ৰূপত সঞ্চয় কৰে?",
    choices:["Glucose","Starch","Fat"],
    answer:1
  },
  {
    en:"Cuscuta is an example of",
    hi:"अमरबेल किसका उदाहरण है?",
    as:"কাচকুৰি কিহৰ উদাহৰণ?",
    choices:["Parasite","Saprotroph","Autotroph"],
    answer:0
  },
  {
    en:"Rhizobium bacteria fix",
    hi:"राइज़ोबियम बैक्टीरिया कौन सी गैस स्थिर करते हैं?",
    as:"ৰাইজ'বিয়াম বেক্টেৰিয়াই কোনটো গেছ স্থিৰ কৰে?",
    choices:["Oxygen","Nitrogen","Carbon"],
    answer:1
  },
  {
    en:"Which part of the plant absorbs sunlight?",
    hi:"पौधे का कौन सा भाग सूर्य का प्रकाश अवशोषित करता है?",
    as:"উদ্ভিদৰ কোনটো অংশে সূৰ্যৰ পোহৰ শোষণ কৰে?",
    choices:["Root","Stem","Leaf"],
    answer:2
  },
  {
    en:"Insectivorous plants grow in",
    hi:"कीटभक्षी पौधे किस मिट्टी में उगते हैं?",
    as:"কীটভক্ষী উদ্ভিদ কোনটো মাটিত জন্মে?",
    choices:["Nitrogen-poor soil","Rich soil","Salty water"],
    answer:0
  },
  {
    en:"The pitcher plant catches",
    hi:"घड़े का पौधा क्या पकड़ता है?",
    as:"পিটচাৰ উদ্ভিদে কি ধৰে?",
    choices:["Insects","Fish","Worms"],
    answer:0
  },
  {
    en:"Plants that make their own food are called",
    hi:"अपना भोजन स्वयं बनाने वाले पौधों को क्या कहते हैं?",
    as:"নিজৰ খাদ্য নিজে প্ৰস্তুত কৰা উদ্ভিদক কি কোৱা হয়?",
    choices:["Autotrophs","Heterotrophs","Parasites"],
    answer:0
  }
];

const T = {
  en:{
    header:"How much do you know about plant nutrition?",
    qLabel:"Question",
    feedback_correct:["Correct! 🎉","Excellent! ✅","Brilliant! 🌟","Well done! 👏","Right! 🌿"],
    feedback_wrong:"Not quite — the answer is",
    next:"Next →",
    restart:"Restart",
    result_title:["Plant Expert! 🌿","Great Work! 🎉","Good Effort! 👏","Keep Studying! 💪"],
    result_score:(c)=>`You scored ${c} out of 10`,
    fact:"🌱 Fun Fact: Sundew and Venus flytrap are insectivorous plants found in nitrogen-poor soil. They trap insects to get nitrogen! Chlorophyll, found only in green plants, absorbs sunlight and drives photosynthesis."
  },
  hi:{
    header:"पौधों के पोषण के बारे में आप कितना जानते हैं?",
    qLabel:"प्रश्न",
    feedback_correct:["सही! 🎉","बहुत अच्छा! ✅","शानदार! 🌟","शाबाश! 👏","बिल्कुल सही! 🌿"],
    feedback_wrong:"सही उत्तर है",
    next:"अगला →",
    restart:"दोबारा खेलें",
    result_title:["पौध विशेषज्ञ! 🌿","बहुत अच्छा! 🎉","अच्छा प्रयास! 👏","पढ़ते रहो! 💪"],
    result_score:(c)=>`आपने 10 में से ${c} अंक पाए`,
    fact:"🌱 मज़ेदार तथ्य: सनड्यू और वीनस फ्लाईट्रैप कीटभक्षी पौधे हैं जो नाइट्रोजन-रहित मिट्टी में उगते हैं। ये कीड़ों से नाइट्रोजन प्राप्त करते हैं! क्लोरोफिल केवल हरे पौधों में पाया जाता है।"
  },
  as:{
    header:"উদ্ভিদৰ পুষ্টি সম্পৰ্কে আপুনি কিমান জানে?",
    qLabel:"প্ৰশ্ন",
    feedback_correct:["শুদ্ধ! 🎉","অসাধাৰণ! ✅","চমৎকাৰ! 🌟","শাবাশ! 👏","একদম শুদ্ধ! 🌿"],
    feedback_wrong:"শুদ্ধ উত্তৰ হ'ল",
    next:"পৰৱৰ্তী →",
    restart:"পুনৰ খেলক",
    result_title:["উদ্ভিদ বিশেষজ্ঞ! 🌿","বহুত ভাল! 🎉","ভাল প্ৰচেষ্টা! 👏","পঢ়ি থাকক! 💪"],
    result_score:(c)=>`আপুনি ১০ৰ মাজত ${c} পাইছে`,
    fact:"🌱 মজাৰ তথ্য: চানডিউ আৰু ভেনাছ ফ্লাইট্ৰেপ কীটভক্ষী উদ্ভিদ যি নাইট্ৰ'জেনবিহীন মাটিত জন্মে। এইবোৰে পোকৰ পৰা নাইট্ৰ'জেন পায়! ক্লৰ'ফিল কেৱল সেউজীয়া উদ্ভিদত পোৱা যায়।"
  }
};

let lang='en', cur=0, score=0, answered=false, litStars=0;

function setLang(l){
  lang=l;
  ['en','hi','as'].forEach(x=>{
    const id='lb'+x.charAt(0).toUpperCase()+x.slice(1);
    document.getElementById(id).classList.toggle('active',x===l);
  });
  document.getElementById('qHeader').textContent=T[l].header;
  renderQ();
}

function renderQ(){
  const t=T[lang], q=QUESTIONS[cur];
  answered=false;
  document.getElementById('qHeader').textContent=t.header;
  document.getElementById('pFill').style.width=(cur/10*100)+'%';
  document.getElementById('pText').textContent=`${cur+1} / 10`;
  document.getElementById('qNum').textContent=`${t.qLabel} ${cur+1}`;
  document.getElementById('qText').textContent=q[lang];
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').style.display='none';

  const ch=document.getElementById('choices');
  ch.innerHTML=q.choices.map((c,i)=>
    `<button class="choice-btn" onclick="pick(${i})">${c}</button>`
  ).join('');
}

function pick(idx){
  if(answered) return;
  answered=true;
  const q=QUESTIONS[cur], t=T[lang];
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const correct=idx===q.answer;
  btns[idx].classList.add(correct?'correct':'wrong');
  if(!correct) btns[q.answer].classList.add('correct');

  const fb=document.getElementById('feedback');
  if(correct){
    score++;
    const msgs=t.feedback_correct;
    fb.textContent=msgs[Math.floor(Math.random()*msgs.length)];
    fb.className='feedback correct';
    playTone(660,'sine',.15);playTone(880,'sine',.2,.25,.12);
    updateStars();
  } else {
    fb.textContent=`${t.feedback_wrong}: ${q.choices[q.answer]}`;
    fb.className='feedback wrong';
    playTone(280,'sawtooth',.18);
  }
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('nextBtn').textContent=cur<9?t.next:t.restart;
  if(cur>=9) document.getElementById('nextBtn').onclick=showResult;
}

function nextQ(){
  cur++;
  if(cur>=10){showResult();return;}
  renderQ();
}

function updateStars(){
  const pct=score/10;
  if(pct>=.4&&litStars<1){litStars=1;litStar(1);}
  if(pct>=.7&&litStars<2){litStars=2;litStar(2);}
  if(pct>=.9&&litStars<3){litStars=3;litStar(3);}
}

function litStar(n){
  const el=document.getElementById('s'+n);
  el.classList.add('lit');
  el.animate([{transform:'scale(1.6)'},{transform:'scale(1)'}],{duration:400});
}

function showResult(){
  const t=T[lang], pct=score/10;
  const idx=pct>=.9?0:pct>=.7?1:pct>=.4?2:3;
  document.getElementById('rEmoji').textContent=['🌿','🎉','👏','💪'][idx];
  document.getElementById('rTitle').textContent=t.result_title[idx];
  document.getElementById('rScore').textContent=t.result_score(score);
  document.getElementById('rStars').textContent='⭐'.repeat(litStars)+'☆'.repeat(3-litStars);
  document.getElementById('rFact').textContent=t.fact;
  document.getElementById('rBtn').textContent=t.restart;
  document.getElementById('overlay').classList.add('show');
  if(pct>=.4) launchConfetti();
}

function restartGame(){
  cur=score=litStars=0;answered=false;
  ['s1','s2','s3'].forEach(id=>document.getElementById(id).classList.remove('lit'));
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('nextBtn').onclick=nextQ;
  renderQ();
}

let _ctx;
function getCtx(){return _ctx||(_ctx=new(window.AudioContext||window.webkitAudioContext)());}
function playTone(f,t,d,g,dl){
  try{const c=getCtx(),dly=dl||0,o=c.createOscillator(),gn=c.createGain();
  o.type=t;o.frequency.setValueAtTime(f,c.currentTime+dly);
  gn.gain.setValueAtTime(0,c.currentTime+dly);
  gn.gain.linearRampToValueAtTime(g||.22,c.currentTime+dly+.01);
  gn.gain.exponentialRampToValueAtTime(.001,c.currentTime+dly+d);
  o.connect(gn);gn.connect(c.destination);
  o.start(c.currentTime+dly);o.stop(c.currentTime+dly+d+.05);}catch(e){}
}
document.addEventListener('click',()=>{try{getCtx().resume();}catch(e){}},{once:true});

function launchConfetti(){
  const cols=['#FFB800','#00AEEF','#FF4081','#00C853','#7C3AED'];
  for(let i=0;i<35;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[i%cols.length]};--dur:${1.4+Math.random()*1.2}s;--dx:${(Math.random()-.5)*160}px;border-radius:${Math.random()>.5?'50%':'3px'}`;
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}

setLang('en');
</script>
</body>
</html>
