<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Plants & Animals – GyanPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --saffron:#FF6B00;--gold:#FFB800;--sky:#00AEEF;--green:#00C853;
  --pink:#FF4081;--purple:#7C3AED;--bg1:#0F0C29;--bg2:#302B63;
  --card:#1a1740;--text:#EEE;--muted:#aaa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1),var(--bg2));
  font-family:'Nunito',sans-serif;color:var(--text);padding-bottom:40px}
@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .45s ease both}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;
  background:rgba(255,255,255,.04);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.08);flex-wrap:wrap}
.back-btn{background:none;border:1px solid rgba(255,255,255,.2);color:#fff;
  padding:6px 14px;border-radius:20px;cursor:pointer;font-family:'Nunito',sans-serif;
  font-size:.85rem;transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.1)}
.badge{background:var(--green);color:#fff;padding:4px 14px;border-radius:20px;
  font-size:.8rem;font-weight:700;font-family:'Baloo 2',sans-serif;letter-spacing:.5px}
.title-bar{font-family:'Baloo 2',sans-serif;font-size:1.15rem;font-weight:700;flex:1;text-align:center}
.lang-toggle{display:flex;gap:4px;margin-left:auto}
.lang-btn{background:rgba(255,255,255,.08);border:none;color:#ccc;
  padding:5px 12px;border-radius:16px;cursor:pointer;font-size:.82rem;
  font-family:'Nunito',sans-serif;transition:all .2s}
.lang-btn.active{background:var(--green);color:#fff;font-weight:700}
.score-wrap{max-width:700px;margin:18px auto 0;padding:0 16px}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.score-label{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1rem;color:var(--gold)}
.score-val{font-family:'Baloo 2',sans-serif;font-size:1.4rem;font-weight:800;color:var(--saffron)}
.prog-bar{height:8px;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:8px;transition:width .4s ease}
.q-wrap{max-width:700px;margin:22px auto 0;padding:0 16px}
.q-card{background:var(--card);border-radius:18px;padding:28px 26px;
  border:1px solid rgba(0,200,83,.22);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.q-num{font-size:.8rem;color:var(--muted);margin-bottom:6px;font-weight:600}
.q-text{font-family:'Baloo 2',sans-serif;font-size:1.13rem;font-weight:700;line-height:1.55;margin-bottom:22px}
.topic-tag{display:inline-block;background:rgba(0,200,83,.15);border:1px solid rgba(0,200,83,.3);
  color:#6effa0;padding:3px 12px;border-radius:20px;font-size:.78rem;font-weight:700;margin-bottom:10px}
.options{display:grid;gap:10px}
.opt-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:var(--text);padding:13px 18px;border-radius:12px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:.97rem;font-weight:600;
  text-align:left;transition:all .22s;display:flex;align-items:center;gap:10px}
.opt-btn:hover:not(:disabled){background:rgba(0,200,83,.15);border-color:var(--green);transform:translateX(4px)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{background:rgba(0,200,83,.2);border-color:var(--green);color:#fff}
.opt-btn.wrong{background:rgba(255,64,129,.18);border-color:var(--pink);color:#fff}
.opt-icon{font-size:1.1rem;min-width:22px}
.explanation{margin-top:16px;padding:14px 18px;background:rgba(255,255,255,.05);
  border-radius:12px;border-left:3px solid var(--green);font-size:.92rem;line-height:1.65;display:none}
.explanation.show{display:block}
.explanation strong{color:var(--green)}
.next-btn{margin-top:18px;width:100%;padding:14px;background:linear-gradient(90deg,var(--green),var(--sky));
  border:none;color:#fff;border-radius:12px;font-family:'Baloo 2',sans-serif;
  font-size:1.05rem;font-weight:700;cursor:pointer;transition:opacity .2s;display:none}
.next-btn:hover{opacity:.88}
.next-btn.show{display:block}
.result-card{max-width:700px;margin:40px auto;padding:0 16px;text-align:center}
.result-inner{background:var(--card);border-radius:20px;padding:40px 30px;border:1px solid rgba(0,200,83,.3)}
.stars{font-size:2.5rem;letter-spacing:4px;margin-bottom:16px}
.result-score{font-family:'Baloo 2',sans-serif;font-size:3rem;font-weight:800;color:var(--saffron)}
.result-msg{font-size:1.1rem;color:var(--muted);margin:8px 0 28px}
.play-again{padding:14px 40px;background:linear-gradient(90deg,var(--green),var(--sky));
  border:none;color:#fff;border-radius:12px;font-family:'Baloo 2',sans-serif;
  font-size:1.1rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.play-again:hover{opacity:.85}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <span class="badge">Science</span>
  <span class="title-bar">
    <span class="lbl-en">🌿🐾 Plants & Animals</span>
    <span class="lbl-hi" style="display:none">🌿🐾 पौधे और जानवर</span>
    <span class="lbl-bn" style="display:none">🌿🐾 গাছপালা ও প্রাণী</span>
  </span>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en',this)">EN</button>
    <button class="lang-btn" onclick="setLang('hi',this)">हि</button>
    <button class="lang-btn" onclick="setLang('bn',this)">অ</button>
  </div>
</div>
<div class="score-wrap">
  <div class="score-row">
    <span class="score-label" id="scoreLabel">Score</span>
    <span class="score-val"><span id="scoreNum">0</span>/100</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>
<div class="q-wrap" id="gameArea"></div>
<div class="result-card" id="resultCard" style="display:none"></div>
<script>
const questions=[
  {
    topic:"🌱 Parts of a Plant",
    q:"Which part of the plant absorbs water and minerals from the soil?",
    opts:["Stem","Leaf","Root","Flower"],
    ans:2,
    exp:"<strong>Roots</strong> absorb water and minerals from the soil and anchor the plant firmly in the ground. They also store food in some plants like carrots and radishes."
  },
  {
    topic:"🌿 Parts of a Plant",
    q:"Which part of the plant carries water and food to all other parts?",
    opts:["Root","Stem","Flower","Seed"],
    ans:1,
    exp:"The <strong>Stem</strong> acts like a pipe — it carries water from roots up to leaves, and food made in leaves to other parts. It also supports the plant upright."
  },
  {
    topic:"☀️ Photosynthesis",
    q:"Plants make their own food using sunlight, water, and which gas from air?",
    opts:["Oxygen (O₂)","Nitrogen (N₂)","Carbon Dioxide (CO₂)","Hydrogen (H₂)"],
    ans:2,
    exp:"Plants use <strong>sunlight + water + Carbon Dioxide (CO₂)</strong> to make food (glucose) — this process is called <strong>Photosynthesis</strong>. They release Oxygen as a by-product!"
  },
  {
    topic:"🌳 Types of Roots",
    q:"A mango tree has one main thick root going deep into the soil. This type of root is called:",
    opts:["Fibrous root","Taproot","Adventitious root","Aerial root"],
    ans:1,
    exp:"A <strong>Taproot</strong> has one main thick root with smaller branches. Mango, neem, and carrot have taproots. Grass and wheat have <strong>fibrous roots</strong> — many thin roots with no main root."
  },
  {
    topic:"🐄 Animal Diet Types",
    q:"A cow eats only grass and plants. What type of animal is it?",
    opts:["Carnivore","Omnivore","Herbivore","Scavenger"],
    ans:2,
    exp:"A <strong>Herbivore</strong> eats only plants. Examples: Cow, deer, rabbit, elephant. <strong>Carnivores</strong> eat meat (lion, tiger). <strong>Omnivores</strong> eat both plants and meat (humans, bear, crow)."
  },
  {
    topic:"🦁 Wild vs Domestic Animals",
    q:"Which of these is a DOMESTIC animal (kept by humans)?",
    opts:["Tiger","Elephant","Lion","Goat"],
    ans:3,
    exp:"A <strong>Domestic animal</strong> is one kept by humans for milk, work, or as a pet. Examples: Goat, cow, dog, horse, hen. <strong>Wild animals</strong> like tigers and lions live in forests and jungles."
  },
  {
    topic:"🏠 Animal Habitats",
    q:"Fish, frogs, and crocodiles live in water. Their habitat is called:",
    opts:["Terrestrial","Arboreal","Aquatic","Aerial"],
    ans:2,
    exp:"<strong>Aquatic</strong> animals live in water (fish, frog, crocodile, whale). <strong>Terrestrial</strong> animals live on land (horse, cow, dog). <strong>Aerial</strong> animals spend most time in air (eagle, sparrow)."
  },
  {
    topic:"🌸 Parts of a Plant",
    q:"After a flower is fertilised, which part grows from it containing seeds?",
    opts:["Root","Stem","Leaf","Fruit"],
    ans:3,
    exp:"A <strong>Fruit</strong> develops from the flower after fertilisation and contains seeds. The fruit protects the seed and helps in seed dispersal. Mango, apple, and tomato are all fruits!"
  },
  {
    topic:"🌿 Types of Leaves",
    q:"Which of the following is NOT a function of leaves?",
    opts:["Making food by photosynthesis","Absorbing water from soil","Releasing water vapour (transpiration)","Exchanging gases with air"],
    ans:1,
    exp:"<strong>Leaves do NOT absorb water from soil</strong> — that is the job of roots. Leaves make food (photosynthesis), release water vapour (transpiration), and exchange gases through tiny pores called stomata."
  },
  {
    topic:"🐦 Animal Diet Types",
    q:"A crow eats both rice (plant food) and insects (animal food). What type of animal is it?",
    opts:["Herbivore","Carnivore","Omnivore","Scavenger"],
    ans:2,
    exp:"A <strong>Omnivore</strong> eats both plants and animals. Examples: Crow, bear, humans, cockroach, dog. Omnivores can survive on a wide variety of food sources."
  }
];
let currentQ=0,score=0,answered=false,lang='en';
const LABELS={en:{score:'Score',next:'Next Question →',result:'See Result →',again:'🔄 Play Again',
  msgs:['🌿 Nature Expert! Outstanding!','Great knowledge! Well done!','Good effort! Keep exploring!','Keep learning! Nature is amazing!']},
  hi:{score:'स्कोर',next:'अगला प्रश्न →',result:'परिणाम देखें →',again:'🔄 फिर खेलें',
  msgs:['🌿 प्रकृति विशेषज्ञ!','बहुत अच्छा! शाबाश!','अच्छी कोशिश! खोज जारी रखो!','सीखते रहो! प्रकृति अद्भुत है!']},
  bn:{score:'স্কোর',next:'পরের প্রশ্ন →',result:'ফলাফল দেখো →',again:'🔄 আবার খেলো',
  msgs:['🌿 প্রকৃতি বিশেষজ্ঞ!','দারুণ জ্ঞান! শাবাশ!','ভালো চেষ্টা! অনুসন্ধান চালিয়ে যাও!','শিখতে থাকো! প্রকৃতি অসাধারণ!']}};
function setLang(l,btn){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelector('.lbl-en').style.display=l==='en'?'':'none';
  document.querySelector('.lbl-hi').style.display=l==='hi'?'':'none';
  document.querySelector('.lbl-bn').style.display=l==='bn'?'':'none';
  document.getElementById('scoreLabel').textContent=LABELS[l].score;
}
function renderQ(){
  answered=false;
  const q=questions[currentQ];
  const L=LABELS[lang];
  document.getElementById('progFill').style.width=Math.round((currentQ/questions.length)*100)+'%';
  document.getElementById('gameArea').innerHTML=`
    <div class="q-card fade">
      <div class="topic-tag">${q.topic}</div>
      <div class="q-num">Question ${currentQ+1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,i)=>`<button class="opt-btn" onclick="pick(${i})" id="opt${i}">
          <span class="opt-icon">◦</span>${o}</button>`).join('')}
      </div>
      <div class="explanation" id="exp">${q.exp}</div>
      <button class="next-btn" id="nextBtn" onclick="nextQ()">${currentQ===questions.length-1?L.result:L.next}</button>
    </div>`;
}
function pick(i){
  if(answered)return;answered=true;
  const q=questions[currentQ];const pts=Math.round(100/questions.length);
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(i===q.ans){
    document.getElementById('opt'+i).classList.add('correct');
    document.getElementById('opt'+i).querySelector('.opt-icon').textContent='✓';
    score+=pts;document.getElementById('scoreNum').textContent=score;
  } else {
    document.getElementById('opt'+i).classList.add('wrong');
    document.getElementById('opt'+i).querySelector('.opt-icon').textContent='✗';
    document.getElementById('opt'+q.ans).classList.add('correct');
    document.getElementById('opt'+q.ans).querySelector('.opt-icon').textContent='✓';
  }
  document.getElementById('exp').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
}
function nextQ(){currentQ++;if(currentQ>=questions.length){showResult();return;}renderQ();}
function showResult(){
  document.getElementById('progFill').style.width='100%';
  document.getElementById('gameArea').style.display='none';
  const L=LABELS[lang];
  const stars=score>=90?'⭐⭐⭐':score>=70?'⭐⭐':score>=40?'⭐':'';
  const msg=score>=90?L.msgs[0]:score>=70?L.msgs[1]:score>=40?L.msgs[2]:L.msgs[3];
  document.getElementById('resultCard').style.display='block';
  document.getElementById('resultCard').innerHTML=`
    <div class="result-inner fade">
      <div class="stars">${stars||'🌿'}</div>
      <div class="result-score">${score}/100</div>
      <div class="result-msg">${msg}</div>
      <button class="play-again" onclick="restart()">${L.again}</button>
    </div>`;
}
function restart(){
  currentQ=0;score=0;answered=false;
  document.getElementById('scoreNum').textContent=0;
  document.getElementById('progFill').style.width='0%';
  document.getElementById('resultCard').style.display='none';
  document.getElementById('gameArea').style.display='block';
  renderQ();
}
renderQ();
</script>
</body>
</html>
