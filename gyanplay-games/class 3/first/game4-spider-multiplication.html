<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕷️ Spider Multiplication — GyanPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1A0A;--card:#122012;--gold:#FFD166;--coral:#FF6B6B;--teal:#06D6A0;--orange:#FF9F1C;--purple:#C77DFF;--green:#6BCB77;--text:#F0FFF0;--dim:#6A966A}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--card);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid rgba(255,209,102,.2)}
.game-title{font-family:'Baloo 2',sans-serif;font-size:1.4rem;font-weight:800;color:var(--gold)}
.subject-tag{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.stars{display:flex;gap:4px;font-size:1.3rem}
.star{opacity:.3;transition:all .3s}
.star.lit{opacity:1;filter:drop-shadow(0 0 6px #FFD166)}
.timer-bar-wrap{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin:6px 0 0;width:100%}
.timer-bar{height:100%;background:var(--teal);border-radius:3px;transition:width .1s linear;width:100%}
.game-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:18px 16px;gap:16px}
.hook{background:linear-gradient(135deg,rgba(107,203,119,.12),rgba(6,214,160,.08));border:1px solid rgba(107,203,119,.3);border-radius:14px;padding:12px 18px;text-align:center;max-width:480px;font-size:.88rem;line-height:1.6;color:#B8F0C4}
.hook strong{color:var(--gold)}
.question-card{background:var(--card);border-radius:16px;padding:20px 24px;text-align:center;border:2px solid rgba(107,203,119,.25);width:100%;max-width:440px}
.question-text{font-size:1rem;color:var(--dim);margin-bottom:8px}
.question-eq{font-family:'Baloo 2',sans-serif;font-size:2.2rem;font-weight:800;color:var(--gold)}
.animal-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:440px;padding:16px;background:var(--card);border-radius:16px;border:2px solid rgba(255,209,102,.1)}
.animal-row{display:flex;gap:6px;flex-wrap:nowrap}
.animal{font-size:2rem;line-height:1;transition:transform .2s;display:inline-block}
.animal.highlight{animation:pop .3s ease;filter:drop-shadow(0 0 8px rgba(255,209,102,.8))}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.row-label{font-size:.72rem;color:var(--dim);align-self:center;white-space:nowrap}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px}
.opt-btn{padding:16px;background:var(--card);border:2px solid rgba(107,203,119,.25);border-radius:12px;color:var(--text);font-family:'Baloo 2',sans-serif;font-size:1.6rem;font-weight:700;cursor:pointer;transition:transform .15s,border-color .2s,background .2s}
.opt-btn:hover{transform:scale(1.05);border-color:var(--teal)}
.opt-btn.correct{background:rgba(6,214,160,.2);border-color:var(--teal);color:var(--teal)}
.opt-btn.wrong{background:rgba(255,107,107,.15);border-color:var(--coral);color:var(--coral)}
.streak-display{font-size:.85rem;color:var(--dim);text-align:center}
.streak-display span{color:var(--orange);font-weight:700;font-size:1rem}
.bottom{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--card);border-top:1px solid rgba(255,255,255,.08)}
.prog{font-size:.82rem;color:var(--dim)}
.next-btn{padding:11px 26px;background:var(--gold);color:#1B0A3C;border:none;border-radius:50px;font-family:'Baloo 2',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:transform .2s;display:none}
.next-btn:hover{transform:scale(1.05)}
.overlay{position:fixed;inset:0;background:rgba(10,26,10,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100;opacity:0;pointer-events:none;transition:opacity .4s}
.overlay.show{opacity:1;pointer-events:all}
.ov-emoji{font-size:4.5rem}
.ov-title{font-family:'Baloo 2',sans-serif;font-size:2rem;font-weight:800;color:var(--gold);text-align:center}
.ov-sub{color:var(--dim);text-align:center;max-width:300px;font-size:.9rem;line-height:1.6}
.confetti-p{position:fixed;top:-10px;width:9px;height:9px;border-radius:2px;animation:fall linear forwards;z-index:200}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="game-title">🕷️ Spider Multiplication</div>
    <div class="subject-tag">Maths · Times Tables · Class 3</div>
  </div>
  <div class="stars"><span class="star" id="s1">⭐</span><span class="star" id="s2">⭐</span><span class="star" id="s3">⭐</span><span class="star" id="s4">⭐</span><span class="star" id="s5">⭐</span></div>
</div>

<div class="game-area">
  <div class="hook">🕷️ A spider has <strong>8 legs</strong>. Six spiders = how many legs? Multiplication saves you from counting 48 things one by one — it's a <strong>superpower shortcut</strong>! Pick the correct total!</div>

  <div class="question-card">
    <div class="question-text" id="qText">Loading...</div>
    <div class="question-eq" id="qEq">? × ? = ?</div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
  </div>

  <div class="animal-grid" id="animalGrid"></div>

  <div class="options-grid" id="optGrid"></div>

  <div class="streak-display">Streak: <span id="streakCount">0</span> 🔥</div>
</div>

<div class="bottom">
  <div class="prog" id="prog">Question 1 of 10</div>
  <button class="next-btn" id="nextBtn" onclick="nextQ()">Next →</button>
</div>

<div class="overlay" id="overlay">
  <div class="ov-emoji" id="ovEmoji">🎉</div>
  <div class="ov-title" id="ovTitle">Correct!</div>
  <div class="ov-sub" id="ovSub"></div>
</div>

<script>
const ANIMALS=[
  {emoji:'🕷️',name:'spiders',legs:8},
  {emoji:'🐝',name:'bees',legs:6},
  {emoji:'🐘',name:'elephants',legs:4},
  {emoji:'🐦',name:'birds',legs:2},
  {emoji:'🐟',name:'fish',fins:1},
  {emoji:'🦁',name:'lions',legs:4},
  {emoji:'🦋',name:'butterflies',wings:4},
  {emoji:'🐸',name:'frogs',legs:4},
  {emoji:'🐢',name:'turtles',legs:4},
  {emoji:'🦅',name:'eagles',wings:2}
];
// Questions: rows × cols
const QS=[
  {rows:3,cols:4,animal:0},{rows:2,cols:6,animal:1},{rows:4,cols:3,animal:2},
  {rows:5,cols:3,animal:3},{rows:3,cols:7,animal:4},{rows:6,cols:2,animal:5},
  {rows:4,cols:5,animal:6},{rows:3,cols:8,animal:7},{rows:5,cols:4,animal:8},
  {rows:7,cols:3,animal:9}
];
const FACTS=[
  '3 × 4 = 12. Three groups of four — like 3 rows of 4 seats in a classroom!',
  '2 × 6 = 12. Multiplication is just quick repeated addition!',
  '4 × 3 = 12. Notice 3×4 and 4×3 are both 12 — that\'s commutative law!',
  '5 × 3 = 15. The 5× table is easy — always ends in 0 or 5!',
  '3 × 7 = 21. Seven is tricky — but practice makes it click!',
  '6 × 2 = 12. The 2× table just doubles everything!',
  '4 × 5 = 20. Five and four are best friends in multiplication!',
  '3 × 8 = 24. Eight times any number is always even!',
  '5 × 4 = 20. You can also think of it as 4×5 — same answer!',
  '7 × 3 = 21. You\'ve practised all the key tables today!'
];
let qi=0,streak=0,score=0,timer=null,timeLeft=0,answered=false;
const TMAX=15;

function loadQ(){
  const q=QS[qi];const a=ANIMALS[q.animal];
  answered=false;
  document.getElementById('qText').textContent=`There are ${q.rows} rows of ${a.name} (${a.emoji}). How many total?`;
  document.getElementById('qEq').textContent=`${q.rows} × ${q.cols} = ?`;
  buildGrid(q,a);
  buildOptions(q.rows*q.cols);
  startTimer();
}

function buildGrid(q,a){
  const g=document.getElementById('animalGrid');g.innerHTML='';
  for(let r=0;r<q.rows;r++){
    const row=document.createElement('div');row.className='animal-row';
    for(let c=0;c<q.cols;c++){
      const s=document.createElement('span');s.className='animal';s.textContent=a.emoji;
      row.appendChild(s);
    }
    g.appendChild(row);
  }
}

function buildOptions(correct){
  const g=document.getElementById('optGrid');g.innerHTML='';
  const opts=new Set([correct]);
  while(opts.size<4){const v=correct+Math.floor(Math.random()*12)-6;if(v>0&&v!==correct)opts.add(v);}
  const arr=Array.from(opts).sort(()=>Math.random()-.5);
  arr.forEach(v=>{
    const b=document.createElement('button');
    b.className='opt-btn';b.textContent=v;
    b.onclick=()=>pick(b,v,correct);
    g.appendChild(b);
  });
}

function pick(btn,val,correct){
  if(answered)return;answered=true;clearInterval(timer);
  if(val===correct){
    btn.classList.add('correct');streak++;score++;
    if(score<=5)document.getElementById(`s${score}`).classList.add('lit');
    document.getElementById('streakCount').textContent=streak;
    showOverlay(streak>=3?`🔥 ${streak} in a row!`:'Correct!',FACTS[qi]||'');
    confetti();setTimeout(hideOverlay,2200);
    document.getElementById('nextBtn').style.display='block';
    // Highlight animals briefly
    document.querySelectorAll('.animal').forEach((el,i)=>{setTimeout(()=>el.classList.add('highlight'),i*30);});
  } else {
    btn.classList.add('wrong');streak=0;document.getElementById('streakCount').textContent=0;
    document.querySelectorAll('.opt-btn').forEach(b=>{if(parseInt(b.textContent)===correct)b.classList.add('correct');});
    document.getElementById('nextBtn').style.display='block';
  }
}

function startTimer(){
  clearInterval(timer);timeLeft=TMAX;
  const bar=document.getElementById('timerBar');bar.style.width='100%';bar.style.background='var(--teal)';
  timer=setInterval(()=>{
    timeLeft--;const pct=(timeLeft/TMAX)*100;bar.style.width=pct+'%';
    if(timeLeft<=5)bar.style.background='var(--coral)';
    if(timeLeft<=0){clearInterval(timer);timeUp();}
  },1000);
}

function timeUp(){
  if(answered)return;answered=true;streak=0;document.getElementById('streakCount').textContent=0;
  const q=QS[qi];const correct=q.rows*q.cols;
  document.querySelectorAll('.opt-btn').forEach(b=>{if(parseInt(b.textContent)===correct)b.classList.add('correct');});
  document.getElementById('nextBtn').style.display='block';
}

function nextQ(){
  qi++;document.getElementById('nextBtn').style.display='none';
  if(qi>=QS.length){endGame();return;}
  document.getElementById('prog').textContent=`Question ${qi+1} of ${QS.length}`;
  loadQ();
}
function endGame(){
  clearInterval(timer);
  document.getElementById('ovEmoji').textContent='🏆';
  showOverlay(`Score: ${score}/${QS.length}!`,'Multiplication master — you beat the spider!');
  document.getElementById('nextBtn').textContent='Play Again ↺';
  document.getElementById('nextBtn').onclick=()=>{score=0;streak=0;qi=0;for(let i=1;i<=5;i++)document.getElementById(`s${i}`).classList.remove('lit');document.getElementById('streakCount').textContent=0;document.getElementById('nextBtn').style.display='none';document.getElementById('nextBtn').textContent='Next →';document.getElementById('nextBtn').onclick=nextQ;document.getElementById('ovEmoji').textContent='🎉';document.getElementById('ovTitle').textContent='Correct!';hideOverlay();loadQ();};
}
function showOverlay(t,s){document.getElementById('ovTitle').textContent=t;document.getElementById('ovSub').textContent=s;document.getElementById('overlay').classList.add('show');}
function hideOverlay(){document.getElementById('overlay').classList.remove('show');}
function confetti(){const C=['#FFD166','#FF6B6B','#06D6A0','#C77DFF','#FF9F1C'];for(let i=0;i<28;i++){const d=document.createElement('div');d.className='confetti-p';d.style.left=Math.random()*100+'vw';d.style.background=C[i%5];d.style.animationDuration=(1.5+Math.random()*2)+'s';d.style.animationDelay=Math.random()*.5+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),3500);}}
loadQ();
</script>
</body>
</html>
