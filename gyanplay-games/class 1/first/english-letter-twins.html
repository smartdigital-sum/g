<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Letter Twins ✉️ — Class 1 English</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#FFD700;--sky:#0288D1;--pink:#E91E8C;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#FCE4EC,#F8BBD0,#F48FB1,#FCE4EC);min-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;user-select:none;animation:bgShift 8s ease-in-out infinite alternate;}
@keyframes bgShift{from{background:linear-gradient(160deg,#FCE4EC,#F8BBD0,#F48FB1,#FCE4EC);}to{background:linear-gradient(160deg,#E8EAF6,#C5CAE9,#9FA8DA,#E8EAF6);}}

/* floating hearts + letters */
.floater{position:fixed;pointer-events:none;z-index:1;animation:floatUp linear infinite;opacity:.35;}
@keyframes floatUp{from{transform:translateY(100vh) rotate(0deg);}to{transform:translateY(-100px) rotate(360deg);}}

.header{position:relative;z-index:20;text-align:center;padding:14px 20px 6px;width:100%;}
.title{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,5vw,2.3rem);color:#880E4F;text-shadow:2px 2px 0 rgba(255,255,255,.5);}
.lvchip{display:inline-block;background:rgba(255,255,255,.75);border-radius:50px;padding:5px 18px;font-size:.82rem;font-weight:800;color:#880E4F;margin-top:4px;}
.score-bar{position:relative;z-index:20;display:flex;gap:10px;align-items:center;margin-top:6px;flex-wrap:wrap;justify-content:center;}
.spill{background:rgba(255,255,255,.75);border-radius:50px;padding:6px 18px;font-weight:800;font-size:.9rem;color:#880E4F;}
.spill span{color:#E91E8C;}
.progress-row{position:relative;z-index:20;display:flex;gap:6px;margin-top:6px;}
.pdot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.35);transition:all .3s;}
.pdot.done{background:#E91E8C;box-shadow:0 0 8px #E91E8C;}
.pdot.active{background:#fff;transform:scale(1.3);}

/* INSTRUCTION */
.instr{position:relative;z-index:20;background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border:3px solid rgba(255,255,255,.95);border-radius:22px;padding:11px 22px;margin:8px 16px;text-align:center;font-weight:700;font-size:clamp(.95rem,3.5vw,1.2rem);color:#880E4F;max-width:620px;width:calc(100% - 32px);}

/* CAPITAL LETTER DISPLAY */
.capital-display{
  position:relative;z-index:20;
  background:linear-gradient(135deg,#E91E8C,#9C27B0);
  border-radius:28px;padding:clamp(14px,4vw,28px) clamp(20px,6vw,50px);
  margin:10px 16px;text-align:center;
  box-shadow:0 10px 30px rgba(233,30,140,.3);
  max-width:400px;width:calc(100% - 32px);
}
.cap-label{color:rgba(255,255,255,.7);font-size:.8rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.cap-letter{font-family:'Fredoka One',cursive;font-size:clamp(5rem,20vw,9rem);color:#fff;line-height:1;text-shadow:4px 4px 0 rgba(0,0,0,.15);animation:capFloat 2s ease-in-out infinite;}
@keyframes capFloat{0%,100%{transform:scale(1);}50%{transform:scale(1.08) rotate(-3deg);}}
.cap-word{color:rgba(255,255,255,.85);font-size:clamp(.85rem,3vw,1.15rem);font-weight:700;margin-top:6px;}
.hear-btn{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);color:#fff;border-radius:50px;padding:6px 18px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;margin-top:8px;transition:all .2s;}
.hear-btn:hover{background:rgba(255,255,255,.4);}

/* SMALL LETTER CHOICES */
.choices-area{position:relative;z-index:20;background:rgba(255,255,255,.78);backdrop-filter:blur(10px);border:3px solid rgba(255,255,255,.95);border-radius:22px;padding:12px 14px;margin:8px 14px;max-width:680px;width:calc(100% - 28px);box-shadow:0 6px 20px rgba(0,0,0,.08);}
.choices-lbl{font-size:.72rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(136,14,79,.4);margin-bottom:8px;text-align:center;}
.letters-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}

.letter-card{
  width:clamp(58px,13vw,78px);height:clamp(72px,16vw,92px);
  border-radius:18px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  border:3px solid rgba(255,255,255,.5);
  box-shadow:0 5px 0 rgba(0,0,0,.18),0 8px 16px rgba(0,0,0,.12);
  transition:all .15s;position:relative;top:0;
}
.letter-card:hover{top:-4px;box-shadow:0 9px 0 rgba(0,0,0,.15),0 12px 20px rgba(0,0,0,.15);}
.letter-card:active{top:4px;box-shadow:0 1px 0 rgba(0,0,0,.2);}
.letter-card.correct-flash{animation:lcPop .45s ease;}
@keyframes lcPop{0%{transform:scale(1);}50%{transform:scale(1.25);}100%{transform:scale(1);}}
.letter-card.wrong-shake{animation:lcShake .35s ease;opacity:.3;pointer-events:none;}
@keyframes lcShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.lc-small{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,6vw,2.4rem);color:#fff;}
.lc-hint{font-size:clamp(.55rem,1.8vw,.72rem);color:rgba(255,255,255,.8);font-weight:800;text-align:center;}

/* MATCH ANIMATION */
.match-burst{position:fixed;pointer-events:none;z-index:200;font-size:3rem;animation:mburst .6s ease-out forwards;}
@keyframes mburst{0%{transform:scale(0);opacity:1;}60%{transform:scale(1.6);opacity:1;}100%{transform:scale(2.2);opacity:0;}}

/* OVERLAY */
.overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.ov-emoji{font-size:clamp(4rem,14vw,7rem);animation:oBounce .5s ease infinite alternate;}
@keyframes oBounce{from{transform:scale(1);}to{transform:scale(1.12);}}
.ov-title{font-family:'Fredoka One',cursive;color:var(--gold);font-size:clamp(2rem,7vw,3.2rem);margin:12px 0 6px;text-align:center;}
.ov-sub{color:#fff;font-size:clamp(.95rem,3.5vw,1.25rem);margin-bottom:22px;text-align:center;padding:0 20px;line-height:1.7;}
.ov-btn{background:linear-gradient(135deg,#E91E8C,#FFD700);color:#fff;border:none;border-radius:50px;padding:14px 40px;font-family:'Fredoka One',cursive;font-size:clamp(1.1rem,4vw,1.5rem);cursor:pointer;box-shadow:0 6px 20px rgba(233,30,140,.4);transition:transform .2s;}
.ov-btn:hover{transform:scale(1.05);}
.conf{position:fixed;pointer-events:none;z-index:300;width:10px;height:10px;border-radius:2px;animation:cFall 1.3s ease-in forwards;}
@keyframes cFall{0%{opacity:1;}100%{transform:translateY(380px) rotate(720deg);opacity:0;}}
.explain{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);z-index:150;pointer-events:none;background:rgba(136,14,79,.95);color:#FFD700;font-size:clamp(.88rem,3vw,1.05rem);font-weight:700;padding:12px 20px;border-radius:16px;max-width:360px;width:90%;text-align:center;animation:exIn .3s ease both,exOut .3s 2.8s ease forwards;border:2px solid rgba(255,215,0,.3);}
@keyframes exIn{from{transform:translateX(-50%) translateY(10px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
@keyframes exOut{to{transform:translateX(-50%) translateY(10px);opacity:0;}}
</style>
</head>
<body>

<div class="header">
  <div class="title">✉️ Letter Twins</div>
  <div class="lvchip" id="lvChip">Capital & Small Letters — A to Z</div>
</div>
<div class="score-bar">
  <div class="spill">⭐ Score: <span id="scoreVal">0</span></div>
  <div class="spill">📚 Round: <span id="roundVal">1</span>/26</div>
</div>
<div class="progress-row" id="progRow"></div>

<div class="instr" id="instrEl">Find the small letter that matches the capital!</div>

<div class="capital-display">
  <div class="cap-label">Capital Letter</div>
  <div class="cap-letter" id="capLetter">A</div>
  <div class="cap-word" id="capWord">A for Apple 🍎</div>
  <button class="hear-btn" onclick="hearLetter()">🔊 Hear it!</button>
</div>

<div class="choices-area">
  <div class="choices-lbl">👇 Find the matching small letter</div>
  <div class="letters-row" id="lettersRow"></div>
</div>

<script>
const ALPHABET=[
  {cap:'A',small:'a',word:'Apple 🍎',color:'#E53935'},{cap:'B',small:'b',word:'Ball ⚽',color:'#1E88E5'},
  {cap:'C',small:'c',word:'Cat 🐱',color:'#43A047'},{cap:'D',small:'d',word:'Dog 🐶',color:'#FB8C00'},
  {cap:'E',small:'e',word:'Elephant 🐘',color:'#8E24AA'},{cap:'F',small:'f',word:'Fish 🐟',color:'#00897B'},
  {cap:'G',small:'g',word:'Goat 🐐',color:'#F4511E'},{cap:'H',small:'h',word:'Hat 🎩',color:'#3949AB'},
  {cap:'I',small:'i',word:'Ice cream 🍦',color:'#039BE5'},{cap:'J',small:'j',word:'Jug 🫗',color:'#7CB342'},
  {cap:'K',small:'k',word:'Kite 🪁',color:'#E91E8C'},{cap:'L',small:'l',word:'Lion 🦁',color:'#795548'},
  {cap:'M',small:'m',word:'Mango 🥭',color:'#FF8F00'},{cap:'N',small:'n',word:'Nest 🪺',color:'#546E7A'},
  {cap:'O',small:'o',word:'Orange 🍊',color:'#F57C00'},{cap:'P',small:'p',word:'Parrot 🦜',color:'#2E7D32'},
  {cap:'Q',small:'q',word:'Queen 👸',color:'#6A1B9A'},{cap:'R',small:'r',word:'Rainbow 🌈',color:'#0277BD'},
  {cap:'S',small:'s',word:'Sun ☀️',color:'#F9A825'},{cap:'T',small:'t',word:'Tree 🌳',color:'#33691E'},
  {cap:'U',small:'u',word:'Umbrella ☂️',color:'#1565C0'},{cap:'V',small:'v',word:'Violin 🎻',color:'#4A148C'},
  {cap:'W',small:'w',word:'Whale 🐳',color:'#006064'},{cap:'X',small:'x',word:'Xylophone 🎶',color:'#BF360C'},
  {cap:'Y',small:'y',word:'Yacht ⛵',color:'#827717'},{cap:'Z',small:'z',word:'Zebra 🦓',color:'#37474F'},
];
const TOTAL=26;
let score=0,round=0,current=null,answered=false,used=[];

let audioCtx;
function ac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playPop(correct){
  const c=ac();
  if(correct){
    [523,659,784,1047].forEach((f,i)=>setTimeout(()=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(.28,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4);
      o.start();o.stop(c.currentTime+.4);
    },i*100));
  } else {
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=180;
    g.gain.setValueAtTime(.14,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);
    o.start();o.stop(c.currentTime+.3);
  }
}
function playBigChime(){
  const c=ac();
  [523,659,784,880,1047,1319].forEach((f,i)=>setTimeout(()=>{
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';
    g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.45);
    o.start();o.stop(c.currentTime+.45);
  },i*90));
}
function speak(t){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.rate=.88;u.pitch=1.2;
  window.speechSynthesis.speak(u);
}
function hearLetter(){
  if(current)speak(`${current.cap}! Capital ${current.cap} matches small ${current.small}. ${current.cap} for ${current.word}!`);
}
window.hearLetter=hearLetter;

function makeDots(){
  const p=document.getElementById('progRow');p.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='pdot'+(i<round?' done':i===round?' active':'');
    p.appendChild(d);
  }
}
function spawnConf(){
  const cols=['#E91E8C','#FFD700','#9C27B0','#1E88E5','#FB8C00'];
  for(let i=0;i<22;i++){
    const c=document.createElement('div');c.className='conf';
    c.style.cssText=`left:${Math.random()*100}%;top:10%;background:${cols[i%cols.length]};animation-duration:${.9+Math.random()*.5}s;`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),1600);
  }
}
function showMatchBurst(x,y){
  const el=document.createElement('div');el.className='match-burst';el.textContent='💞';
  el.style.cssText=`left:${x-20}px;top:${y-20}px;`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),700);
}
function showExplain(txt){
  document.querySelector('.explain')?.remove();
  const el=document.createElement('div');el.className='explain';el.textContent=txt;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3000);
}

function newRound(){
  if(used.length>=TOTAL){showCelebration();return;}
  answered=false;
  document.getElementById('roundVal').textContent=round+1;
  makeDots();

  const remaining=ALPHABET.filter(a=>!used.some(u=>u.cap===a.cap));
  current=remaining[Math.floor(Math.random()*remaining.length)];
  used.push(current);

  document.getElementById('capLetter').textContent=current.cap;
  document.getElementById('capWord').textContent=current.cap+' for '+current.word;
  document.getElementById('capLetter').style.textShadow=`4px 4px 0 ${current.color}55`;

  // 5 choices: correct + 4 distractors
  const others=ALPHABET.filter(a=>a.cap!==current.cap).sort(()=>Math.random()-.5).slice(0,4);
  const allChoices=[current,...others].sort(()=>Math.random()-.5);

  const row=document.getElementById('lettersRow');row.innerHTML='';
  allChoices.forEach(letter=>{
    const card=document.createElement('div');card.className='letter-card';
    card.style.background=`linear-gradient(145deg,${lighten(letter.color)},${letter.color})`;
    card.innerHTML=`<span class="lc-small">${letter.small}</span><span class="lc-hint">${letter.small} for<br/>${letter.word.split(' ')[0]}</span>`;
    card.onclick=(e)=>{
      const rect=card.getBoundingClientRect();
      checkAns(card,letter,rect.left+rect.width/2,rect.top+rect.height/2);
    };
    row.appendChild(card);
  });

  setTimeout(()=>speak(`Big ${current.cap}! Find the small letter ${current.small}. ${current.cap} for ${current.word}!`),300);
}

function checkAns(card,letter,cx,cy){
  if(answered)return;
  if(letter.cap===current.cap){
    answered=true;
    card.classList.add('correct-flash');
    playPop(true);spawnConf();showMatchBurst(cx,cy);
    score+=10;document.getElementById('scoreVal').textContent=score;
    speak(`Perfect! Capital ${current.cap} and small ${current.small} are twins! They are the same letter!`);
    round++;makeDots();setTimeout(newRound,1900);
  } else {
    card.classList.add('wrong-shake');
    playPop(false);
    showExplain(`💡 Capital ${current.cap} and small ${current.small} are the same letter!\nLook for ${current.small} — it's the small version of ${current.cap}!`);
    speak(`That is ${letter.small}! Find ${current.small} — the small version of ${current.cap}!`);
  }
}

function showCelebration(){
  playBigChime();spawnConf();
  speak(`You know all 26 letters! Capital and small! You are an English superstar!`);
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="ov-emoji">🔤</div>
    <div class="ov-title">Alphabet Master!</div>
    <div class="ov-sub">You matched all 26 letter twins!<br/>A↔a, B↔b, C↔c... Z↔z<br/>Score: <span style="color:#FFD700;font-size:1.4em;">${score}</span> points!</div>
    <button class="ov-btn" onclick="restart()">Play Again ✉️</button>`;
  document.body.appendChild(ov);
}
function restart(){document.querySelector('.overlay')?.remove();score=0;round=0;used=[];document.getElementById('scoreVal').textContent=0;newRound();}
window.restart=restart;

function lighten(hex){
  try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+65)},${Math.min(255,g+65)},${Math.min(255,b+65)})`;}catch{return hex;}
}

// floating letters
function makeFloaters(){
  const chars='AaBbCcDdEe';
  for(let i=0;i<8;i++){
    const el=document.createElement('div');el.className='floater';
    el.textContent=chars[i];
    el.style.cssText=`left:${Math.random()*100}%;font-family:'Fredoka One',cursive;font-size:${1.5+Math.random()*2}rem;color:rgba(136,14,79,.25);animation-duration:${8+Math.random()*6}s;animation-delay:${Math.random()*4}s;`;
    document.body.appendChild(el);
  }
}

window.addEventListener('load',()=>{makeFloaters();window.speechSynthesis.getVoices();makeDots();setTimeout(()=>{speak('Match capital letters to their small twins!');setTimeout(newRound,1400);},400);});
</script>
</body>
</html>
