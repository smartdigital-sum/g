      as:"বায়'গেছত মূলতঃ মিথেন (CH₄ ~৭৫%) আৰু CO₂ থাকে। পশুৰ গোবৰ আৰু উদ্ভিদৰ পচনৰ পৰা উৎপন্ন হয়।"

  },
  {
    emoji:"🌞",
    en:"Nuclear fission is the process in which:",
    hi:"नाभिकीय विखंडन की प्रक्रिया में:",

    opts:{
      en:["Two lighter nuclei combine to form a heavier nucleus","A heavy nucleus splits into two lighter nuclei","An atom loses its electrons","Protons and neutrons combine"],
      hi:["दो हल्के नाभिक मिलकर भारी नाभिक बनाते हैं","एक भारी नाभिक दो हल्के नाभिकों में विखंडित होता है","परमाणु इलेक्ट्रॉन खोता है","प्रोटॉन और न्यूट्रॉन मिलते हैं"],
      as:["দুটা পাতল নিউক্লিয়াছ মিলি এটা গধুৰ নিউক্লিয়াছ গঠন কৰে","এটা গধুৰ নিউক্লিয়াছ দুটা পাতল নিউক্লিয়াছত বিভক্ত হয়","পৰমাণুৱে ইলেক্ট্ৰন হেৰুৱায়","প্ৰ'টন আৰু নিউট্ৰন মিলে"]
    },
    ans:1,
    exp:{

      as:["নিউক্লিয়াৰ ফিছন: গধুৰ নিউক্লিয়াছ (U-235) → পাতল নিউক্লিয়াছ + শক্তি। নিউক্লিয়াৰ ফিউজন: দুটা পাতল নিউক্লিয়াছ → গধুৰ নিউক্লিয়াছ + বিপুল শক্তি।"]

    as:"জলবিদ্যুৎ কেন্দ্ৰৰ এটা প্ৰধান অসুবিধা কি?",

      as:["এইবোৰে গ্ৰীনহাউছ গেছ উৎপন্ন কৰে","বৃহৎ অঞ্চল ডুব যায় আৰু লোকসকল বিস্থাপিত হয়","এইবোৰে পাৰমাণৱিক ইন্ধন ব্যৱহাৰ কৰে","নিশাত বিদ্যুৎ উৎপাদন কৰিব নোৱাৰি"]

      as:["জলবিদ্যুৎ কেন্দ্ৰৰ বাবে বৃহৎ বান্ধ নিৰ্মাণ কৰিব লাগে, ফলত বিশাল অঞ্চল (অৰণ্য, গাঁও) ডুব যায়, লোক বিস্থাপিত হয়।"]
    }

];

let current=0, score=0, lang='en', answered=false;
const TOTAL=QUESTIONS.length, PTS=10;

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.toggle('active',b.textContent.trim()===(l==='en'?'EN':l==='hi'?'हि':'অ'));});
  document.querySelectorAll('[data-lang]').forEach(el=>{el.classList.toggle('hidden',el.dataset.lang!==l);});
  if(!document.getElementById('endScreen')) renderQ();
}

function renderQ(){
  if(current>=TOTAL){showEnd();return;}
  const q=QUESTIONS[current];
  answered=false;
  const pct=Math.round((current/TOTAL)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent=current+' / '+TOTAL;
  const optsHtml=q.opts[lang].map((o,i)=>`<button class="opt-btn" onclick="choose(${i})">${o}</button>`).join('');
  document.getElementById('gameArea').innerHTML=`
    <div class="q-card fadeIn">
      <div class="q-num">QUESTION ${current+1} OF ${TOTAL}</div>
      <div class="q-emoji">${q.emoji}</div>
      <div class="q-text" data-lang="${lang}">${q[lang]}</div>
      <div class="options">${optsHtml}</div>
      <div class="feedback" id="fb"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQ()">${lang==='hi'?'अगला प्रश्न →':lang==='as'?'পৰৱৰ্তী প্ৰশ্ন →':'Next Question →'}</button>
    </div>`;
}

function choose(i){
  if(answered)return;
  answered=true;
  const q=QUESTIONS[current];
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[q.ans].classList.add('correct');
  const fb=document.getElementById('fb');
  if(i===q.ans){
    score+=PTS;
    document.getElementById('scoreVal').textContent=score;
    fb.className='feedback correct show';
    fb.innerHTML='✓ '+q.exp[lang];
  } else {
    btns[i].classList.add('wrong');
    fb.className='feedback wrong show';
    fb.innerHTML='✗ '+q.exp[lang];
  }
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQ(){current++;renderQ();}

function showEnd(){
  document.getElementById('progFill').style.width='100%';
  document.getElementById('progLabel').textContent=TOTAL+' / '+TOTAL;
  const pct=score;
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=40?'⭐':'';
  const msgs={en:['Keep studying! You can do it!','Good effort! Review the topics.','Well done! Great understanding!','Outstanding! Perfect score!'],
               hi:['पढ़ते रहो! आप कर सकते हो!','अच्छा प्रयास! विषयों की समीक्षा करें।','शाबाश! बेहतरीन समझ!','अद्भुत! परफेक्ट स्कोर!'],
               as:['পঢ়ি থাকা! তুমি পাৰিবা!','ভাল প্ৰচেষ্টা! বিষয়বোৰ পুনৰীক্ষণ কৰা।','চমৎকাৰ! উত্তম বোধ!','অসাধাৰণ! পূৰ্ণ নম্বৰ!']};
  const idx=pct>=90?3:pct>=70?2:pct>=40?1:0;
  document.getElementById('gameArea').innerHTML=`
    <div class="end-screen fadeIn" id="endScreen">
      <div class="stars">${stars||'📚'}</div>
      <div class="final-score">${score}/100</div>
      <div class="final-msg">${msgs[lang][idx]}</div>
      <button class="play-again" onclick="restart()">${lang==='hi'?'फिर से खेलें':lang==='as'?'পুনৰ খেলা':'Play Again'}</button>
    </div>`;
}

function restart(){current=0;score=0;document.getElementById('scoreVal').textContent=0;renderQ();}

renderQ();
</script>
