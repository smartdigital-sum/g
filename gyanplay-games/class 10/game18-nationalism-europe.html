<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rise of Nationalism in Europe – Class 10</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --saffron:#FF6B00;--gold:#FFB800;--sky:#00AEEF;
    --green:#00C853;--pink:#FF4081;--purple:#7C3AED;
    --bg1:#0F0C29;--bg2:#302B63;--card:#1a1740;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;font-family:'Nunito',sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#fff;}
  .topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;
    background:rgba(0,0,0,.35);flex-wrap:wrap;}
  .back-btn{background:rgba(255,255,255,.12);border:none;color:#fff;
    padding:7px 16px;border-radius:20px;cursor:pointer;
    font-family:'Nunito',sans-serif;font-size:.9rem;transition:background .2s;}
  .back-btn:hover{background:rgba(255,255,255,.25);}
  .subject-badge{background:var(--pink);color:#fff;padding:5px 14px;
    border-radius:20px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:.85rem;}
  .title-bar{flex:1;font-family:'Baloo 2',sans-serif;font-weight:700;
    font-size:1.05rem;color:var(--gold);}
  .lang-toggle{display:flex;gap:6px;}
  .lang-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
    color:#fff;padding:5px 12px;border-radius:16px;cursor:pointer;font-size:.82rem;transition:all .2s;}
  .lang-btn.active{background:var(--sky);border-color:var(--sky);}
  .progress-wrap{padding:14px 20px 0;}
  .progress-info{display:flex;justify-content:space-between;font-size:.85rem;color:#ccc;margin-bottom:6px;}
  .progress-bar-bg{background:rgba(255,255,255,.12);border-radius:10px;height:8px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--saffron),var(--pink));
    border-radius:10px;transition:width .5s;}
  .game-wrap{max-width:740px;margin:18px auto;padding:0 16px 40px;}
  .card{background:var(--card);border-radius:18px;padding:26px;
    box-shadow:0 8px 32px rgba(0,0,0,.45);animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .q-number{font-family:'Baloo 2',sans-serif;font-size:.85rem;color:var(--pink);margin-bottom:8px;font-weight:600;}
  .q-text{font-size:1.08rem;line-height:1.6;margin-bottom:6px;font-weight:600;}
  .year-tag{display:inline-block;background:rgba(255,107,0,.2);border:1px solid var(--saffron);
    color:var(--saffron);padding:3px 12px;border-radius:12px;font-size:.8rem;
    font-weight:700;margin-bottom:12px;}
  .context-box{background:rgba(255,255,255,.06);border-left:3px solid var(--pink);
    border-radius:0 10px 10px 0;padding:10px 14px;margin:10px 0;
    font-size:.88rem;color:#ddd;line-height:1.5;}
  .options{display:grid;gap:10px;margin-top:16px;}
  .opt-btn{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);
    color:#fff;padding:13px 18px;border-radius:12px;cursor:pointer;
    font-family:'Nunito',sans-serif;font-size:.97rem;text-align:left;transition:all .2s;}
  .opt-btn:hover:not(:disabled){background:rgba(255,64,129,.18);border-color:var(--pink);}
  .opt-btn.correct{background:rgba(0,200,83,.25);border-color:var(--green);}
  .opt-btn.wrong{background:rgba(255,64,129,.2);border-color:var(--pink);}
  .opt-btn:disabled{cursor:default;}
  .feedback{margin-top:14px;padding:11px 16px;border-radius:10px;
    font-weight:700;font-size:.95rem;display:none;}
  .feedback.show{display:block;animation:fadeIn .3s ease;}
  .feedback.ok{background:rgba(0,200,83,.2);color:var(--green);}
  .feedback.no{background:rgba(255,64,129,.18);color:#ff7eb3;}
  .next-btn{margin-top:18px;background:linear-gradient(135deg,var(--saffron),var(--pink));
    border:none;color:#fff;padding:12px 32px;border-radius:25px;
    font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:700;
    cursor:pointer;display:none;transition:transform .15s;}
  .next-btn:hover{transform:scale(1.04);}
  .end-screen{display:none;text-align:center;}
  .end-screen.show{display:block;animation:fadeIn .5s ease;}
  .score-big{font-family:'Baloo 2',sans-serif;font-size:3.5rem;font-weight:800;
    color:var(--gold);line-height:1;margin:10px 0;}
  .score-label{color:#ccc;font-size:.95rem;margin-bottom:18px;}
  .stars{font-size:2.5rem;margin:10px 0;}
  .play-again{background:linear-gradient(135deg,var(--saffron),var(--gold));
    border:none;color:#fff;padding:14px 36px;border-radius:28px;
    font-family:'Baloo 2',sans-serif;font-size:1.1rem;font-weight:700;
    cursor:pointer;margin-top:16px;transition:transform .15s;}
  .play-again:hover{transform:scale(1.05);}
  .result-detail{margin-top:22px;text-align:left;}
  .result-detail h3{font-family:'Baloo 2',sans-serif;color:var(--sky);margin-bottom:10px;}
  .result-item{padding:9px 14px;border-radius:8px;margin-bottom:7px;
    font-size:.9rem;line-height:1.4;background:rgba(255,255,255,.06);}
  .result-item.r-ok{border-left:3px solid var(--green);}
  .result-item.r-no{border-left:3px solid var(--pink);}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← <span data-lang="en">Back</span><span data-lang="hi" style="display:none">वापस</span><span data-lang="as" style="display:none">পিছলৈ</span></button>
  <span class="subject-badge">Social Studies</span>
  <span class="title-bar">
    <span data-lang="en">Rise of Nationalism in Europe</span>
    <span data-lang="hi" style="display:none">यूरोप में राष्ट्रवाद का उदय</span>
    <span data-lang="as" style="display:none">ইউৰোপত ৰাষ্ট্ৰবাদৰ উত্থান</span>
  </span>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span><span data-lang="en">Question</span><span data-lang="hi" style="display:none">प्रश्न</span><span data-lang="as" style="display:none">প্ৰশ্ন</span> <span id="qNum">1</span>/10</span>
    <span><span data-lang="en">Score</span><span data-lang="hi" style="display:none">स्कोर</span><span data-lang="as" style="display:none">স্কোৰ</span>: <span id="scoreDisp">0</span>/100</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progBar" style="width:0%"></div></div>
</div>

<div class="game-wrap">
  <div class="card" id="questionCard">
    <div class="q-number" id="qLabel">Question 1 of 10</div>
    <div id="yearTagWrap"></div>
    <div class="q-text" id="qText"></div>
    <div id="contextBox" style="display:none" class="context-box"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      <span data-lang="en">Next →</span>
      <span data-lang="hi" style="display:none">अगला →</span>
      <span data-lang="as" style="display:none">পৰৱৰ্তী →</span>
    </button>
  </div>

  <div class="card end-screen" id="endScreen">
    <div class="score-big" id="finalScore">0</div>
    <div class="score-label">
      <span data-lang="en">out of 100</span>
      <span data-lang="hi" style="display:none">100 में से</span>
      <span data-lang="as" style="display:none">100ৰ মাজৰ পৰা</span>
    </div>
    <div class="stars" id="stars">⭐⭐⭐</div>
    <p id="endMsg" style="color:#ccc;font-size:1rem;"></p>
    <button class="play-again" onclick="restartGame()">
      <span data-lang="en">Play Again</span>
      <span data-lang="hi" style="display:none">फिर खेलें</span>
      <span data-lang="as" style="display:none">পুনৰ খেলক</span>
    </button>
    <div class="result-detail" id="resultDetail"></div>
  </div>
</div>

<script>
const questions=[
  {
    year:"1789",
    context:"The French Revolution marked the beginning of modern nationalism in Europe.",
    en:{q:"🇪🇺 What idea did the French Revolution introduce that became the foundation of modern nationalism?",
    opts:["The idea that the 'nation' is made up of its citizens who have sovereignty, not the king",
          "The idea that kings rule by divine right over their subjects",
          "The idea that only the aristocracy can govern the state",
          "The idea that the Church should control all political power"],ans:0,
    exp:"The French Revolution (1789) introduced the concept of la patrie (the fatherland) and le citoyen (the citizen). Power shifted from monarch to the nation. A new French flag (tricolour) replaced the royal standard, symbolising the nation-state."},
    hi:{q:"🇪🇺 फ्रांसीसी क्रांति ने कौन-सा विचार दिया जो आधुनिक राष्ट्रवाद की नींव बना?",
    opts:["'राष्ट्र' उसके नागरिकों से बना है जिनके पास संप्रभुता है, राजा के पास नहीं",
          "राजा दैवीय अधिकार से शासन करते हैं","केवल कुलीन वर्ग ही शासन कर सकता है",
          "चर्च को सारी राजनीतिक शक्ति होनी चाहिए"],exp:"फ्रांसीसी क्रांति ने la patrie (मातृभूमि) और le citoyen (नागरिक) की अवधारणा दी। शक्ति राजा से राष्ट्र की ओर स्थानांतरित हुई।"},
    as:{q:"🇪🇺 ফৰাচী বিপ্লৱে কোন ধাৰণা আনিলে যি আধুনিক ৰাষ্ট্ৰবাদৰ ভিত্তি হ'ল?",
    opts:["'ৰাষ্ট্ৰ' ইয়াৰ নাগৰিকসকলেৰে গঠিত যাৰ সার্বভৌমত্ব আছে, ৰজাৰ নহয়",
          "ৰজাই ঈশ্বৰীয় অধিকাৰেৰে শাসন কৰে","কেৱল অভিজাত শ্ৰেণীয়েহে শাসন কৰিব পাৰে",
          "চাৰ্চৰ সকলো ৰাজনৈতিক ক্ষমতা থাকা উচিত"],exp:"ফৰাচী বিপ্লৱে la patrie আৰু le citoyen ধাৰণা আনিলে। ক্ষমতা ৰজাৰ পৰা ৰাষ্ট্ৰলৈ স্থানান্তৰিত হ'ল।"}
  },
  {
    year:"1799–1815",
    context:"A military general rose to power and reshaped Europe through wars and laws.",
    en:{q:"🗺️ How did Napoleon Bonaparte spread the ideas of nationalism across Europe?",
    opts:["Through the Napoleonic Code — abolishing feudalism, establishing equality before law, and administrative reforms in conquered territories",
          "By forcing all Europeans to speak French","By restoring the power of the Church everywhere",
          "By dividing Europe into small city-states"],ans:0,
    exp:"Napoleon's Civil Code (1804) abolished privileges based on birth, established equality before the law, and secured the right to property. He simplified administrative divisions, abolished feudal system, and removed guild restrictions — spreading revolutionary ideas across Europe."},
    hi:{q:"🗺️ नेपोलियन बोनापार्ट ने यूरोप में राष्ट्रवाद के विचार कैसे फैलाए?",
    opts:["नेपोलियन संहिता के माध्यम से — सामंतवाद समाप्त कर, कानून के सामने समानता स्थापित कर, और प्रशासनिक सुधार",
          "सभी यूरोपीयों को फ्रेंच बोलने पर मजबूर करके","हर जगह चर्च की शक्ति बहाल करके",
          "यूरोप को छोटे नगर-राज्यों में विभाजित करके"],exp:"नेपोलियन की सिविल संहिता (1804) ने जन्म आधारित विशेषाधिकार समाप्त किए, कानून के सामने समानता स्थापित की।"},
    as:{q:"🗺️ নেপোলিয়ন বোনাপার্টে ইউৰোপত ৰাষ্ট্ৰবাদৰ ধাৰণা কেনেকৈ বিয়পালে?",
    opts:["নেপোলিয়ন কোডৰ জৰিয়তে — সামন্তবাদ বাতিল কৰি, আইনৰ আগত সমতা প্ৰতিষ্ঠা কৰি, প্ৰশাসনিক সংস্কাৰ",
          "সকলো ইউৰোপীয়ক ফৰাচী ভাষা বলিবলৈ বাধ্য কৰি","সৰ্বত্ৰ চাৰ্চৰ ক্ষমতা পুনৰুদ্ধাৰ কৰি",
          "ইউৰোপক ক্ষুদ্ৰ নগৰ-ৰাজ্যত বিভক্ত কৰি"],exp:"নেপোলিয়নৰ চিভিল কোড (1804) জন্মভিত্তিক সুবিধা বাতিল কৰিলে, আইনৰ আগত সমতা প্ৰতিষ্ঠা কৰিলে।"}
  },
  {
    year:"1815",
    context:"After Napoleon's defeat, European powers tried to reverse the changes he had made.",
    en:{q:"📜 What was the main goal of the Congress of Vienna (1815) led by Metternich?",
    opts:["To restore conservative monarchies and reverse the democratic and nationalist changes Napoleon had spread",
          "To create a united Europe with a single government","To give independence to all European colonies",
          "To establish free trade across all European nations"],ans:0,
    exp:"The Congress of Vienna (1815), chaired by Austria's Klemens von Metternich, aimed to undo the changes of the French Revolution and Napoleonic era. The Bourbon monarchy was restored in France, and the German Confederation of 39 states was created to maintain the balance of power."},
    hi:{q:"📜 मेटर्निख के नेतृत्व में वियना कांग्रेस (1815) का मुख्य लक्ष्य क्या था?",
    opts:["रूढ़िवादी राजतंत्र बहाल करना और नेपोलियन द्वारा फैले लोकतांत्रिक व राष्ट्रवादी परिवर्तनों को उलटना",
          "एकल सरकार के साथ एकजुट यूरोप बनाना","सभी यूरोपीय उपनिवेशों को स्वतंत्रता देना",
          "सभी यूरोपीय राष्ट्रों में मुक्त व्यापार स्थापित करना"],exp:"वियना कांग्रेस (1815) ने फ्रांसीसी क्रांति और नेपोलियन युग के परिवर्तनों को वापस करने की कोशिश की। बोर्बन राजतंत्र फ्रांस में बहाल किया गया।"},
    as:{q:"📜 মেটাৰনিখৰ নেতৃত্বত ভিয়েনা কংগ্ৰেছ (1815)ৰ মূল লক্ষ্য কি আছিল?",
    opts:["ৰক্ষণশীল ৰাজতন্ত্ৰ পুনৰুদ্ধাৰ কৰা আৰু নেপোলিয়নে বিয়পোৱা গণতান্ত্ৰিক পৰিৱৰ্তনসমূহ উলটাই দিয়া",
          "এটা চৰকাৰেৰে একত্ৰিত ইউৰোপ গঢ়া","সকলো ইউৰোপীয় উপনিৱেশক স্বাধীনতা দিয়া",
          "সকলো ইউৰোপীয় ৰাষ্ট্ৰত মুক্ত বাণিজ্য প্ৰতিষ্ঠা কৰা"],exp:"ভিয়েনা কংগ্ৰেছ (1815) ফৰাচী বিপ্লৱ আৰু নেপোলিয়ন যুগৰ পৰিৱৰ্তন উলটাই দিবলৈ চেষ্টা কৰিলে।"}
  },
  {
    year:"1832",
    context:"A secret revolutionary organisation was working to unite Italy.",
    en:{q:"🇪🇺 Who founded 'Young Italy' and what was its aim?",
    opts:["Giuseppe Mazzini — to unite the Italian states into a single republic through popular uprising",
          "Count Cavour — to unite Italy under the Piedmont monarchy","Otto von Bismarck — to create a German-Italian alliance",
          "Napoleon III — to make Italy part of the French Empire"],ans:0,
    exp:"Giuseppe Mazzini founded 'Young Italy' (1832) with the aim of uniting the fragmented Italian states through popular revolution. He believed God had intended nations to be free. He also inspired 'Young Europe' — a broader nationalist movement."},
    hi:{q:"🇪🇺 'यंग इटली' की स्थापना किसने की और इसका उद्देश्य क्या था?",
    opts:["जोसेफ मेज़िनी — लोकप्रिय विद्रोह के माध्यम से इतालवी राज्यों को एक गणराज्य में एकजुट करना",
          "काउंट कैवोर — पीडमोंट राजतंत्र के अधीन इटली को एकजुट करना","ओटो वॉन बिस्मार्क — जर्मन-इतालवी गठबंधन बनाना",
          "नेपोलियन तृतीय — इटली को फ्रांसीसी साम्राज्य का हिस्सा बनाना"],exp:"जोसेफ मेज़िनी ने 1832 में 'यंग इटली' की स्थापना की। उनका मानना था कि ईश्वर ने राष्ट्रों को स्वतंत्र होने के लिए बनाया है।"},
    as:{q:"🇪🇺 'ইয়াং ইটালী' কোনে প্ৰতিষ্ঠা কৰিলে আৰু ইয়াৰ লক্ষ্য কি আছিল?",
    opts:["জিউছেপ মাজিনি — জনপ্ৰিয় বিদ্ৰোহৰ জৰিয়তে ইটালীৰ ৰাজ্যসমূহক এটা প্ৰজাতন্ত্ৰত একত্ৰিত কৰা",
          "কাউণ্ট কেভোৰ — পিডমণ্ট ৰাজতন্ত্ৰৰ অধীনত ইটালী একত্ৰিত কৰা","অটো ভন বিছমাৰ্ক — জাৰ্মান-ইটালীয় মৈত্ৰী গঠন",
          "তৃতীয় নেপোলিয়ন — ইটালীক ফৰাচী সাম্ৰাজ্যৰ অংশ কৰা"],exp:"জিউছেপ মাজিনিয়ে 1832 চনত 'ইয়াং ইটালী' প্ৰতিষ্ঠা কৰিলে। তেওঁ বিশ্বাস কৰিছিল ঈশ্বৰে ৰাষ্ট্ৰসমূহক মুক্ত হ'বলৈ সৃষ্টি কৰিছে।"}
  },
  {
    year:"1848",

    opts:["প্ৰাছিয়াৰ জয়ৰ ফলত ভাৰচেলছত জাৰ্মান সাম্ৰাজ্য ঘোষণা হ'ল, আৰু ফ্ৰান্সে আলছাচ-লোৰেন হেৰাইলে — ফৰাচী প্ৰতিশোধৰ মনোভাৱ আৰু প্ৰথম বিশ্বযুদ্ধৰ সৃষ্টি কৰিলে",
          "ফ্ৰান্সে প্ৰাছিয়াক পৰাজিত কৰিলে আৰু জাৰ্মানীত নতুন অঞ্চল পালে",
          "যুদ্ধ শান্তিপূৰ্ণ সন্ধিৰে শেষ হ'ল","যুদ্ধৰ ৰাষ্ট্ৰবাদত কোনো প্ৰভাৱ নাছিল"],exp:"ফ্ৰেংকো-প্ৰাছিয়ান যুদ্ধত প্ৰাছিয়াই ফ্ৰান্সক পৰাজিত কৰিলে। ভাৰচেলছত জাৰ্মান সাম্ৰাজ্য ঘোষণা হ'ল। ফ্ৰান্সে আলছাচ-লোৰেন হেৰাইলে — 1914 চনৰ প্ৰথম বিশ্বযুদ্ধৰ কাৰণ হ'ল।"}
  }
];

let current=0,score=0,answered=[],currentLang='en';

function setLang(l){
  currentLang=l;
  document.querySelectorAll('[data-lang]').forEach(el=>{
    el.style.display=el.getAttribute('data-lang')===l?'':'none';
  });
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{
    b.classList.toggle('active',['en','hi','as'][i]===l);
  });
  renderQuestion();
}

function renderQuestion(){
  if(current>=questions.length){showEnd();return;}
  const q=questions[current];
  const lang=q[currentLang]||q['en'];
  const enQ=q['en'];
  document.getElementById('qNum').textContent=current+1;
  document.getElementById('scoreDisp').textContent=score;
  document.getElementById('qLabel').textContent='Question '+(current+1)+' of 10';
  document.getElementById('progBar').style.width=((current)/10*100)+'%';
  document.getElementById('yearTagWrap').innerHTML=q.year?
    '<span class="year-tag">📅 '+q.year+'</span>':'';
  document.getElementById('qText').textContent=lang.q||enQ.q;
  const ctx=document.getElementById('contextBox');
  if(q.context){ctx.textContent=q.context;ctx.style.display='block';}
  else{ctx.style.display='none';}
  const opts=lang.opts||enQ.opts;
  const optDiv=document.getElementById('options');
  optDiv.innerHTML='';
  opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt-btn';b.textContent=o;
    b.onclick=()=>selectAnswer(i,enQ.ans,lang.exp||enQ.exp);
    optDiv.appendChild(b);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').style.display='none';
}

function selectAnswer(chosen,correct,exp){
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[correct].classList.add('correct');
  const fb=document.getElementById('feedback');
  if(chosen===correct){
    score+=10;document.getElementById('scoreDisp').textContent=score;
    fb.textContent='✓ Correct! '+exp;fb.className='feedback ok show';
  } else {
    btns[chosen].classList.add('wrong');
    fb.textContent='✗ Not quite. '+exp;fb.className='feedback no show';
  }
  answered.push({q:questions[current]['en'].q,correct:chosen===correct,exp});
  document.getElementById('nextBtn').style.display='inline-block';
}

function nextQuestion(){current++;renderQuestion();}

function showEnd(){
  document.getElementById('questionCard').style.display='none';
  document.getElementById('progBar').style.width='100%';
  document.getElementById('finalScore').textContent=score;
  let stars='';
  if(score>=90)stars='⭐⭐⭐';
  else if(score>=70)stars='⭐⭐';
  else if(score>=40)stars='⭐';
  document.getElementById('stars').textContent=stars||'☆☆☆';
  const msgs={en:['Keep studying history! 🗺️','Good work! 🇪🇺','History hero! 🏆'],
    hi:['इतिहास पढ़ते रहें! 🗺️','अच्छा काम! 🇪🇺','इतिहास नायक! 🏆'],
    as:['ইতিহাস পঢ়ি থাকক! 🗺️','ভাল কাম! 🇪🇺','ইতিহাসৰ নায়ক! 🏆']};
  const mArr=msgs[currentLang]||msgs.en;
  document.getElementById('endMsg').textContent=score>=90?mArr[2]:score>=70?mArr[1]:mArr[0];
  let html='<h3>Review</h3>';
  answered.forEach((a,i)=>{
    html+='<div class="result-item '+(a.correct?'r-ok':'r-no')+'">'
      +'<strong>Q'+(i+1)+':</strong> '+(a.correct?'✓':'✗')+' '+a.q
      +'<br/><small>'+a.exp+'</small></div>';
  });
  document.getElementById('resultDetail').innerHTML=html;
  const es=document.getElementById('endScreen');
  es.style.display='block';es.classList.add('show');
}

function restartGame(){
  current=0;score=0;answered=[];
  document.getElementById('questionCard').style.display='block';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('endScreen').classList.remove('show');
  renderQuestion();
}

setLang('en');
</script>
