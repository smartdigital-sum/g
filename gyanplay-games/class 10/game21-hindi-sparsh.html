<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hindi Sparsh &amp; Sanchayan — GyanPlay Class 10</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --saffron:#FF6B00;--gold:#FFB800;--sky:#00AEEF;
  --green:#00C853;--pink:#FF4081;--purple:#7C3AED;
  --bg1:#0F0C29;--bg2:#302B63;--card:#1a1740;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));min-height:100vh;color:#fff;}
@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fadeIn{animation:fadeIn .45s ease both;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:99;}
.back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-family:'Baloo 2',sans-serif;font-size:.95rem;padding:7px 16px;border-radius:20px;cursor:pointer;transition:.2s;}
.back-btn:hover{background:rgba(255,255,255,.22);}
.badge{background:var(--purple);color:#fff;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:.82rem;padding:5px 14px;border-radius:20px;letter-spacing:.5px;}
.lang-toggle{display:flex;gap:6px;}
.lang-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:.8rem;padding:5px 11px;border-radius:14px;cursor:pointer;transition:.2s;}
.lang-btn.active,.lang-btn:hover{background:var(--purple);}
.container{max-width:780px;margin:0 auto;padding:24px 16px 60px;}
.game-title{font-family:'Baloo 2',sans-serif;font-size:1.65rem;font-weight:800;text-align:center;margin-bottom:4px;background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.game-sub{text-align:center;font-size:.88rem;color:#bbb;margin-bottom:22px;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.prog-bar{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:4px;transition:width .4s ease;}
.prog-label{font-size:.82rem;color:#aaa;white-space:nowrap;}
.score-display{text-align:right;font-family:'Baloo 2',sans-serif;font-size:1rem;color:var(--gold);margin-bottom:14px;}
.q-card{background:var(--card);border-radius:18px;padding:26px 24px;border:1px solid rgba(255,255,255,.09);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.q-num{font-size:.78rem;color:var(--purple);font-weight:700;letter-spacing:1px;margin-bottom:8px;}
.chapter-tag{display:inline-block;background:rgba(124,58,237,.25);border:1px solid rgba(124,58,237,.5);color:#c4b5fd;font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:12px;margin-bottom:10px;font-family:'Baloo 2',sans-serif;}
.q-text{font-family:'Baloo 2',sans-serif;font-size:1.08rem;font-weight:600;line-height:1.6;margin-bottom:6px;}
.en-hint{font-size:.82rem;color:#aaa;font-style:italic;margin-bottom:14px;line-height:1.4;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:520px){.options{grid-template-columns:1fr;}}
.opt-btn{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);color:#e8e8e8;font-family:'Nunito',sans-serif;font-size:.93rem;padding:13px 16px;border-radius:12px;cursor:pointer;text-align:left;transition:.22s;line-height:1.4;}
.opt-btn:hover:not(:disabled){background:rgba(124,58,237,.2);border-color:var(--purple);}
.opt-btn.correct{background:rgba(0,200,83,.2);border-color:var(--green);color:#fff;}
.opt-btn.wrong{background:rgba(255,64,129,.2);border-color:var(--pink);color:#fff;}
.opt-btn:disabled{cursor:not-allowed;}
.feedback{margin-top:16px;padding:12px 16px;border-radius:12px;font-size:.92rem;line-height:1.5;display:none;}
.feedback.show{display:block;}
.feedback.correct{background:rgba(0,200,83,.15);border:1px solid var(--green);color:#b9f6ca;}
.feedback.wrong{background:rgba(255,64,129,.15);border:1px solid var(--pink);color:#ffd0dd;}
.next-btn{display:block;margin:20px auto 0;background:linear-gradient(135deg,var(--purple),#5b21b6);border:none;color:#fff;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1rem;padding:13px 36px;border-radius:24px;cursor:pointer;transition:.2s;opacity:0;pointer-events:none;}
.next-btn.visible{opacity:1;pointer-events:all;}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.4);}
.end-screen{background:var(--card);border-radius:20px;padding:36px 28px;text-align:center;border:1px solid rgba(255,255,255,.09);}
.stars{font-size:2.8rem;margin-bottom:10px;letter-spacing:4px;}
.final-score{font-family:'Baloo 2',sans-serif;font-size:2.4rem;font-weight:800;color:var(--gold);margin-bottom:6px;}
.final-msg{color:#ccc;font-size:1rem;margin-bottom:24px;}
.play-again{background:linear-gradient(135deg,var(--purple),#5b21b6);border:none;color:#fff;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1rem;padding:14px 38px;border-radius:24px;cursor:pointer;transition:.2s;}
.play-again:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,58,237,.5);}
.hidden{display:none;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">&#8592; Back</button>
  <span class="badge">Hindi</span>
  <div class="lang-toggle">
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn active" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<div class="container">
  <div class="game-title">
    <span data-lang="en">Hindi Sparsh &amp; Sanchayan</span>
    <span data-lang="hi">हिंदी स्पर्श एवं संचयन</span>
    <span data-lang="as" class="hidden">হিন্দী স্পৰ্শ আৰু সঞ্চয়ন</span>
  </div>
  <div class="game-sub">Class 10 Hindi &nbsp;|&nbsp; Sparsh Bhag 2 + Sanchayan &nbsp;|&nbsp; 10 Questions</div>

  <div class="prog-row">
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-label" id="progLabel">0 / 10</div>
  </div>
  <div class="score-display">Score: <span id="scoreVal">0</span> / 100</div>

  <div class="q-card fadeIn" id="qCard">
    <div class="q-num" id="qNum">&#x092A;&#x094D;&#x0930;&#x0936;&#x094D;&#x0928; 1 / 10</div>
    <div class="chapter-tag" id="chapterTag"></div>
    <div class="q-text" id="qText"></div>
    <div class="en-hint" id="enHint"></div>
    <div class="options" id="optionsGrid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">&#x0905;&#x0917;&#x0932;&#x093E; &#8594;</button>
  </div>

  <div class="end-screen fadeIn hidden" id="endScreen">
    <div class="stars" id="starsDisplay"></div>
    <div class="final-score" id="finalScore"></div>
    <div class="final-msg" id="finalMsg"></div>
    <button class="play-again" onclick="restartGame()">&#9654; &#x092B;&#x093F;&#x0930; &#x0916;&#x0947;&#x0932;&#x0947;&#x0902;</button>
  </div>
</div>

<script>
const questions=[
  {
    chapter:{en:"Sparsh — Kabir Sakhiyan",hi:"स्पर्श — कबीर की साखियाँ",as:"স্পৰ্শ — কবীৰৰ সাখিয়া"},
    en:"Kabir's 'Sakhiyan' are written in which literary form?",
    hi:"कबीर की 'साखियाँ' किस साहित्यिक विधा में लिखी गई हैं?",
    as:"কবীৰৰ 'সাখিয়া' কোন সাহিত্যিক বিধাত লিখা হৈছে?",
    hint:"Kabir's Sakhiyan = short two-line wisdom couplets (dohas), each 24 matras",
    opts:{
      en:["Pad (song form)","Doha (couplet)","Chaupai (quatrain)","Kavitt (verse)"],
      hi:["पद (गीत रूप)","दोहा (द्विपदी)","चौपाई (चतुष्पदी)","कवित्त (छंद)"],
      as:["পদ (গীতৰূপ)","দোহা (দ্বিপদী)","চৌপাই (চতুষ্পদী)","কবিত্ত (ছন্দ)"]
    },
    ans:1,
    exp:{
      en:"✓ Kabir's Sakhiyan are written in the Doha form — two-line couplets of 24 matras each. 'Sakhi' means 'witness' (Sanskrit: Sakshi). They convey moral and spiritual wisdom in simple everyday language. Kabir was a 15th-century Bhakti saint who preached unity and denounced caste discrimination. The Sakhiyan are part of Sparsh Bhag 2 Ch 1.",
      hi:"✓ साखी = दोहा विधा — दो पंक्तियाँ, 24-24 मात्राएँ। 'साखी' = साक्षी (संस्कृत)। कबीर 15वीं शती के भक्ति संत। समाज-सुधार और ईश्वर-प्रेम का संदेश।",
      as:"✓ সাখিয়া = দোহা বিধা — দুটা শাৰী, 24-24 মাত্ৰা। 'সাখি' = সাক্ষী (সংস্কৃত)। কবীৰ 15শ শতাব্দীৰ ভক্তি সন্ত।"
    }
  },
  {
    chapter:{en:"Sparsh — Kabir Sakhiyan",hi:"स्पर्श — कबीर की साखियाँ",as:"স্পৰ্শ — কবীৰৰ সাখিয়া"},
    en:"Kabir says: 'बुरा जो देखन मैं चला, बुरा न मिलिया कोय' — what is the core teaching?",
    hi:"कबीर कहते हैं: 'बुरा जो देखन मैं चला, बुरा न मिलिया कोय' — इसका मूल भाव क्या है?",
    as:"কবীৰে কয়: 'বুৰা জো দেখন মৈঁ চলা, বুৰা ন মিলিয়া কোয়' — মূল শিক্ষা কি?",
    hint:"When I went searching for evil outside — I found the worst fault inside myself",
    opts:{
      en:["Evil people do not exist in this world","Search for faults in yourself, not in others — self-reflection leads to wisdom","Society is free of evil","Avoid evil people at all costs"],
      hi:["दुनिया में बुरे लोग नहीं हैं","दूसरों में दोष ढूँढ़ने की बजाय आत्म-अवलोकन करो — स्वयं में सबसे बड़ी बुराई मिलेगी","समाज बुराई से मुक्त है","बुरे लोगों से हमेशा दूर रहो"],
      as:["পৃথিৱীত বেয়া মানুহ নাই","আনৰ দোষ নিবিচাৰি নিজৰ মাজত বিচাৰ — আত্মদৰ্শনেই জ্ঞান","সমাজ বুৰাইমুক্ত","বেয়া মানুহৰ পৰা সদায় আঁতৰে থাক"]
    },
    ans:1,
    exp:{
      en:"✓ Full doha: 'Bura jo dekhan main chala, bura na miliya koye / Jo dil khoja aapna, mujhse bura na koye.' Meaning: When I searched for evil in others, I found none; but when I looked within my own heart, I found none more evil than myself. Teaching: self-reflection over criticising others. A key lesson on humility in Kabir's Sakhiyan.",
      hi:"✓ पूरा दोहा: 'बुरा जो देखन मैं चला, बुरा न मिलिया कोय / जो दिल खोजा आपना, मुझसे बुरा न कोय।' भाव: दूसरों में दोष खोजने की बजाय स्वयं में देखो। आत्म-ज्ञान और विनम्रता की सीख।",
      as:"✓ পূৰ্ণ দোহা: আনৰ দোষ বিচৰাৰ সলনি নিজকে বিচাৰা। আত্মদৰ্শন আৰু বিনম্ৰতাৰ শিক্ষা।"
    }
  },
  {
    chapter:{en:"Sparsh — Meera Pads",hi:"स्पर्श — मीरा के पद",as:"স্পৰ্শ — মীৰাৰ পদ"},
    en:"Meera's pads are addressed to which deity, whom she considers her eternal husband?",
    hi:"मीरा के पद किस देवता को संबोधित हैं, जिन्हें वे अपना ईश्वरीय पति मानती हैं?",
    as:"মীৰাৰ পদ কোন দেৱতাক সম্বোধিত, যাক তেওঁ নিজৰ দেৱীয় স্বামী বুলি মানে?",
    hint:"Meera Bai — devoted to the blue-skinned flute-playing cowherd god of Vrindavan",
    opts:{
      en:["Shiva","Ram","Krishna (Giridhar Gopal)","Vishnu"],
      hi:["शिव","राम","कृष्ण (गिरिधर गोपाल)","विष्णु"],
      as:["শিৱ","ৰাম","কৃষ্ণ (গিৰিধৰ গোপাল)","বিষ্ণু"]
    },
    ans:2,
    exp:{
      en:"✓ Meera Bai (16th century Rajput princess-saint) was an ardent devotee of Lord Krishna, whom she called 'Giridhar Gopal' (one who lifted Govardhan hill). She considered Krishna her divine husband and expressed intense love and virah (separation-longing) for him. Her pads are in Braj Bhasha. She is among the greatest Bhakti poetesses of India.",
      hi:"✓ मीराबाई (16वीं शती, राजपूत संत-कवयित्री) कृष्ण की परम भक्त थीं — 'गिरिधर गोपाल' कहती थीं। कृष्ण को ईश्वरीय पति माना। पद ब्रजभाषा में — विरह-भक्ति की भावना।",
      as:"✓ মীৰাবাই (16শ শতাব্দী) কৃষ্ণৰ পৰম ভক্ত — 'গিৰিধৰ গোপাল' বুলিছিল। ব্ৰজভাষাত পদ — বিৰহ-ভক্তিৰ ভাব।"
    }
  },
  {
    chapter:{en:"Sparsh — Meera Pads",hi:"स्पर्श — मीरा के पद",as:"স্পৰ্শ — মীৰাৰ পদ"},
    en:"In Meera's pads, the word 'विरह' (virah) refers to:",
    hi:"मीरा के पदों में 'विरह' शब्द का अर्थ है:",
    as:"মীৰাৰ পদত 'বিৰহ' শব্দৰ অৰ্থ হৈছে:",
    hint:"Virah = the central emotion of Bhakti poetry — intense separation from the beloved deity",
    opts:{
      en:["Union with God (milan)","Intense separation / longing for the beloved or God","Joy and festival","Surrender to the guru"],
      hi:["ईश्वर से मिलन (मिलन)","प्रियतम/ईश्वर से तीव्र वियोग / विछोह","आनंद और उत्सव","गुरु के प्रति समर्पण"],
      as:["ঈশ্বৰৰ সৈতে মিলন","প্ৰিয়তম/ঈশ্বৰৰ পৰা তীব্ৰ বিচ্ছেদ","আনন্দ আৰু উৎসৱ","গুৰুৰ প্ৰতি সমৰ্পণ"]
    },
    ans:1,
    exp:{
      en:"✓ Virah (विरह) = intense pain of separation from the beloved. In Meera's pads it is her longing for Krishna — she weeps, cannot sleep, and cries out for him. Virah is the primary rasa (emotion) in Meera's poetry. Its opposite is 'milan' (union). Virah poetry is a hallmark of Bhakti literature, especially Vaishnava bhakti.",
      hi:"✓ विरह = प्रियतम से बिछड़ने की तड़प। मीरा के पदों में यह कृष्ण के लिए रोना, बेचैनी और पुकार है। विरह का विलोम = मिलन। वैष्णव भक्ति साहित्य की प्रमुख भावना।",
      as:"✓ বিৰহ = প্ৰিয়তমৰ পৰা বিচ্ছেদৰ যন্ত্ৰণা। মীৰাৰ পদত কৃষ্ণৰ বাবে কান্দোন। বিৰহৰ বিপৰীত = মিলন।"
    }
  },
  {
    chapter:{en:"Sparsh — Tulsidas Dohas",hi:"स्पर्श — तुलसीदास के दोहे",as:"স্পৰ্শ — তুলসীদাসৰ দোহা"},
    en:"Tulsidas is the author of which famous epic written in Awadhi language?",
    hi:"तुलसीदास किस प्रसिद्ध अवधी महाकाव्य के रचयिता हैं?",
    as:"তুলসীদাস কোন বিখ্যাত অৱধী মহাকাব্যৰ ৰচয়িতা?",
    hint:"The most beloved Hindi retelling of Ram's story — written NOT in Sanskrit but in a folk dialect",
    opts:{
      en:["Valmiki Ramayan","Ramcharitmanas","Mahabharat","Adhyatma Ramayana"],
      hi:["वाल्मीकि रामायण","रामचरितमानस","महाभारत","अध्यात्म रामायण"],
      as:["বাল্মীকি ৰামায়ণ","ৰামচৰিতমানস","মহাভাৰত","আধ্যাত্ম ৰামায়ণ"]
    },
    ans:1,
    exp:{
      en:"✓ Goswami Tulsidas (16th century) wrote Ramcharitmanas in Awadhi — the most popular retelling of Ram's story in Hindi. It uses Chaupai and Doha metres. Tulsidas belonged to the Saguna Bhakti tradition (devotion to God with form). His dohas in Sparsh carry moral, social, and devotional teachings. He also wrote Vinay Patrika and Kavitavali.",
      hi:"✓ गोस्वामी तुलसीदास (16वीं शती) ने रामचरितमानस अवधी में लिखी — सर्वाधिक लोकप्रिय राम-कथा। चौपाई और दोहा छंद। सगुण भक्ति धारा। अन्य रचनाएँ: विनय पत्रिका, कवितावली।",
      as:"✓ গোস্বামী তুলসীদাসে (16শ শতাব্দী) অৱধী ভাষাত ৰামচৰিতমানস লিখিলে। চৌপাই আৰু দোহা ছন্দ। সগুণ ভক্তি ধাৰা।"
    }
  },
  {
    chapter:{en:"Sanchayan — Harihar Kaka",hi:"संचयन — हरिहर काका",as:"সঞ্চয়ন — হৰিহৰ কাকা"},
    en:"'Harihar Kaka' (Sanchayan) is written by which author and what is its central theme?",
    hi:"'हरिहर काका' (संचयन) किस लेखक की रचना है और इसका मुख्य विषय क्या है?",
    as:"'হৰিহৰ কাকা' (সঞ্চয়ন) কোন লেখকৰ ৰচনা আৰু ইয়াৰ মূল বিষয় কি?",
    hint:"A childless old man — trapped between greedy family and greedy temple priest — both want his land",

let currentQ=0,score=0,answered=false,currentLang='hi';

function setLang(l){
  currentLang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b=>{if(b.textContent.trim()===(l==='en'?'EN':l==='hi'?'\u0939\u093F':'অ'))b.classList.add('active');});
  document.querySelectorAll('[data-lang]').forEach(el=>{
    el.classList.toggle('hidden',el.dataset.lang!==l);
  });
  renderQuestion();
}

function renderQuestion(){
  if(currentQ>=questions.length){showEnd();return;}
  const q=questions[currentQ];
  const l=currentLang;
  const qLabel=l==='hi'?`\u092A\u094D\u0930\u0936\u094D\u0928 ${currentQ+1} / ${questions.length}`:`QUESTION ${currentQ+1} OF ${questions.length}`;
  document.getElementById('qNum').textContent=qLabel;

  const tag=document.getElementById('chapterTag');
  tag.textContent=q.chapter[l]||q.chapter.hi;

  document.getElementById('qText').textContent=q[l]||q.hi;
  document.getElementById('enHint').textContent=q.hint||'';

  const grid=document.getElementById('optionsGrid');
  grid.innerHTML='';
  const opts=q.opts[l]||q.opts.hi;
  opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=o;
    btn.onclick=()=>selectAnswer(i);
    grid.appendChild(btn);
  });
  const fd=document.getElementById('feedback');
  fd.className='feedback';
  fd.textContent='';
  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('nextBtn').textContent=l==='hi'?'\u0905\u0917\u0932\u093E \u2192':'Next \u2192';
  document.getElementById('progFill').style.width=(currentQ/questions.length*100)+'%';
  document.getElementById('progLabel').textContent=`${currentQ} / ${questions.length}`;
  answered=false;
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  const q=questions[currentQ];
  const l=currentLang;
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  const correct=idx===q.ans;
  btns[idx].classList.add(correct?'correct':'wrong');
  if(!correct)btns[q.ans].classList.add('correct');
  const fd=document.getElementById('feedback');
  const prefix=correct?(l==='hi'?'\u2713 \u0938\u0939\u0940! ':'\u2713 Correct! '):(l==='hi'?'\u2717 \u0917\u0932\u0924! ':'\u2717 Wrong! ');
  fd.className='feedback show '+(correct?'correct':'wrong');
  fd.textContent=prefix+(q.exp[l]||q.exp.hi);
  if(correct)score+=10;
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQuestion(){
  currentQ++;
  const card=document.getElementById('qCard');
  card.classList.remove('fadeIn');
  void card.offsetWidth;
  card.classList.add('fadeIn');
  renderQuestion();
}

function showEnd(){
  document.getElementById('qCard').classList.add('hidden');
  const end=document.getElementById('endScreen');
  end.classList.remove('hidden');
  document.getElementById('finalScore').textContent=`${score} / 100`;
  const pct=score;
  let stars='',msg='';
  if(pct>=90){stars='★★★';msg='\u0905\u0926\u094D\u092D\u0941\u0924! \u0906\u092A \u0939\u093F\u0902\u0926\u0940 \u0938\u093E\u0939\u093F\u0924\u094D\u092F \u092E\u0947\u0902 \u0928\u093F\u092A\u0941\u0923 \u0939\u0948\u0902!';}
  else if(pct>=70){stars='★★☆';msg='\u092C\u0939\u0941\u0924 \u0905\u091A\u094D\u091B\u0947! \u0935\u093F\u0930\u0939, \u0926\u094B\u0939\u093E \u0914\u0930 \u092A\u0926 \u0926\u094B\u092C\u093E\u0930\u093E \u092A\u0922\u093C\u0947\u0902\u0964';}
  else if(pct>=40){stars='★☆☆';msg='\u0905\u091A\u094D\u091B\u093E \u092A\u094D\u0930\u092F\u093E\u0938! \u0915\u092C\u0940\u0930, \u092E\u0940\u0930\u093E \u0914\u0930 \u0924\u0941\u0932\u0938\u0940\u0926\u093E\u0938 \u0926\u094B\u092C\u093E\u0930\u093E \u092A\u0922\u093C\u0947\u0902\u0964';}
  else{stars='☆☆☆';msg='\u0914\u0930 \u092E\u0947\u0939\u0928\u0924 \u0915\u0930\u0947\u0902! \u092A\u0939\u0932\u0947 \u0905\u0927\u094D\u092F\u093E\u092F\u094B\u0902 \u0915\u0947 \u092E\u0941\u0916\u094D\u092F \u092C\u093F\u0902\u0926\u0941 \u092F\u093E\u0926 \u0915\u0930\u0947\u0902\u0964';}
  document.getElementById('starsDisplay').textContent=stars;
  document.getElementById('finalMsg').textContent=msg;
  document.getElementById('progFill').style.width='100%';
  document.getElementById('progLabel').textContent=`${questions.length} / ${questions.length}`;
}

function restartGame(){
  currentQ=0;score=0;answered=false;
  document.getElementById('scoreVal').textContent=0;
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('qCard').classList.remove('hidden');
  renderQuestion();
}
