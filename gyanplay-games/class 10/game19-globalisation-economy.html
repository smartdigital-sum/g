<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Money, Credit &amp; Globalisation – Class 10</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --saffron:#FF6B00;--gold:#FFB800;--sky:#00AEEF;
    --green:#00C853;--pink:#FF4081;--purple:#7C3AED;
    --bg1:#0F0C29;--bg2:#302B63;--card:#1a1740;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;font-family:'Nunito',sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#fff;}
  .topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;
    background:rgba(0,0,0,.35);flex-wrap:wrap;}
  .back-btn{background:rgba(255,255,255,.12);border:none;color:#fff;
    padding:7px 16px;border-radius:20px;cursor:pointer;
    font-family:'Nunito',sans-serif;font-size:.9rem;transition:background .2s;}
  .back-btn:hover{background:rgba(255,255,255,.25);}
  .subject-badge{background:var(--pink);color:#fff;padding:5px 14px;
    border-radius:20px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:.85rem;}
  .title-bar{flex:1;font-family:'Baloo 2',sans-serif;font-weight:700;
    font-size:1.05rem;color:var(--gold);}
  .lang-toggle{display:flex;gap:6px;}
  .lang-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
    color:#fff;padding:5px 12px;border-radius:16px;cursor:pointer;font-size:.82rem;transition:all .2s;}
  .lang-btn.active{background:var(--sky);border-color:var(--sky);}
  .progress-wrap{padding:14px 20px 0;}
  .progress-info{display:flex;justify-content:space-between;font-size:.85rem;color:#ccc;margin-bottom:6px;}
  .progress-bar-bg{background:rgba(255,255,255,.12);border-radius:10px;height:8px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--green));
    border-radius:10px;transition:width .5s;}
  .game-wrap{max-width:740px;margin:18px auto;padding:0 16px 40px;}
  .card{background:var(--card);border-radius:18px;padding:26px;
    box-shadow:0 8px 32px rgba(0,0,0,.45);animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .q-number{font-family:'Baloo 2',sans-serif;font-size:.85rem;color:var(--sky);margin-bottom:8px;font-weight:600;}
  .q-text{font-size:1.08rem;line-height:1.6;margin-bottom:6px;font-weight:600;}
  .year-tag{display:inline-block;background:rgba(0,174,239,.15);border:1px solid var(--sky);
    color:var(--sky);padding:3px 12px;border-radius:12px;font-size:.8rem;
    font-weight:700;margin-bottom:12px;}
  .context-box{background:rgba(255,255,255,.06);border-left:3px solid var(--sky);
    border-radius:0 10px 10px 0;padding:10px 14px;margin:10px 0;
    font-size:.88rem;color:#ddd;line-height:1.5;}
  .options{display:grid;gap:10px;margin-top:16px;}
  .opt-btn{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);
    color:#fff;padding:13px 18px;border-radius:12px;cursor:pointer;
    font-family:'Nunito',sans-serif;font-size:.97rem;text-align:left;transition:all .2s;}
  .opt-btn:hover:not(:disabled){background:rgba(0,174,239,.18);border-color:var(--sky);}
  .opt-btn.correct{background:rgba(0,200,83,.25);border-color:var(--green);}
  .opt-btn.wrong{background:rgba(255,64,129,.2);border-color:var(--pink);}
  .opt-btn:disabled{cursor:default;}
  .feedback{margin-top:14px;padding:11px 16px;border-radius:10px;
    font-weight:700;font-size:.95rem;display:none;}
  .feedback.show{display:block;animation:fadeIn .3s ease;}
  .feedback.ok{background:rgba(0,200,83,.2);color:var(--green);}
  .feedback.no{background:rgba(255,64,129,.18);color:#ff7eb3;}
  .next-btn{margin-top:18px;background:linear-gradient(135deg,var(--sky),var(--green));
    border:none;color:#fff;padding:12px 32px;border-radius:25px;
    font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:700;
    cursor:pointer;display:none;transition:transform .15s;}
  .next-btn:hover{transform:scale(1.04);}
  .end-screen{display:none;text-align:center;}
  .end-screen.show{display:block;animation:fadeIn .5s ease;}
  .score-big{font-family:'Baloo 2',sans-serif;font-size:3.5rem;font-weight:800;
    color:var(--gold);line-height:1;margin:10px 0;}
  .score-label{color:#ccc;font-size:.95rem;margin-bottom:18px;}
  .stars{font-size:2.5rem;margin:10px 0;}
  .play-again{background:linear-gradient(135deg,var(--sky),var(--gold));
    border:none;color:#fff;padding:14px 36px;border-radius:28px;
    font-family:'Baloo 2',sans-serif;font-size:1.1rem;font-weight:700;
    cursor:pointer;margin-top:16px;transition:transform .15s;}
  .play-again:hover{transform:scale(1.05);}
  .result-detail{margin-top:22px;text-align:left;}
  .result-detail h3{font-family:'Baloo 2',sans-serif;color:var(--sky);margin-bottom:10px;}
  .result-item{padding:9px 14px;border-radius:8px;margin-bottom:7px;
    font-size:.9rem;line-height:1.4;background:rgba(255,255,255,.06);}
  .result-item.r-ok{border-left:3px solid var(--green);}
  .result-item.r-no{border-left:3px solid var(--pink);}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← <span data-lang="en">Back</span><span data-lang="hi" style="display:none">वापस</span><span data-lang="as" style="display:none">পিছলৈ</span></button>
  <span class="subject-badge">Social Studies</span>
  <span class="title-bar">
    <span data-lang="en">Money, Credit &amp; Globalisation</span>
    <span data-lang="hi" style="display:none">मुद्रा, साख और वैश्वीकरण</span>
    <span data-lang="as" style="display:none">মুদ্ৰা, ঋণ আৰু বিশ্বায়ন</span>
  </span>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span><span data-lang="en">Question</span><span data-lang="hi" style="display:none">प्रश्न</span><span data-lang="as" style="display:none">প্ৰশ্ন</span> <span id="qNum">1</span>/10</span>
    <span><span data-lang="en">Score</span><span data-lang="hi" style="display:none">स्कोर</span><span data-lang="as" style="display:none">স্কোৰ</span>: <span id="scoreDisp">0</span>/100</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progBar" style="width:0%"></div></div>
</div>

<div class="game-wrap">
  <div class="card" id="questionCard">
    <div class="q-number" id="qLabel">Question 1 of 10</div>
    <div id="yearTagWrap"></div>
    <div class="q-text" id="qText"></div>
    <div id="contextBox" style="display:none" class="context-box"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      <span data-lang="en">Next →</span>
      <span data-lang="hi" style="display:none">अगला →</span>
      <span data-lang="as" style="display:none">পৰৱৰ্তী →</span>
    </button>
  </div>

  <div class="card end-screen" id="endScreen">
    <div class="score-big" id="finalScore">0</div>
    <div class="score-label">
      <span data-lang="en">out of 100</span>
      <span data-lang="hi" style="display:none">100 में से</span>
      <span data-lang="as" style="display:none">100ৰ মাজৰ পৰা</span>
    </div>
    <div class="stars" id="stars">⭐⭐⭐</div>
    <p id="endMsg" style="color:#ccc;font-size:1rem;"></p>
    <button class="play-again" onclick="restartGame()">
      <span data-lang="en">Play Again</span>
      <span data-lang="hi" style="display:none">फिर खेलें</span>
      <span data-lang="as" style="display:none">পুনৰ খেলক</span>
    </button>
    <div class="result-detail" id="resultDetail"></div>
  </div>
</div>

<script>
const questions=[
  {
    tag:"Money & Credit",
    context:"Before money existed, people exchanged goods directly.",
    en:{q:"💰 What is the main problem with the barter system that money solved?",
    opts:["Barter required a double coincidence of wants — both parties had to want exactly what the other offered; money eliminated this problem",
          "Barter was too fast and efficient","Barter only worked in cities, not in rural areas",
          "Barter required government approval for every transaction"],ans:0,
    exp:"In a barter system, a farmer with rice who wants cloth must find someone who has cloth AND wants rice — a 'double coincidence of wants.' Money acts as a medium of exchange accepted by everyone, eliminating this barrier and enabling complex economies."},
    hi:{q:"💰 वस्तु-विनिमय प्रणाली की मुख्य समस्या क्या थी जिसे मुद्रा ने हल किया?",
    opts:["वस्तु-विनिमय में दोहरी संयोग की आवश्यकता थी — दोनों पक्षों को बिल्कुल वही चाहिए होना था जो दूसरे के पास है; मुद्रा ने यह समस्या समाप्त की",
          "वस्तु-विनिमय बहुत तेज़ और कुशल थी","वस्तु-विनिमय केवल शहरों में काम करती थी",
          "प्रत्येक लेनदेन के लिए सरकारी अनुमति चाहिए थी"],exp:"वस्तु-विनिमय में 'दोहरी संयोग' की समस्या थी। मुद्रा ने विनिमय का माध्यम प्रदान किया जिसे सभी स्वीकार करते हैं।"},
    as:{q:"💰 বিনিময় প্ৰথাৰ মূল সমস্যা কি আছিল যি মুদ্ৰাই সমাধান কৰিলে?",
    opts:["বিনিময়ত দ্বৈত সমাপতনৰ প্ৰয়োজন আছিল — উভয় পক্ষই ঠিক সেইটোই বিচাৰিব লাগিব যি আনৰ হাতত আছে; মুদ্ৰাই এই সমস্যা সমাধান কৰিলে",
          "বিনিময় প্ৰথা অতি দ্ৰুত আৰু দক্ষ আছিল","বিনিময় কেৱল চহৰত কাম কৰিছিল",
          "প্ৰতিটো লেনদেনৰ বাবে চৰকাৰী অনুমতি লাগিছিল"],exp:"বিনিময় প্ৰথাত 'দ্বৈত সমাপতন'ৰ সমস্যা আছিল। মুদ্ৰাই বিনিময়ৰ মাধ্যম প্ৰদান কৰিলে যি সকলোৱে গ্ৰহণ কৰে।"}
  },
  {
    tag:"Formal Credit",
    context:"Banks and cooperative societies form the formal credit sector in India.",
    en:{q:"🏦 What is 'collateral' in the context of bank loans, and why do the poor struggle to access bank credit?",
    opts:["Collateral is an asset pledged as security for a loan (e.g., land, gold); poor people lack assets, so banks refuse them loans — pushing them to informal lenders",
          "Collateral is the interest rate charged by banks","Collateral is the government guarantee on bank deposits",
          "Collateral is a fee paid to the bank when opening an account"],ans:0,
    exp:"Collateral is property (land, building, vehicle, deposits) that borrowers offer as guarantee. If the borrower cannot repay, the lender sells it. The poor lack valuable collateral, so banks reject them. They then rely on moneylenders who charge very high interest rates (often 36–60% per year)."},
    hi:{q:"🏦 बैंक ऋण में 'संपार्श्विक' क्या है, और गरीब लोग बैंक ऋण क्यों नहीं पा पाते?",
    opts:["संपार्श्विक एक संपत्ति है जो ऋण के लिए जमानत के रूप में गिरवी रखी जाती है (भूमि, सोना); गरीबों के पास संपत्ति नहीं, इसलिए बैंक ऋण से इनकार — वे अनौपचारिक ऋणदाताओं पर निर्भर",
          "संपार्श्विक बैंकों द्वारा लगाई जाने वाली ब्याज दर है","संपार्श्विक बैंक जमा पर सरकारी गारंटी है",
          "संपार्श्विक खाता खोलते समय बैंक को दी जाने वाली शुल्क है"],exp:"संपार्श्विक वह संपत्ति है जो उधारकर्ता गारंटी के रूप में देते हैं। गरीबों के पास यह नहीं होती, इसलिए वे महंगे साहूकारों पर निर्भर होते हैं।"},
    as:{q:"🏦 বেংক ঋণত 'জামানত' কি, আৰু দৰিদ্ৰ লোকসকলে বেংক ঋণ পোৱাত কিয় সমস্যা হয়?",
    opts:["জামানত হৈছে ঋণৰ নিৰাপত্তা হিচাপে বন্ধক ৰখা সম্পত্তি (ভূমি, সোণ); দৰিদ্ৰ লোকৰ সম্পত্তি নাই, সেয়ে বেংকে ঋণ প্ৰত্যাখ্যান কৰে — তেওঁলোক অনানুষ্ঠানিক ঋণদাতাৰ ওপৰত নিৰ্ভৰশীল",
          "জামানত হৈছে বেংকে ধাৰ্য কৰা সুদৰ হাৰ","জামানত হৈছে বেংক আমানতত চৰকাৰী নিশ্চয়তা",
          "জামানত হৈছে একাউণ্ট খোলাৰ সময়ত বেংকক দিয়া মাচুল"],exp:"জামানত হৈছে ঋণগ্ৰহীতাই নিৰাপত্তা হিচাপে আগবঢ়োৱা সম্পত্তি। দৰিদ্ৰ লোকৰ এনে সম্পত্তি নথকাত তেওঁলোক মহাজনৰ ওপৰত নিৰ্ভৰশীল।"}
  },
  {
    tag:"SHGs",
    context:"A grassroots model was developed to give the rural poor access to credit.",
    en:{q:"💰 What is a Self Help Group (SHG) and how does it help poor rural women?",
    opts:["SHGs are small groups (15–20 members) who save regularly and give loans to members at low interest, without collateral — empowering women economically",
          "SHGs are government banks set up in rural areas","SHGs are groups of large farmers who share agricultural equipment",
          "SHGs are MNC-funded organisations providing free food in villages"],ans:0,
    exp:"SHGs typically have 15–20 rural women who save small amounts (₹25–100/month). After building savings, the group borrows from banks and gives loans to members at 10–15% interest (much lower than moneylenders' 36–60%). Grameen Bank of Bangladesh inspired India's SHG movement. NABARD supports SHGs in India."},
    hi:{q:"💰 स्वयं सहायता समूह (SHG) क्या है और यह गरीब ग्रामीण महिलाओं की कैसे मदद करता है?",
    opts:["SHG छोटे समूह (15–20 सदस्य) हैं जो नियमित बचत करते हैं और बिना संपार्श्विक के कम ब्याज पर सदस्यों को ऋण देते हैं — महिलाओं को आर्थिक रूप से सशक्त बनाते हैं",
          "SHG ग्रामीण क्षेत्रों में सरकारी बैंक हैं","SHG बड़े किसानों के समूह हैं जो कृषि उपकरण साझा करते हैं",
          "SHG बहुराष्ट्रीय कंपनियों द्वारा वित्त पोषित गांवों में मुफ्त भोजन देने वाले संगठन हैं"],exp:"SHG में 15–20 ग्रामीण महिलाएं छोटी-छोटी बचत करती हैं। बैंक से उधार लेकर सदस्यों को 10–15% ब्याज पर ऋण देती हैं। NABARD भारत में SHG का समर्थन करता है।"},
    as:{q:"💰 স্বনিৰ্ভৰ গোট (SHG) কি আৰু ই কেনেকৈ দৰিদ্ৰ গ্ৰামীণ মহিলাসকলক সহায় কৰে?",
    opts:["SHG হৈছে ক্ষুদ্ৰ গোট (15–20 সদস্য) যিসকলে নিয়মিত সঞ্চয় কৰে আৰু জামানত অবিহনে কম সুদত সদস্যসকলক ঋণ দিয়ে — মহিলাসকলক অৰ্থনৈতিকভাৱে ক্ষমতায়িত কৰে",
          "SHG গ্ৰামাঞ্চলত স্থাপিত চৰকাৰী বেংক","SHG হৈছে কৃষি সঁজুলি ভাগ-বতৰা কৰা বৃহৎ কৃষকৰ গোট",
          "SHG হৈছে বহুজাতিক কোম্পানীয়ে পুঁজি যোগোৱা গাঁৱত বিনামূলীয়া খাদ্য প্ৰদানকাৰী সংগঠন"],exp:"SHGত 15–20 গ্ৰামীণ মহিলাই সৰু পৰিমাণে সঞ্চয় কৰে। বেংকৰ পৰা ঋণ লৈ সদস্যসকলক 10–15% সুদত ঋণ দিয়ে। NABARD এ ভাৰতত SHG সমৰ্থন কৰে।"}
  },
  {
    tag:"Informal Credit",
    context:"A large portion of rural India still relies on non-institutional lenders.",
    en:{q:"🏦 What is the difference between formal and informal sources of credit in India?",
    opts:["Formal: banks, cooperatives — regulated, lower interest, require collateral; Informal: moneylenders, traders, relatives — unregulated, very high interest, no collateral check",
          "Formal credit is only available in cities; informal only in rural areas",
          "Formal credit is given by the government for free; informal credit is illegal",
          "Both formal and informal sources charge the same interest rates"],ans:0,
    exp:"Formal sector (RBI regulated): commercial banks, cooperative banks — interest 8–15%. Informal sector: moneylenders (36–60%), landlords, traders, relatives. About 85% of rural credit in India was from informal sources in the 1950s; today it is around 40%. The government promotes formal credit to reduce 'debt traps.'"},
    hi:{q:"🏦 भारत में ऋण के औपचारिक और अनौपचारिक स्रोतों में क्या अंतर है?",

let current=0,score=0,answered=[],currentLang='en';

function setLang(l){
  currentLang=l;
  document.querySelectorAll('[data-lang]').forEach(el=>{
    el.style.display=el.getAttribute('data-lang')===l?'':'none';
  });
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{
    b.classList.toggle('active',['en','hi','as'][i]===l);
  });
  renderQuestion();
}

function renderQuestion(){
  if(current>=questions.length){showEnd();return;}
  const q=questions[current];
  const lang=q[currentLang]||q['en'];
  const enQ=q['en'];
  document.getElementById('qNum').textContent=current+1;
  document.getElementById('scoreDisp').textContent=score;
  document.getElementById('qLabel').textContent='Question '+(current+1)+' of 10';
  document.getElementById('progBar').style.width=((current)/10*100)+'%';
  document.getElementById('yearTagWrap').innerHTML=q.tag?
    '<span class="year-tag">🏷️ '+q.tag+'</span>':'';
  document.getElementById('qText').textContent=lang.q||enQ.q;
  const ctx=document.getElementById('contextBox');
  if(q.context){ctx.textContent=q.context;ctx.style.display='block';}
  else{ctx.style.display='none';}
  const opts=lang.opts||enQ.opts;
  const optDiv=document.getElementById('options');
  optDiv.innerHTML='';
  opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt-btn';b.textContent=o;
    b.onclick=()=>selectAnswer(i,enQ.ans,lang.exp||enQ.exp);
    optDiv.appendChild(b);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').style.display='none';
}

function selectAnswer(chosen,correct,exp){
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[correct].classList.add('correct');
  const fb=document.getElementById('feedback');
  if(chosen===correct){
    score+=10;document.getElementById('scoreDisp').textContent=score;
    fb.textContent='✓ Correct! '+exp;fb.className='feedback ok show';
  } else {
    btns[chosen].classList.add('wrong');
    fb.textContent='✗ Not quite. '+exp;fb.className='feedback no show';
  }
  answered.push({q:questions[current]['en'].q,correct:chosen===correct,exp});
  document.getElementById('nextBtn').style.display='inline-block';
}

function nextQuestion(){current++;renderQuestion();}

function showEnd(){
  document.getElementById('questionCard').style.display='none';
  document.getElementById('progBar').style.width='100%';
  document.getElementById('finalScore').textContent=score;
  let stars='';
  if(score>=90)stars='⭐⭐⭐';
  else if(score>=70)stars='⭐⭐';
  else if(score>=40)stars='⭐';
  document.getElementById('stars').textContent=stars||'☆☆☆';
  const msgs={en:['Keep studying economics! 💰','Good understanding! 🌐','Economics expert! 🏆'],
    hi:['अर्थशास्त्र पढ़ते रहें! 💰','अच्छी समझ! 🌐','अर्थशास्त्र विशेषज्ञ! 🏆'],
    as:['অৰ্থনীতি পঢ়ি থাকক! 💰','ভাল বোধগম্যতা! 🌐','অৰ্থনীতি বিশেষজ্ঞ! 🏆']};
  const mArr=msgs[currentLang]||msgs.en;
  document.getElementById('endMsg').textContent=score>=90?mArr[2]:score>=70?mArr[1]:mArr[0];
  let html='<h3>Review</h3>';
  answered.forEach((a,i)=>{
    html+='<div class="result-item '+(a.correct?'r-ok':'r-no')+'">'
      +'<strong>Q'+(i+1)+':</strong> '+(a.correct?'✓':'✗')+' '+a.q
      +'<br/><small>'+a.exp+'</small></div>';
  });
  document.getElementById('resultDetail').innerHTML=html;
  const es=document.getElementById('endScreen');
  es.style.display='block';es.classList.add('show');
}

function restartGame(){
  current=0;score=0;answered=[];
  document.getElementById('questionCard').style.display='block';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('endScreen').classList.remove('show');
  renderQuestion();
}

setLang('en');
</script>
