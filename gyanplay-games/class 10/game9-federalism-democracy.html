<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Federalism &amp; Democracy – Class 10</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --saffron:#FF6B00;--gold:#FFB800;--sky:#00AEEF;
    --green:#00C853;--pink:#FF4081;--purple:#7C3AED;
    --bg1:#0F0C29;--bg2:#302B63;--card:#1a1740;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;font-family:'Nunito',sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#fff;}
  .topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;
    background:rgba(0,0,0,.35);flex-wrap:wrap;}
  .back-btn{background:rgba(255,255,255,.12);border:none;color:#fff;
    padding:7px 16px;border-radius:20px;cursor:pointer;
    font-family:'Nunito',sans-serif;font-size:.9rem;transition:background .2s;}
  .back-btn:hover{background:rgba(255,255,255,.25);}
  .subject-badge{background:var(--pink);color:#fff;padding:5px 14px;
    border-radius:20px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:.85rem;}
  .title-bar{flex:1;font-family:'Baloo 2',sans-serif;font-weight:700;
    font-size:1.05rem;color:var(--gold);}
  .lang-toggle{display:flex;gap:6px;}
  .lang-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
    color:#fff;padding:5px 12px;border-radius:16px;cursor:pointer;font-size:.82rem;transition:all .2s;}
  .lang-btn.active{background:var(--sky);border-color:var(--sky);}
  .progress-wrap{padding:14px 20px 0;}
  .progress-info{display:flex;justify-content:space-between;font-size:.85rem;color:#ccc;margin-bottom:6px;}
  .progress-bar-bg{background:rgba(255,255,255,.12);border-radius:10px;height:8px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));
    border-radius:10px;transition:width .5s;}
  .game-wrap{max-width:740px;margin:18px auto;padding:0 16px 40px;}
  .card{background:var(--card);border-radius:18px;padding:26px;
    box-shadow:0 8px 32px rgba(0,0,0,.45);animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .q-number{font-family:'Baloo 2',sans-serif;font-size:.85rem;color:var(--purple);margin-bottom:8px;font-weight:600;}
  .q-text{font-size:1.08rem;line-height:1.6;margin-bottom:6px;font-weight:600;}

  /* Compare table */
  .compare-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.85rem;}
  .compare-table th{background:rgba(124,58,237,.3);color:var(--gold);padding:8px 10px;text-align:left;}
  .compare-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.08);}
  .compare-table tr:nth-child(even) td{background:rgba(255,255,255,.04);}

  .list-box{
    background:rgba(255,255,255,.06);border-radius:10px;
    padding:10px 14px;margin:10px 0;
    border-left:3px solid var(--purple);font-size:.88rem;line-height:1.7;
  }
  .list-box b{color:var(--gold);}

  .options{display:grid;gap:10px;margin-top:16px;}
  .opt-btn{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);
    color:#fff;padding:13px 18px;border-radius:12px;cursor:pointer;
    font-family:'Nunito',sans-serif;font-size:.97rem;text-align:left;transition:all .2s;}
  .opt-btn:hover:not(:disabled){background:rgba(124,58,237,.25);border-color:var(--purple);}
  .opt-btn.correct{background:rgba(0,200,83,.25);border-color:var(--green);}
  .opt-btn.wrong{background:rgba(255,64,129,.2);border-color:var(--pink);}
  .opt-btn:disabled{cursor:default;}
  .feedback{margin-top:14px;padding:11px 16px;border-radius:10px;
    font-weight:700;font-size:.95rem;display:none;}
  .feedback.show{display:block;animation:fadeIn .3s ease;}
  .feedback.ok{background:rgba(0,200,83,.2);color:var(--green);}
  .feedback.no{background:rgba(255,64,129,.18);color:#ff7eb3;}
  .next-btn{margin-top:18px;background:linear-gradient(135deg,var(--purple),var(--pink));
    border:none;color:#fff;padding:12px 32px;border-radius:25px;
    font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:700;
    cursor:pointer;display:none;transition:transform .15s;}
  .next-btn:hover{transform:scale(1.04);}
  .end-screen{display:none;text-align:center;}
  .end-screen.show{display:block;animation:fadeIn .5s ease;}
  .score-big{font-family:'Baloo 2',sans-serif;font-size:3.5rem;font-weight:800;
    color:var(--gold);line-height:1;margin:10px 0;}
  .score-label{color:#ccc;font-size:.95rem;margin-bottom:18px;}
  .stars{font-size:2.5rem;margin:10px 0;}
  .play-again{background:linear-gradient(135deg,var(--saffron),var(--gold));
    border:none;color:#fff;padding:14px 36px;border-radius:28px;
    font-family:'Baloo 2',sans-serif;font-size:1.1rem;font-weight:700;
    cursor:pointer;margin-top:16px;transition:transform .15s;}
  .play-again:hover{transform:scale(1.05);}
  .result-detail{margin-top:22px;text-align:left;}
  .result-detail h3{font-family:'Baloo 2',sans-serif;color:var(--sky);margin-bottom:10px;}
  .result-item{padding:9px 14px;border-radius:8px;margin-bottom:7px;
    font-size:.9rem;line-height:1.4;background:rgba(255,255,255,.06);}
  .result-item.r-ok{border-left:3px solid var(--green);}
  .result-item.r-no{border-left:3px solid var(--pink);}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← <span data-lang="en">Back</span><span data-lang="hi" style="display:none">वापस</span><span data-lang="as" style="display:none">পিছলৈ</span></button>
  <span class="subject-badge">Social Studies</span>
  <span class="title-bar">
    <span data-lang="en">Federalism &amp; Democracy</span>
    <span data-lang="hi" style="display:none">संघवाद और लोकतंत्र</span>
    <span data-lang="as" style="display:none">যুক্তৰাষ্ট্ৰীয়তা আৰু গণতন্ত্ৰ</span>
  </span>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span><span data-lang="en">Question</span><span data-lang="hi" style="display:none">प्रश्न</span><span data-lang="as" style="display:none">প্ৰশ্ন</span> <span id="qNum">1</span>/10</span>
    <span><span data-lang="en">Score</span><span data-lang="hi" style="display:none">स्कोर</span><span data-lang="as" style="display:none">স্কোৰ</span>: <span id="scoreDisp">0</span>/100</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progBar" style="width:0%"></div></div>
</div>

<div class="game-wrap">
  <div class="card" id="questionCard">
    <div class="q-number" id="qLabel">Question 1 of 10</div>
    <div class="q-text" id="qText"></div>
    <div id="extraContent"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      <span data-lang="en">Next →</span>
      <span data-lang="hi" style="display:none">अगला →</span>
      <span data-lang="as" style="display:none">পৰৱৰ্তী →</span>
    </button>
  </div>

  <div class="card end-screen" id="endScreen">
    <div class="score-big" id="finalScore">0</div>
    <div class="score-label">
      <span data-lang="en">out of 100</span>
      <span data-lang="hi" style="display:none">100 में से</span>
      <span data-lang="as" style="display:none">100ৰ মাজৰ পৰা</span>
    </div>
    <div class="stars" id="stars">⭐⭐⭐</div>
    <p id="endMsg" style="color:#ccc;font-size:1rem;"></p>
    <button class="play-again" onclick="restartGame()">
      <span data-lang="en">Play Again</span>
      <span data-lang="hi" style="display:none">फिर खेलें</span>
      <span data-lang="as" style="display:none">পুনৰ খেলক</span>
    </button>
    <div class="result-detail" id="resultDetail"></div>
  </div>
</div>

<script>
// extraHTML: optional HTML to show in extra content area
const questions=[
  {
    extraHTML:`<table class="compare-table"><thead><tr><th>Federal Govt</th><th>Unitary Govt</th></tr></thead>
    <tbody><tr><td>Power shared between Centre &amp; States</td><td>All power with Central Govt</td></tr>
    <tr><td>Written Constitution</td><td>May be unwritten</td></tr>
    <tr><td>Independent judiciary</td><td>Central court controls all</td></tr></tbody></table>`,
    en:{q:"What is the key difference between FEDERAL and UNITARY government?",
    opts:["Federal: power shared between centre and states; Unitary: all power with central government",
          "Federal: only one level of government; Unitary: two levels",
          "Federal: unelected leaders; Unitary: elected leaders",
          "Federal: no constitution; Unitary: written constitution"],ans:0,
    exp:"Federal government has two or more levels of government (Centre + States/Provinces), each with its own jurisdiction. Unitary: only central government has real power (e.g., Sri Lanka, UK)."},
    hi:{q:"संघीय और एकात्मक सरकार में मुख्य अंतर क्या है?",
    opts:["संघीय: केंद्र और राज्यों में शक्ति का बंटवारा; एकात्मक: सभी शक्ति केंद्र में",
          "संघीय: केवल एक स्तर; एकात्मक: दो स्तर",
          "संघीय: अनिर्वाचित नेता; एकात्मक: निर्वाचित",
          "संघीय: कोई संविधान नहीं; एकात्मक: लिखित संविधान"],exp:"संघीय सरकार में केंद्र और राज्य दोनों के पास अलग-अलग क्षेत्राधिकार होते हैं। एकात्मक में सारी शक्ति केंद्र में।"},
    as:{q:"যুক্তৰাষ্ট্ৰীয় আৰু এককেন্দ্ৰিক চৰকাৰৰ মূল পাৰ্থক্য কি?",
    opts:["যুক্তৰাষ্ট্ৰীয়: কেন্দ্ৰ আৰু ৰাজ্যৰ মাজত ক্ষমতা ভাগ; এককেন্দ্ৰিক: সকলো ক্ষমতা কেন্দ্ৰত",
          "যুক্তৰাষ্ট্ৰীয়: কেৱল এটা স্তৰ; এককেন্দ্ৰিক: দুটা স্তৰ",
          "যুক্তৰাষ্ট্ৰীয়: নিৰ্বাচিত নহোৱা নেতা; এককেন্দ্ৰিক: নিৰ্বাচিত",
          "যুক্তৰাষ্ট্ৰীয়: কোনো সংবিধান নাই; এককেন্দ্ৰিক: লিখিত সংবিধান"],exp:"যুক্তৰাষ্ট্ৰীয় চৰকাৰত কেন্দ্ৰ আৰু ৰাজ্য দুয়োৰে পৃথক এখতিয়াৰ থাকে। এককেন্দ্ৰিকত সকলো ক্ষমতা কেন্দ্ৰত।"}
  },
  {
    extraHTML:`<div class="list-box"><b>Three Lists (Seventh Schedule):</b><br/>
    • <b>Union List</b> — Defence, Foreign affairs, Currency (97 subjects)<br/>
    • <b>State List</b> — Police, Trade, Agriculture (66 subjects)<br/>
    • <b>Concurrent List</b> — Education, Forest, Marriage (47 subjects)</div>`,
    en:{q:"Which LIST in the Indian Constitution covers subjects like EDUCATION and FORESTS?",
    opts:["Concurrent List — both Centre and State can make laws",
          "Union List — only Centre","State List — only State","Residuary List — only Centre"],ans:0,
    exp:"Education and Forests were moved to the Concurrent List (by 42nd Amendment, 1976). Both Centre and States can legislate. If conflict, Central law prevails. Union List: defence, foreign affairs. State List: police, agriculture."},
    hi:{q:"भारतीय संविधान में शिक्षा और वन किस सूची में हैं?",
    opts:["समवर्ती सूची — केंद्र और राज्य दोनों कानून बना सकते हैं",
          "संघ सूची — केवल केंद्र","राज्य सूची — केवल राज्य","अवशिष्ट सूची — केवल केंद्र"],exp:"42वें संशोधन (1976) से शिक्षा और वन समवर्ती सूची में आए। दोनों कानून बना सकते हैं; टकराव पर केंद्रीय कानून प्रभावी।"},
    as:{q:"ভাৰতীয় সংবিধানত শিক্ষা আৰু বন কোন তালিকাত আছে?",
    opts:["সমৱৰ্তী তালিকা — কেন্দ্ৰ আৰু ৰাজ্য দুয়োটাই আইন প্ৰণয়ন কৰিব পাৰে",
          "সংঘ তালিকা — কেৱল কেন্দ্ৰ","ৰাজ্য তালিকা — কেৱল ৰাজ্য","অৱশিষ্ট তালিকা — কেৱল কেন্দ্ৰ"],exp:"42তম সংশোধনী (1976)ৰ দ্বাৰা শিক্ষা আৰু বন সমৱৰ্তী তালিকালৈ স্থানান্তৰিত হ'ল।"}
  },
  {
    extraHTML:`<div class="list-box"><b>Belgium vs Sri Lanka Model:</b><br/>
    🇧🇪 <b>Belgium</b>: Accommodated French &amp; Dutch communities; equal representation<br/>
    🇱🇰 <b>Sri Lanka</b>: Majoritarianism — Sinhala only language, disadvantaged Tamils → civil conflict</div>`,
    en:{q:"Which country is an example of SUCCESSFUL power sharing between different linguistic communities?",
    opts:["Belgium — power shared equally between Dutch and French speakers through federal system",
          "Sri Lanka — Sinhala-only policy gave equal rights to Tamils",
          "India — only Hindi speakers get political power","USA — only English speakers can vote"],ans:0,
    exp:"Belgium solved ethnic conflict by power sharing: equal representation for Dutch/French communities, separate governments for regions. Sri Lanka chose majoritarianism (Sinhala-only), which led to civil war. Belgium is the model NCERT recommends."},
    hi:{q:"कौन सा देश विभिन्न भाषाई समुदायों के बीच सफल सत्ता साझेदारी का उदाहरण है?",
    opts:["बेल्जियम — डच और फ्रांसीसी भाषियों के बीच संघीय व्यवस्था से समान प्रतिनिधित्व",
          "श्रीलंका — सिंहली-केवल नीति ने तमिलों को समान अधिकार दिए",
          "भारत — केवल हिंदी भाषियों को राजनीतिक शक्ति","अमेरिका — केवल अंग्रेजी भाषी वोट दे सकते हैं"],exp:"बेल्जियम ने सत्ता साझेदारी से जातीय संघर्ष सुलझाया। श्रीलंका में बहुसंख्यकवाद ने गृह युद्ध को जन्म दिया।"},
    as:{q:"কোন দেশ বিভিন্ন ভাষাভাষী সম্প্ৰদায়ৰ মাজত সফল ক্ষমতা ভাগ-বতৰাৰ উদাহৰণ?",
    opts:["বেলজিয়াম — ডাচ আৰু ফ্ৰান্সভাষী সম্প্ৰদায়ৰ মাজত যুক্তৰাষ্ট্ৰীয় ব্যৱস্থাৰে সমান প্ৰতিনিধিত্ব",
          "শ্ৰীলংকা — চিংহালা-মাত্ৰ নীতিয়ে তামিলসকলক সমান অধিকাৰ দিলে",
          "ভাৰত — কেৱল হিন্দিভাষীসকলে ৰাজনৈতিক ক্ষমতা পায়","আমেৰিকা — কেৱল ইংৰাজীভাষীয়ে ভোট দিব পাৰে"],exp:"বেলজিয়ামে ক্ষমতা ভাগ-বতৰাৰে জাতিগত দ্বন্দ্ব সমাধান কৰিলে। শ্ৰীলংকাত সংখ্যাগুৰুবাদে গৃহযুদ্ধৰ সৃষ্টি কৰিলে।"}
  },
  {
    extraHTML:null,
    en:{q:"The 73rd Constitutional Amendment (1992) is related to:",
    opts:["Panchayati Raj — created a 3-tier system of local self-government in rural areas",
          "Right to Education","Formation of linguistic states",
          "Reservation for OBCs in central government jobs"],ans:0,
    exp:"73rd Amendment (1992) gave constitutional status to Panchayati Raj: 3 tiers — Gram Panchayat (village), Panchayat Samiti (block), Zila Parishad (district). 1/3 seats reserved for women. 74th Amendment created Urban Local Bodies (Municipalities/Corporations)."},
    hi:{q:"73वाँ संवैधानिक संशोधन (1992) किससे संबंधित है?",
    opts:["पंचायती राज — ग्रामीण क्षेत्रों में स्थानीय स्वशासन की 3-स्तरीय व्यवस्था",
          "शिक्षा का अधिकार","भाषाई राज्यों का गठन","सरकारी नौकरियों में OBC आरक्षण"],exp:"73वाँ संशोधन (1992): पंचायती राज को संवैधानिक दर्जा मिला। 3 स्तर: ग्राम पंचायत, पंचायत समिति, जिला परिषद। 1/3 सीटें महिलाओं के लिए।"},
    as:{q:"73তম সাংবিধানিক সংশোধনী (1992) কিহৰ সৈতে সম্পৰ্কিত?",
    opts:["পঞ্চায়তী ৰাজ — গ্ৰামীণ অঞ্চলত স্থানীয় স্বশাসনৰ 3-স্তৰীয় ব্যৱস্থা",
          "শিক্ষাৰ অধিকাৰ","ভাষিক ৰাজ্য গঠন","চৰকাৰী চাকৰিত OBC সংৰক্ষণ"],exp:"73তম সংশোধনী (1992): পঞ্চায়তী ৰাজক সাংবিধানিক মৰ্যাদা দিলে। 3 স্তৰ: গ্ৰাম পঞ্চায়ত, পঞ্চায়ত সমিতি, জিলা পৰিষদ।"}
  },
  {
    extraHTML:null,
    en:{q:"What is the GRAM SABHA in Panchayati Raj?",
    opts:["A body of all voters/adults in a village — can oversee the Gram Panchayat's work",
          "The elected village council (Gram Panchayat)","The district level panchayat body",
          "The block level panchayat body"],ans:0,

let current=0,score=0,answered=[],currentLang='en';

function setLang(l){
  currentLang=l;
  document.querySelectorAll('[data-lang]').forEach(el=>{
    el.style.display=el.getAttribute('data-lang')===l?'':'none';
  });
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{
    b.classList.toggle('active',['en','hi','as'][i]===l);
  });
  renderQuestion();
}

function renderQuestion(){
  if(current>=questions.length){showEnd();return;}
  const q=questions[current];
  const lang=q[currentLang]||q['en'];
  const enQ=q['en'];
  document.getElementById('qNum').textContent=current+1;
  document.getElementById('scoreDisp').textContent=score;
  document.getElementById('qLabel').textContent=`Question ${current+1} of 10`;
  document.getElementById('progBar').style.width=((current)/10*100)+'%';
  document.getElementById('qText').textContent=lang.q||enQ.q;

  // extra content
  const ec=document.getElementById('extraContent');
  ec.innerHTML=q.extraHTML||'';

  const opts=lang.opts||enQ.opts;
  const optDiv=document.getElementById('options');
  optDiv.innerHTML='';
  opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt-btn';b.textContent=o;
    b.onclick=()=>selectAnswer(i,enQ.ans,lang.exp||enQ.exp);
    optDiv.appendChild(b);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').style.display='none';
}

function selectAnswer(chosen,correct,exp){
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[correct].classList.add('correct');
  const fb=document.getElementById('feedback');
  if(chosen===correct){
    score+=10;document.getElementById('scoreDisp').textContent=score;
    fb.textContent='✓ Correct! '+exp;fb.className='feedback ok show';
  } else {
    btns[chosen].classList.add('wrong');
    fb.textContent='✗ Not quite. '+exp;fb.className='feedback no show';
  }
  answered.push({q:questions[current]['en'].q,correct:chosen===correct,exp});
  document.getElementById('nextBtn').style.display='inline-block';
}

function nextQuestion(){current++;renderQuestion();}

function showEnd(){
  document.getElementById('questionCard').style.display='none';
  document.getElementById('progBar').style.width='100%';
  document.getElementById('finalScore').textContent=score;
  let stars='';
  if(score>=90)stars='⭐⭐⭐';
  else if(score>=70)stars='⭐⭐';
  else if(score>=40)stars='⭐';
  document.getElementById('stars').textContent=stars||'☆☆☆';
  const msgs={en:['Keep learning Civics!','Good understanding!','Civics champion! 🏛️'],
    hi:['नागरिकशास्त्र पढ़ते रहें!','अच्छी समझ!','नागरिकशास्त्र चैंपियन! 🏛️'],
    as:['নাগৰিক বিজ্ঞান পঢ়ি থাকক!','ভাল বুজাপোৱা!','নাগৰিক বিজ্ঞান চেম্পিয়ন! 🏛️']};
  const mArr=msgs[currentLang]||msgs.en;
  document.getElementById('endMsg').textContent=score>=90?mArr[2]:score>=70?mArr[1]:mArr[0];
  let html='<h3>Review</h3>';
  answered.forEach((a,i)=>{
    html+=`<div class="result-item ${a.correct?'r-ok':'r-no'}">
      <strong>Q${i+1}:</strong> ${a.correct?'✓':'✗'} ${a.q}<br/><small>${a.exp}</small></div>`;
  });
  document.getElementById('resultDetail').innerHTML=html;
  const es=document.getElementById('endScreen');
  es.style.display='block';es.classList.add('show');
}

function restartGame(){
  current=0;score=0;answered=[];
  document.getElementById('questionCard').style.display='block';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('endScreen').classList.remove('show');
  renderQuestion();
}

setLang('en');
