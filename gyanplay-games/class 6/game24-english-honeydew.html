<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Honeydew &amp; A Pact with the Sun – GyanPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --saffron:#FF6B00;--gold:#FFB800;--sky:#00AEEF;--green:#00C853;
  --pink:#FF4081;--purple:#7C3AED;--bg1:#0F0C29;--bg2:#302B63;
  --card:#1a1740;--text:#EEE;--muted:#aaa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1),var(--bg2));
  font-family:'Nunito',sans-serif;color:var(--text);padding-bottom:48px}
@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .45s ease both}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;
  background:rgba(255,255,255,.04);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.08);flex-wrap:wrap}
.back-btn{background:none;border:1px solid rgba(255,255,255,.2);color:#fff;
  padding:6px 14px;border-radius:20px;cursor:pointer;font-family:'Nunito',sans-serif;
  font-size:.85rem;transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.1)}
.badge{background:var(--sky);color:#000;padding:4px 14px;border-radius:20px;
  font-size:.8rem;font-weight:700;font-family:'Baloo 2',sans-serif;letter-spacing:.5px}
.title-bar{font-family:'Baloo 2',sans-serif;font-size:1.1rem;font-weight:700;flex:1;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lang-toggle{display:flex;gap:4px;margin-left:auto}
.lang-btn{background:rgba(255,255,255,.08);border:none;color:#ccc;
  padding:5px 12px;border-radius:16px;cursor:pointer;font-size:.82rem;
  font-family:'Nunito',sans-serif;transition:all .2s}
.lang-btn.active{background:var(--sky);color:#000;font-weight:700}

/* SCORE / PROGRESS */
.score-wrap{max-width:700px;margin:18px auto 0;padding:0 16px}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.score-label{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1rem;color:var(--gold)}
.score-val{font-family:'Baloo 2',sans-serif;font-size:1.4rem;font-weight:800;color:var(--saffron)}
.prog-bar{height:8px;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--purple));border-radius:8px;transition:width .4s ease}

/* QUESTION CARD */
.q-wrap{max-width:700px;margin:22px auto 0;padding:0 16px}
.chapter-tag{display:inline-block;background:rgba(0,174,239,.18);border:1px solid var(--sky);
  color:#7dd9f9;padding:3px 13px;border-radius:20px;font-size:.76rem;font-weight:700;margin-bottom:12px;
  letter-spacing:.3px}
.q-card{background:var(--card);border-radius:18px;padding:28px 26px;
  border:1px solid rgba(0,174,239,.2);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.q-num{font-size:.8rem;color:var(--muted);margin-bottom:6px;font-weight:600}
.q-text{font-family:'Baloo 2',sans-serif;font-size:1.08rem;font-weight:700;line-height:1.65;margin-bottom:22px}
.options{display:grid;gap:10px}
.opt-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:var(--text);padding:13px 18px;border-radius:12px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:.97rem;font-weight:600;
  text-align:left;transition:all .22s;display:flex;align-items:center;gap:10px}
.opt-btn:hover:not(:disabled){background:rgba(0,174,239,.15);border-color:var(--sky);transform:translateX(4px)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{background:rgba(0,200,83,.18);border-color:var(--green);color:#fff}
.opt-btn.wrong{background:rgba(255,64,129,.18);border-color:var(--pink);color:#fff}
.opt-icon{font-size:1.1rem;min-width:22px}
.explanation{margin-top:16px;padding:14px 18px;background:rgba(255,255,255,.06);
  border-radius:12px;border-left:3px solid var(--sky);font-size:.92rem;line-height:1.65;display:none}
.explanation.show{display:block}
.explanation strong{color:var(--gold)}
.next-btn{margin-top:18px;width:100%;padding:14px;background:linear-gradient(90deg,var(--sky),var(--purple));
  border:none;color:#fff;border-radius:12px;font-family:'Baloo 2',sans-serif;
  font-size:1.05rem;font-weight:700;cursor:pointer;transition:opacity .2s;display:none}
.next-btn:hover{opacity:.88}
.next-btn.show{display:block}

/* RESULT */
.result-card{max-width:700px;margin:40px auto;padding:0 16px;text-align:center}
.result-inner{background:var(--card);border-radius:20px;padding:40px 30px;border:1px solid rgba(0,174,239,.25)}
.stars{font-size:2.5rem;letter-spacing:4px;margin-bottom:16px}
.result-score{font-family:'Baloo 2',sans-serif;font-size:3rem;font-weight:800;color:var(--saffron)}
.result-msg{font-size:1.1rem;color:var(--muted);margin:8px 0 28px}
.play-again{padding:14px 40px;background:linear-gradient(90deg,var(--sky),var(--purple));
  border:none;color:#fff;border-radius:12px;font-family:'Baloo 2',sans-serif;
  font-size:1.1rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.play-again:hover{opacity:.85}

@media(max-width:480px){
  .title-bar{font-size:.95rem}
  .q-card{padding:20px 16px}
  .q-text{font-size:1rem}
  .result-score{font-size:2.4rem}
}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">&#8592; Back</button>
  <span class="badge">English</span>
  <span class="title-bar">&#128218; Honeydew &amp; A Pact with the Sun</span>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en',this)">EN</button>
    <button class="lang-btn" onclick="setLang('hi',this)">हि</button>
    <button class="lang-btn" onclick="setLang('bn',this)">অ</button>
  </div>
</div>

<div class="score-wrap">
  <div class="score-row">
    <span class="score-label" id="scoreLabel">Score</span>
    <span class="score-val"><span id="scoreNum">0</span>/100</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="q-wrap fade" id="gameArea"></div>
<div class="result-card fade" id="resultCard" style="display:none"></div>

<script>
/* ===== LANGUAGE ===== */
let currentLang = 'en';
function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuestion();
  const labels = {en:'Score', hi:'स्कोर', bn:'স্কোর'};
  document.getElementById('scoreLabel').textContent = labels[lang];
}

/* ===== QUESTION BANK (12 questions) ===== */
const BANK = [
  {
    chapter: {en:"A Tale of Two Birds", hi:"दो चिड़ियों की कहानी", bn:"দুই পাখির গল্প"},
    q:{
      en:"📖 In 'A Tale of Two Birds', the two birds were separated after a storm. What was the main lesson of this story?",
      hi:"📖 'दो चिड़ियों की कहानी' में तूफान के बाद दोनों चिड़ियाँ अलग हो गईं। इस कहानी का मुख्य संदेश क्या है?",
      bn:"📖 'দুই পাখির গল্পে' ঝড়ের পর দুটি পাখি আলাদা হয়ে গেল। এই গল্পের মূল বার্তা কী?"
    },
    opts:{
      en:["Hard work leads to success","Environment and company shape one's character","Birds are smarter than humans","Forests are dangerous places"],
      hi:["कड़ी मेहनत सफलता दिलाती है","परिवेश और संगत चरित्र को आकार देती है","पक्षी मनुष्य से चालाक होते हैं","जंगल खतरनाक जगह हैं"],
      bn:["কঠোর পরিশ্রম সাফল্য দেয়","পরিবেশ ও সঙ্গ চরিত্র গড়ে তোলে","পাখিরা মানুষের চেয়ে চালাক","জঙ্গল বিপজ্জনক জায়গা"]
    },
    ans: 1,
    exp:{
      en:"<strong>Environment shapes character.</strong> One bird lived with a rishi (sage) and spoke kindly; the other lived with robbers and learned to speak harshly. Same origin — different surroundings made them completely different.",
      hi:"<strong>परिवेश चरित्र को आकार देता है।</strong> एक चिड़िया ऋषि के पास रही और विनम्र बोलना सीखा; दूसरी चिड़िया डाकुओं के साथ रही और कठोर बोलना सीखा। एक ही उद्गम — अलग-अलग परिवेश ने उन्हें बिल्कुल अलग बना दिया।",
      bn:"<strong>পরিবেশ চরিত্র গড়ে তোলে।</strong> একটি পাখি ঋষির কাছে থেকে ভদ্র হয়ে ওঠে; অন্যটি ডাকাতদের সঙ্গে থেকে রুক্ষ হয়ে ওঠে। একই উৎস — ভিন্ন পরিবেশ তাদের সম্পূর্ণ আলাদা করে দিল।"
    }
  },
  {
    chapter: {en:"A Tale of Two Birds", hi:"दो चिड़ियों की कहानी", bn:"দুই পাখির গল্প"},
    q:{
      en:"📖 In 'A Tale of Two Birds', the bird raised near the rishi said which kind of words to the king?",
      hi:"📖 'दो चिड़ियों की कहानी' में ऋषि के पास पली चिड़िया ने राजा से कैसे शब्द कहे?",
      bn:"📖 'দুই পাখির গল্পে' ঋষির কাছে বড় হওয়া পাখিটি রাজাকে কী ধরনের কথা বলেছিল?"
    },
    opts:{
      en:["Rude and threatening words","Kind and welcoming words","Silent — it could not speak","Angry and warning words"],
      hi:["कठोर और धमकी भरे शब्द","विनम्र और स्वागत भरे शब्द","चुप — वह बोल नहीं सकती थी","क्रोधित और चेतावनी भरे शब्द"],

    exp:{

      bn:"ঋষির কাছে বড় হওয়া পাখিটি <strong>উষ্ণভাবে</strong> রাজাকে স্বাগত জানাল: 'আসুন, মহারাজ।' ভালো পরিবেশ তাকে মিষ্টি কথা বলতে শেখাল।"

  },

    q:{

    },
    opts:{
      en:["She lost the baby while shopping","She killed the loyal mongoose by mistake, thinking it had hurt the baby","She forgot to feed the mongoose","She sold the mongoose to a merchant"],

      bn:["বাজারে শিশুকে হারিয়ে ফেলেছিল","সে বিশ্বস্ত নেউলকে ভুল করে হত্যা করেছিল, মনে করেছিল সে শিশুকে আঘাত করেছে","সে নেউলকে খাওয়াতে ভুলে গিয়েছিল","সে নেউলকে একজন ব্যবসায়ীর কাছে বিক্রি করেছিল"]
    },
    ans: 1,
    exp:{
      en:"The mongoose had <strong>killed a cobra</strong> to protect the baby. The mother saw blood on the mongoose's mouth and killed it, thinking it had harmed the baby. The moral: never act in haste without knowing the full truth.",
      hi:"नेवले ने <strong>बच्चे की रक्षा के लिए साँप को मार डाला था</strong>। माँ ने नेवले के मुँह पर खून देखकर उसे मार दिया। नैतिक शिक्षा: बिना पूरी सच्चाई जाने जल्दबाजी में कभी कार्य न करें।",

  },
  {

      bn:"📖 'রাখালের ধন' গল্পে রাখাল গভর্নর হয়। নম্রতার প্রতীক হিসেবে সে সবসময় কী সাথে রাখত?"

    opts:{
      en:["His old iron staff","His old cloak","A bag of gold coins","A shepherd's flute"],

    ans: 1,

  },
  {

    opts:{
      en:["Baiju Bawra","Swami Haridas","Miyan Ki Todi","Hazrat Inayat Khan"],

      bn:["বৈজু বাওয়ারা","স্বামী হরিদাস","মিয়াঁ কি তোড়ি","হজরত ইনায়েত খাঁন"]

      bn:"তানসেন <strong>স্বামী হরিদাসের</strong> কাছে সঙ্গীত শিখেছিলেন, যিনি বৃন্দাবনে বাস করতেন। সম্রাট আকবর তানসেনের প্রতিভায় এতটাই মুগ্ধ হয়েছিলেন যে তাকে নবরত্নদের একজন হিসেবে দরবারে আমন্ত্রণ জানান।"
    }
  },
  {
    chapter: {en:"Tansen", hi:"तानसेन", bn:"তানসেন"},

      hi:"साईदा ने सूरज की किरणों से अनुरोध किया कि वे <strong>गर्मजोशी और रोशनी लेकर उनकी बीमार माँ के पास आएँ</strong>। सूरज ने अपना 'वादा' पूरा किया — अगली सुबह उजली और धूप भरी थी, साईदा की माँ धूप में बैठी और धीरे-धीरे स्वस्थ हो गई। यह कहानी आस्था और प्रकृति की उपचार शक्ति सिखाती है।",
      bn:"সাইদা সূর্যের রশ্মিকে অনুরোধ করল <strong>উষ্ণতা ও আলো নিয়ে তার অসুস্থ মায়ের কাছে আসতে</strong>। সূর্য তার 'চুক্তি' রাখল — পরের সকাল উজ্জ্বল ও রোদেলা ছিল, সাইদার মা রোদে বসলেন এবং ধীরে ধীরে সুস্থ হলেন। গল্পটি বিশ্বাস ও প্রকৃতির নিরাময় শক্তি শেখায়।"
    }
  }
];

/* ===== GAME STATE ===== */
let session = [];
let qi = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  session = shuffle(BANK).slice(0, 10);
  qi = 0;
  score = 0;
  answered = false;
  document.getElementById('scoreNum').textContent = '0';
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('gameArea').style.display = '';
  renderQuestion();
}

function renderQuestion() {
  const q = session[qi];
  const lang = currentLang;
  const chName = q.chapter[lang] || q.chapter['en'];
  const qText = q.q[lang] || q.q['en'];
  const opts = q.opts[lang] || q.opts['en'];

  const html = `
    <div class="chapter-tag">&#128218; ${chName}</div>
    <div class="q-card fade">
      <div class="q-num">${getLabel('question', lang)} ${qi + 1} / 10</div>
      <div class="q-text">${qText}</div>
      <div class="options" id="optGroup">
        ${opts.map((o, i) => `
          <button class="opt-btn" id="opt${i}" onclick="choose(${i})">
            <span class="opt-icon">${['A','B','C','D'][i]}</span>
            <span>${o}</span>
          </button>`).join('')}
      </div>
      <div class="explanation" id="expBox">
        ${q.exp[lang] || q.exp['en']}
      </div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        ${qi < 9 ? getLabel('next', lang) : getLabel('finish', lang)}
      </button>
    </div>`;
  document.getElementById('gameArea').innerHTML = html;
  answered = false;
}

function getLabel(key, lang) {
  const labels = {
    question: {en:'Question', hi:'प्रश्न', bn:'প্রশ্ন'},
    next: {en:'Next Question →', hi:'अगला प्रश्न →', bn:'পরবর্তী প্রশ্ন →'},
    finish: {en:'See Results', hi:'परिणाम देखें', bn:'ফলাফল দেখুন'},
    score: {en:'Score', hi:'स्कोर', bn:'স্কোর'},
    playAgain: {en:'Play Again', hi:'फिर खेलें', bn:'আবার খেলুন'},
    excellent: {en:'Excellent! Outstanding performance!', hi:'शानदार! उत्कृष्ट प्रदर्शन!', bn:'অসাধারণ! অনবদ্য পারফরম্যান্স!'},
    great: {en:'Great work! Keep it up!', hi:'बहुत अच्छा! ऐसे ही करते रहो!', bn:'চমৎকার কাজ! চালিয়ে যাও!'},
    good: {en:'Good effort! Review the chapters.', hi:'अच्छा प्रयास! अध्याय दोबारा पढ़ें।', bn:'ভালো চেষ্টা! অধ্যায়গুলো আবার পড়ো।'},
    keep: {en:'Keep practising! You can do better.', hi:'अभ्यास जारी रखो! तुम बेहतर कर सकते हो।', bn:'অনুশীলন চালিয়ে যাও! তুমি আরো ভালো করতে পারো।'}
  };
  return (labels[key] && labels[key][lang]) || (labels[key] && labels[key]['en']) || key;
}

function choose(idx) {
  if (answered) return;
  answered = true;
  const q = session[qi];
  const opts = document.querySelectorAll('.opt-btn');
  opts.forEach(b => b.disabled = true);

  if (idx === q.ans) {
    opts[idx].classList.add('correct');
    opts[idx].querySelector('.opt-icon').textContent = '✓';
    score += 10;
    document.getElementById('scoreNum').textContent = score;
  } else {
    opts[idx].classList.add('wrong');
    opts[idx].querySelector('.opt-icon').textContent = '✗';
    opts[q.ans].classList.add('correct');
    opts[q.ans].querySelector('.opt-icon').textContent = '✓';
  }

  document.getElementById('expBox').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');

  const prog = ((qi + 1) / 10) * 100;
  document.getElementById('progFill').style.width = prog + '%';
}

function nextQuestion() {
  qi++;
  if (qi >= 10) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('gameArea').style.display = 'none';
  const lang = currentLang;
  const pct = score;
  let stars = 0;
  if (pct >= 90) stars = 3;
  else if (pct >= 70) stars = 2;
  else if (pct >= 40) stars = 1;

  const starStr = '&#9733;'.repeat(stars) + '&#9734;'.repeat(3 - stars);
  let msg = '';
  if (pct >= 90) msg = getLabel('excellent', lang);
  else if (pct >= 70) msg = getLabel('great', lang);
  else if (pct >= 40) msg = getLabel('good', lang);
  else msg = getLabel('keep', lang);

  const titleMap = {en:'Honeydew & A Pact with the Sun', hi:'हनीड्यू और सूरज से वादा', bn:'হানিডিউ ও সূর্যের সাথে চুক্তি'};

  document.getElementById('resultCard').innerHTML = `
    <div class="result-inner fade">
      <div class="stars">${starStr}</div>
      <div class="result-score">${score}/100</div>
      <div class="result-msg">${msg}</div>
      <div style="color:var(--sky);font-family:'Baloo 2',sans-serif;font-size:.95rem;margin-bottom:24px;font-weight:700">
        ${titleMap[lang] || titleMap['en']} — Class 6 English
      </div>
      <button class="play-again" onclick="startGame()">&#9654; ${getLabel('playAgain', lang)}</button>
    </div>`;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('progFill').style.width = '100%';
}

/* ===== INIT ===== */
startGame();
</script>
</body>
</html>
