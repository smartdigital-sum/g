<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Count the Objects 🔢 | GyanPlay Nursery</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#00C853;--pink:#FF4081;--gold:#FFB800;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:'Nunito',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#E8F5E9,#A5D6A7);
      color:#1B5E20;
      display:flex;flex-direction:column;align-items:center;
      padding:16px;animation:fadeIn .4s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}
    @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
    @keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

    .top-bar{
      width:100%;max-width:680px;
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:14px;flex-wrap:wrap;gap:8px;
    }
    .back-btn{
      background:rgba(255,255,255,.55);border:none;
      padding:9px 22px;border-radius:999px;
      font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
      cursor:pointer;transition:background .2s;color:#1B5E20;
    }
    .back-btn:hover{background:rgba(255,255,255,.8)}
    .subject-badge{
      background:rgba(255,255,255,.55);padding:7px 20px;
      border-radius:999px;font-size:.9rem;font-weight:800;
      font-family:'Baloo 2',sans-serif;color:#1B5E20;
    }
    .lang-toggle{display:flex;gap:6px}
    .lang-btn{
      background:rgba(255,255,255,.35);border:none;
      padding:7px 14px;border-radius:999px;
      font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;
      cursor:pointer;transition:all .2s;color:#1B5E20;
    }
    .lang-btn.active{background:#fff;color:#2E7D32}
    .lang-btn:hover:not(.active){background:rgba(255,255,255,.6)}

    .game-card{
      background:rgba(255,255,255,.52);
      backdrop-filter:blur(14px);
      border:2.5px solid rgba(255,255,255,.7);
      border-radius:28px;padding:22px 20px;
      width:100%;max-width:680px;
      box-shadow:0 12px 50px rgba(27,94,32,.12);
    }
    .game-title{
      font-family:'Baloo 2',sans-serif;font-size:2rem;font-weight:800;
      text-align:center;margin-bottom:6px;color:#1B5E20;
    }
    .score-bar{display:flex;justify-content:space-between;margin:6px 0;font-size:1rem;font-weight:800;color:#1B5E20;}
    .prog-wrap{background:rgba(255,255,255,.4);border-radius:999px;height:12px;margin-bottom:16px}
    .prog-fill{
      height:12px;border-radius:999px;
      background:linear-gradient(90deg,#66BB6A,#2E7D32);
      transition:width .4s ease;
    }

    .instruction{
      font-size:1.2rem;font-weight:800;text-align:center;
      margin-bottom:14px;color:#2E7D32;
    }

    /* EMOJI COUNT BOX */
    .count-box{
      background:rgba(255,255,255,.45);
      border:2.5px solid rgba(255,255,255,.65);
      border-radius:24px;padding:22px 16px;
      margin-bottom:18px;text-align:center;
    }
    .count-label{
      font-size:.95rem;font-weight:700;color:#43A047;margin-bottom:12px;
      text-transform:uppercase;letter-spacing:1px;
    }
    .emoji-grid{
      display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
      min-height:90px;align-items:center;
    }
    .emoji-item{
      font-size:5.5rem;line-height:1;
      animation:floatUp 2s ease infinite;
      filter:drop-shadow(0 3px 10px rgba(27,94,32,.18));
    }
    /* Stagger float animations per item */
    .emoji-item:nth-child(2){animation-delay:.25s}
    .emoji-item:nth-child(3){animation-delay:.5s}
    .emoji-item:nth-child(4){animation-delay:.75s}
    .emoji-item:nth-child(5){animation-delay:1s}
    .emoji-item:nth-child(6){animation-delay:1.25s}
    .emoji-item:nth-child(7){animation-delay:1.5s}
    .emoji-item:nth-child(8){animation-delay:1.75s}

    /* NUMBER CHOICE BUTTONS — 3 big buttons */
    .choices-row{
      display:flex;gap:14px;margin-bottom:12px;justify-content:center;
    }
    .num-btn{
      background:rgba(255,255,255,.5);
      border:3px solid rgba(255,255,255,.68);
      border-radius:24px;
      width:100%;max-width:150px;
      min-height:90px;
      font-family:'Baloo 2',sans-serif;font-size:3rem;font-weight:800;
      cursor:pointer;transition:all .2s;
      display:flex;align-items:center;justify-content:center;
      color:#1B5E20;
    }
    .num-btn:hover:not(:disabled){background:rgba(255,255,255,.8);transform:scale(1.07)}
    .num-btn.correct{background:rgba(0,200,83,.3);border-color:#00C853;color:#1B5E20;animation:pop .4s ease}
    .num-btn.wrong{background:rgba(255,64,129,.22);border-color:#FF4081;animation:shake .4s ease}
    .num-btn:disabled{cursor:default}

    .feedback{
      font-family:'Baloo 2',sans-serif;font-size:1.45rem;font-weight:800;
      text-align:center;min-height:1.8rem;margin:6px 0 4px;
    }
    .feedback.correct{color:#2E7D32}
    .feedback.wrong{color:#C62828}

    .next-btn{
      color:#fff;background:#2E7D32;
      font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.2rem;
      padding:.8rem 2.5rem;border:none;border-radius:999px;
      cursor:pointer;display:none;transition:transform .15s;
      width:100%;margin-top:6px;
    }
    .next-btn:hover{transform:scale(1.04)}

    .overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
      align-items:center;justify-content:center;z-index:100;padding:1.5rem;
    }
    .overlay.show{display:flex}
    .result-box{
      background:linear-gradient(135deg,#E8F5E9,#A5D6A7);
      border:3px solid rgba(46,125,50,.3);
      border-radius:28px;padding:2.5rem 2rem;text-align:center;
      max-width:400px;width:100%;animation:popIn .35s ease;
    }
    .res-emoji{font-size:4rem;margin-bottom:.5rem}
    .res-title{font-family:'Baloo 2',sans-serif;font-size:2.2rem;font-weight:800;margin-bottom:.4rem;color:#1B5E20;}
    .res-score{font-size:1.1rem;margin-bottom:.8rem;font-weight:700;color:#2E7D32;}
    .res-stars{font-size:3rem;margin-bottom:1.2rem;letter-spacing:6px}
    .play-again-btn{
      color:#fff;background:#2E7D32;
      font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.2rem;
      padding:.85rem 2.5rem;border:none;border-radius:999px;
      cursor:pointer;transition:transform .15s;
    }
    .play-again-btn:hover{transform:scale(1.05)}

    [data-lang]{display:none}
    [data-lang="en"]{display:inline}

    @media(max-width:480px){
      .emoji-item{font-size:4rem}
      .num-btn{font-size:2.4rem;min-height:75px}
      .game-title{font-size:1.65rem}
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">← <span data-lang="en">Back</span><span data-lang="hi">वापस</span><span data-lang="as">পাছে</span></button>
  <div class="subject-badge">🔢 <span data-lang="en">Maths</span><span data-lang="hi">गणित</span><span data-lang="as">গণিত</span></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<!-- GAME CARD -->
<div class="game-card">
  <div class="game-title">
    <span data-lang="en">Count the Objects! 🔢</span>
    <span data-lang="hi">वस्तुएँ गिनो! 🔢</span>
    <span data-lang="as">বস্তু গণনা কৰা! 🔢</span>
  </div>
  <div class="score-bar">
    <span><span data-lang="en">Score</span><span data-lang="hi">स्कोर</span><span data-lang="as">স্কোৰ</span>: <b id="score-val">0</b> / 80</span>
    <span><span data-lang="en">Round</span><span data-lang="hi">दौर</span><span data-lang="as">ৰাউণ্ড</span> <b id="round-num">1</b> / 8</span>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <div class="instruction">
    <span data-lang="en">👇 How many are there? Tap the number!</span>
    <span data-lang="hi">👇 कितने हैं? संख्या को छुओ!</span>
    <span data-lang="as">👇 কিমান আছে? সংখ্যাটো টিপক!</span>
  </div>

  <div class="count-box">
    <div class="count-label">
      <span data-lang="en">Count these!</span>
      <span data-lang="hi">इन्हें गिनो!</span>
      <span data-lang="as">এইবোৰ গণনা কৰা!</span>
    </div>
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>

  <div class="choices-row" id="choices-row"></div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextRound()">
    <span data-lang="en">Next →</span>
    <span data-lang="hi">अगला →</span>
    <span data-lang="as">পৰৱৰ্তী →</span>
  </button>
</div>

<!-- RESULT OVERLAY -->
<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="res-emoji" id="res-emoji"></div>
    <div class="res-title" id="res-title"></div>
    <div class="res-score" id="res-score"></div>
    <div class="res-stars" id="res-stars"></div>
    <button class="play-again-btn" onclick="restartGame()">
      <span data-lang="en">🔄 Play Again!</span>
      <span data-lang="hi">🔄 फिर खेलें!</span>
      <span data-lang="as">🔄 আকৌ খেলক!</span>
    </button>
  </div>
</div>

<script>
let currentLang = 'en';

function setLang(l) {
  currentLang = l;
  document.querySelectorAll('[data-lang]').forEach(el => {
    el.style.display = el.dataset.lang === l ? 'inline' : 'none';
  });
  document.querySelectorAll('.lang-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['en','hi','as'][i] === l);
  });
}

// 8 rounds: one per count 1-8, each with a fun emoji
const baseRounds = [
  { count: 1, emoji: '🌟' },
  { count: 2, emoji: '🍎' },
  { count: 3, emoji: '🎈' },
  { count: 4, emoji: '🐾' },
  { count: 5, emoji: '🌸' },
  { count: 6, emoji: '🐟' },
  { count: 7, emoji: '⭐' },
  { count: 8, emoji: '🍭' },
];

let rounds = [], order = [], ri = 0, score = 0, answered = false;

function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

function getChoices(correct) {
  // Generate 2 wrong numbers (different from correct, range 1-10, unique)
  let pool = [];
  for (let i = 1; i <= 10; i++) { if (i !== correct) pool.push(i); }
  pool = shuffle(pool).slice(0, 2);
  return shuffle([correct, pool[0], pool[1]]);
}

function startGame() {
  rounds = shuffle([...baseRounds]);
  order = [...Array(rounds.length).keys()];
  ri = 0; score = 0;
  document.getElementById('overlay').classList.remove('show');
  loadRound();
}

function loadRound() {
  const r = rounds[order[ri]];
  answered = false;

  document.getElementById('prog-fill').style.width = (ri / rounds.length * 100) + '%';
  document.getElementById('score-val').textContent = score;
  document.getElementById('round-num').textContent = ri + 1;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  // Build emoji grid
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  for (let i = 0; i < r.count; i++) {
    const span = document.createElement('span');
    span.className = 'emoji-item';
    span.textContent = r.emoji;
    grid.appendChild(span);
  }

  // Build number choice buttons
  const choices = getChoices(r.count);
  const row = document.getElementById('choices-row');
  row.innerHTML = '';
  choices.forEach(num => {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = num;
    btn.dataset.correct = num === r.count ? '1' : '0';
    btn.onclick = () => handleAnswer(num === r.count, btn);
    row.appendChild(btn);
  });
}

function handleAnswer(isCorrect, clickedBtn) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.num-btn').forEach(b => b.disabled = true);

  if (isCorrect) {
    clickedBtn.classList.add('correct');
    score += 10;
  } else {
    clickedBtn.classList.add('wrong');
    document.querySelectorAll('.num-btn').forEach(b => {
      if (b.dataset.correct === '1') b.classList.add('correct');
    });
  }

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    const msgs = {
      en: ['Great counting! ✓', 'You counted right! ✓', 'Superstar! ✓', 'Brilliant! ✓', 'Amazing! ✓'],
      hi: ['बहुत अच्छी गिनती! ✓', 'सही गिना! ✓', 'सुपरस्टार! ✓', 'शानदार! ✓', 'कमाल! ✓'],
      as: ['চমৎকাৰ গণনা! ✓', 'শুদ্ধকৈ গণনা কৰিলে! ✓', 'ছুপাৰষ্টাৰ! ✓', 'অসাধাৰণ! ✓', 'দুৰ্দান্ত! ✓']
    };
    const arr = msgs[currentLang] || msgs['en'];
    fb.textContent = arr[Math.floor(Math.random() * arr.length)];
    fb.className = 'feedback correct';
  } else {
    const r = rounds[order[ri]];
    const msgs = {
      en: [`There are ${r.count}! Try again next time! ✗`],
      hi: [`${r.count} हैं! अगली बार कोशिश करो! ✗`],
      as: [`${r.count}টো আছে! পৰৱৰ্তীবাৰ চেষ্টা কৰক! ✗`]
    };
    fb.textContent = (msgs[currentLang] || msgs['en'])[0];
    fb.className = 'feedback wrong';
  }

  document.getElementById('score-val').textContent = score;
  document.getElementById('next-btn').style.display = 'block';
}

function nextRound() {
  ri++;
  if (ri >= rounds.length) { showResult(); return; }
  loadRound();
}

function showResult() {
  document.getElementById('prog-fill').style.width = '100%';
  const pct = (score / (rounds.length * 10)) * 100;
  let emoji = '😊', title = { en: 'Good Try!', hi: 'अच्छी कोशिश!', as: 'ভাল চেষ্টা!' };
  if (pct >= 90) { emoji = '🏆'; title = { en: 'Counting Champion!', hi: 'गिनती चैम्पियन!', as: 'গণনা চেম্পিয়ন!' }; }
  else if (pct >= 70) { emoji = '🌟'; title = { en: 'Well Done!', hi: 'बहुत अच्छा!', as: 'বহুত ভাল!' }; }
  else if (pct >= 40) { emoji = '👍'; title = { en: 'Good Job!', hi: 'शाबाश!', as: 'ভাল কাম!' }; }

  const stars = pct >= 90 ? '⭐⭐⭐' : pct >= 70 ? '⭐⭐' : pct >= 40 ? '⭐' : '';
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title[currentLang] || title['en'];
  document.getElementById('res-score').innerHTML =
    '<span data-lang="en">Score</span>: ' + score + ' / ' + (rounds.length * 10);
  document.getElementById('res-stars').textContent = stars;
  document.getElementById('overlay').classList.add('show');
}

function restartGame() { startGame(); }
startGame();
</script>
</body>
</html>
