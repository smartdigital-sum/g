<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big or Small? More or Less? | GyanPlay Nursery</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--gold:#FFB800;--green:#00C853;--pink:#FF4081;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:linear-gradient(135deg,#43e97b 0%,#38f9d7 50%,#4facfe 100%);
    color:#fff;
    font-family:'Nunito',sans-serif;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:20px;
    animation:fadeIn .4s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes seesaw{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  .top-bar{width:100%;max-width:680px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .back-btn{background:rgba(255,255,255,.25);border:none;color:#fff;padding:8px 20px;border-radius:999px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s;}
  .back-btn:hover{background:rgba(255,255,255,.4);}
  .subject-badge{background:rgba(255,255,255,.25);padding:6px 18px;border-radius:999px;font-size:.85rem;font-weight:800;font-family:'Baloo 2',sans-serif;}
  .lang-toggle{display:flex;gap:6px;}
  .lang-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 14px;border-radius:999px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .lang-btn.active{background:#fff;color:#43e97b;}
  .lang-btn:hover:not(.active){background:rgba(255,255,255,.35);}

  .game-card{
    background:rgba(255,255,255,.2);
    backdrop-filter:blur(12px);
    border:2px solid rgba(255,255,255,.35);
    border-radius:28px;
    padding:28px 22px;
    width:100%;max-width:680px;
    box-shadow:0 12px 50px rgba(0,0,0,.18);
  }
  .game-title{font-family:'Baloo 2',sans-serif;font-size:1.9rem;font-weight:800;text-align:center;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.15);margin-bottom:8px;}

  .score-bar{display:flex;justify-content:space-between;margin:8px 0;font-size:1rem;font-weight:700;}
  .progress-wrap{background:rgba(255,255,255,.22);border-radius:999px;height:10px;margin-bottom:20px;}
  .progress-fill{height:10px;border-radius:999px;background:linear-gradient(90deg,#FFB800,#FF4081);transition:width .4s ease;}

  .question-type-badge{
    text-align:center;
    font-family:'Baloo 2',sans-serif;
    font-size:1.1rem;font-weight:800;
    background:rgba(255,255,255,.22);
    border-radius:12px;padding:8px 16px;
    margin-bottom:14px;letter-spacing:.5px;
  }

  .comparison-display{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:24px;
    margin-bottom:18px;
    padding:10px;
    animation:seesaw 2s ease infinite;
  }
  .compare-item{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    background:rgba(255,255,255,.18);
    border-radius:18px;padding:16px 18px;
    min-width:110px;
  }
  .compare-emoji{font-size:3.5rem;line-height:1;}
  .compare-label{font-size:.9rem;font-weight:800;opacity:.9;}
  .compare-dots{font-size:1.4rem;line-height:1.5;text-align:center;word-break:break-all;}
  .compare-count{font-family:'Baloo 2',sans-serif;font-size:1.4rem;font-weight:800;}
  .vs-badge{font-family:'Baloo 2',sans-serif;font-size:1.5rem;font-weight:800;opacity:.85;}

  .question-text{font-family:'Baloo 2',sans-serif;font-size:1.4rem;font-weight:800;text-align:center;color:#fff;margin-bottom:18px;text-shadow:0 1px 4px rgba(0,0,0,.15);}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .choice-btn{
    background:rgba(255,255,255,.22);
    border:3px solid rgba(255,255,255,.4);
    border-radius:20px;
    padding:18px 12px;
    cursor:pointer;
    transition:all .2s;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    min-height:110px;
    font-family:'Nunito',sans-serif;font-weight:800;
    color:#fff;
  }
  .choice-btn:hover:not(:disabled){background:rgba(255,255,255,.38);border-color:#fff;transform:translateY(-4px) scale(1.04);}
  .choice-btn.correct{background:rgba(0,200,83,.45);border-color:#00C853;animation:pop .35s ease;}
  .choice-btn.wrong{background:rgba(255,64,129,.35);border-color:#FF4081;animation:shake .3s ease;}
  .choice-btn:disabled{cursor:not-allowed;}
  .choice-emoji{font-size:2.8rem;}
  .choice-dots{font-size:1.2rem;line-height:1.5;text-align:center;word-break:break-all;}
  .choice-label{font-size:.95rem;font-weight:800;}

  .feedback{margin-top:16px;padding:14px;border-radius:14px;font-weight:800;font-size:1.1rem;text-align:center;animation:fadeIn .3s ease;display:none;}
  .feedback.show{display:block;}
  .feedback.correct-fb{background:rgba(0,200,83,.35);border:2px solid #00C853;}
  .feedback.wrong-fb{background:rgba(255,64,129,.3);border:2px solid #FF4081;}

  .next-btn{margin-top:16px;width:100%;background:#FFB800;border:none;color:#000;padding:16px;border-radius:16px;font-family:'Baloo 2',sans-serif;font-size:1.2rem;font-weight:800;cursor:pointer;transition:all .2s;display:none;}
  .next-btn.show{display:block;}
  .next-btn:hover{background:#e6a600;transform:translateY(-2px) scale(1.02);}

  .result-screen{display:none;text-align:center;padding:10px 0;}
  .result-screen.show{display:block;}
  .result-emoji{font-size:5rem;margin:10px 0;}
  .stars{font-size:3.5rem;margin:10px 0;}
  .result-score{font-family:'Baloo 2',sans-serif;font-size:2.8rem;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.15);}
  .result-msg{font-size:1.2rem;font-weight:700;margin:10px 0 24px;opacity:.95;}
  .restart-btn{background:#fff;color:#43e97b;border:none;padding:16px 40px;border-radius:999px;font-family:'Baloo 2',sans-serif;font-size:1.2rem;font-weight:800;cursor:pointer;transition:all .2s;}
  .restart-btn:hover{background:#f0fff0;transform:scale(1.05);}
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <span class="subject-badge">📐 Maths – Nursery</span>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<div class="game-card">
  <div class="game-title">Big or Small? More or Less? 🐘🐭</div>

  <div id="quizArea">
    <div class="score-bar">
      <span id="qCounter">1 / 8</span>
      <span id="scoreDisplay">⭐ 0</span>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="question-type-badge" id="qTypeBadge">🐘 Size Comparison</div>
    <div class="comparison-display" id="comparisonDisplay"></div>
    <div class="question-text" id="questionText"></div>
    <div class="choices" id="choicesContainer"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next ➡️</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="stars" id="starsDisplay">⭐⭐⭐</div>
    <div class="result-score" id="resultScore">8 / 8</div>
    <div class="result-msg" id="resultMsg">Amazing! You are so smart!</div>
    <button class="restart-btn" onclick="restartGame()">🔄 Play Again</button>
  </div>
</div>

<script>
// type: 'size' or 'count'; for size use emoji+label; for count use dots
const questions = [
  {
    type:'size',
    badge:{en:"🐘 Which is BIGGER?",hi:"🐘 कौन बड़ा है?",as:"🐘 কোনটো ডাঙৰ?"},
    question:{en:"Which is BIGGER?",hi:"कौन सा बड़ा है?",as:"কোনটো বেছি ডাঙৰ?"},
    items:[{emoji:"🐘",label:"Elephant"},{emoji:"🐭",label:"Mouse"}],
    ansLabel:"Elephant"
  },
  {
    type:'count',
    badge:{en:"🔢 Which has MORE?",hi:"🔢 किसके पास ज़्यादा है?",as:"🔢 কোনটোত বেছি?"},
    question:{en:"Which group has MORE?",hi:"किस समूह में ज़्यादा हैं?",as:"কোন দলত বেছি আছে?"},
    counts:[5,3], ansCount:5
  },
  {
    type:'size',
    badge:{en:"🏠 Which is BIGGER?",hi:"🏠 कौन बड़ा है?",as:"🏠 কোনটো ডাঙৰ?"},
    question:{en:"Which is BIGGER?",hi:"कौन सा बड़ा है?",as:"কোনটো বেছি ডাঙৰ?"},
    items:[{emoji:"🏠",label:"House"},{emoji:"🏡",label:"Hut"}],
    ansLabel:"House"
  },
  {
    type:'count',
    badge:{en:"🔢 Which has LESS?",hi:"🔢 किसके पास कम है?",as:"🔢 কোনটোত কম?"},
    question:{en:"Which group has LESS?",hi:"किस समूह में कम हैं?",as:"কোন দলত কম আছে?"},
    counts:[2,7], ansCount:2
  },
  {
    type:'size',
    badge:{en:"🌳 Which is TALLER?",hi:"🌳 कौन ऊँचा है?",as:"🌳 কোনটো ওখ?"},
    question:{en:"Which is TALLER?",hi:"कौन सा ऊँचा है?",as:"কোনটো বেছি ওখ?"},
    items:[{emoji:"🌳",label:"Tree"},{emoji:"🌸",label:"Flower"}],
    ansLabel:"Tree"
  },
  {
    type:'count',
    badge:{en:"🔢 Which has MORE?",hi:"🔢 किसके पास ज़्यादा है?",as:"🔢 কোনটোত বেছি?"},
    question:{en:"Which group has MORE?",hi:"किस समूह में ज़्यादा हैं?",as:"কোন দলত বেছি আছে?"},
    counts:[4,6], ansCount:6
  },
  {
    type:'size',
    badge:{en:"🚌 Which is BIGGER?",hi:"🚌 कौन बड़ा है?",as:"🚌 কোনটো ডাঙৰ?"},
    question:{en:"Which is BIGGER?",hi:"कौन सा बड़ा है?",as:"কোনটো বেছি ডাঙৰ?"},
    items:[{emoji:"🚗",label:"Car"},{emoji:"🚌",label:"Bus"}],
    ansLabel:"Bus"
  },
  {
    type:'count',
    badge:{en:"🔢 Which has LESS?",hi:"🔢 किसके पास कम है?",as:"🔢 কোনটোত কম?"},
    question:{en:"Which group has LESS?",hi:"किस समूह में कम हैं?",as:"কোন দলত কম আছে?"},
    counts:[1,4], ansCount:1
  },
];

const labels = {
  en:{score:"⭐",next:"Next ➡️",correct:"✅ Correct! You are so smart! 🌟",wrong:"❌ Oops! Look at the next one!",play:"🔄 Play Again",result:["Amazing! You are so smart! 🌟","Great job! Well done! 🎉","Good effort! Keep going! 📐","Keep practicing! You can do it! 💪"]},
  hi:{score:"⭐",next:"आगे ➡️",correct:"✅ सही! तुम बहुत होशियार हो! 🌟",wrong:"❌ अरे! अगला देखो!",play:"🔄 फिर खेलें",result:["शानदार! 🌟","बहुत अच्छा! 🎉","अच्छा! चलते रहो! 📐","अभ्यास करो! 💪"]},
  as:{score:"⭐",next:"পৰৱৰ্তী ➡️",correct:"✅ শুদ্ধ! তুমি বহুত চতুৰ! 🌟",wrong:"❌ আৰে! পৰৱৰ্তীটো চোৱা!",play:"🔄 পুনৰ খেলক",result:["অসাধাৰণ! 🌟","বহুত ভাল! 🎉","ভাল! চলি যাওক! 📐","অভ্যাস কৰক! 💪"]},
};

let current=0,score=0,lang='en',answered=false;

function makeDots(n){return '🔵'.repeat(n);}
function setLang(l){lang=l;document.querySelectorAll('.lang-btn').forEach((b,i)=>{b.classList.toggle('active',['en','hi','as'][i]===l);});renderQuestion();}

function renderQuestion(){
  if(current>=questions.length){showResult();return;}
  answered=false;
  const q=questions[current],L=labels[lang];
  document.getElementById('qCounter').textContent=`${current+1} / 8`;
  document.getElementById('scoreDisplay').textContent=`${L.score} ${score}`;
  document.getElementById('progressFill').style.width=`${(current/questions.length)*100}%`;
  document.getElementById('qTypeBadge').textContent=q.badge[lang]||q.badge.en;
  document.getElementById('questionText').textContent=q.question[lang]||q.question.en;

  // Comparison display
  const compDiv=document.getElementById('comparisonDisplay');
  if(q.type==='size'){
    compDiv.innerHTML=`
      <div class="compare-item">
        <div class="compare-emoji">${q.items[0].emoji}</div>
        <div class="compare-label">${q.items[0].label}</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="compare-item">
        <div class="compare-emoji">${q.items[1].emoji}</div>
        <div class="compare-label">${q.items[1].label}</div>
      </div>
    `;
  } else {
    compDiv.innerHTML=`
      <div class="compare-item">
        <div class="compare-dots">${makeDots(q.counts[0])}</div>
        <div class="compare-count">${q.counts[0]}</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="compare-item">
        <div class="compare-dots">${makeDots(q.counts[1])}</div>
        <div class="compare-count">${q.counts[1]}</div>
      </div>
    `;
  }

  // Choices
  const cont=document.getElementById('choicesContainer');
  cont.innerHTML='';
  if(q.type==='size'){
    // shuffle items
    const items=[...q.items].sort(()=>Math.random()-.5);
    items.forEach(item=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.dataset.label=item.label;
      btn.innerHTML=`<span class="choice-emoji">${item.emoji}</span><span class="choice-label">${item.label}</span>`;
      btn.onclick=()=>handleAnswer(item.label,q.ansLabel,btn,'size');
      cont.appendChild(btn);
    });
  } else {
    const counts=[...q.counts].sort(()=>Math.random()-.5);
    counts.forEach(c=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.dataset.count=c;
      btn.innerHTML=`<span class="choice-dots">${makeDots(c)}</span><span class="choice-label">${c}</span>`;
      btn.onclick=()=>handleAnswer(c,q.ansCount,btn,'count');
      cont.appendChild(btn);
    });
  }

  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
}

function handleAnswer(chosen,correct,btn,type){
  if(answered)return;answered=true;
  const L=labels[lang];
  const allBtns=document.querySelectorAll('.choice-btn');
  allBtns.forEach(b=>{
    b.disabled=true;
    const val=type==='size'?b.dataset.label:parseInt(b.dataset.count);
    if(val===correct)b.classList.add('correct');
  });
  const fb=document.getElementById('feedback');
  const isCorrect=type==='size'?(chosen===correct):(parseInt(chosen)===parseInt(correct));
  if(isCorrect){score++;btn.classList.add('correct');fb.textContent=L.correct;fb.className='feedback show correct-fb';}
  else{btn.classList.add('wrong');fb.textContent=L.wrong;fb.className='feedback show wrong-fb';}
  document.getElementById('scoreDisplay').textContent=`${L.score} ${score}`;
  const nb=document.getElementById('nextBtn');nb.className='next-btn show';nb.textContent=current===questions.length-1?'See Results 🏆':L.next;
}

function nextQuestion(){current++;renderQuestion();}

function showResult(){
  document.getElementById('quizArea').style.display='none';
  const rs=document.getElementById('resultScreen');rs.className='result-screen show';
  const pct=(score/questions.length)*100,L=labels[lang];
  const idx=pct>=90?0:pct>=70?1:pct>=40?2:3;
  document.getElementById('resultEmoji').textContent=['🎉','😊','😄','💪'][idx];
  document.getElementById('starsDisplay').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=40?'⭐':'💪';
  document.getElementById('resultScore').textContent=`${score} / ${questions.length}`;
  document.getElementById('resultMsg').textContent=L.result[idx];
  document.querySelector('.restart-btn').textContent=L.play;
}

function restartGame(){
  current=0;score=0;answered=false;
  document.getElementById('quizArea').style.display='block';
  document.getElementById('resultScreen').className='result-screen';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
