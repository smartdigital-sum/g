<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Same or Different 👯 | GyanPlay Nursery</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#00C853;--pink:#FF4081;--gold:#FFB800;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:'Nunito',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#FFF3E0,#FFCC80);
      color:#BF360C;
      display:flex;flex-direction:column;align-items:center;
      padding:16px;animation:fadeIn .4s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes floatUpAlt{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}
    @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
    @keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    @keyframes wiggle{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}

    .top-bar{
      width:100%;max-width:680px;
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:14px;flex-wrap:wrap;gap:8px;
    }
    .back-btn{
      background:rgba(255,255,255,.55);border:none;
      padding:9px 22px;border-radius:999px;
      font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
      cursor:pointer;transition:background .2s;color:#BF360C;
    }
    .back-btn:hover{background:rgba(255,255,255,.8)}
    .subject-badge{
      background:rgba(255,255,255,.55);padding:7px 20px;
      border-radius:999px;font-size:.9rem;font-weight:800;
      font-family:'Baloo 2',sans-serif;color:#BF360C;
    }
    .lang-toggle{display:flex;gap:6px}
    .lang-btn{
      background:rgba(255,255,255,.35);border:none;
      padding:7px 14px;border-radius:999px;
      font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;
      cursor:pointer;transition:all .2s;color:#BF360C;
    }
    .lang-btn.active{background:#fff;color:#E64A19}
    .lang-btn:hover:not(.active){background:rgba(255,255,255,.6)}

    .game-card{
      background:rgba(255,255,255,.52);
      backdrop-filter:blur(14px);
      border:2.5px solid rgba(255,255,255,.7);
      border-radius:28px;padding:22px 20px;
      width:100%;max-width:680px;
      box-shadow:0 12px 50px rgba(191,54,12,.1);
    }
    .game-title{
      font-family:'Baloo 2',sans-serif;font-size:2rem;font-weight:800;
      text-align:center;margin-bottom:6px;color:#BF360C;
    }
    .score-bar{display:flex;justify-content:space-between;margin:6px 0;font-size:1rem;font-weight:800;color:#BF360C;}
    .prog-wrap{background:rgba(255,255,255,.4);border-radius:999px;height:12px;margin-bottom:16px}
    .prog-fill{
      height:12px;border-radius:999px;
      background:linear-gradient(90deg,#FFAB40,#E64A19);
      transition:width .4s ease;
    }

    .instruction{
      font-size:1.2rem;font-weight:800;text-align:center;
      margin-bottom:14px;color:#E64A19;
    }

    /* COMPARISON BOX */
    .compare-box{
      background:rgba(255,255,255,.45);
      border:2.5px solid rgba(255,255,255,.65);
      border-radius:24px;padding:24px 18px;
      margin-bottom:18px;text-align:center;
    }
    .pair-row{
      display:flex;justify-content:center;align-items:center;gap:24px;
      flex-wrap:wrap;
    }
    .pair-item{
      display:flex;flex-direction:column;align-items:center;gap:8px;
    }
    .pair-emoji{
      font-size:6.5rem;line-height:1;
      filter:drop-shadow(0 4px 16px rgba(191,54,12,.15));
    }
    .pair-emoji.left{animation:floatUp 2s ease infinite;}
    .pair-emoji.right{animation:floatUpAlt 2.3s ease infinite;}
    .vs-badge{
      font-family:'Baloo 2',sans-serif;font-size:1.6rem;font-weight:800;
      color:#FB8C00;background:rgba(255,255,255,.6);
      padding:6px 14px;border-radius:999px;
      border:2px solid rgba(251,140,0,.3);
    }

    /* SAME / DIFFERENT BUTTONS */
    .choices-row{
      display:flex;gap:16px;margin-bottom:12px;
    }
    .choice-btn{
      background:rgba(255,255,255,.5);
      border:3px solid rgba(255,255,255,.68);
      border-radius:24px;
      flex:1;
      min-height:90px;
      font-family:'Baloo 2',sans-serif;font-size:1.55rem;font-weight:800;
      cursor:pointer;transition:all .2s;
      display:flex;align-items:center;justify-content:center;gap:8px;
      color:#BF360C;padding:14px 10px;text-align:center;
    }
    .choice-btn:hover:not(:disabled){background:rgba(255,255,255,.8);transform:scale(1.05)}
    .choice-btn.correct{background:rgba(0,200,83,.3);border-color:#00C853;color:#1B5E20;animation:pop .4s ease}
    .choice-btn.wrong{background:rgba(255,64,129,.22);border-color:#FF4081;animation:shake .4s ease}
    .choice-btn:disabled{cursor:default}

    .feedback{
      font-family:'Baloo 2',sans-serif;font-size:1.45rem;font-weight:800;
      text-align:center;min-height:1.8rem;margin:6px 0 4px;
    }
    .feedback.correct{color:#2E7D32}
    .feedback.wrong{color:#C62828}

    .next-btn{
      color:#fff;background:#E64A19;
      font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.2rem;
      padding:.8rem 2.5rem;border:none;border-radius:999px;
      cursor:pointer;display:none;transition:transform .15s;
      width:100%;margin-top:6px;
    }
    .next-btn:hover{transform:scale(1.04)}

    .overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
      align-items:center;justify-content:center;z-index:100;padding:1.5rem;
    }
    .overlay.show{display:flex}
    .result-box{
      background:linear-gradient(135deg,#FFF3E0,#FFCC80);
      border:3px solid rgba(230,74,25,.3);
      border-radius:28px;padding:2.5rem 2rem;text-align:center;
      max-width:400px;width:100%;animation:popIn .35s ease;
    }
    .res-emoji{font-size:4rem;margin-bottom:.5rem}
    .res-title{font-family:'Baloo 2',sans-serif;font-size:2.2rem;font-weight:800;margin-bottom:.4rem;color:#BF360C;}
    .res-score{font-size:1.1rem;margin-bottom:.8rem;font-weight:700;color:#E64A19;}
    .res-stars{font-size:3rem;margin-bottom:1.2rem;letter-spacing:6px}
    .play-again-btn{
      color:#fff;background:#E64A19;
      font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.2rem;
      padding:.85rem 2.5rem;border:none;border-radius:999px;
      cursor:pointer;transition:transform .15s;
    }
    .play-again-btn:hover{transform:scale(1.05)}

    [data-lang]{display:none}
    [data-lang="en"]{display:inline}

    @media(max-width:480px){
      .pair-emoji{font-size:5rem}
      .choice-btn{font-size:1.25rem;min-height:75px}
      .game-title{font-size:1.65rem}
      .vs-badge{font-size:1.2rem}
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">← <span data-lang="en">Back</span><span data-lang="hi">वापस</span><span data-lang="as">পাছে</span></button>
  <div class="subject-badge">🧠 <span data-lang="en">Thinking</span><span data-lang="hi">सोचो</span><span data-lang="as">চিন্তা</span></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<!-- GAME CARD -->
<div class="game-card">
  <div class="game-title">
    <span data-lang="en">Same or Different? 👯</span>
    <span data-lang="hi">एक जैसा या अलग? 👯</span>
    <span data-lang="as">একে নে বেলেগ? 👯</span>
  </div>
  <div class="score-bar">
    <span><span data-lang="en">Score</span><span data-lang="hi">स्कोर</span><span data-lang="as">স্কোৰ</span>: <b id="score-val">0</b> / 80</span>
    <span><span data-lang="en">Round</span><span data-lang="hi">दौर</span><span data-lang="as">ৰাউণ্ড</span> <b id="round-num">1</b> / 8</span>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <div class="instruction">
    <span data-lang="en">👇 Are they the Same or Different?</span>
    <span data-lang="hi">👇 क्या ये एक जैसे हैं या अलग?</span>
    <span data-lang="as">👇 এইবোৰ একে নে বেলেগ?</span>
  </div>

  <div class="compare-box">
    <div class="pair-row">
      <div class="pair-item">
        <span class="pair-emoji left" id="emoji-left"></span>
      </div>
      <div class="vs-badge">VS</div>
      <div class="pair-item">
        <span class="pair-emoji right" id="emoji-right"></span>
      </div>
    </div>
  </div>

  <div class="choices-row">
    <button class="choice-btn" id="btn-same" onclick="handleAnswer('same')">
      <span data-lang="en">👯 Same</span><span data-lang="hi">👯 एक जैसा</span><span data-lang="as">👯 একে</span>
    </button>
    <button class="choice-btn" id="btn-diff" onclick="handleAnswer('different')">
      <span data-lang="en">🔀 Different</span><span data-lang="hi">🔀 अलग</span><span data-lang="as">🔀 বেলেগ</span>
    </button>
  </div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextRound()">
    <span data-lang="en">Next →</span>
    <span data-lang="hi">अगला →</span>
    <span data-lang="as">পৰৱৰ্তী →</span>
  </button>
</div>

<!-- RESULT OVERLAY -->
<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="res-emoji" id="res-emoji"></div>
    <div class="res-title" id="res-title"></div>
    <div class="res-score" id="res-score"></div>
    <div class="res-stars" id="res-stars"></div>
    <button class="play-again-btn" onclick="restartGame()">
      <span data-lang="en">🔄 Play Again!</span>
      <span data-lang="hi">🔄 फिर खेलें!</span>
      <span data-lang="as">🔄 আকৌ খেলক!</span>
    </button>
  </div>
</div>

<script>
let currentLang = 'en';

function setLang(l) {
  currentLang = l;
  document.querySelectorAll('[data-lang]').forEach(el => {
    el.style.display = el.dataset.lang === l ? 'inline' : 'none';
  });
  document.querySelectorAll('.lang-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['en','hi','as'][i] === l);
  });
}

// 4 SAME pairs + 4 DIFFERENT pairs
const baseRounds = [
  // SAME
  { left: '🍎', right: '🍎', answer: 'same' },
  { left: '🐕', right: '🐕', answer: 'same' },
  { left: '⭐', right: '⭐', answer: 'same' },
  { left: '🎈', right: '🎈', answer: 'same' },
  // DIFFERENT
  { left: '🍎', right: '🍊', answer: 'different' },
  { left: '🐕', right: '🐱', answer: 'different' },
  { left: '⭐', right: '🌙', answer: 'different' },
  { left: '🎈', right: '🎁', answer: 'different' },
];

let rounds = [], ri = 0, score = 0, answered = false;

function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

function startGame() {
  rounds = shuffle([...baseRounds]);
  ri = 0; score = 0;
  document.getElementById('overlay').classList.remove('show');
  loadRound();
}

function loadRound() {
  const r = rounds[ri];
  answered = false;

  document.getElementById('prog-fill').style.width = (ri / rounds.length * 100) + '%';
  document.getElementById('score-val').textContent = score;
  document.getElementById('round-num').textContent = ri + 1;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  document.getElementById('emoji-left').textContent = r.left;
  document.getElementById('emoji-right').textContent = r.right;

  // Re-enable buttons and clear states
  ['btn-same', 'btn-diff'].forEach(id => {
    const btn = document.getElementById(id);
    btn.disabled = false;
    btn.classList.remove('correct', 'wrong');
  });
}

function handleAnswer(choice) {
  if (answered) return;
  answered = true;

  const r = rounds[ri];
  const isCorrect = choice === r.answer;

  document.getElementById('btn-same').disabled = true;
  document.getElementById('btn-diff').disabled = true;

  const clickedId = choice === 'same' ? 'btn-same' : 'btn-diff';
  const correctId = r.answer === 'same' ? 'btn-same' : 'btn-diff';

  if (isCorrect) {
    document.getElementById(clickedId).classList.add('correct');
    score += 10;
  } else {
    document.getElementById(clickedId).classList.add('wrong');
    document.getElementById(correctId).classList.add('correct');
  }

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    const sameMsg = {
      en: ['Yes, they are the SAME! 👯 ✓', 'Correct! They match! ✓', 'Super! Same same! ✓'],
      hi: ['हाँ, ये एक जैसे हैं! 👯 ✓', 'सही! ये मिलते हैं! ✓', 'वाह! एक जैसे! ✓'],
      as: ['হয়, এইবোৰ একে! 👯 ✓', 'শুদ্ধ! একে একে! ✓', 'চুপাৰ! একে একে! ✓']
    };
    const diffMsg = {
      en: ['Yes, they are DIFFERENT! 🔀 ✓', 'Correct! Not the same! ✓', 'Great eye! Different! ✓'],
      hi: ['हाँ, ये अलग हैं! 🔀 ✓', 'सही! ये अलग हैं! ✓', 'बहुत अच्छा! अलग! ✓'],
      as: ['হয়, এইবোৰ বেলেগ! 🔀 ✓', 'শুদ্ধ! একে নহয়! ✓', 'বহুত ভাল! বেলেগ! ✓']
    };
    const pool = r.answer === 'same'
      ? (sameMsg[currentLang] || sameMsg['en'])
      : (diffMsg[currentLang] || diffMsg['en']);
    fb.textContent = pool[Math.floor(Math.random() * pool.length)];
    fb.className = 'feedback correct';
  } else {
    const wrongSame = {
      en: ['They are actually the SAME! 👯 ✗'],
      hi: ['ये असल में एक जैसे हैं! 👯 ✗'],
      as: ['এইবোৰ আচলতে একে! 👯 ✗']
    };
    const wrongDiff = {
      en: ['They are actually DIFFERENT! 🔀 ✗'],
      hi: ['ये असल में अलग हैं! 🔀 ✗'],
      as: ['এইবোৰ আচলতে বেলেগ! 🔀 ✗']
    };
    const pool = r.answer === 'same'
      ? (wrongSame[currentLang] || wrongSame['en'])
      : (wrongDiff[currentLang] || wrongDiff['en']);
    fb.textContent = pool[0];
    fb.className = 'feedback wrong';
  }

  document.getElementById('score-val').textContent = score;
  document.getElementById('next-btn').style.display = 'block';
}

function nextRound() {
  ri++;
  if (ri >= rounds.length) { showResult(); return; }
  loadRound();
}

function showResult() {
  document.getElementById('prog-fill').style.width = '100%';
  const pct = (score / (rounds.length * 10)) * 100;
  let emoji = '😊', title = { en: 'Good Try!', hi: 'अच्छी कोशिश!', as: 'ভাল চেষ্টা!' };
  if (pct >= 90) { emoji = '🏆'; title = { en: 'Matching Master!', hi: 'मिलान चैम्पियन!', as: 'মিলান চেম্পিয়ন!' }; }
  else if (pct >= 70) { emoji = '🌟'; title = { en: 'Well Done!', hi: 'बहुत अच्छा!', as: 'বহুত ভাল!' }; }
  else if (pct >= 40) { emoji = '👍'; title = { en: 'Good Job!', hi: 'शाबाश!', as: 'ভাল কাম!' }; }

  const stars = pct >= 90 ? '⭐⭐⭐' : pct >= 70 ? '⭐⭐' : pct >= 40 ? '⭐' : '';
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title[currentLang] || title['en'];
  document.getElementById('res-score').textContent = 'Score: ' + score + ' / ' + (rounds.length * 10);
  document.getElementById('res-stars').textContent = stars;
  document.getElementById('overlay').classList.add('show');
}

function restartGame() { startGame(); }
startGame();
</script>
</body>
</html>
