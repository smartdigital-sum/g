<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Body Parts 🧒 | GyanPlay Nursery</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#00C853;--pink:#FF4081;--gold:#FFB800;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:'Nunito',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#FCE4EC,#F8BBD0);
      color:#880E4F;
      display:flex;flex-direction:column;align-items:center;
      padding:16px;animation:fadeIn .4s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
    @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
    @keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    @keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

    /* TOP BAR */
    .top-bar{
      width:100%;max-width:680px;
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:14px;flex-wrap:wrap;gap:8px;
    }
    .back-btn{
      background:rgba(255,255,255,.45);border:none;
      padding:9px 22px;border-radius:999px;
      font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
      cursor:pointer;transition:background .2s;color:#880E4F;
    }
    .back-btn:hover{background:rgba(255,255,255,.7)}
    .subject-badge{
      background:rgba(255,255,255,.45);padding:7px 20px;
      border-radius:999px;font-size:.9rem;font-weight:800;
      font-family:'Baloo 2',sans-serif;color:#880E4F;
    }
    .lang-toggle{display:flex;gap:6px}
    .lang-btn{
      background:rgba(255,255,255,.3);border:none;
      padding:7px 14px;border-radius:999px;
      font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;
      cursor:pointer;transition:all .2s;color:#880E4F;
    }
    .lang-btn.active{background:#fff;color:#AD1457}
    .lang-btn:hover:not(.active){background:rgba(255,255,255,.55)}

    /* CARD */
    .game-card{
      background:rgba(255,255,255,.45);
      backdrop-filter:blur(14px);
      border:2.5px solid rgba(255,255,255,.65);
      border-radius:28px;padding:22px 20px;
      width:100%;max-width:680px;
      box-shadow:0 12px 50px rgba(136,14,79,.12);
    }
    .game-title{
      font-family:'Baloo 2',sans-serif;font-size:2rem;font-weight:800;
      text-align:center;margin-bottom:6px;color:#880E4F;
    }
    .score-bar{display:flex;justify-content:space-between;margin:6px 0;font-size:1rem;font-weight:800;color:#880E4F;}
    .prog-wrap{background:rgba(255,255,255,.4);border-radius:999px;height:12px;margin-bottom:16px}
    .prog-fill{
      height:12px;border-radius:999px;
      background:linear-gradient(90deg,#F48FB1,#E91E63);
      transition:width .4s ease;
    }

    /* CLUE */
    .clue-box{
      background:rgba(255,255,255,.38);
      border:2px solid rgba(255,255,255,.5);
      border-radius:24px;padding:22px 18px;
      margin-bottom:18px;text-align:center;
    }
    .clue-emoji{
      font-size:6.5rem;line-height:1;
      display:block;margin-bottom:10px;
      animation:floatUp 2.2s ease infinite;
      filter:drop-shadow(0 4px 16px rgba(136,14,79,.18));
    }
    .clue-text{
      font-family:'Baloo 2',sans-serif;font-size:1.7rem;font-weight:800;
      color:#880E4F;line-height:1.35;
    }

    /* INSTRUCTION */
    .instruction{
      font-size:1.25rem;font-weight:800;text-align:center;
      margin-bottom:16px;color:#AD1457;
    }

    /* ANSWER BUTTONS */
    .answer-grid{
      display:grid;grid-template-columns:repeat(3,1fr);
      gap:12px;margin-bottom:12px;
    }
    .ans-btn{
      background:rgba(255,255,255,.42);
      border:3px solid rgba(255,255,255,.55);
      border-radius:22px;padding:14px 8px;
      font-family:'Baloo 2',sans-serif;font-size:1.25rem;font-weight:800;
      cursor:pointer;text-align:center;transition:all .2s;
      min-height:90px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:5px;
      color:#880E4F;
    }
    .ans-btn span.be{font-size:2.4rem;display:block}
    .ans-btn:hover:not(:disabled){background:rgba(255,255,255,.7);transform:scale(1.04)}
    .ans-btn.correct{background:rgba(0,200,83,.35);border-color:#00C853;color:#1B5E20;animation:pop .4s ease}
    .ans-btn.wrong{background:rgba(255,64,129,.25);border-color:#FF4081;animation:shake .4s ease}
    .ans-btn:disabled{cursor:default}

    /* FEEDBACK */
    .feedback{
      font-family:'Baloo 2',sans-serif;font-size:1.4rem;font-weight:800;
      text-align:center;min-height:1.8rem;margin:8px 0 4px;
    }
    .feedback.correct{color:#2E7D32}
    .feedback.wrong{color:#C62828}

    /* NEXT BTN */
    .next-btn{
      color:#fff;background:#E91E63;
      font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.2rem;
      padding:.8rem 2.5rem;border:none;border-radius:999px;
      cursor:pointer;display:none;transition:transform .15s;
      width:100%;margin-top:6px;
    }
    .next-btn:hover{transform:scale(1.04)}

    /* OVERLAY */
    .overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
      align-items:center;justify-content:center;z-index:100;padding:1.5rem;
    }
    .overlay.show{display:flex}
    .result-box{
      background:linear-gradient(135deg,#FCE4EC,#F8BBD0);
      border:3px solid rgba(233,30,99,.3);
      border-radius:28px;padding:2.5rem 2rem;text-align:center;
      max-width:400px;width:100%;animation:popIn .35s ease;
    }
    .res-emoji{font-size:4rem;margin-bottom:.5rem}
    .res-title{font-family:'Baloo 2',sans-serif;font-size:2.2rem;font-weight:800;margin-bottom:.4rem;color:#880E4F;}
    .res-score{font-size:1.1rem;margin-bottom:.8rem;font-weight:700;color:#AD1457;}
    .res-stars{font-size:3rem;margin-bottom:1.2rem;letter-spacing:6px}
    .play-again-btn{
      color:#fff;background:#E91E63;
      font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.2rem;
      padding:.85rem 2.5rem;border:none;border-radius:999px;
      cursor:pointer;transition:transform .15s;
    }
    .play-again-btn:hover{transform:scale(1.05)}

    [data-lang]{display:none}
    [data-lang="en"]{display:inline}

    @media(max-width:480px){
      .clue-emoji{font-size:5rem}
      .ans-btn{font-size:1.05rem;min-height:75px}
      .ans-btn span.be{font-size:2rem}
      .game-title{font-size:1.65rem}
      .answer-grid{gap:9px}
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">← <span data-lang="en">Back</span><span data-lang="hi">वापस</span><span data-lang="as">পাছে</span></button>
  <div class="subject-badge">🧒 <span data-lang="en">Science</span><span data-lang="hi">विज्ञान</span><span data-lang="as">বিজ্ঞান</span></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<!-- GAME CARD -->
<div class="game-card">
  <div class="game-title">
    <span data-lang="en">My Body Parts 🧒</span>
    <span data-lang="hi">मेरे शरीर के अंग 🧒</span>
    <span data-lang="as">মোৰ শৰীৰৰ অংগ 🧒</span>
  </div>
  <div class="score-bar">
    <span><span data-lang="en">Score</span><span data-lang="hi">स्कोर</span><span data-lang="as">স্কোৰ</span>: <b id="score-val">0</b> / 80</span>
    <span><span data-lang="en">Round</span><span data-lang="hi">दौर</span><span data-lang="as">ৰাউণ্ড</span> <b id="round-num">1</b> / 8</span>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <div class="clue-box">
    <span class="clue-emoji" id="clue-emoji"></span>
    <div class="clue-text" id="clue-text"></div>
  </div>

  <div class="instruction">
    <span data-lang="en">👇 Which body part is it?</span>
    <span data-lang="hi">👇 यह कौन सा शरीर का अंग है?</span>
    <span data-lang="as">👇 এইটো শৰীৰৰ কোন অংগ?</span>
  </div>

  <div class="answer-grid" id="answer-grid"></div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextRound()">
    <span data-lang="en">Next →</span>
    <span data-lang="hi">अगला →</span>
    <span data-lang="as">পৰৱৰ্তী →</span>
  </button>
</div>

<!-- RESULT OVERLAY -->
<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="res-emoji" id="res-emoji"></div>
    <div class="res-title" id="res-title"></div>
    <div class="res-score" id="res-score"></div>
    <div class="res-stars" id="res-stars"></div>
    <button class="play-again-btn" onclick="restartGame()">
      <span data-lang="en">🔄 Play Again!</span>
      <span data-lang="hi">🔄 फिर खेलें!</span>
      <span data-lang="as">🔄 আকৌ খেলক!</span>
    </button>
  </div>
</div>

<script>
let currentLang = 'en';

function setLang(l) {
  currentLang = l;
  document.querySelectorAll('[data-lang]').forEach(el => {
    el.style.display = el.dataset.lang === l ? 'inline' : 'none';
  });
  document.querySelectorAll('.lang-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['en','hi','as'][i] === l);
  });
}

const rounds = [
  {
    clueEmoji: '👁️',
    clue: { en: 'We see with our...', hi: 'हम इससे देखते हैं...', as: 'আমি ইয়েৰে চাওঁ...' },
    answer: 'eyes',
    options: [
      { key: 'eyes',  emoji: '👀', label: { en: 'Eyes',  hi: 'आँखें',  as: 'চকু'  } },
      { key: 'ears',  emoji: '👂', label: { en: 'Ears',  hi: 'कान',    as: 'কান'  } },
      { key: 'nose',  emoji: '👃', label: { en: 'Nose',  hi: 'नाक',   as: 'নাক'  } }
    ]
  },
  {
    clueEmoji: '🎵',
    clue: { en: 'We hear music with our...', hi: 'हम संगीत इनसे सुनते हैं...', as: 'আমি সংগীত ইয়েৰে শুনো...' },
    answer: 'ears',
    options: [
      { key: 'mouth', emoji: '👄', label: { en: 'Mouth', hi: 'मुँह',   as: 'মুখ'  } },
      { key: 'ears',  emoji: '👂', label: { en: 'Ears',  hi: 'कान',    as: 'কান'  } },
      { key: 'hands', emoji: '👐', label: { en: 'Hands', hi: 'हाथ',   as: 'হাত'  } }
    ]
  },
  {
    clueEmoji: '🌸',
    clue: { en: 'We smell flowers with our...', hi: 'हम फूलों की खुशबू इससे सूँघते हैं...', as: 'আমি ফুলৰ সুগন্ধ ইয়েৰে শুঙো...' },
    answer: 'nose',
    options: [
      { key: 'nose',  emoji: '👃', label: { en: 'Nose',  hi: 'नाक',   as: 'নাক'  } },
      { key: 'hair',  emoji: '💇', label: { en: 'Hair',  hi: 'बाल',   as: 'চুলি' } },
      { key: 'feet',  emoji: '🦶', label: { en: 'Feet',  hi: 'पैर',   as: 'ভৰি' } }
    ]
  },
  {
    clueEmoji: '🍎',
    clue: { en: 'We eat and talk with our...', hi: 'हम खाना खाते और बात करते हैं...', as: 'আমি খাওঁ আৰু কথা কওঁ...' },
    answer: 'mouth',
    options: [
      { key: 'eyes',  emoji: '👀', label: { en: 'Eyes',  hi: 'आँखें',  as: 'চকু'  } },
      { key: 'mouth', emoji: '👄', label: { en: 'Mouth', hi: 'मुँह',   as: 'মুখ'  } },
      { key: 'teeth', emoji: '🦷', label: { en: 'Teeth', hi: 'दाँत',  as: 'দাঁত' } }
    ]
  },
  {
    clueEmoji: '✏️',
    clue: { en: 'We draw and clap with our...', hi: 'हम इनसे चित्र बनाते और ताली बजाते हैं...', as: 'আমি ইয়েৰে আঁকো আৰু হাততালি দিওঁ...' },
    answer: 'hands',
    options: [
      { key: 'hands', emoji: '👐', label: { en: 'Hands', hi: 'हाथ',   as: 'হাত'  } },
      { key: 'nose',  emoji: '👃', label: { en: 'Nose',  hi: 'नाक',   as: 'নাক'  } },
      { key: 'ears',  emoji: '👂', label: { en: 'Ears',  hi: 'कान',    as: 'কান'  } }
    ]
  },
  {
    clueEmoji: '👟',
    clue: { en: 'We walk and run with our...', hi: 'हम इनसे चलते और दौड़ते हैं...', as: 'আমি ইয়েৰে খোজকাঢ়ো আৰু দৌৰোঁ...' },
    answer: 'feet',
    options: [
      { key: 'hair',  emoji: '💇', label: { en: 'Hair',  hi: 'बाल',   as: 'চুলি' } },
      { key: 'teeth', emoji: '🦷', label: { en: 'Teeth', hi: 'दाँत',  as: 'দাঁত' } },
      { key: 'feet',  emoji: '🦶', label: { en: 'Feet',  hi: 'पैर',   as: 'ভৰি' } }
    ]
  },
  {
    clueEmoji: '💈',
    clue: { en: 'We comb and cut our...', hi: 'हम इन्हें कंघी करते और काटते हैं...', as: 'আমি ইয়াক চিৰণি কৰোঁ আৰু কাটো...' },
    answer: 'hair',
    options: [
      { key: 'mouth', emoji: '👄', label: { en: 'Mouth', hi: 'मुँह',   as: 'মুখ'  } },
      { key: 'hair',  emoji: '💇', label: { en: 'Hair',  hi: 'बाल',   as: 'চুলি' } },
      { key: 'eyes',  emoji: '👀', label: { en: 'Eyes',  hi: 'आँखें',  as: 'চকু'  } }
    ]
  },
  {
    clueEmoji: '😁',
    clue: { en: 'We brush our... every morning!', hi: 'हम हर सुबह अपने... साफ करते हैं!', as: 'আমি প্ৰতি পুৱা আমাৰ... পৰিষ্কাৰ কৰো!' },
    answer: 'teeth',
    options: [
      { key: 'feet',  emoji: '🦶', label: { en: 'Feet',  hi: 'पैर',   as: 'ভৰি' } },
      { key: 'ears',  emoji: '👂', label: { en: 'Ears',  hi: 'कान',    as: 'কান'  } },
      { key: 'teeth', emoji: '🦷', label: { en: 'Teeth', hi: 'दाँत',  as: 'দাঁত' } }
    ]
  }
];

const correctMessages = {
  en: ['Great job! ✓', 'Awesome! ✓', 'You got it! ✓', 'Superstar! ✓'],
  hi: ['शाबाश! ✓', 'बहुत अच्छा! ✓', 'सही जवाब! ✓', 'सुपरस्टार! ✓'],
  as: ['চমৎকাৰ! ✓', 'অসাধাৰণ! ✓', 'একদম ঠিক! ✓', 'ছুপাৰষ্টাৰ! ✓']
};
const wrongMessages = {
  en: ['Oops! Try again next time ✗', 'Not quite! ✗', 'Almost! ✗'],
  hi: ['उफ़! अगली बार कोशिश करो ✗', 'सही नहीं! ✗', 'लगभग! ✗'],
  as: ['উফ! পৰৱৰ্তী বাৰ চেষ্টা কৰা ✗', 'ঠিক নহয়! ✗', 'প্ৰায়! ✗']
};

let order = [], ri = 0, score = 0, answered = false;

function shuffle(a) { return [...a].sort(() => Math.random() - .5); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function startGame() {
  order = shuffle([...Array(rounds.length).keys()]);
  ri = 0; score = 0;
  document.getElementById('overlay').classList.remove('show');
  loadRound();
}

function loadRound() {
  const r = rounds[order[ri]];
  answered = false;

  document.getElementById('prog-fill').style.width = (ri / rounds.length * 100) + '%';
  document.getElementById('score-val').textContent = score;
  document.getElementById('round-num').textContent = ri + 1;
  document.getElementById('clue-emoji').textContent = r.clueEmoji;
  document.getElementById('clue-text').textContent = r.clue[currentLang] || r.clue['en'];
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  const grid = document.getElementById('answer-grid');
  grid.innerHTML = '';
  const opts = shuffle(r.options);
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.dataset.key = opt.key;
    btn.innerHTML = `<span class="be">${opt.emoji}</span><span>${opt.label[currentLang] || opt.label['en']}</span>`;
    btn.onclick = () => handleAnswer(opt.key, r.answer, btn);
    grid.appendChild(btn);
  });
}

function handleAnswer(chosen, correct, clickedBtn) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);

  const isCorrect = chosen === correct;
  if (isCorrect) {
    clickedBtn.classList.add('correct');
    score += 10;
  } else {
    clickedBtn.classList.add('wrong');
    document.querySelectorAll('.ans-btn').forEach(b => {
      if (b.dataset.key === correct) b.classList.add('correct');
    });
  }

  const fb = document.getElementById('feedback');
  fb.textContent = isCorrect
    ? pick(correctMessages[currentLang] || correctMessages['en'])
    : pick(wrongMessages[currentLang] || wrongMessages['en']);
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');

  document.getElementById('score-val').textContent = score;
  document.getElementById('next-btn').style.display = 'block';
}

function nextRound() {
  ri++;
  if (ri >= rounds.length) { showResult(); return; }
  loadRound();
}

function showResult() {
  document.getElementById('prog-fill').style.width = '100%';
  const pct = (score / (rounds.length * 10)) * 100;
  let emoji = '😊', title = { en: 'Good Try!', hi: 'अच्छी कोशिश!', as: 'ভাল চেষ্টা!' };
  if (pct >= 90) { emoji = '🏆'; title = { en: 'Body Parts Expert!', hi: 'शरीर विशेषज्ञ!', as: 'শৰীৰ বিশেষজ্ঞ!' }; }
  else if (pct >= 70) { emoji = '🎉'; title = { en: 'Well Done!', hi: 'बहुत अच्छा!', as: 'বহুত ভাল!' }; }
  else if (pct >= 40) { emoji = '👍'; title = { en: 'Good Job!', hi: 'शाबाश!', as: 'ভাল কাম!' }; }

  const stars = pct >= 90 ? '⭐⭐⭐' : pct >= 70 ? '⭐⭐' : pct >= 40 ? '⭐' : '';
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title[currentLang] || title['en'];
  document.getElementById('res-score').textContent = 'Score: ' + score + ' / ' + (rounds.length * 10);
  document.getElementById('res-stars').textContent = stars;
  document.getElementById('overlay').classList.add('show');
}

function restartGame() { startGame(); }
startGame();
</script>
</body>
</html>
