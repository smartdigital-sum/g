<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opposites Game 🐘🐭 | GyanPlay Nursery</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#00C853;--pink:#FF4081;--gold:#FFB800;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:'Nunito',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#E8EAF6,#C5CAE9);
      color:#1A237E;
      display:flex;flex-direction:column;align-items:center;
      padding:16px;animation:fadeIn .4s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
    @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
    @keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

    /* TOP BAR */
    .top-bar{
      width:100%;max-width:680px;
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:14px;flex-wrap:wrap;gap:8px;
    }
    .back-btn{
      background:rgba(255,255,255,.5);border:none;
      padding:9px 22px;border-radius:999px;
      font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
      cursor:pointer;transition:background .2s;color:#1A237E;
    }
    .back-btn:hover{background:rgba(255,255,255,.75)}
    .subject-badge{
      background:rgba(255,255,255,.5);padding:7px 20px;
      border-radius:999px;font-size:.9rem;font-weight:800;
      font-family:'Baloo 2',sans-serif;color:#1A237E;
    }
    .lang-toggle{display:flex;gap:6px}
    .lang-btn{
      background:rgba(255,255,255,.35);border:none;
      padding:7px 14px;border-radius:999px;
      font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;
      cursor:pointer;transition:all .2s;color:#1A237E;
    }
    .lang-btn.active{background:#fff;color:#283593}
    .lang-btn:hover:not(.active){background:rgba(255,255,255,.6)}

    /* CARD */
    .game-card{
      background:rgba(255,255,255,.5);
      backdrop-filter:blur(14px);
      border:2.5px solid rgba(255,255,255,.7);
      border-radius:28px;padding:22px 20px;
      width:100%;max-width:680px;
      box-shadow:0 12px 50px rgba(26,35,126,.1);
    }
    .game-title{
      font-family:'Baloo 2',sans-serif;font-size:2rem;font-weight:800;
      text-align:center;margin-bottom:6px;color:#1A237E;
    }
    .score-bar{display:flex;justify-content:space-between;margin:6px 0;font-size:1rem;font-weight:800;color:#1A237E;}
    .prog-wrap{background:rgba(255,255,255,.4);border-radius:999px;height:12px;margin-bottom:16px}
    .prog-fill{
      height:12px;border-radius:999px;
      background:linear-gradient(90deg,#9FA8DA,#3949AB);
      transition:width .4s ease;
    }

    /* INSTRUCTION */
    .instruction{
      font-size:1.2rem;font-weight:800;text-align:center;
      margin-bottom:14px;color:#283593;
    }

    /* PROMPT BOX — shows the word + emoji to find opposite of */
    .prompt-box{
      background:rgba(255,255,255,.45);
      border:2.5px solid rgba(255,255,255,.65);
      border-radius:24px;padding:22px 18px;
      margin-bottom:18px;text-align:center;
    }
    .prompt-label{
      font-size:.95rem;font-weight:700;color:#5C6BC0;margin-bottom:8px;
      text-transform:uppercase;letter-spacing:1px;
    }
    .prompt-emoji{
      font-size:6.5rem;line-height:1;
      display:block;margin-bottom:8px;
      animation:floatUp 2.2s ease infinite;
      filter:drop-shadow(0 4px 16px rgba(26,35,126,.15));
    }
    .prompt-word{
      font-family:'Baloo 2',sans-serif;font-size:2.4rem;font-weight:800;
      color:#1A237E;letter-spacing:2px;
    }

    /* CHOICE BUTTONS — 2 big buttons side by side */
    .choices-grid{
      display:grid;grid-template-columns:1fr 1fr;
      gap:16px;margin-bottom:12px;
    }
    .choice-btn{
      background:rgba(255,255,255,.48);
      border:3px solid rgba(255,255,255,.65);
      border-radius:24px;padding:18px 12px;
      font-family:'Baloo 2',sans-serif;font-size:1.35rem;font-weight:800;
      cursor:pointer;text-align:center;transition:all .2s;
      min-height:120px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:8px;
      color:#1A237E;
    }
    .choice-btn span.ce{font-size:3rem;display:block}
    .choice-btn:hover:not(:disabled){background:rgba(255,255,255,.75);transform:scale(1.04)}
    .choice-btn.correct{background:rgba(0,200,83,.3);border-color:#00C853;color:#1B5E20;animation:pop .4s ease}
    .choice-btn.wrong{background:rgba(255,64,129,.22);border-color:#FF4081;animation:shake .4s ease}
    .choice-btn:disabled{cursor:default}

    /* FEEDBACK */
    .feedback{
      font-family:'Baloo 2',sans-serif;font-size:1.45rem;font-weight:800;
      text-align:center;min-height:1.8rem;margin:6px 0 4px;
    }
    .feedback.correct{color:#2E7D32}
    .feedback.wrong{color:#C62828}

    /* NEXT BTN */
    .next-btn{
      color:#fff;background:#3949AB;
      font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.2rem;
      padding:.8rem 2.5rem;border:none;border-radius:999px;
      cursor:pointer;display:none;transition:transform .15s;
      width:100%;margin-top:6px;
    }
    .next-btn:hover{transform:scale(1.04)}

    /* OVERLAY */
    .overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
      align-items:center;justify-content:center;z-index:100;padding:1.5rem;
    }
    .overlay.show{display:flex}
    .result-box{
      background:linear-gradient(135deg,#E8EAF6,#C5CAE9);
      border:3px solid rgba(57,73,171,.3);
      border-radius:28px;padding:2.5rem 2rem;text-align:center;
      max-width:400px;width:100%;animation:popIn .35s ease;
    }
    .res-emoji{font-size:4rem;margin-bottom:.5rem}
    .res-title{font-family:'Baloo 2',sans-serif;font-size:2.2rem;font-weight:800;margin-bottom:.4rem;color:#1A237E;}
    .res-score{font-size:1.1rem;margin-bottom:.8rem;font-weight:700;color:#283593;}
    .res-stars{font-size:3rem;margin-bottom:1.2rem;letter-spacing:6px}
    .play-again-btn{
      color:#fff;background:#3949AB;
      font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.2rem;
      padding:.85rem 2.5rem;border:none;border-radius:999px;
      cursor:pointer;transition:transform .15s;
    }
    .play-again-btn:hover{transform:scale(1.05)}

    [data-lang]{display:none}
    [data-lang="en"]{display:inline}

    @media(max-width:480px){
      .prompt-emoji{font-size:5rem}
      .prompt-word{font-size:1.9rem}
      .choice-btn{font-size:1.15rem;min-height:100px}
      .choice-btn span.ce{font-size:2.4rem}
      .game-title{font-size:1.65rem}
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">← <span data-lang="en">Back</span><span data-lang="hi">वापस</span><span data-lang="as">পাছে</span></button>
  <div class="subject-badge">🔤 <span data-lang="en">English</span><span data-lang="hi">अंग्रेज़ी</span><span data-lang="as">ইংৰাজী</span></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<!-- GAME CARD -->
<div class="game-card">
  <div class="game-title">
    <span data-lang="en">Opposites Game 🔄</span>
    <span data-lang="hi">विपरीत शब्द 🔄</span>
    <span data-lang="as">বিপৰীত শব্দ 🔄</span>
  </div>
  <div class="score-bar">
    <span><span data-lang="en">Score</span><span data-lang="hi">स्कोर</span><span data-lang="as">স্কোৰ</span>: <b id="score-val">0</b> / 80</span>
    <span><span data-lang="en">Round</span><span data-lang="hi">दौर</span><span data-lang="as">ৰাউণ্ড</span> <b id="round-num">1</b> / 8</span>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <div class="instruction">
    <span data-lang="en">👇 Tap the OPPOSITE!</span>
    <span data-lang="hi">👇 विपरीत शब्द को छुओ!</span>
    <span data-lang="as">👇 বিপৰীত শব্দটো টিপক!</span>
  </div>

  <div class="prompt-box">
    <div class="prompt-label">
      <span data-lang="en">What is the opposite of...</span>
      <span data-lang="hi">इसका विपरीत क्या है...</span>
      <span data-lang="as">ইয়াৰ বিপৰীত কি...</span>
    </div>
    <span class="prompt-emoji" id="prompt-emoji"></span>
    <div class="prompt-word" id="prompt-word"></div>
  </div>

  <div class="choices-grid" id="choices-grid"></div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextRound()">
    <span data-lang="en">Next →</span>
    <span data-lang="hi">अगला →</span>
    <span data-lang="as">পৰৱৰ্তী →</span>
  </button>
</div>

<!-- RESULT OVERLAY -->
<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="res-emoji" id="res-emoji"></div>
    <div class="res-title" id="res-title"></div>
    <div class="res-score" id="res-score"></div>
    <div class="res-stars" id="res-stars"></div>
    <button class="play-again-btn" onclick="restartGame()">
      <span data-lang="en">🔄 Play Again!</span>
      <span data-lang="hi">🔄 फिर खेलें!</span>
      <span data-lang="as">🔄 আকৌ খেলক!</span>
    </button>
  </div>
</div>

<script>
let currentLang = 'en';

function setLang(l) {
  currentLang = l;
  document.querySelectorAll('[data-lang]').forEach(el => {
    el.style.display = el.dataset.lang === l ? 'inline' : 'none';
  });
  document.querySelectorAll('.lang-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['en','hi','as'][i] === l);
  });
}

// Each pair appears twice — once asking A→B, once asking B→A
// We generate both directions from the base pairs
const basePairs = [
  {
    a: { word: { en: 'BIG',    hi: 'बड़ा',    as: 'ডাঙৰ'   }, emoji: '🐘' },
    b: { word: { en: 'SMALL',  hi: 'छोटा',   as: 'সৰু'    }, emoji: '🐭' }
  },
  {
    a: { word: { en: 'HOT',    hi: 'गर्म',    as: 'গৰম'    }, emoji: '🔥' },
    b: { word: { en: 'COLD',   hi: 'ठंडा',   as: 'ঠান্ডা'  }, emoji: '🧊' }
  },
  {
    a: { word: { en: 'DAY',    hi: 'दिन',    as: 'দিন'    }, emoji: '☀️' },
    b: { word: { en: 'NIGHT',  hi: 'रात',    as: 'ৰাতি'   }, emoji: '🌙' }
  },
  {
    a: { word: { en: 'HAPPY',  hi: 'खुश',    as: 'সুখী'   }, emoji: '😊' },
    b: { word: { en: 'SAD',    hi: 'दुखी',   as: 'দুখী'   }, emoji: '😢' }
  },
  {
    a: { word: { en: 'FAST',   hi: 'तेज़',   as: 'দ্ৰুত'  }, emoji: '🐆' },
    b: { word: { en: 'SLOW',   hi: 'धीमा',  as: 'লেহেম'  }, emoji: '🐢' }
  },
  {
    a: { word: { en: 'UP',     hi: 'ऊपर',   as: 'ওপৰ'    }, emoji: '⬆️' },
    b: { word: { en: 'DOWN',   hi: 'नीचे',  as: 'তল'     }, emoji: '⬇️' }
  },
  {
    a: { word: { en: 'OPEN',   hi: 'खुला',  as: 'খোলা'   }, emoji: '🚪' },
    b: { word: { en: 'CLOSED', hi: 'बंद',   as: 'বন্ধ'   }, emoji: '🔒' }
  },
  {
    a: { word: { en: 'CLEAN',  hi: 'साफ',   as: 'পৰিষ্কাৰ' }, emoji: '🧼' },
    b: { word: { en: 'DIRTY',  hi: 'गंदा',  as: 'লেতেৰা' }, emoji: '🪣' }
  }
];

// Build 8 rounds: one direction per pair (shuffle which direction each time in startGame)
let rounds = [];
let order = [], ri = 0, score = 0, answered = false;

function shuffle(a) { return [...a].sort(() => Math.random() - .5); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function startGame() {
  // For each pair, randomly pick direction A→B or B→A
  rounds = basePairs.map(pair => {
    const askA = Math.random() < 0.5;
    return {
      prompt:  askA ? pair.a : pair.b,
      correct: askA ? pair.b : pair.a,
      wrong:   askA ? pair.a : pair.b   // the prompt itself as the wrong choice
    };
  });
  order = shuffle([...Array(rounds.length).keys()]);
  ri = 0; score = 0;
  document.getElementById('overlay').classList.remove('show');
  loadRound();
}

function loadRound() {
  const r = rounds[order[ri]];
  answered = false;

  document.getElementById('prog-fill').style.width = (ri / rounds.length * 100) + '%';
  document.getElementById('score-val').textContent = score;
  document.getElementById('round-num').textContent = ri + 1;
  document.getElementById('prompt-emoji').textContent = r.prompt.emoji;
  document.getElementById('prompt-word').textContent = r.prompt.word[currentLang] || r.prompt.word['en'];
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  // Shuffle the two choices
  const choices = shuffle([
    { data: r.correct, isCorrect: true },
    { data: r.wrong,   isCorrect: false }
  ]);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.correct = ch.isCorrect ? '1' : '0';
    btn.innerHTML = `<span class="ce">${ch.data.emoji}</span><span>${ch.data.word[currentLang] || ch.data.word['en']}</span>`;
    btn.onclick = () => handleAnswer(ch.isCorrect, btn, r);
    grid.appendChild(btn);
  });
}

function handleAnswer(isCorrect, clickedBtn, r) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  if (isCorrect) {
    clickedBtn.classList.add('correct');
    score += 10;
  } else {
    clickedBtn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.dataset.correct === '1') b.classList.add('correct');
    });
  }

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    const msgs = {
      en: ['Great! You know your opposites! ✓', 'Correct! ✓', 'Superstar! ✓', 'Amazing! ✓'],
      hi: ['बहुत अच्छा! आप विपरीत जानते हो! ✓', 'सही! ✓', 'सुपरस्टार! ✓', 'शानदार! ✓'],
      as: ['চমৎকাৰ! আপুনি বিপৰীত জানে! ✓', 'শুদ্ধ! ✓', 'ছুপাৰষ্টাৰ! ✓', 'অসাধাৰণ! ✓']
    };
    fb.textContent = pick(msgs[currentLang] || msgs['en']);
    fb.className = 'feedback correct';
  } else {
    const oppWord = r.correct.word[currentLang] || r.correct.word['en'];
    const msgs = {
      en: [`The opposite is ${oppWord} ${r.correct.emoji}! ✗`],
      hi: [`विपरीत है ${oppWord} ${r.correct.emoji}! ✗`],
      as: [`বিপৰীত হৈছে ${oppWord} ${r.correct.emoji}! ✗`]
    };
    fb.textContent = msgs[currentLang][0] || msgs['en'][0];
    fb.className = 'feedback wrong';
  }

  document.getElementById('score-val').textContent = score;
  document.getElementById('next-btn').style.display = 'block';
}

function nextRound() {
  ri++;
  if (ri >= rounds.length) { showResult(); return; }
  loadRound();
}

function showResult() {
  document.getElementById('prog-fill').style.width = '100%';
  const pct = (score / (rounds.length * 10)) * 100;
  let emoji = '😊', title = { en: 'Good Try!', hi: 'अच्छी कोशिश!', as: 'ভাল চেষ্টা!' };
  if (pct >= 90) { emoji = '🏆'; title = { en: 'Opposites Master!', hi: 'विपरीत शब्द माहिर!', as: 'বিপৰীত শব্দ মাষ্টাৰ!' }; }
  else if (pct >= 70) { emoji = '🌟'; title = { en: 'Well Done!', hi: 'बहुत अच्छा!', as: 'বহুত ভাল!' }; }
  else if (pct >= 40) { emoji = '👍'; title = { en: 'Good Job!', hi: 'शाबाश!', as: 'ভাল কাম!' }; }

  const stars = pct >= 90 ? '⭐⭐⭐' : pct >= 70 ? '⭐⭐' : pct >= 40 ? '⭐' : '';
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title[currentLang] || title['en'];
  document.getElementById('res-score').textContent = 'Score: ' + score + ' / ' + (rounds.length * 10);
  document.getElementById('res-stars').textContent = stars;
  document.getElementById('overlay').classList.add('show');
}

function restartGame() { startGame(); }
startGame();
</script>
</body>
</html>
