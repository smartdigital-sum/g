<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>हिंदी रिमझिम – GyanPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--saffron:#FF6B00;--gold:#FFB800;--sky:#00AEEF;--green:#00C853;--pink:#FF4081;--purple:#7C3AED;--bg1:#0F0C29;--bg2:#302B63;--card:#1a1740;--text:#e8e0ff;--muted:#9b8ec4}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1),var(--bg2));font-family:'Nunito',sans-serif;color:var(--text);overflow-x:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(26,23,64,.85);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(124,58,237,.3)}
.back-btn{background:none;border:1.5px solid rgba(124,58,237,.4);color:var(--purple);padding:6px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:.2s}
.back-btn:hover{background:rgba(124,58,237,.15)}
.badge{background:linear-gradient(90deg,var(--purple),#a855f7);color:#fff;font-weight:800;font-family:'Baloo 2',sans-serif;padding:5px 14px;border-radius:20px;font-size:.8rem;letter-spacing:.5px}
.lang-toggle{display:flex;gap:6px}
.lang-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--muted);padding:5px 11px;border-radius:14px;font-size:.78rem;font-weight:700;cursor:pointer;transition:.2s;font-family:'Nunito',sans-serif}
.lang-btn.active{background:rgba(124,58,237,.3);border-color:var(--purple);color:#c4b5fd}
.wrap{max-width:700px;margin:0 auto;padding:24px 16px 60px}
.score-bar-wrap{display:flex;align-items:center;gap:12px;margin-bottom:22px;animation:fadeIn .5s ease}
.score-label{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1rem;color:#c4b5fd;min-width:90px}
.prog-track{flex:1;height:10px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),#a855f7);border-radius:10px;transition:width .5s ease}
.q-card{background:var(--card);border-radius:20px;padding:28px 24px;animation:fadeIn .4s ease;border:1px solid rgba(124,58,237,.2);box-shadow:0 8px 40px rgba(0,0,0,.4)}
.q-number{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.chapter-tag{display:inline-block;background:rgba(124,58,237,.25);border:1px solid rgba(124,58,237,.4);color:#c4b5fd;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;margin-bottom:14px;letter-spacing:.3px}
.en-hint{background:rgba(255,184,0,.08);border-left:3px solid var(--gold);color:var(--gold);padding:8px 12px;border-radius:0 8px 8px 0;font-size:.82rem;font-style:italic;margin-bottom:16px;line-height:1.4}
.q-text{font-size:1.05rem;font-weight:600;line-height:1.65;margin-bottom:20px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:var(--text);padding:13px 16px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.93rem;font-weight:600;cursor:pointer;transition:.2s;text-align:left;line-height:1.4}
.opt-btn:hover:not(:disabled){background:rgba(124,58,237,.2);border-color:var(--purple);transform:translateY(-2px)}
.opt-btn.correct{background:rgba(0,200,83,.18);border-color:var(--green);color:var(--green);animation:pop .3s ease}
.opt-btn.wrong{background:rgba(255,64,129,.15);border-color:var(--pink);color:var(--pink);animation:shake .3s ease}
.opt-btn.reveal{background:rgba(0,200,83,.1);border-color:rgba(0,200,83,.4);color:rgba(0,200,83,.7)}
.opt-btn:disabled{cursor:default}
.feedback{margin-top:16px;padding:14px 16px;border-radius:12px;font-size:.9rem;font-weight:600;line-height:1.5;animation:fadeIn .3s ease}
.feedback.correct{background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.3);color:#6effa5}
.feedback.wrong{background:rgba(255,64,129,.1);border:1px solid rgba(255,64,129,.3);color:#ff9ebf}
.next-btn{margin-top:18px;width:100%;background:linear-gradient(90deg,var(--purple),#a855f7);color:#fff;border:none;padding:14px;border-radius:12px;font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:.2s}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.4)}
.end-card{background:var(--card);border-radius:24px;padding:40px 28px;text-align:center;animation:fadeIn .6s ease;border:1px solid rgba(124,58,237,.3);box-shadow:0 8px 50px rgba(0,0,0,.5)}
.stars{font-size:2.8rem;margin:12px 0;letter-spacing:4px}
.end-score{font-family:'Baloo 2',sans-serif;font-size:3.5rem;font-weight:800;color:#c4b5fd;text-shadow:0 0 30px rgba(124,58,237,.5)}
.end-label{font-size:1rem;color:var(--muted);margin-top:4px}
.end-msg{font-size:1.1rem;font-weight:700;margin:16px 0 24px;color:var(--text)}
.play-again{background:linear-gradient(90deg,var(--purple),#a855f7);color:#fff;border:none;padding:14px 32px;border-radius:14px;font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:.2s}
.play-again:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(124,58,237,.5)}
[data-en],[data-hi],[data-as]{display:none}
.lang-en [data-en]{display:inline}
.lang-hi [data-hi]{display:inline}
.lang-as [data-as]{display:inline}
</style>
</head>
<body class="lang-hi">
<div class="topbar">
  <button class="back-btn" onclick="history.back()">← <span data-en>Back</span><span data-hi>वापस</span><span data-as>পিছলৈ</span></button>
  <span class="badge">📖 Hindi</span>
  <div class="lang-toggle">
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn active" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>
<div class="wrap">
  <div class="score-bar-wrap">
    <div class="score-label"><span data-en>Score:</span><span data-hi>अंक:</span><span data-as>নম্বৰ:</span> <span id="scoreDisplay">0</span>/100</div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div style="font-size:.85rem;color:var(--muted)" id="qCounter">1/10</div>
  </div>
  <div id="gameArea"></div>
</div>
<script>
const questions=[

 q:{en:"The poem 'Mann Karo Matt' teaches children about:",hi:"'मन करो मत' कविता बच्चों को क्या सिखाती है?",as:"'মন কৰো মত' কবিতাই শিশুসকলক কি শিকায়?"},

 ans:0,

{chapter:{en:"Pappamal (पप्पामाल)",hi:"पप्पामाल",as:"পাপ্পামাল"},

let cur=0,score=0,answered=false,lang='hi';

function setLang(l){
  lang=l;
  document.body.className='lang-'+l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  renderQ();
}

function renderQ(){
  const q=questions[cur];
  document.getElementById('progFill').style.width=((cur)/10*100)+'%';
  document.getElementById('qCounter').textContent=(cur+1)+'/10';
  document.getElementById('scoreDisplay').textContent=score;
  const opts=q.opts[lang].map((o,i)=>`<button class="opt-btn" onclick="answer(${i})">${o}</button>`).join('');
  const chapterLabel=lang==='en'?q.chapter.en:lang==='hi'?q.chapter.hi:q.chapter.as;
  document.getElementById('gameArea').innerHTML=`
    <div class="q-card">
      <div class="q-number">Question ${cur+1} of 10</div>
      <div class="chapter-tag">📚 ${chapterLabel}</div>
      <div class="en-hint">💡 ${q.hint[lang]}</div>
      <div class="q-text">${q.q[lang]}</div>
      <div class="options">${opts}</div>
      <div id="feedback"></div>
      <div id="nextWrap"></div>
    </div>`;
  answered=false;
}

function answer(i){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  const correct=i===q.ans;
  btns[i].classList.add(correct?'correct':'wrong');
  if(!correct) btns[q.ans].classList.add('reveal');
  score+=correct?10:0;
  document.getElementById('feedback').innerHTML=`<div class="feedback ${correct?'correct':'wrong'}">${correct?'✓':'✗'} ${q.exp[lang]}</div>`;
  document.getElementById('nextWrap').innerHTML=`<button class="next-btn" onclick="next()">${cur<9?'अगला →':'परिणाम देखें'}</button>`;
}

function next(){cur++;if(cur>=10){showEnd();return;}renderQ();}

function showEnd(){
  const stars=score>=90?3:score>=70?2:score>=40?1:0;
  const starStr='★'.repeat(stars)+'☆'.repeat(3-stars);
  const msgs={en:["Keep reading Hindi!","Good try! Re-read the chapters.","Great Hindi skills!","Hindi champion! 📖"],hi:["हिंदी पढ़ते रहो!","अच्छा प्रयास! पाठ दोबारा पढ़ें।","शाबाश! बेहतरीन हिंदी!","हिंदी चैंपियन! 📖"],as:["হিন্দী পঢ়ি থাকক!","ভাল প্ৰচেষ্টা! পুনৰ পাঠ পঢ়ক।","অসাধাৰণ হিন্দী দক্ষতা!","হিন্দী চেম্পিয়ন! 📖"]};
  document.getElementById('progFill').style.width='100%';
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('gameArea').innerHTML=`
    <div class="end-card">
      <div style="font-family:'Baloo 2',sans-serif;font-size:1.4rem;font-weight:800;color:#c4b5fd">हिंदी रिमझिम भाग 4</div>
      <div class="stars">${starStr}</div>
      <div class="end-score">${score}<span style="font-size:1.5rem;color:var(--muted)">/100</span></div>
      <div class="end-label">${stars} Star${stars!==1?'s':''}</div>
      <div class="end-msg">${msgs[lang][stars]}</div>
      <button class="play-again" onclick="restart()">🔄 फिर से खेलें</button>
    </div>`;
}
function restart(){cur=0;score=0;answered=false;renderQ();}
renderQ();
</script>
