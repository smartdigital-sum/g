<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>States & Capitals – GyanPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--saffron:#FF6B00;--gold:#FFB800;--sky:#00AEEF;--green:#00C853;--pink:#FF4081;--purple:#7C3AED;--bg1:#0F0C29;--bg2:#302B63;--card:#1a1740;--text:#e8e0ff;--muted:#9b8ec4}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1),var(--bg2));font-family:'Nunito',sans-serif;color:var(--text);overflow-x:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes floatIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(26,23,64,.85);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,64,129,.2)}
.back-btn{background:none;border:1.5px solid rgba(255,64,129,.4);color:var(--pink);padding:6px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:.2s}
.back-btn:hover{background:rgba(255,64,129,.15)}
.badge{background:linear-gradient(90deg,var(--pink),#ff80ab);color:#fff;font-weight:800;font-family:'Baloo 2',sans-serif;padding:5px 14px;border-radius:20px;font-size:.8rem;letter-spacing:.5px}
.lang-toggle{display:flex;gap:6px}
.lang-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--muted);padding:5px 11px;border-radius:14px;font-size:.78rem;font-weight:700;cursor:pointer;transition:.2s;font-family:'Nunito',sans-serif}
.lang-btn.active{background:rgba(255,64,129,.25);border-color:var(--pink);color:var(--pink)}
.wrap{max-width:700px;margin:0 auto;padding:24px 16px 60px}
.score-bar-wrap{display:flex;align-items:center;gap:12px;margin-bottom:22px;animation:fadeIn .5s ease}
.score-label{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1rem;color:var(--pink);min-width:90px}
.prog-track{flex:1;height:10px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),#ff80ab);border-radius:10px;transition:width .5s ease}
.q-card{background:var(--card);border-radius:20px;padding:28px 24px;animation:fadeIn .4s ease;border:1px solid rgba(255,64,129,.12);box-shadow:0 8px 40px rgba(0,0,0,.4)}
.q-number{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.state-emoji{font-size:4rem;text-align:center;margin:14px 0 6px;animation:floatIn .5s ease}
.state-name{font-family:'Baloo 2',sans-serif;font-size:1.8rem;font-weight:800;color:var(--pink);text-align:center;margin-bottom:4px;text-shadow:0 0 20px rgba(255,64,129,.3)}
.state-hint{text-align:center;font-size:.8rem;color:var(--muted);margin-bottom:16px;font-style:italic}
.q-text{font-size:1.05rem;font-weight:600;line-height:1.55;margin-bottom:20px;text-align:center}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:var(--text);padding:13px 16px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s;text-align:center}
.opt-btn:hover:not(:disabled){background:rgba(255,64,129,.15);border-color:var(--pink);transform:translateY(-2px)}
.opt-btn.correct{background:rgba(0,200,83,.18);border-color:var(--green);color:var(--green);animation:pop .3s ease}
.opt-btn.wrong{background:rgba(255,64,129,.15);border-color:var(--pink);color:var(--pink);animation:shake .3s ease}
.opt-btn.reveal{background:rgba(0,200,83,.1);border-color:rgba(0,200,83,.4);color:rgba(0,200,83,.7)}
.opt-btn:disabled{cursor:default}
.feedback{margin-top:16px;padding:14px 16px;border-radius:12px;font-size:.9rem;font-weight:600;line-height:1.5;animation:fadeIn .3s ease}
.feedback.correct{background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.3);color:#6effa5}
.feedback.wrong{background:rgba(255,64,129,.1);border:1px solid rgba(255,64,129,.3);color:#ff9ebf}
.next-btn{margin-top:18px;width:100%;background:linear-gradient(90deg,var(--pink),#ff80ab);color:#fff;border:none;padding:14px;border-radius:12px;font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:.2s}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,64,129,.4)}
.end-card{background:var(--card);border-radius:24px;padding:40px 28px;text-align:center;animation:fadeIn .6s ease;border:1px solid rgba(255,64,129,.2);box-shadow:0 8px 50px rgba(0,0,0,.5)}
.stars{font-size:2.8rem;margin:12px 0;letter-spacing:4px}
.end-score{font-family:'Baloo 2',sans-serif;font-size:3.5rem;font-weight:800;color:var(--pink);text-shadow:0 0 30px rgba(255,64,129,.4)}
.end-label{font-size:1rem;color:var(--muted);margin-top:4px}
.end-msg{font-size:1.1rem;font-weight:700;margin:16px 0 24px;color:var(--text)}
.play-again{background:linear-gradient(90deg,var(--pink),#ff80ab);color:#fff;border:none;padding:14px 32px;border-radius:14px;font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:.2s}
.play-again:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(255,64,129,.4)}
[data-en],[data-hi],[data-as]{display:none}
.lang-en [data-en]{display:inline}
.lang-hi [data-hi]{display:inline}
.lang-as [data-as]{display:inline}
</style>
</head>
<body class="lang-en">
<div class="topbar">
  <button class="back-btn" onclick="history.back()">← <span data-en>Back</span><span data-hi>वापस</span><span data-as>পিছলৈ</span></button>
  <span class="badge">🗺️ Social</span>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>
<div class="wrap">
  <div class="score-bar-wrap">
    <div class="score-label"><span data-en>Score:</span><span data-hi>अंक:</span><span data-as>নম্বৰ:</span> <span id="scoreDisplay">0</span>/100</div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div style="font-size:.85rem;color:var(--muted)" id="qCounter">1/10</div>
  </div>
  <div id="gameArea"></div>
</div>
<script>
const questions=[
{emoji:"🦏",state:{en:"Assam",hi:"असम",as:"অসম"},hint:{en:"Land of the one-horned rhino 🦏",hi:"एक सींग वाले गैंडे की भूमि 🦏",as:"এক শিঙীয়া গঁড়ৰ ভূমি 🦏"},q:{en:"What is the capital of Assam?",hi:"असम की राजधानी क्या है?",as:"অসমৰ ৰাজধানী কি?"},opts:{en:["Dispur","Guwahati","Jorhat","Tezpur"],hi:["दिसपुर","गुवाहाटी","जोरहाट","तेजपुर"],as:["দিছপুৰ","গুৱাহাটী","যোৰহাট","তেজপুৰ"]},ans:0,exp:{en:"Dispur is the capital of Assam. It is located within Guwahati city.",hi:"दिसपुर असम की राजधानी है। यह गुवाहाटी शहर के भीतर स्थित है।",as:"দিছপুৰ অসমৰ ৰাজধানী। এইটো গুৱাহাটী চহৰৰ ভিতৰত অৱস্থিত।"}},
{emoji:"🥭",state:{en:"Maharashtra",hi:"महाराष्ट्र",as:"মহাৰাষ্ট্ৰ"},hint:{en:"India's financial capital state 💹",hi:"भारत की वित्तीय राजधानी 💹",as:"ভাৰতৰ বিত্তীয় কেন্দ্ৰ 💹"},q:{en:"What is the capital of Maharashtra?",hi:"महाराष्ट्र की राजधानी क्या है?",as:"মহাৰাষ্ট্ৰৰ ৰাজধানী কি?"},opts:{en:["Mumbai","Pune","Nagpur","Nashik"],hi:["मुंबई","पुणे","नागपुर","नासिक"],as:["মুম্বাই","পুণে","নাগপুৰ","নাচিক"]},ans:0,exp:{en:"Mumbai is the capital of Maharashtra and also India's financial hub.",hi:"मुंबई महाराष्ट्र की राजधानी है और भारत का वित्तीय केंद्र है।",as:"মুম্বাই মহাৰাষ্ট্ৰৰ ৰাজধানী আৰু ভাৰতৰ বিত্তীয় কেন্দ্ৰ।"}},
{emoji:"🌊",state:{en:"Tamil Nadu",hi:"तमिलनाडु",as:"তামিলনাড়ু"},hint:{en:"Land of temples and Marina Beach 🏖️",hi:"मंदिरों और मरीना बीच की भूमि 🏖️",as:"মন্দিৰ আৰু মেৰিনা বিচৰ ভূমি 🏖️"},q:{en:"What is the capital of Tamil Nadu?",hi:"तमिलनाडु की राजधानी क्या है?",as:"তামিলনাড়ুৰ ৰাজধানী কি?"},opts:{en:["Chennai","Coimbatore","Madurai","Salem"],hi:["चेन्नई","कोयंबटूर","मदुरई","सेलम"],as:["চেন্নাই","কোয়েম্বাটুৰ","মাদুৰাই","চেলেম"]},ans:0,exp:{en:"Chennai (formerly Madras) is the capital of Tamil Nadu.",hi:"चेन्नई (पूर्व में मद्रास) तमिलनाडु की राजधानी है।",as:"চেন্নাই (পূৰ্বে মাদ্ৰাছ) তামিলনাড়ুৰ ৰাজধানী।"}},
{emoji:"🏜️",state:{en:"Rajasthan",hi:"राजस्थान",as:"ৰাজস্থান"},hint:{en:"Land of deserts and royal forts 🏰",hi:"रेगिस्तान और राजसी किलों की भूमि 🏰",as:"মৰুভূমি আৰু ৰাজকীয় দুৰ্গৰ ভূমি 🏰"},q:{en:"What is the capital of Rajasthan?",hi:"राजस्थान की राजधानी क्या है?",as:"ৰাজস্থানৰ ৰাজধানী কি?"},opts:{en:["Jaipur","Jodhpur","Udaipur","Ajmer"],hi:["जयपुर","जोधपुर","उदयपुर","अजमेर"],as:["জয়পুৰ","যোধপুৰ","উদয়পুৰ","আজমেৰ"]},ans:0,exp:{en:"Jaipur (the Pink City) is the capital of Rajasthan.",hi:"जयपुर (गुलाबी शहर) राजस्थान की राजधानी है।",as:"জয়পুৰ (গোলাপী চহৰ) ৰাজস্থানৰ ৰাজধানী।"}},
{emoji:"🎭",state:{en:"West Bengal",hi:"पश्चिम बंगाल",as:"পশ্চিমবঙ্গ"},hint:{en:"City of Joy, home of Tagore 🎶",hi:"आनंद का शहर, टैगोर का घर 🎶",as:"আনন্দৰ চহৰ, টেগোৰৰ ঘৰ 🎶"},q:{en:"What is the capital of West Bengal?",hi:"पश्चिम बंगाल की राजधानी क्या है?",as:"পশ্চিমবঙ্গৰ ৰাজধানী কি?"},opts:{en:["Kolkata","Darjeeling","Siliguri","Asansol"],hi:["कोलकाता","दार्जिलिंग","सिलीगुड़ी","आसनसोल"],as:["কলকাতা","দাৰ্জিলিং","শিলিগুড়ি","আচানচল"]},ans:0,exp:{en:"Kolkata (formerly Calcutta) is the capital of West Bengal.",hi:"कोलकाता (पूर्व में कलकत्ता) पश्चिम बंगाल की राजधानी है।",as:"কলকাতা (পূৰ্বে কলকাতা) পশ্চিমবঙ্গৰ ৰাজধানী।"}},
{emoji:"💎",state:{en:"Gujarat",hi:"गुजरात",as:"গুজৰাট"},hint:{en:"Land of Gandhi, famous for Rann of Kutch ✨",hi:"गांधी की भूमि, कच्छ के रण के लिए प्रसिद्ध ✨",as:"গান্ধীৰ ভূমি, কচ্ছৰ ৰণৰ বাবে বিখ্যাত ✨"},q:{en:"What is the capital of Gujarat?",hi:"गुजरात की राजधानी क्या है?",as:"গুজৰাটৰ ৰাজধানী কি?"},opts:{en:["Gandhinagar","Ahmedabad","Surat","Vadodara"],hi:["गांधीनगर","अहमदाबाद","सूरत","वडोदरा"],as:["গান্ধীনগৰ","আহমেদাবাদ","চুৰাট","বড়দৰা"]},ans:0,exp:{en:"Gandhinagar is the capital of Gujarat, though Ahmedabad is its largest city.",hi:"गांधीनगर गुजरात की राजधानी है, हालांकि अहमदाबाद सबसे बड़ा शहर है।",as:"গান্ধীনগৰ গুজৰাটৰ ৰাজধানী, যদিও আহমেদাবাদ ইয়াৰ সৰ্ববৃহৎ চহৰ।"}},
{emoji:"🕌",state:{en:"Uttar Pradesh",hi:"उत्तर प्रदेश",as:"উত্তৰ প্ৰদেশ"},hint:{en:"Home of Taj Mahal & Ganges River 🕌",hi:"ताजमहल और गंगा का घर 🕌",as:"তাজমহল আৰু গংগাৰ ঘৰ 🕌"},q:{en:"What is the capital of Uttar Pradesh?",hi:"उत्तर प्रदेश की राजधानी क्या है?",as:"উত্তৰ প্ৰদেশৰ ৰাজধানী কি?"},opts:{en:["Lucknow","Agra","Varanasi","Kanpur"],hi:["लखनऊ","आगरा","वाराणसी","कानपुर"],as:["লখনউ","আগ্ৰা","বাৰাণাসী","কানপুৰ"]},ans:0,exp:{en:"Lucknow (the City of Nawabs) is the capital of Uttar Pradesh.",hi:"लखनऊ (नवाबों का शहर) उत्तर प्रदेश की राजधानी है।",as:"লখনউ (নৱাবৰ চহৰ) উত্তৰ প্ৰদেশৰ ৰাজধানী।"}},
{emoji:"🌾",state:{en:"Punjab",hi:"पंजाब",as:"পঞ্জাৱ"},hint:{en:"Granary of India, land of five rivers 🌾",hi:"भारत का अन्न भंडार, पाँच नदियों की भूमि 🌾",as:"ভাৰতৰ শস্যভাণ্ডাৰ, পাঁচ নদীৰ ভূমি 🌾"},q:{en:"What is the capital of Punjab?",hi:"पंजाब की राजधानी क्या है?",as:"পঞ্জাৱৰ ৰাজধানী কি?"},opts:{en:["Chandigarh","Amritsar","Ludhiana","Patiala"],hi:["चंडीगढ़","अमृतसर","लुधियाना","पटियाला"],as:["চণ্ডীগড়","অমৃতচৰ","লুধিয়ানা","পটিয়ালা"]},ans:0,exp:{en:"Chandigarh is the capital of Punjab (shared with Haryana). It's a planned city.",hi:"चंडीगढ़ पंजाब की राजधानी है (हरियाणा के साथ साझा)। यह एक नियोजित शहर है।",as:"চণ্ডীগড় পঞ্জাৱৰ ৰাজধানী (হাৰিয়ানাৰ সৈতে ভাগ কৰা)।"}},
{emoji:"🌴",state:{en:"Kerala",hi:"केरल",as:"কেৰালা"},hint:{en:"God's Own Country, land of backwaters 🌴",hi:"ईश्वर का अपना देश, बैकवाटर की भूमि 🌴",as:"ঈশ্বৰৰ নিজৰ দেশ, বেকৱাটাৰৰ ভূমি 🌴"},q:{en:"What is the capital of Kerala?",hi:"केरल की राजधानी क्या है?",as:"কেৰালাৰ ৰাজধানী কি?"},opts:{en:["Thiruvananthapuram","Kochi","Kozhikode","Thrissur"],hi:["तिरुवनंतपुरम","कोच्चि","कोझिकोड","त्रिशूर"],as:["তিৰুৱনন্তপুৰম","কোচি","কোঝিকোড","থ্ৰিচুৰ"]},ans:0,exp:{en:"Thiruvananthapuram (Trivandrum) is the capital of Kerala.",hi:"तिरुवनंतपुरम (त्रिवेन्द्रम) केरल की राजधानी है।",as:"তিৰুৱনন্তপুৰম কেৰালাৰ ৰাজধানী।"}},
{emoji:"🏛️",state:{en:"Karnataka",hi:"कर्नाटक",as:"কৰ্ণাটক"},hint:{en:"IT hub of India, home of Mysore Palace 🏛️",hi:"भारत का आईटी हब, मैसूर पैलेस का घर 🏛️",as:"ভাৰতৰ IT কেন্দ্ৰ, মহীশূৰ মহলৰ ঘৰ 🏛️"},q:{en:"What is the capital of Karnataka?",hi:"कर्नाटक की राजधानी क्या है?",as:"কৰ্ণাটকৰ ৰাজধানী কি?"},opts:{en:["Bengaluru","Mysuru","Hubli","Mangaluru"],hi:["बेंगलुरु","मैसूरु","हुबली","मंगलुरु"],as:["বেঙ্গালুৰু","মহীশূৰু","হুবলি","মংগালুৰু"]},ans:0,exp:{en:"Bengaluru (Bangalore) is the capital of Karnataka and India's tech capital.",hi:"बेंगलुरु (बैंगलोर) कर्नाटक की राजधानी और भारत की तकनीकी राजधानी है।",as:["বেঙ্গালুৰু (বাংগালোৰ) কৰ্ণাটকৰ ৰাজধানী আৰু ভাৰতৰ তথ্য-প্ৰযুক্তি কেন্দ্ৰ।"]}}
];

let cur=0,score=0,answered=false,lang='en';

function setLang(l){
  lang=l;
  document.body.className='lang-'+l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  renderQ();
}

function renderQ(){
  const q=questions[cur];
  document.getElementById('progFill').style.width=((cur)/10*100)+'%';
  document.getElementById('qCounter').textContent=(cur+1)+'/10';
  document.getElementById('scoreDisplay').textContent=score;
  const opts=q.opts[lang].map((o,i)=>`<button class="opt-btn" onclick="answer(${i})">${o}</button>`).join('');
  document.getElementById('gameArea').innerHTML=`
    <div class="q-card">
      <div class="q-number">Question ${cur+1} of 10</div>
      <div class="state-emoji">${q.emoji}</div>
      <div class="state-name">${q.state[lang]}</div>
      <div class="state-hint">${q.hint[lang]}</div>
      <div class="q-text">${q.q[lang]}</div>
      <div class="options">${opts}</div>
      <div id="feedback"></div>
      <div id="nextWrap"></div>
    </div>`;
  answered=false;
}

function answer(i){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  const correct=i===q.ans;
  btns[i].classList.add(correct?'correct':'wrong');
  if(!correct) btns[q.ans].classList.add('reveal');
  score+=correct?10:0;
  const exp=Array.isArray(q.exp[lang])?q.exp[lang][0]:q.exp[lang];
  document.getElementById('feedback').innerHTML=`<div class="feedback ${correct?'correct':'wrong'}">${correct?'✓':'✗'} ${exp}</div>`;
  document.getElementById('nextWrap').innerHTML=`<button class="next-btn" onclick="next()">${cur<9?'Next →':'See Results'}</button>`;
}

function next(){cur++;if(cur>=10){showEnd();return;}renderQ();}

function showEnd(){
  const stars=score>=90?3:score>=70?2:score>=40?1:0;
  const starStr='★'.repeat(stars)+'☆'.repeat(3-stars);
  const msgs={en:["Keep exploring India!","Good try! Study more states.","Great geography skills!","India expert! 🗺️"],hi:["भारत खोजते रहो!","अच्छा प्रयास! और राज्य पढ़ें।","बढ़िया भूगोल कौशल!","भारत विशेषज्ञ! 🗺️"],as:["ভাৰত অন্বেষণ কৰি থাকক!","ভাল প্ৰচেষ্টা! আৰু ৰাজ্য পঢ়ক।","অসাধাৰণ ভূগোল দক্ষতা!","ভাৰত বিশেষজ্ঞ! 🗺️"]};
  document.getElementById('progFill').style.width='100%';
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('gameArea').innerHTML=`
    <div class="end-card">
      <div style="font-family:'Baloo 2',sans-serif;font-size:1.4rem;font-weight:800;color:var(--pink)">States & Capitals</div>
      <div class="stars">${starStr}</div>
      <div class="end-score">${score}<span style="font-size:1.5rem;color:var(--muted)">/100</span></div>
      <div class="end-label">${stars} Star${stars!==1?'s':''}</div>
      <div class="end-msg">${msgs[lang][stars]}</div>
      <button class="play-again" onclick="restart()">🔄 Play Again</button>
    </div>`;
}
function restart(){cur=0;score=0;answered=false;renderQ();}
renderQ();
</script>
</body>
</html>
