<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GyanPlay – Fractions & Decimals</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--saffron:#FF6B00;--gold:#FFB800;--sky:#00AEEF;--green:#00C853;--pink:#FF4081;--purple:#7C3AED;--bg1:#0F0C29;--bg2:#302B63;--card:#1a1740;}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1),var(--bg2));font-family:'Nunito',sans-serif;color:#fff;}
@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes numPop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.fadeIn{animation:fadeIn .45s ease both;}
.numPop{animation:numPop .5s cubic-bezier(.34,1.56,.64,1) both;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100;}
.back-btn{background:none;border:2px solid rgba(255,255,255,.25);color:#fff;font-family:'Baloo 2',sans-serif;font-size:.95rem;font-weight:600;padding:7px 16px;border-radius:30px;cursor:pointer;transition:all .2s;}
.back-btn:hover{background:rgba(255,255,255,.12);}
.badge{background:var(--saffron);color:#fff;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:.8rem;padding:5px 14px;border-radius:30px;letter-spacing:.5px;}
.lang-toggle{display:flex;gap:6px;}
.lang-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .2s;}
.lang-btn.active{background:var(--saffron);border-color:var(--saffron);}

.score-bar{padding:12px 20px 0;max-width:700px;margin:0 auto;}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.score-label{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:.95rem;color:var(--gold);}
.score-val{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;}
.progress-track{height:8px;background:rgba(255,255,255,.12);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--saffron),var(--gold));border-radius:10px;transition:width .5s ease;}

.main{max-width:700px;margin:0 auto;padding:20px;}
.q-card{background:var(--card);border-radius:20px;padding:28px 28px 24px;box-shadow:0 8px 40px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.q-num{font-family:'Baloo 2',sans-serif;font-size:.85rem;font-weight:700;color:rgba(255,255,255,.45);}
.q-type{font-family:'Baloo 2',sans-serif;font-size:.8rem;font-weight:700;color:var(--saffron);background:rgba(255,107,0,.15);padding:3px 10px;border-radius:20px;}

/* BIG NUMBER DISPLAY */
.num-display{text-align:center;margin:16px 0 22px;padding:18px;background:rgba(255,184,0,.08);border:2px solid rgba(255,184,0,.2);border-radius:16px;}
.fraction-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;line-height:1;}
.frac-num{font-family:'Baloo 2',sans-serif;font-size:3.2rem;font-weight:800;color:var(--gold);}
.frac-line{width:60px;height:4px;background:var(--gold);border-radius:2px;margin:3px 0;}
.frac-den{font-family:'Baloo 2',sans-serif;font-size:3.2rem;font-weight:800;color:var(--saffron);}
.big-num{font-family:'Baloo 2',sans-serif;font-size:3.5rem;font-weight:800;color:var(--gold);}
.decimal-num{font-family:'Baloo 2',sans-serif;font-size:3rem;font-weight:800;color:var(--sky);}
.num-label{font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;color:rgba(255,255,255,.5);margin-top:8px;}

.q-text{font-family:'Baloo 2',sans-serif;font-size:1.15rem;font-weight:700;line-height:1.5;margin-bottom:18px;color:#fff;}
.choices{display:flex;gap:11px;flex-wrap:wrap;}
.choice{flex:1;min-width:140px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 10px;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.3rem;cursor:pointer;text-align:center;color:#fff;transition:all .2s;}
.choice:hover:not(:disabled){background:rgba(255,107,0,.15);border-color:var(--saffron);}
.choice.correct{background:rgba(0,200,83,.15);border-color:var(--green);}
.choice.wrong{background:rgba(255,64,129,.15);border-color:var(--pink);}
.choice:disabled{cursor:default;}
.choice-label{font-size:.75rem;font-weight:700;color:rgba(255,255,255,.45);display:block;margin-bottom:4px;font-family:'Nunito',sans-serif;}

.explanation{margin-top:18px;background:rgba(255,255,255,.06);border-left:4px solid var(--gold);border-radius:0 12px 12px 0;padding:14px 16px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;line-height:1.55;color:rgba(255,255,255,.88);}
.next-btn{margin-top:20px;background:linear-gradient(135deg,var(--saffron),var(--gold));border:none;color:#fff;font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:800;padding:12px 32px;border-radius:50px;cursor:pointer;display:block;width:100%;transition:transform .18s;}
.next-btn:hover{transform:scale(1.03);}
.end-card{background:var(--card);border-radius:24px;padding:40px 28px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4);}
.stars{font-size:2.8rem;margin-bottom:10px;}
.end-title{font-family:'Baloo 2',sans-serif;font-size:2rem;font-weight:800;color:var(--gold);margin-bottom:6px;}
.end-score{font-family:'Baloo 2',sans-serif;font-size:1.2rem;color:rgba(255,255,255,.75);margin-bottom:24px;}
.play-again{background:linear-gradient(135deg,var(--saffron),var(--gold));border:none;color:#fff;font-family:'Baloo 2',sans-serif;font-size:1.1rem;font-weight:800;padding:14px 36px;border-radius:50px;cursor:pointer;transition:transform .18s;}
.play-again:hover{transform:scale(1.06);}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <span class="badge">🔢 Mathematics</span>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('as')">অ</button>
  </div>
</div>

<div class="score-bar">
  <div class="score-row">
    <span class="score-label" id="scoreLabel">Score</span>
    <span class="score-val" id="scoreVal">0 / 100</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="main" id="mainArea"></div>

<script>
const QUESTIONS=[
  {type:"Proper Fraction",display:{kind:"fraction",n:3,d:5},
   en:{q:"What TYPE of fraction is 3/5?",choices:["Proper","Improper","Mixed"],ans:0,exp:"A proper fraction has the numerator SMALLER than the denominator. Since 3 < 5, it is a proper fraction."},
   hi:{q:"3/5 किस प्रकार का भिन्न है?",choices:["उचित भिन्न","अनुचित भिन्न","मिश्रित भिन्न"],ans:0,exp:"उचित भिन्न में अंश हमेशा हर से छोटा होता है। 3 < 5 है, इसलिए यह उचित भिन्न है।"},
   as:{q:"3/5 কি ধৰণৰ ভগ্নাংশ?",choices:["যথাৰ্থ ভগ্নাংশ","অযথাৰ্থ ভগ্নাংশ","মিশ্ৰিত ভগ্নাংশ"],ans:0,exp:"যথাৰ্থ ভগ্নাংশত লব হৰতকৈ সৰু হয়। 3 < 5 হোৱাত ই যথাৰ্থ ভগ্নাংশ।"}},
  {type:"Improper Fraction",display:{kind:"fraction",n:7,d:4},
   en:{q:"What TYPE of fraction is 7/4?",choices:["Improper","Proper","Whole number"],ans:0,exp:"An improper fraction has numerator GREATER than or EQUAL to the denominator. Since 7 > 4, it is improper."},
   hi:{q:"7/4 किस प्रकार का भिन्न है?",choices:["अनुचित भिन्न","उचित भिन्न","पूर्ण संख्या"],ans:0,exp:"अनुचित भिन्न में अंश हर से बड़ा या बराबर होता है। 7 > 4 है, इसलिए यह अनुचित भिन्न है।"},
   as:{q:"7/4 কি ধৰণৰ ভগ্নাংশ?",choices:["অযথাৰ্থ ভগ্নাংশ","যথাৰ্থ ভগ্নাংশ","পূৰ্ণ সংখ্যা"],ans:0,exp:"অযথাৰ্থ ভগ্নাংশত লব হৰতকৈ ডাঙৰ বা সমান হয়। 7 > 4 হোৱাত ই অযথাৰ্থ।"}},
  {type:"Equivalent Fractions",display:{kind:"fraction",n:1,d:2},
   en:{q:"Which fraction is EQUIVALENT to 1/2?",choices:["2/4","1/3","3/5"],ans:0,exp:"Equivalent fractions have the same value. 1/2 = 2/4 because multiplying both top and bottom by 2 gives 2/4."},
   hi:{q:"1/2 के बराबर कौन-सा भिन्न है?",choices:["2/4","1/3","3/5"],ans:0,exp:"समतुल्य भिन्न का मान बराबर होता है। 1/2 = 2/4, क्योंकि अंश और हर दोनों को 2 से गुणा करने पर 2/4 मिलता है।"},
   as:{q:"1/2 ৰ সমতুল্য ভগ্নাংশ কোনটো?",choices:["2/4","1/3","3/5"],ans:0,exp:"সমতুল্য ভগ্নাংশৰ মান একে থাকে। 1/2 = 2/4, কাৰণ লব আৰু হৰ দুয়োটা 2 ৰে গুণ কৰিলে 2/4 পোৱা যায়।"}},
  {type:"Comparing Fractions",display:{kind:"text",text:"3/8  vs  5/8"},
   en:{q:"Which is GREATER: 3/8 or 5/8? (same denominator)",choices:["5/8","3/8","Equal"],ans:0,exp:"When denominators are the same, the fraction with the larger numerator is greater. 5 > 3, so 5/8 > 3/8."},
   hi:{q:"3/8 या 5/8 में से कौन बड़ा है? (समान हर)",choices:["5/8","3/8","बराबर"],ans:0,exp:"जब हर समान हों, तो बड़े अंश वाला भिन्न बड़ा होता है। 5 > 3, इसलिए 5/8 > 3/8."},
   as:{q:"3/8 বা 5/8 কোনটো ডাঙৰ? (একে হৰ)",choices:["5/8","3/8","সমান"],ans:0,exp:"যেতিয়া হৰ একে, ডাঙৰ লব থকা ভগ্নাংশটো বড়। 5 > 3, গতিকে 5/8 > 3/8."}},
  {type:"Adding Fractions",display:{kind:"text",text:"2/7 + 3/7"},
   en:{q:"What is 2/7 + 3/7?",choices:["5/7","5/14","1/7"],ans:0,exp:"When denominators are same, just add the numerators: 2+3=5. Denominator stays 7. Answer = 5/7."},
   hi:{q:"2/7 + 3/7 = ?",choices:["5/7","5/14","1/7"],ans:0,exp:"जब हर समान हों, तो अंशों को जोड़ें: 2+3=5। हर 7 ही रहता है। उत्तर = 5/7."},
   as:{q:"2/7 + 3/7 = ?",choices:["5/7","5/14","1/7"],ans:0,exp:"হৰ একে হ'লে, কেৱল লব যোগ কৰা হয়: 2+3=5। হৰ 7 থাকে। উত্তৰ = 5/7."}},
  {type:"Subtracting Fractions",display:{kind:"text",text:"6/9 − 2/9"},
   en:{q:"What is 6/9 − 2/9?",choices:["4/9","4/18","8/9"],ans:0,exp:"Subtract numerators: 6−2=4. Denominator stays 9. Answer = 4/9."},
   hi:{q:"6/9 − 2/9 = ?",choices:["4/9","4/18","8/9"],ans:0,exp:"अंशों को घटाएँ: 6−2=4। हर 9 ही रहता है। उत्तर = 4/9."},
   as:{q:"6/9 − 2/9 = ?",choices:["4/9","4/18","8/9"],ans:0,exp:"লব বিয়োগ কৰক: 6−2=4। হৰ 9 থাকে। উত্তৰ = 4/9."}},
  {type:"Fraction of a Whole",display:{kind:"text",text:"½ of 20"},
   en:{q:"What is ½ of 20?",choices:["10","5","15"],ans:0,exp:"Fraction of a whole: multiply the whole by the fraction. ½ × 20 = 20÷2 = 10."},
   hi:{q:"20 का ½ क्या है?",choices:["10","5","15"],ans:0,exp:"पूर्ण संख्या का भिन्न: पूर्ण संख्या को भिन्न से गुणा करें। ½ × 20 = 20÷2 = 10."},
   as:{q:"20 ৰ ½ কিমান?",choices:["10","5","15"],ans:0,exp:"পূৰ্ণ সংখ্যাৰ ভগ্নাংশ: পূৰ্ণ সংখ্যা ভগ্নাংশেৰে গুণ কৰক। ½ × 20 = 20÷2 = 10."}},
  {type:"Decimals – Place Value",display:{kind:"decimal",val:"0.63"},
   en:{q:"In 0.63, what digit is in the HUNDREDTHS place?",choices:["3","6","0"],ans:0,exp:"In 0.63: digit after decimal = tenths (6), next digit = hundredths (3). So 3 is in the hundredths place."},
   hi:{q:"0.63 में सौवें स्थान पर कौन-सा अंक है?",choices:["3","6","0"],ans:0,exp:"0.63 में: दशमलव के बाद पहला अंक = दसवाँ (6), अगला अंक = सौवाँ (3)। इसलिए 3 सौवें स्थान पर है।"},
   as:{q:"0.63 ত শতাংশ স্থানত কোন অংক আছে?",choices:["3","6","0"],ans:0,exp:"0.63 ত: দশমিকৰ পিছৰ প্ৰথম অংক = দশাংশ (6), পৰৱৰ্তী অংক = শতাংশ (3)। গতিকে 3 শতাংশ স্থানত আছে।"}},
  {type:"Fraction → Decimal",display:{kind:"fraction",n:1,d:4},
   en:{q:"What is 1/4 as a decimal?",choices:["0.25","0.14","0.4"],ans:0,exp:"1/4 = 1÷4 = 0.25. Remember: 1/4=0.25, 1/2=0.5, 3/4=0.75."},
   hi:{q:"1/4 को दशमलव में क्या लिखेंगे?",choices:["0.25","0.14","0.4"],ans:0,exp:"1/4 = 1÷4 = 0.25। याद रखें: 1/4=0.25, 1/2=0.5, 3/4=0.75."},
   as:{q:"1/4 দশমিকত কি?",choices:["0.25","0.14","0.4"],ans:0,exp:"1/4 = 1÷4 = 0.25। মনত ৰাখক: 1/4=0.25, 1/2=0.5, 3/4=0.75."}},
  {type:"Fraction → Decimal",display:{kind:"fraction",n:3,d:4},
   en:{q:"What is 3/4 as a decimal?",choices:["0.75","0.34","0.3"],ans:0,exp:"3/4 = 3÷4 = 0.75. Key decimals: 1/2=0.5, 1/4=0.25, 3/4=0.75."},
   hi:{q:"3/4 को दशमलव में क्या लिखेंगे?",choices:["0.75","0.34","0.3"],ans:0,exp:"3/4 = 3÷4 = 0.75। मुख्य: 1/2=0.5, 1/4=0.25, 3/4=0.75."},
   as:{q:"3/4 দশমিকত কি?",choices:["0.75","0.34","0.3"],ans:0,exp:"3/4 = 3÷4 = 0.75। মূল দশমিক: 1/2=0.5, 1/4=0.25, 3/4=0.75."}}
];

let lang='en',current=0,score=0,answered=false;
const pts=10;

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{b.classList.toggle('active',['en','hi','as'][i]===l);});
  render();
}

function buildDisplay(d){
  if(d.kind==='fraction'){
    return `<div class="num-display numPop">
      <div class="fraction-wrap">
        <span class="frac-num">${d.n}</span>
        <div class="frac-line"></div>
        <span class="frac-den">${d.d}</span>
      </div>
    </div>`;
  }else if(d.kind==='decimal'){
    return `<div class="num-display numPop"><span class="decimal-num">${d.val}</span><div class="num-label">decimal</div></div>`;
  }else{
    return `<div class="num-display numPop"><span class="big-num" style="font-size:2rem">${d.text}</span></div>`;
  }
}

function render(){
  if(current>=QUESTIONS.length){showEnd();return;}
  const q=QUESTIONS[current];
  const d=q[lang];
  document.getElementById('progressFill').style.width=((current/QUESTIONS.length)*100)+'%';
  document.getElementById('scoreVal').textContent=score+' / 100';
  document.getElementById('mainArea').innerHTML=`
  <div class="q-card fadeIn">
    <div class="q-meta"><span class="q-num">Q ${current+1} / 10</span><span class="q-type">${q.type}</span></div>
    ${buildDisplay(q.display)}
    <div class="q-text">${d.q}</div>
    <div class="choices" id="choices">
      ${d.choices.map((c,i)=>`<button class="choice" onclick="pick(${i})" id="ch${i}">
        <span class="choice-label">${['A','B','C'][i]}</span>${c}
      </button>`).join('')}
    </div>
  </div>`;
  answered=false;
}

function pick(i){
  if(answered)return;
  answered=true;
  const d=QUESTIONS[current][lang];
  const ans=d.ans;
  document.querySelectorAll('.choice').forEach((b,j)=>{
    b.disabled=true;
    if(j===ans)b.classList.add('correct');
    else if(j===i&&i!==ans)b.classList.add('wrong');
  });
  if(i===ans)score+=pts;
  document.getElementById('scoreVal').textContent=score+' / 100';
  const exp=document.createElement('div');exp.className='explanation fadeIn';exp.textContent='💡 '+d.exp;
  document.querySelector('.q-card').appendChild(exp);
  const btn=document.createElement('button');btn.className='next-btn fadeIn';
  btn.textContent=current<9?'Next →':'See Results';
  btn.onclick=()=>{current++;render();};
  document.querySelector('.q-card').appendChild(btn);
}

function showEnd(){
  const pct=score;
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=40?'⭐':'☆';
  const msg=pct>=90?'Outstanding! 🎉':pct>=70?'Great job! 👍':pct>=40?'Good effort! 💪':'Keep practising! 📚';
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('mainArea').innerHTML=`
  <div class="end-card fadeIn">
    <div class="stars">${stars}</div>
    <div class="end-title">${msg}</div>
    <div class="end-score">You scored ${score} out of 100</div>
    <button class="play-again" onclick="restart()">🔄 Play Again</button>
  </div>`;
}
function restart(){current=0;score=0;render();}
render();
</script>
</body>
</html>
