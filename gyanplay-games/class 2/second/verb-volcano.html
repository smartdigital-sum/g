<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Verb Volcano - GyanPlay Class 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff7675, #d63031);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .game-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #2d3436, #1e272e);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #ff7675;
            font-size: 2rem;
        }
        
        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
        }
        
        .score {
            background: #00b894;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2rem;
        }
        
        .instruction-box {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .instruction-text {
            color: white;
            font-size: 1.3rem;
        }
        
        .volcano-area {
            background: linear-gradient(180deg, #87CEEB 0%, #d63031 50%, #2d3436 100%);
            border-radius: 20px;
            padding: 20px;
            min-height: 300px;
            position: relative;
        }
        
        .volcano {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8rem;
        }
        
        .eruption {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 300px;
        }
        
        .verb-tile {
            background: white;
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d3436;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }
        
        .verb-tile:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .verb-tile.used {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .sentence-area {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }
        
        .sentence-title {
            color: #636e72;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .sentence {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 1.5rem;
            color: #2d3436;
            min-height: 60px;
            align-items: center;
        }
        
        .word-slot {
            background: #dfe6e9;
            border-radius: 10px;
            padding: 10px 20px;
            min-width: 100px;
            text-align: center;
            border: 2px dashed #b2bec3;
        }
        
        .word-slot.filled {
            background: #ffeaa7;
            border: 2px solid #f39c12;
            border-style: solid;
        }
        
        .word-slot.verb {
            background: #ff7675;
            color: white;
            border-color: #d63031;
        }
        
        .check-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 50px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
            transition: transform 0.3s;
        }
        
        .check-btn:hover {
            transform: scale(1.05);
        }
        
        .feedback {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
        }
        
        .feedback.show { display: flex; }
        
        .feedback-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s;
        }
        
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        .feedback-content.correct {
            border: 5px solid #00b894;
        }
        
        .feedback-content.wrong {
            border: 5px solid #e94560;
        }
        
        .feedback-icon {
            font-size: 5rem;
        }
        
        .feedback-text {
            font-size: 1.8rem;
            margin: 20px 0;
            color: #2d3436;
        }
        
        .next-btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #2d3436;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .info-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .info-title {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        
        .info-text {
            color: #dfe6e9;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='batch2-index.html'">← Back</button>
    
    <div class="game-container">
        <div class="header">
            <h1>🌋 Verb Volcano</h1>
            <div class="score-board">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="score">Sentence: <span id="sentenceNum">1</span></div>
            </div>
        </div>
        
        <div class="instruction-box">
            <p class="instruction-text">Drag the correct verb from the volcano to complete the sentence!</p>
        </div>
        
        <div class="sentence-area">
            <div class="sentence-title">Complete the sentence:</div>
            <div class="sentence" id="sentenceDisplay">
                <!-- Sentence will be generated by JS -->
            </div>
        </div>
        
        <div class="volcano-area">
            <div class="volcano">🌋</div>
            <div class="eruption" id="verbTiles">
                <!-- Verb tiles will be generated by JS -->
            </div>
        </div>
        
        <div class="info-box">
            <div class="info-title">📖 Action Words (Verbs):</div>
            <div class="info-text">A verb tells us what someone does: run, eat, sleep, jump, read</div>
            <div class="info-text">Example: The bird flies in the sky</div>
        </div>
        
        <button class="check-btn" onclick="checkAnswer()">✓ Check Answer</button>
    </div>
    
    <div class="feedback" id="feedback">
        <div class="feedback-content" id="feedbackContent">
            <div class="feedback-icon" id="feedbackIcon">🎉</div>
            <div class="feedback-text" id="feedbackText">Correct!</div>
            <button class="next-btn" onclick="nextSentence()">Next Sentence →</button>
        </div>
    </div>
    
    <script>
        const sentences = [
            {
                parts: ['The', 'bird', '____', 'in', 'the', 'sky'],
                correct: 'flies',
                options: ['flies', 'swims', 'eats', 'sleeps']
            },
            {
                parts: ['I', '____', 'my', 'homework', 'every', 'day'],
                correct: 'do',
                options: ['do', 'make', 'play', 'run']
            },
            {
                parts: ['The', 'cat', '____', 'on', 'the', 'bed'],
                correct: 'sleeps',
                options: ['sleeps', 'eats', 'flies', 'jumps']
            },
            {
                parts: ['She', '____', 'to', 'school', 'every', 'morning'],
                correct: 'walks',
                options: ['walks', 'flies', 'swims', 'runs']
            },
            {
                parts: ['The', 'dog', '____', 'loudly', 'at', 'the', 'stranger'],
                correct: 'barks',
                options: ['barks', 'sings', 'talks', 'eats']
            },
            {
                parts: ['We', '____', 'our', 'hands', 'before', 'dinner'],
                correct: 'wash',
                options: ['wash', 'play', 'sleep', 'run']
            },
            {
                parts: ['The', 'sun', '____', 'in', 'the', 'morning'],
                correct: 'rises',
                options: ['rises', 'sets', 'sleeps', 'eats']
            },
            {
                parts: ['The', 'fish', '____', 'in', 'the', 'water'],
                correct: 'swims',
                options: ['swims', 'flies', 'runs', 'sleeps']
            },
            {
                parts: ['I', '____', 'a', 'book', 'every', 'night'],
                correct: 'read',
                options: ['read', 'eat', 'drink', 'play']
            },
            {
                parts: ['The', 'boy', '____', 'the', 'ball', 'very', 'high'],
                correct: 'throws',
                options: ['throws', 'catches', 'eats', 'sleeps']
            }
        ];
        
        let currentIndex = 0;
        let score = 0;
        let selectedVerbs = [];
        let sentenceData = null;
        
        function loadSentence() {
            sentenceData = sentences[currentIndex];
            
            const display = document.getElementById('sentenceDisplay');
            display.innerHTML = '';
            
            selectedVerbs = [];
            
            sentenceData.parts.forEach((part, index) => {
                const span = document.createElement('span');
                
                if (part === '____') {
                    span.className = 'word-slot verb';
                    span.id = 'slot-' + index;
                    span.textContent = 'Tap verb';
                    span.onclick = () => selectSlot(index);
                } else {
                    span.className = 'word-slot';
                    span.textContent = part;
                }
                
                display.appendChild(span);
            });
            
            // Load verb tiles
            const tilesContainer = document.getElementById('verbTiles');
            tilesContainer.innerHTML = '';
            
            const shuffledOptions = [...sentenceData.options].sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach(verb => {
                const tile = document.createElement('div');
                tile.className = 'verb-tile';
                tile.textContent = verb;
                tile.onclick = () => selectVerb(tile, verb);
                tilesContainer.appendChild(tile);
            });
            
            document.getElementById('sentenceNum').textContent = currentIndex + 1;
        }
        
        function selectSlot(index) {
            // Find the blank slot
            const slots = document.querySelectorAll('.word-slot.verb');
            if (slots.length > 0) {
                slots[0].id = 'active-slot';
            }
        }
        
        function selectVerb(tile, verb) {
            if (tile.classList.contains('used')) return;
            
            // Add verb to sentence
            const activeSlot = document.getElementById('active-slot') || document.querySelector('.word-slot.verb');
            
            if (activeSlot) {
                activeSlot.textContent = verb;
                activeSlot.classList.add('filled');
                selectedVerbs.push(verb);
                tile.classList.add('used');
            }
        }
        
        function checkAnswer() {
            const filledSlots = document.querySelectorAll('.word-slot.verb.filled');
            let userAnswer = '';
            filledSlots.forEach(slot => {
                userAnswer = slot.textContent;
            });
            
            const feedback = document.getElementById('feedback');
            const content = document.getElementById('feedbackContent');
            const icon = document.getElementById('feedbackIcon');
            const text = document.getElementById('feedbackText');
            
            if (userAnswer === sentenceData.correct) {
                content.className = 'feedback-content correct';
                icon.textContent = '🎉';
                text.textContent = 'Correct! Great verb!';
                score += 10;
                document.getElementById('score').textContent = score;
            } else {
                content.className = 'feedback-content wrong';
                icon.textContent = '😢';
                text.textContent = `The correct verb is "${sentenceData.correct}"`;
            }
            
            feedback.classList.add('show');
        }
        
        function nextSentence() {
            document.getElementById('feedback').classList.remove('show');
            currentIndex = (currentIndex + 1) % sentences.length;
            loadSentence();
        }
        
        loadSentence();
    </script>
</body>
</html>
