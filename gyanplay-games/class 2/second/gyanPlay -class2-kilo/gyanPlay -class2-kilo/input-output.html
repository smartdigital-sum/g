<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Input or Output? - GyanPlay Class 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #00cec9, #81ecec);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .game-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: linear-gradient(135deg, #2d3436, #1e272e);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 { color: #00cec9; font-size: 2rem; }
        
        .score-board { display: flex; justify-content: center; gap: 30px; margin-top: 10px; }
        
        .score { background: #e94560; color: white; padding: 10px 20px; border-radius: 10px; font-size: 1.2rem; }
        
        .instruction-box {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .instruction-text { color: white; font-size: 1.3rem; }
        
        .devices-area {
            background: linear-gradient(180deg, #87CEEB 0%, #74b9ff 100%);
            border-radius: 20px;
            padding: 30px;
            min-height: 300px;
        }
        
        .devices-title {
            text-align: center;
            color: white;
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .devices-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .device-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
            border: 3px solid transparent;
        }
        
        .device-card:hover { transform: scale(1.1); }
        
        .device-card.selected { border-color: #00cec9; background: #81ecec; }
        
        .device-icon { font-size: 3rem; display: block; }
        
        .device-name {
            color: #2d3436;
            font-weight: bold;
            margin-top: 10px;
            font-size: 1rem;
        }
        
        .bins-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .device-bin {
            background: white;
            border-radius: 20px;
            padding: 20px;
            min-width: 200px;
            border: 4px solid #dfe6e9;
        }
        
        .bin-title {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .input-bin .bin-title {
            background: #74b9ff;
            color: white;
        }
        
        .output-bin .bin-title {
            background: #fdcb6e;
            color: #2d3436;
        }
        
        .bin-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            min-height: 60px;
        }
        
        .bin-item {
            background: #dfe6e9;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .type-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        
        .type-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .type-btn.input { background: #74b9ff; color: white; }
        .type-btn.output { background: #fdcb6e; color: #2d3436; }
        .type-btn.active { transform: scale(1.1); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        
        .check-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 50px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
            transition: transform 0.3s;
        }
        
        .check-btn:hover { transform: scale(1.05); }
        
        .feedback {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
        }
        
        .feedback.show { display: flex; }
        
        .feedback-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s;
        }
        
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        
        .feedback-content.correct { border: 5px solid #00b894; }
        .feedback-content.wrong { border: 5px solid #e94560; }
        
        .feedback-icon { font-size: 5rem; }
        .feedback-text { font-size: 1.8rem; margin: 20px 0; color: #2d3436; }
        
        .next-btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #2d3436;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .info-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .info-title { color: white; font-size: 1.1rem; margin-bottom: 10px; }
        .info-text { color: #dfe6e9; font-size: 0.9rem; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='batch3-index.html'">← Back</button>
    
    <div class="game-container">
        <div class="header">
            <h1>💻 Input or Output?</h1>
            <div class="score-board">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="score">Devices: <span id="deviceNum">1</span></div>
            </div>
        </div>
        
        <div class="instruction-box">
            <p class="instruction-text">Sort computer devices into Input or Output!</p>
        </div>
        
        <div class="type-toggle">
            <button class="type-btn input active" onclick="selectType('input')">🔵 Input Device</button>
            <button class="type-btn output" onclick="selectType('output')">🟡 Output Device</button>
        </div>
        
        <div class="devices-area">
            <div class="devices-title">🖥️ Computer Devices</div>
            <div class="devices-grid" id="devicesGrid">
                <!-- Devices will be generated by JS -->
            </div>
        </div>
        
        <div class="bins-container">
            <div class="device-bin input-bin">
                <div class="bin-title">🔵 Input Devices</div>
                <div class="bin-items" id="inputBin"></div>
            </div>
            <div class="device-bin output-bin">
                <div class="bin-title">🟡 Output Devices</div>
                <div class="bin-items" id="outputBin"></div>
            </div>
        </div>
        
        <div class="info-box">
            <div class="info-title">💾 Input vs Output:</div>
            <div class="info-text">Input - Keyboard, Mouse, Microphone, Scanner</div>
            <div class="info-text">Output - Monitor, Printer, Speaker, Headphones</div>
        </div>
    </div>
    
    <div class="feedback" id="feedback">
        <div class="feedback-content" id="feedbackContent">
            <div class="feedback-icon" id="feedbackIcon">🎉</div>
            <div class="feedback-text" id="feedbackText">Correct!</div>
            <button class="next-btn" onclick="nextRound()">Next Round →</button>
        </div>
    </div>
    
    <script>
        const devices = [
            { icon: '⌨️', name: 'Keyboard', type: 'input' },
            { icon: '🖱️', name: 'Mouse', type: 'input' },
            { icon: '🎤', name: 'Microphone', type: 'input' },
            { icon: '🖨️', name: 'Scanner', type: 'input' },
            { icon: '🖥️', name: 'Monitor', type: 'output' },
            { icon: '🖨️', name: 'Printer', type: 'output' },
            { icon: '🔊', name: 'Speaker', type: 'output' },
            { icon: '🎧', name: 'Headphones', type: 'output' },
            { icon: '📷', name: 'Camera', type: 'input' },
            { icon: '📺', name: 'Projector', type: 'output' },
            { icon: '🕹️', name: 'Joystick', type: 'input' },
            { icon: '📝', name: 'Drawing Tablet', type: 'input' }
        ];
        
        let currentType = 'input';
        let placedDevices = { input: [], output: [] };
        let score = 0;
        let round = 1;
        
        function loadDevices() {
            const shuffled = [...devices].sort(() => Math.random() - 0.5).slice(0, 6);
            
            const grid = document.getElementById('devicesGrid');
            grid.innerHTML = '';
            
            shuffled.forEach(device => {
                const div = document.createElement('div');
                div.className = 'device-card';
                div.innerHTML = `
                    <span class="device-icon">${device.icon}</span>
                    <span class="device-name">${device.name}</span>
                `;
                div.onclick = () => selectDevice(div, device);
                grid.appendChild(div);
            });
            
            document.getElementById('deviceNum').textContent = round;
        }
        
        function selectType(type) {
            currentType = type;
            document.querySelector('.type-btn.input').classList.toggle('active', type === 'input');
            document.querySelector('.type-btn.output').classList.toggle('active', type === 'output');
        }
        
        function selectDevice(div, device) {
            if (div.classList.contains('selected')) return;
            
            div.classList.add('selected');
            placedDevices[device.type].push(device.name);
            
            updateBinDisplay();
        }
        
        function updateBinDisplay() {
            const inputBin = document.getElementById('inputBin');
            const outputBin = document.getElementById('outputBin');
            
            inputBin.innerHTML = placedDevices.input.map(name => 
                `<span class="bin-item" onclick="removeFromBin('input', '${name}')">${name}</span>`
            ).join('');
            
            outputBin.innerHTML = placedDevices.output.map(name => 
                `<span class="bin-item" onclick="removeFromBin('output', '${name}')">${name}</span>`
            ).join('');
        }
        
        function removeFromBin(type, name) {
            placedDevices[type] = placedDevices[type].filter(n => n !== name);
            updateBinDisplay();
            
            // Remove selection from grid
            const cards = document.querySelectorAll('.device-card');
            cards.forEach(card => {
                if (card.querySelector('.device-name').textContent === name) {
                    card.classList.remove('selected');
                }
            });
        }
        
        function checkAnswer() {
            let correctCount = 0;
            
            placedDevices.input.forEach(name => {
                const device = devices.find(d => d.name === name);
                if (device && device.type === 'input') correctCount++;
            });
            
            placedDevices.output.forEach(name => {
                const device = devices.find(d => d.name === name);
                if (device && device.type === 'output') correctCount++;
            });
            
            const feedback = document.getElementById('feedback');
            const content = document.getElementById('feedbackContent');
            const icon = document.getElementById('feedbackIcon');
            const text = document.getElementById('feedbackText');
            
            if (correctCount >= 4) {
                content.className = 'feedback-content correct';
                icon.textContent = '🎉';
                text.textContent = 'Excellent! You sorted them correctly!';
                score += 15;
                document.getElementById('score').textContent = score;
            } else {
                content.className = 'feedback-content wrong';
                icon.textContent = '👍';
                text.textContent = `You got ${correctCount} correct`;
            }
            
            feedback.classList.add('show');
        }
        
        function nextRound() {
            document.getElementById('feedback').classList.remove('show');
            round++;
            placedDevices = { input: [], output: [] };
            
            document.getElementById('inputBin').innerHTML = '';
            document.getElementById('outputBin').innerHTML = '';
            
            loadDevices();
        }
        
        loadDevices();
        
        // Add check button
        setTimeout(() => {
            const btn = document.querySelector('.check-btn');
            if (btn) btn.onclick = checkAnswer;
        }, 100);
    </script>
</body>
</html>
