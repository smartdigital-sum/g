<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ABC Bubble Bath 🫧</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Baloo 2',cursive;
    background:linear-gradient(180deg,#0077b6,#00b4d8,#90e0ef);
    min-height:100vh;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
    user-select:none;
  }
  /* water surface */
  .water-surface{
    position:fixed;bottom:0;left:0;right:0;height:100px;
    background:linear-gradient(180deg,rgba(0,119,182,.3),rgba(0,119,182,.7));
    z-index:1;
  }
  .water-surface::before{
    content:'';position:absolute;top:-20px;left:0;right:0;height:30px;
    background:radial-gradient(ellipse 50px 20px,rgba(144,224,239,.7) 50%,transparent 50%) repeat-x;
    background-size:60px 30px;
    animation:waves 2s ease-in-out infinite;
  }
  @keyframes waves{0%,100%{background-position:0 0;}50%{background-position:30px 0;}}

  /* floating foam */
  .foam{
    position:fixed;pointer-events:none;z-index:2;
    font-size:1.5rem;
    animation:foamFloat 4s ease-in-out infinite;
    opacity:.7;
  }
  @keyframes foamFloat{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-15px) rotate(10deg);}}

  .header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px;width:100%;}
  .title{font-size:clamp(1.4rem,5vw,2.2rem);color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.3);}
  .instruction{
    background:rgba(255,255,255,.25);backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,.4);border-radius:50px;
    padding:12px 28px;font-size:clamp(1.2rem,5vw,1.8rem);color:#fff;
    margin-top:10px;display:inline-block;
    text-shadow:0 1px 4px rgba(0,0,0,.2);
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}

  .score-bar{position:relative;z-index:10;display:flex;gap:16px;align-items:center;margin-top:8px;}
  .score-box{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);border-radius:20px;padding:6px 18px;color:#fff;font-size:1rem;font-weight:700;}
  .score-box span{color:#FFD700;font-size:1.2rem;}

  .progress{position:relative;z-index:10;display:flex;gap:8px;margin-top:8px;}
  .dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .3s;}
  .dot.done{background:#FFD700;box-shadow:0 0 8px #FFD700;}
  .dot.active{background:#fff;transform:scale(1.3);}

  /* game area */
  .game-area{position:relative;z-index:5;flex:1;width:100%;max-width:700px;}

  /* bubble */
  .bubble{
    position:absolute;
    border-radius:50%;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    animation:bubbleRise linear forwards;
    transition:transform .1s;
    /* glassmorphism bubble */
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.7), rgba(255,255,255,.15));
    box-shadow:
      inset -4px -4px 12px rgba(0,150,200,.3),
      inset 4px 4px 10px rgba(255,255,255,.6),
      0 4px 20px rgba(0,0,0,.15);
    border:2px solid rgba(255,255,255,.6);
  }
  .bubble:active{transform:scale(.9);}
  .bubble-letter{
    font-size:clamp(1.8rem,7vw,3rem);
    font-weight:800;
    /* colored letter */
    background:linear-gradient(135deg,var(--lc1),var(--lc2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));
  }
  @keyframes bubbleRise{
    0%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-100px) scale(1.05);}
    100%{transform:translateY(-200vh) scale(.8);}
  }

  /* pop splash */
  .splash{
    position:fixed;pointer-events:none;z-index:99;
    animation:splashOut .5s ease-out forwards;
    font-size:2rem;
  }
  @keyframes splashOut{0%{transform:scale(0);opacity:1;}100%{transform:scale(3);opacity:0;}}

  /* letter flash */
  .letter-flash{
    position:fixed;inset:0;z-index:150;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .flash-letter{
    font-size:clamp(6rem,25vw,12rem);font-weight:800;
    color:#FFD700;text-shadow:0 0 40px rgba(255,215,0,.6);
    animation:flashIn .5s ease both, flashOut .3s .5s ease forwards;
  }
  @keyframes flashIn{0%{transform:scale(0) rotate(-20deg);opacity:0;}60%{transform:scale(1.2);opacity:1;}100%{transform:scale(1);opacity:1;}}
  @keyframes flashOut{to{transform:scale(1.5);opacity:0;}}

  /* wrong bubble shake */
  @keyframes bubbleWrong{0%,100%{transform:scale(1);}25%{transform:scale(1.2);}75%{transform:scale(.9);}}

  /* celebration */
  .celebration{
    position:fixed;inset:0;z-index:200;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,50,100,.8);backdrop-filter:blur(10px);animation:fadeIn .4s ease;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .celeb-emoji{font-size:clamp(4rem,15vw,7rem);animation:celebBounce .5s ease infinite alternate;}
  @keyframes celebBounce{from{transform:scale(1);}to{transform:scale(1.15);}}
  .celebration h2{color:#FFD700;font-size:clamp(2rem,8vw,3.5rem);text-align:center;margin:16px 0 8px;}
  .celebration p{color:#fff;font-size:clamp(1rem,4vw,1.4rem);margin-bottom:24px;}
  .next-btn{
    background:linear-gradient(135deg,#FF6B00,#FFB800);color:#fff;border:none;border-radius:50px;
    padding:14px 40px;font-family:'Baloo 2',cursive;font-size:clamp(1.1rem,4vw,1.5rem);font-weight:800;
    cursor:pointer;box-shadow:0 6px 24px rgba(255,107,0,.4);transition:transform .2s;
  }
  .next-btn:hover{transform:scale(1.05);}
  .confetti-piece{position:fixed;pointer-events:none;z-index:300;width:10px;height:10px;border-radius:2px;animation:confettiFall 1.2s ease-in forwards;}
  @keyframes confettiFall{0%{opacity:1;}100%{transform:translateY(300px) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="water-surface"></div>

<div class="header">
  <div class="title">🫧 ABC Bubble Bath</div>
  <div class="instruction">Pop bubble <span id="targetLetter" style="color:#FFD700;font-size:1.3em;">A</span>!</div>
</div>
<div class="score-bar">
  <div class="score-box">⭐ Score: <span id="scoreVal">0</span></div>
  <div class="score-box">🎯 Round: <span id="roundVal">1</span>/26</div>
</div>
<div class="progress" id="progress"></div>
<div class="game-area" id="gameArea"></div>

<script>
const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const LETTER_COLORS=[
  ['#FF4757','#FF6B6B'],['#FF6B00','#FFB800'],['#FFD700','#FFA502'],['#2ed573','#7bed9f'],
  ['#1e90ff','#70a1ff'],['#a55eea','#cd84f1'],['#ff6b81','#ff4757'],['#eccc68','#ffd32a'],
  ['#ff9ff3','#f368e0'],['#00d2d3','#54a0ff'],['#ff9f43','#feca57'],['#10ac84','#1dd1a1'],
];

let score=0,round=0,target='',usedLetters=[],canPop=true;
let bubbleTimers=[];
const BUBBLES_PER_ROUND=5;

let audioCtx;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playPop(correct){
  const ctx=getAudio();
  if(correct){
    // bubbly pop
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.setValueAtTime(800,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1600,ctx.currentTime+.1);
    o.type='sine';
    g.gain.setValueAtTime(.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);
    o.start();o.stop(ctx.currentTime+.25);
    // chime
    setTimeout(()=>{
      [880,1047,1319].forEach((f,i)=>{
        setTimeout(()=>{
          const o2=ctx.createOscillator(),g2=ctx.createGain();
          o2.connect(g2);g2.connect(ctx.destination);
          o2.frequency.value=f;o2.type='sine';
          g2.gain.setValueAtTime(.25,ctx.currentTime);
          g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
          o2.start();o2.stop(ctx.currentTime+.3);
        },i*80);
      });
    },100);
  } else {
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.value=300;
    g.gain.setValueAtTime(.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);
    o.start();o.stop(ctx.currentTime+.2);
  }
}

function speakLetter(letter){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(`${letter}!`);
  u.rate=0.7;u.pitch=1.4;u.volume=1;
  window.speechSynthesis.speak(u);
}

function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.85;u.pitch=1.3;u.volume=1;
  window.speechSynthesis.speak(u);
}

function makeDots(){
  const p=document.getElementById('progress');p.innerHTML='';
  for(let i=0;i<LETTERS.length;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<round?' done':i===round?' active':'');
    p.appendChild(d);
  }
}

function spawnSplash(x,y){
  const s=document.createElement('div');
  s.className='splash';
  s.textContent='💦';
  s.style.cssText=`left:${x-15}px;top:${y-15}px;`;
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),600);
}

function showLetterFlash(letter){
  const el=document.createElement('div');
  el.className='letter-flash';
  el.innerHTML=`<div class="flash-letter">${letter}</div>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

function spawnConfetti(x,y){
  const cols=['#FF4757','#FFD700','#2ed573','#1e90ff','#a55eea'];
  for(let i=0;i<15;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.cssText=`left:${x+Math.random()*100-50}px;top:${y}px;background:${cols[i%cols.length]};animation-duration:${.8+Math.random()*.5}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1400);
  }
}

function clearBubbles(){
  bubbleTimers.forEach(t=>clearTimeout(t));
  bubbleTimers=[];
  document.getElementById('gameArea').innerHTML='';
}

function newRound(){
  if(usedLetters.length>=LETTERS.length){showCelebration();return;}
  clearBubbles();
  canPop=true;

  // pick next letter
  const remaining=LETTERS.filter(l=>!usedLetters.includes(l));
  target=remaining[Math.floor(Math.random()*remaining.length)];
  document.getElementById('targetLetter').textContent=target;
  document.getElementById('roundVal').textContent=round+1;
  makeDots();

  setTimeout(()=>{
    speak(`Pop the bubble with letter ${target}!`);
    setTimeout(()=>speakLetter(target),1200);
  },300);

  // distractor letters
  const distractors=LETTERS.filter(l=>l!==target).sort(()=>Math.random()-.5).slice(0,BUBBLES_PER_ROUND-1);
  const allLetters=[target,...distractors].sort(()=>Math.random()-.5);

  const area=document.getElementById('gameArea');
  const W=area.offsetWidth||300;
  const H=area.offsetHeight||400;
  const BSIZE=Math.min(W,H)/5.5;

  allLetters.forEach((letter,i)=>{
    const bubble=document.createElement('div');
    bubble.className='bubble';
    const sz=BSIZE*(0.85+Math.random()*.3);
    const col=LETTER_COLORS[(letter.charCodeAt(0)-65)%LETTER_COLORS.length];
    const dur=6+Math.random()*4;
    const delay=i*0.6+Math.random()*.4;
    const leftPct=5+i*(88/(BUBBLES_PER_ROUND-1||1))+Math.random()*5-2.5;

    bubble.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${Math.min(90,Math.max(5,leftPct))}%;
      bottom:-${sz+20}px;
      --lc1:${col[0]};--lc2:${col[1]};
      animation:bubbleRise ${dur}s ${delay}s linear forwards;
    `;
    bubble.innerHTML=`<span class="bubble-letter">${letter}</span>`;

    bubble.addEventListener('click',(e)=>{
      const rect=bubble.getBoundingClientRect();
      popBubble(bubble,letter,rect.left+rect.width/2,rect.top+rect.height/2);
    });
    bubble.addEventListener('touchstart',(e)=>{
      e.preventDefault();
      const t=e.touches[0];
      popBubble(bubble,letter,t.clientX,t.clientY);
    },{passive:false});

    area.appendChild(bubble);

    const t=setTimeout(()=>{if(bubble.parentNode)bubble.remove();},(dur+delay+.5)*1000);
    bubbleTimers.push(t);
  });

  // auto-advance if missed
  const autoT=setTimeout(()=>{
    if(canPop){
      canPop=false;
      speak(`Oops! That was letter ${target}! Let's try again!`);
      setTimeout(newRound,1800);
    }
  },(6+BUBBLES_PER_ROUND*.6+4+1)*1000);
  bubbleTimers.push(autoT);
}

function popBubble(bubble,letter,cx,cy){
  if(!canPop)return;
  if(letter===target){
    canPop=false;
    playPop(true);
    spawnSplash(cx,cy);
    spawnConfetti(cx,cy);
    showLetterFlash(letter);
    bubble.remove();
    score+=10;
    document.getElementById('scoreVal').textContent=score;
    usedLetters.push(letter);
    round++;
    speak(`${letter}! ${letter} for...`);
    speakLetter(letter);
    makeDots();
    setTimeout(newRound,1600);
  } else {
    playPop(false);
    spawnSplash(cx,cy);
    bubble.style.animation='bubbleWrong .3s ease, bubbleRise '+
      (4+Math.random()*3)+'s linear forwards';
    speak(`That's ${letter}! Find ${target}!`);
  }
}

function showCelebration(){
  speak(`You know your A B C! Amazing!`);
  const ov=document.createElement('div');
  ov.className='celebration';
  ov.innerHTML=`
    <div class="celeb-emoji">🌊</div>
    <h2>All Bubbles Popped!</h2>
    <p>Score: <span style="color:#FFD700;font-size:1.4em;">${score}</span> points!</p>
    <button class="next-btn" onclick="restartGame()">Play Again 🫧</button>
  `;
  document.body.appendChild(ov);
}

function restartGame(){
  document.querySelector('.celebration')?.remove();
  score=0;round=0;usedLetters=[];
  document.getElementById('scoreVal').textContent=0;
  newRound();
}

// Foam bubbles decoration
function makeFoam(){
  const foams=['🫧','💧','🫧'];
  foams.forEach((f,i)=>{
    const el=document.createElement('div');
    el.className='foam';
    el.textContent=f;
    el.style.cssText=`bottom:${60+i*20}px;left:${10+i*40}%;animation-delay:${i*.7}s;`;
    document.body.appendChild(el);
  });
}

window.addEventListener('load',()=>{
  makeFoam();
  window.speechSynthesis.getVoices();
  makeDots();
  setTimeout(()=>{
    speak('Pop the letter bubbles!');
    setTimeout(newRound,1200);
  },500);
});
</script>
</body>
</html>
