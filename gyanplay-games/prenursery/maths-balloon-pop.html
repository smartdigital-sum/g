<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Balloon Pop Numbers 🎈</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg1: #1a0533; --bg2: #0d1b6e;
    --gold: #FFD700; --white: #fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Baloo 2',cursive;
    background: radial-gradient(ellipse at 30% 20%, #2d0a5e, #0d1b6e 60%, #0a0a2e);
    min-height:100vh; overflow:hidden;
    display:flex; flex-direction:column; align-items:center;
    user-select:none;
  }
  /* stars */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 2s infinite;}
  @keyframes twinkle{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}

  /* header */
  .header{
    position:relative;z-index:10;
    text-align:center; padding:18px 20px 0;
    width:100%;
  }
  .title{font-size:clamp(1.4rem,5vw,2.2rem);color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.5);}
  .instruction{
    background:rgba(255,255,255,.12); backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,.2);
    border-radius:50px; padding:10px 24px;
    font-size:clamp(1rem,4vw,1.5rem); color:#fff;
    margin-top:10px; display:inline-block;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}

  /* score */
  .score-bar{
    position:relative;z-index:10;
    display:flex;gap:16px;align-items:center;
    margin-top:10px;
  }
  .score-box{
    background:rgba(255,255,255,.15);
    border:2px solid rgba(255,255,255,.3);
    border-radius:20px; padding:6px 18px;
    color:#fff; font-size:1rem;
  }
  .score-box span{color:var(--gold);font-size:1.2rem;}

  /* game area */
  .game-area{
    position:relative;z-index:5;
    flex:1; width:100%; max-width:700px;
  }

  /* balloon */
  .balloon{
    position:absolute;
    cursor:pointer;
    display:flex;flex-direction:column;align-items:center;
    animation: floatUp linear forwards;
    transition: transform .1s;
  }
  .balloon:active{transform:scale(.9);}
  .balloon-body{
    width:clamp(70px,15vw,100px);
    height:clamp(85px,18vw,120px);
    border-radius:50% 50% 45% 45%;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(1.8rem,6vw,2.8rem);
    font-weight:800; color:#fff;
    text-shadow:0 2px 6px rgba(0,0,0,.4);
    box-shadow: inset -8px -10px 20px rgba(0,0,0,.2), inset 6px 6px 12px rgba(255,255,255,.3), 0 8px 30px rgba(0,0,0,.3);
    position:relative;
    transition: transform .15s;
  }
  .balloon-body::after{
    content:'';
    position:absolute;
    top:18%; left:22%;
    width:22%; height:16%;
    background:rgba(255,255,255,.45);
    border-radius:50%;
    transform:rotate(-30deg);
  }
  .balloon-string{
    width:2px; height:clamp(30px,6vw,50px);
    background:rgba(255,255,255,.5);
    margin-top:2px;
  }
  @keyframes floatUp{
    0%{transform:translateY(100vh) rotate(0deg);}
    100%{transform:translateY(-200px) rotate(5deg);}
  }

  /* confetti */
  .confetti-piece{
    position:fixed; pointer-events:none; z-index:100;
    width:10px; height:10px; border-radius:2px;
    animation: confettiFall 1.2s ease-in forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(300px) rotate(720deg);opacity:0;}
  }

  /* pop burst */
  .pop-burst{
    position:fixed;pointer-events:none;z-index:99;
    font-size:clamp(2rem,8vw,3.5rem);
    animation:burst .6s ease-out forwards;
  }
  @keyframes burst{
    0%{transform:scale(0);opacity:1;}
    60%{transform:scale(1.5);opacity:1;}
    100%{transform:scale(2);opacity:0;}
  }

  /* wrong shake */
  @keyframes wrongShake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-12px);}
    40%{transform:translateX(12px);}
    60%{transform:translateX(-8px);}
    80%{transform:translateX(8px);}
  }

  /* celebration overlay */
  .celebration{
    position:fixed;inset:0;z-index:200;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(6px);
    animation:fadeIn .4s ease;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .celebration-emoji{font-size:clamp(4rem,15vw,7rem);animation:celebBounce .5s ease infinite alternate;}
  @keyframes celebBounce{from{transform:scale(1);}to{transform:scale(1.15);}}
  .celebration h2{color:var(--gold);font-size:clamp(2rem,8vw,3.5rem);text-align:center;margin:16px 0 8px;}
  .celebration p{color:#fff;font-size:clamp(1rem,4vw,1.5rem);margin-bottom:24px;}
  .next-btn{
    background:linear-gradient(135deg,#FF6B00,#FFB800);
    color:#fff;border:none;border-radius:50px;
    padding:14px 40px;font-family:'Baloo 2',cursive;
    font-size:clamp(1.1rem,4vw,1.5rem);font-weight:800;
    cursor:pointer;box-shadow:0 6px 24px rgba(255,107,0,.4);
    transition:transform .2s;
  }
  .next-btn:hover{transform:scale(1.05);}

  /* progress dots */
  .progress{
    position:relative;z-index:10;
    display:flex;gap:8px;margin-top:8px;
  }
  .dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s;}
  .dot.done{background:var(--gold);box-shadow:0 0 8px var(--gold);}
  .dot.active{background:#fff;transform:scale(1.3);}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="header">
  <div class="title">🎈 Balloon Pop Numbers</div>
  <div class="instruction" id="instruction">Pop the balloon with number <span id="targetNum" style="color:#FFD700;font-size:1.3em;">1</span>!</div>
</div>

<div class="score-bar">
  <div class="score-box">⭐ Score: <span id="scoreVal">0</span></div>
  <div class="score-box">🎯 Round: <span id="roundVal">1</span>/10</div>
</div>

<div class="progress" id="progress"></div>

<div class="game-area" id="gameArea"></div>

<script>
const COLORS = ['#FF4757','#FF6B00','#FFD700','#2ed573','#1e90ff','#a55eea','#ff6b81','#eccc68','#70a1ff','#5352ed'];
const BALLOON_COUNT = 4;
const TOTAL_ROUNDS = 10;

let score = 0, round = 0, target = 0, canPop = true;
let balloonTimers = [];

// Audio context
let audioCtx;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playPop(correct){
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  if(correct){
    osc.frequency.setValueAtTime(600,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200,ctx.currentTime+.15);
    gain.gain.setValueAtTime(.4,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    osc.start(); osc.stop(ctx.currentTime+.3);
    // chime
    setTimeout(()=>{
      const o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.connect(g2);g2.connect(ctx.destination);
      o2.frequency.value=880; o2.type='sine';
      g2.gain.setValueAtTime(.3,ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
      o2.start();o2.stop(ctx.currentTime+.4);
    },150);
  } else {
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(200,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80,ctx.currentTime+.3);
    gain.gain.setValueAtTime(.2,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    osc.start();osc.stop(ctx.currentTime+.3);
  }
}

function playCelebration(){
  const ctx = getAudio();
  const notes=[523,659,784,1047];
  notes.forEach((freq,i)=>{
    setTimeout(()=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq; o.type='sine';
      g.gain.setValueAtTime(.35,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
      o.start();o.stop(ctx.currentTime+.5);
    },i*120);
  });
}

function speak(text){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.85; u.pitch=1.3; u.volume=1;
    const voices=window.speechSynthesis.getVoices();
    const female=voices.find(v=>v.name.toLowerCase().includes('female')||v.name.toLowerCase().includes('samantha')||v.name.toLowerCase().includes('karen'));
    if(female) u.voice=female;
    window.speechSynthesis.speak(u);
  }
}

// Stars background
function makeStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    const size=Math.random()*3+1;
    s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;`;
    c.appendChild(s);
  }
}

// Progress dots
function makeDots(){
  const p=document.getElementById('progress');
  p.innerHTML='';
  for(let i=0;i<TOTAL_ROUNDS;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<round?' done':i===round?' active':'');
    p.appendChild(d);
  }
}

// Confetti
function spawnConfetti(x,y){
  const colors=['#FF4757','#FFD700','#2ed573','#1e90ff','#a55eea','#FF6B00'];
  for(let i=0;i<18;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.cssText=`left:${x}px;top:${y}px;background:${colors[i%colors.length]};transform:rotate(${Math.random()*360}deg);animation-duration:${.8+Math.random()*.6}s;left:${x+Math.random()*160-80}px;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1400);
  }
}

function showBurst(x,y,emoji){
  const b=document.createElement('div');
  b.className='pop-burst';
  b.textContent=emoji;
  b.style.cssText=`left:${x-30}px;top:${y-30}px;`;
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),700);
}

function clearBalloons(){
  balloonTimers.forEach(t=>clearTimeout(t));
  balloonTimers=[];
  document.getElementById('gameArea').innerHTML='';
}

function newRound(){
  if(round>=TOTAL_ROUNDS){showCelebration();return;}
  clearBalloons();
  canPop=true;

  // pick target 1-10
  target=Math.floor(Math.random()*10)+1;
  document.getElementById('targetNum').textContent=target;
  document.getElementById('roundVal').textContent=round+1;
  makeDots();

  setTimeout(()=>speak(`Pop the balloon with number ${target}!`),300);

  // pick numbers for balloons (must include target)
  let nums=[target];
  while(nums.length<BALLOON_COUNT){
    let n=Math.floor(Math.random()*10)+1;
    if(!nums.includes(n)) nums.push(n);
  }
  nums=nums.sort(()=>Math.random()-.5);

  const area=document.getElementById('gameArea');
  const areaW=area.offsetWidth||window.innerWidth;

  nums.forEach((num,i)=>{
    const balloon=document.createElement('div');
    balloon.className='balloon';
    const color=COLORS[num-1];
    const dur=5+Math.random()*4;
    const delay=i*0.5+Math.random()*0.5;
    const leftPct=8+(i*(82/(BALLOON_COUNT-1||1)));
    balloon.style.cssText=`left:${leftPct}%;animation:floatUp ${dur}s ${delay}s linear forwards;`;

    balloon.innerHTML=`
      <div class="balloon-body" style="background:radial-gradient(circle at 35% 30%, ${lighten(color)}, ${color});">${num}</div>
      <div class="balloon-string"></div>
    `;

    balloon.addEventListener('click',()=>popBalloon(balloon,num,target));
    balloon.addEventListener('touchstart',(e)=>{e.preventDefault();popBalloon(balloon,num,target);},{passive:false});
    area.appendChild(balloon);

    // auto remove when floated away
    const t=setTimeout(()=>{
      if(balloon.parentNode) balloon.remove();
    },(dur+delay+1)*1000);
    balloonTimers.push(t);
  });

  // if all balloons floated away without correct pop
  const autoT=setTimeout(()=>{
    if(canPop){
      canPop=false;
      round++;
      speak(`Oops! It was ${target}! Let's try again!`);
      setTimeout(newRound,1800);
    }
  },(5+BALLOON_COUNT*0.5+4+1)*1000);
  balloonTimers.push(autoT);
}

function popBalloon(balloon,num,tgt){
  if(!canPop) return;
  const rect=balloon.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;

  if(num===tgt){
    canPop=false;
    playPop(true);
    spawnConfetti(cx,cy);
    showBurst(cx,cy,'🎉');
    balloon.remove();
    score+=10;
    document.getElementById('scoreVal').textContent=score;
    speak(`Yes! ${num}! Amazing!`);
    round++;
    makeDots();
    setTimeout(newRound,1400);
  } else {
    playPop(false);
    showBurst(cx,cy,'😅');
    balloon.style.animation='none';
    balloon.style.animation='wrongShake .4s ease';
    speak(`Oops! That's ${num}. Find ${tgt}!`);
    setTimeout(()=>{
      if(balloon.parentNode){
        balloon.style.animation='';
        // restart float
        balloon.style.animation=`floatUp ${4+Math.random()*3}s linear forwards`;
      }
    },500);
  }
}

function showCelebration(){
  clearBalloons();
  playCelebration();
  speak(`Wow! You got ${score} points! You are a superstar!`);
  const ov=document.createElement('div');
  ov.className='celebration';
  ov.innerHTML=`
    <div class="celebration-emoji">🏆</div>
    <h2>Amazing Job!</h2>
    <p>You scored <span style="color:#FFD700;font-size:1.4em;">${score}</span> points!</p>
    <button class="next-btn" onclick="restartGame()">Play Again 🎈</button>
  `;
  document.body.appendChild(ov);
}

function restartGame(){
  document.querySelector('.celebration')?.remove();
  score=0; round=0;
  document.getElementById('scoreVal').textContent=0;
  newRound();
}

function lighten(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)})`;
}

// Init
window.addEventListener('load',()=>{
  makeStars();
  // preload voices
  window.speechSynthesis.getVoices();
  setTimeout(()=>{
    speak('Welcome! Pop the right balloon!');
    setTimeout(newRound,1500);
  },500);
});
</script>
</body>
</html>
