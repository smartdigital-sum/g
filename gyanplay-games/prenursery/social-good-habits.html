<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Good Habits ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Baloo 2',cursive;
    background:linear-gradient(160deg,#ffecd2,#fcb69f,#FF9A9E);
    min-height:100vh;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
    user-select:none;
  }

  .header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px;width:100%;}
  .title{font-size:clamp(1.4rem,5vw,2.2rem);color:#5d2e0c;text-shadow:0 2px 6px rgba(255,255,255,.4);}
  .instruction{
    background:rgba(255,255,255,.5);backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,.7);border-radius:20px;
    padding:10px 24px;font-size:clamp(1rem,4vw,1.3rem);color:#5d2e0c;
    margin-top:10px;display:inline-block;font-weight:700;
    box-shadow:0 4px 16px rgba(0,0,0,.1);
  }

  .score-bar{position:relative;z-index:10;display:flex;gap:16px;align-items:center;margin-top:8px;}
  .score-box{background:rgba(255,255,255,.4);border:2px solid rgba(255,255,255,.6);border-radius:20px;padding:6px 18px;color:#5d2e0c;font-size:1rem;}
  .score-box span{color:#FF6B00;font-size:1.2rem;}

  /* character */
  .character-box{
    position:relative;z-index:10;
    background:rgba(255,255,255,.45);backdrop-filter:blur(8px);
    border:3px solid rgba(255,255,255,.6);border-radius:24px;
    padding:14px 24px;margin:12px 20px;
    text-align:center;width:90%;max-width:500px;
  }
  .char-emoji{font-size:clamp(3rem,12vw,6rem);animation:charBob 1.5s ease-in-out infinite;}
  @keyframes charBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .char-speech{color:#5d2e0c;font-size:clamp(.9rem,3.5vw,1.2rem);font-weight:700;min-height:40px;}

  /* sequence area */
  .sequence-label{
    position:relative;z-index:10;
    color:#5d2e0c;font-size:clamp(.85rem,3vw,1.1rem);font-weight:800;
    margin:8px 0 4px;letter-spacing:1px;text-transform:uppercase;opacity:.7;
  }
  .sequence-bar{
    position:relative;z-index:10;
    display:flex;align-items:center;gap:6px;
    padding:0 20px;margin-bottom:12px;
    width:100%;max-width:600px;
  }
  .seq-step{
    flex:1;background:rgba(255,255,255,.5);
    border:3px dashed rgba(255,255,255,.7);border-radius:16px;
    height:clamp(55px,15vw,75px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:clamp(1.5rem,6vw,2.5rem);
    transition:all .3s;
    position:relative;
  }
  .seq-step.filled{border-style:solid;border-color:rgba(46,213,115,.6);background:rgba(46,213,115,.2);}
  .seq-step .step-num{
    position:absolute;top:2px;left:6px;
    font-size:.65rem;color:rgba(93,46,12,.5);font-weight:800;
  }
  .seq-arrow{color:rgba(93,46,12,.4);font-size:1.2rem;flex-shrink:0;}

  /* choices */
  .choices{
    position:relative;z-index:10;
    display:flex;gap:clamp(8px,3vw,14px);
    flex-wrap:wrap;justify-content:center;
    padding:0 20px;
    width:100%;max-width:600px;
  }
  .habit-btn{
    background:rgba(255,255,255,.5);backdrop-filter:blur(6px);
    border:3px solid rgba(255,255,255,.6);border-radius:20px;
    padding:clamp(10px,2.5vw,16px);
    cursor:pointer;transition:all .2s;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    min-width:clamp(70px,18vw,100px);
  }
  .habit-btn:hover{transform:scale(1.08) translateY(-4px);border-color:rgba(255,107,0,.6);}
  .habit-btn.used{opacity:.3;pointer-events:none;transform:scale(.9);}
  .habit-btn .h-emoji{font-size:clamp(2rem,8vw,3rem);}
  .habit-btn .h-name{color:#5d2e0c;font-size:clamp(.65rem,2.2vw,.85rem);font-weight:700;text-align:center;}
  @keyframes btnPop{0%{transform:scale(1);}50%{transform:scale(1.15);}100%{transform:scale(.95);}}

  .celebration{
    position:fixed;inset:0;z-index:200;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,0,.65);backdrop-filter:blur(10px);animation:fadeIn .4s ease;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .celeb-emoji{font-size:clamp(4rem,15vw,7rem);animation:celebBounce .5s ease infinite alternate;}
  @keyframes celebBounce{from{transform:scale(1);}to{transform:scale(1.15);}}
  .celebration h2{color:#FFD700;font-size:clamp(2rem,8vw,3.5rem);text-align:center;margin:16px 0 8px;}
  .celebration p{color:#fff;font-size:clamp(1rem,4vw,1.4rem);margin-bottom:24px;text-align:center;padding:0 20px;line-height:1.7;}
  .next-btn{
    background:linear-gradient(135deg,#FF6B00,#FFB800);color:#fff;border:none;border-radius:50px;
    padding:14px 40px;font-family:'Baloo 2',cursive;font-size:clamp(1.1rem,4vw,1.5rem);font-weight:800;
    cursor:pointer;box-shadow:0 6px 24px rgba(255,107,0,.4);transition:transform .2s;
  }
  .next-btn:hover{transform:scale(1.05);}
  .confetti-piece{position:fixed;pointer-events:none;z-index:300;width:10px;height:10px;border-radius:2px;animation:confettiFall 1.4s ease-in forwards;}
  @keyframes confettiFall{0%{opacity:1;}100%{transform:translateY(350px) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<div class="header">
  <div class="title">✨ Good Morning Habits</div>
  <div class="instruction" id="instruction">Tap the habits in the right order! What comes first?</div>
</div>
<div class="score-bar">
  <div class="score-box">⭐ Score: <span id="scoreVal">0</span></div>
  <div class="score-box">🎯 Round: <span id="roundVal">1</span>/3</div>
</div>

<div class="character-box">
  <div class="char-emoji" id="charEmoji">😴</div>
  <div class="char-speech" id="charSpeech">Good morning! Help me get ready!</div>
</div>

<div class="sequence-label">Put them in order →</div>
<div class="sequence-bar" id="sequenceBar"></div>

<div class="choices" id="choices"></div>

<script>
const ROUTINES=[
  {
    title:'Morning Routine',
    steps:[
      {emoji:'😴',name:'Wake Up',speech:'Good morning! I just woke up!'},
      {emoji:'🚿',name:'Bath',speech:'Time to take a bath! Clean clean clean!'},
      {emoji:'🪥',name:'Brush Teeth',speech:'Brush brush! Clean teeth!'},
      {emoji:'👗',name:'Get Dressed',speech:'Wearing clean clothes!'},
      {emoji:'🍳',name:'Eat Breakfast',speech:'Yummy breakfast! Eggs and toast!'},
      {emoji:'🎒',name:'Pack Bag',speech:'School bag is ready!'},
    ]
  },
  {
    title:'Bedtime Routine',
    steps:[
      {emoji:'🍽️',name:'Eat Dinner',speech:'Dinner is ready! Eat well!'},
      {emoji:'📚',name:'Read Book',speech:'Reading before bed!'},
      {emoji:'🚿',name:'Bath',speech:'Bath time! Stay clean!'},
      {emoji:'🪥',name:'Brush Teeth',speech:'Brush teeth before sleeping!'},
      {emoji:'🙏',name:'Prayer',speech:'Thank you for this day!'},
      {emoji:'😴',name:'Sleep',speech:'Good night! Sweet dreams!'},
    ]
  },
  {
    title:'School Routine',
    steps:[
      {emoji:'🌅',name:'Wake Early',speech:'Rise and shine!'},
      {emoji:'🤸',name:'Exercise',speech:'Morning exercise! Stay fit!'},
      {emoji:'🍎',name:'Healthy Snack',speech:'Eat a healthy snack!'},
      {emoji:'📖',name:'Study Time',speech:'Study hard!'},
      {emoji:'✏️',name:'Do Homework',speech:'Finish homework!'},
      {emoji:'🛁',name:'Rest',speech:'Relax after school!'},
    ]
  }
];

let score=0,round=0;
let currentRoutine=null,currentOrder=[],placedCount=0;
let audioCtx;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playPlop(){
  const ctx=getAudio();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type='sine';
  o.frequency.setValueAtTime(500,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(300,ctx.currentTime+.15);
  g.gain.setValueAtTime(.25,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);
  o.start();o.stop(ctx.currentTime+.2);
}

function playWrong(){
  const ctx=getAudio();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.frequency.value=200;o.type='sawtooth';
  g.gain.setValueAtTime(.15,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);
  o.start();o.stop(ctx.currentTime+.25);
}

function playCelebration(){
  const ctx=getAudio();
  [523,659,784,880,1047].forEach((f,i)=>{
    setTimeout(()=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
      o.start();o.stop(ctx.currentTime+.4);
    },i*100);
  });
}

function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.85;u.pitch=1.3;
  window.speechSynthesis.speak(u);
}

function spawnConfetti(){
  const cols=['#FF4757','#FFD700','#2ed573','#1e90ff','#FF6B00'];
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.cssText=`left:${Math.random()*100}%;top:20%;background:${cols[i%cols.length]};animation-duration:${.8+Math.random()*.8}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1600);
  }
}

function buildSequenceBar(){
  const bar=document.getElementById('sequenceBar');
  bar.innerHTML='';
  currentRoutine.steps.forEach((s,i)=>{
    if(i>0){const arr=document.createElement('div');arr.className='seq-arrow';arr.textContent='›';bar.appendChild(arr);}
    const slot=document.createElement('div');
    slot.className='seq-step';
    slot.id=`slot${i}`;
    slot.innerHTML=`<span class="step-num">${i+1}</span>`;
    bar.appendChild(slot);
  });
}

function buildChoices(){
  // shuffled steps
  const shuffled=[...currentRoutine.steps].sort(()=>Math.random()-.5);
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  shuffled.forEach((s,i)=>{
    const btn=document.createElement('div');
    btn.className='habit-btn';
    btn.id=`btn_${s.name.replace(/\s/g,'_')}`;
    btn.innerHTML=`<span class="h-emoji">${s.emoji}</span><span class="h-name">${s.name}</span>`;
    btn.onclick=()=>tapHabit(btn,s);
    choicesEl.appendChild(btn);
  });
}

function tapHabit(btn,step){
  const expected=currentRoutine.steps[placedCount];
  if(step.name===expected.name){
    // correct
    playPlop();
    const slot=document.getElementById(`slot${placedCount}`);
    slot.textContent=step.emoji;
    slot.classList.add('filled');
    btn.classList.add('used');
    placedCount++;
    document.getElementById('charEmoji').textContent=step.emoji;
    document.getElementById('charSpeech').textContent=step.speech;
    speak(step.speech);

    if(placedCount===currentRoutine.steps.length){
      // All done!
      setTimeout(()=>{
        spawnConfetti();
        playCelebration();
        score+=30;
        document.getElementById('scoreVal').textContent=score;
        speak(`Amazing! You arranged all the steps correctly!`);
        round++;
        document.getElementById('roundVal').textContent=round;
        if(round>=3){
          setTimeout(showFinalCelebration,1800);
        } else {
          setTimeout(()=>{speak('Well done! Let\'s try another routine!');setTimeout(newRound,1500);},1800);
        }
      },600);
    }
  } else {
    // wrong
    playWrong();
    btn.style.animation='btnPop .3s ease';
    setTimeout(()=>btn.style.animation='',400);
    speak(`Oops! ${expected.name} comes first! Find ${expected.name}!`);
  }
}

function newRound(){
  currentRoutine=ROUTINES[round%ROUTINES.length];
  placedCount=0;
  document.getElementById('instruction').textContent=`Arrange the ${currentRoutine.title}! What comes first?`;
  document.getElementById('charEmoji').textContent='🤔';
  document.getElementById('charSpeech').textContent=`Help me arrange my ${currentRoutine.title.toLowerCase()}!`;
  buildSequenceBar();
  buildChoices();
  setTimeout(()=>speak(`Put the ${currentRoutine.title} steps in order!`),400);
}

function showFinalCelebration(){
  const ov=document.createElement('div');
  ov.className='celebration';
  ov.innerHTML=`
    <div class="celeb-emoji">🌟</div>
    <h2>Good Habits Champion!</h2>
    <p>You know all the good habits!<br/>
    🦷 Brush teeth · 🚿 Stay clean<br/>
    📚 Study hard · 😴 Sleep well!<br/>
    Score: <span style="color:#FFD700;font-size:1.4em;">${score}</span> points!</p>
    <button class="next-btn" onclick="restartGame()">Play Again ✨</button>
  `;
  document.body.appendChild(ov);
}

function restartGame(){
  document.querySelector('.celebration')?.remove();
  score=0;round=0;
  document.getElementById('scoreVal').textContent=0;
  document.getElementById('roundVal').textContent=1;
  newRound();
}

window.addEventListener('load',()=>{
  window.speechSynthesis.getVoices();
  setTimeout(()=>{
    speak('Welcome! Let\'s learn good habits!');
    setTimeout(newRound,1200);
  },500);
});
</script>
</body>
</html>
