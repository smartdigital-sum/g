<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GyanPlay — Pre-Nursery Games 🌱</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --saffron:#FF6B00;--gold:#FFB800;--sky:#00AEEF;
    --green:#00C853;--pink:#FF4081;--dark:#1A1A2E;--dark2:#16213E;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    background:var(--dark);
    color:#fff;min-height:100vh;
    overflow-x:hidden;
  }
  /* animated bg */
  .bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .glow-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:orbDrift 8s ease-in-out infinite;}
  @keyframes orbDrift{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-20px);}}

  /* topbar */
  .topbar{
    position:sticky;top:0;z-index:100;
    background:rgba(26,26,46,.9);backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .logo{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.5rem;color:var(--gold);}
  .logo span{color:var(--sky);}
  .tag{
    background:rgba(0,200,83,.15);border:1px solid rgba(0,200,83,.3);
    color:#00C853;font-size:.75rem;font-weight:800;
    padding:4px 12px;border-radius:20px;letter-spacing:1px;
  }

  /* hero */
  .hero{
    text-align:center;padding:clamp(40px,8vw,80px) 24px clamp(30px,5vw,50px);
    position:relative;z-index:1;
  }
  .hero-emoji{font-size:clamp(4rem,15vw,7rem);animation:heroFloat 3s ease-in-out infinite;}
  @keyframes heroFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .hero h1{
    font-family:'Baloo 2',cursive;font-weight:800;
    font-size:clamp(2rem,7vw,3.5rem);
    background:linear-gradient(135deg,var(--gold),var(--saffron));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin:16px 0 8px;line-height:1.1;
  }
  .hero p{color:rgba(255,255,255,.5);font-size:clamp(.9rem,3vw,1.15rem);max-width:500px;margin:0 auto;line-height:1.6;}
  .hero-stats{
    display:flex;justify-content:center;gap:clamp(16px,5vw,40px);
    margin-top:28px;flex-wrap:wrap;
  }
  .stat{text-align:center;}
  .stat-num{font-family:'Baloo 2',cursive;font-size:clamp(1.8rem,6vw,2.5rem);font-weight:800;color:var(--gold);line-height:1;}
  .stat-label{font-size:.75rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px;margin-top:2px;}

  /* subject filter tabs */
  .filter-bar{
    display:flex;justify-content:center;gap:8px;flex-wrap:wrap;
    padding:0 20px 24px;position:relative;z-index:1;
  }
  .filter-btn{
    padding:8px 18px;border-radius:50px;font-weight:700;font-size:.85rem;
    border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);
    color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;
    font-family:'Nunito',sans-serif;
  }
  .filter-btn:hover{border-color:rgba(255,255,255,.3);color:#fff;}
  .filter-btn.active{color:#fff;border-color:transparent;}
  .filter-btn[data-filter="all"].active{background:linear-gradient(135deg,var(--saffron),var(--gold));}
  .filter-btn[data-filter="maths"].active{background:linear-gradient(135deg,#FF6B00,#FFB800);}
  .filter-btn[data-filter="english"].active{background:linear-gradient(135deg,#00AEEF,#0080ff);}
  .filter-btn[data-filter="science"].active{background:linear-gradient(135deg,#00C853,#69F0AE);}
  .filter-btn[data-filter="social"].active{background:linear-gradient(135deg,#FF4081,#f953c6);}
  .filter-btn[data-filter="hindi"].active{background:linear-gradient(135deg,#FF6B00,#FF4757);}
  .filter-btn[data-filter="computer"].active{background:linear-gradient(135deg,#00ffff,#a855f7);}

  /* grid */
  .games-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:clamp(14px,3vw,22px);
    padding:0 clamp(16px,4vw,32px) 60px;
    max-width:1200px;margin:0 auto;
    position:relative;z-index:1;
  }

  /* game card */
  .game-card{
    background:rgba(255,255,255,.04);
    border:1.5px solid rgba(255,255,255,.08);
    border-radius:24px;
    overflow:hidden;
    cursor:pointer;
    transition:all .25s cubic-bezier(.34,1.56,.64,1);
    text-decoration:none;color:inherit;
    display:block;
  }
  .game-card:hover{
    transform:translateY(-6px) scale(1.02);
    border-color:rgba(255,255,255,.2);
    box-shadow:0 20px 50px rgba(0,0,0,.4);
  }
  .game-card.hidden{display:none;}

  .card-thumb{
    height:clamp(130px,20vw,170px);
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(4rem,12vw,6rem);
    position:relative;overflow:hidden;
  }
  .card-thumb::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.3));
  }

  /* subject color themes */
  .thumb-maths{background:linear-gradient(135deg,#3d1c02,#FF6B00 200%);}
  .thumb-english{background:linear-gradient(135deg,#001f3d,#00AEEF 200%);}
  .thumb-science{background:linear-gradient(135deg,#002d14,#00C853 200%);}
  .thumb-social{background:linear-gradient(135deg,#3d001a,#FF4081 200%);}
  .thumb-hindi{background:linear-gradient(135deg,#3d1200,#FF4757 200%);}
  .thumb-computer{background:linear-gradient(135deg,#00001a,#00ffff 200%);}

  .card-body{padding:18px 20px 20px;}
  .card-subject{
    font-size:.7rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;
    margin-bottom:6px;
  }
  .subject-maths{color:var(--saffron);}
  .subject-english{color:var(--sky);}
  .subject-science{color:#00C853;}
  .subject-social{color:var(--pink);}
  .subject-hindi{color:#FF6347;}
  .subject-computer{color:#00ffff;}

  .card-title{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:1.15rem;
    color:#fff;margin-bottom:6px;line-height:1.2;
  }
  .card-desc{
    font-size:.83rem;color:rgba(255,255,255,.45);line-height:1.5;
    margin-bottom:14px;
  }
  .card-play{
    display:flex;align-items:center;justify-content:center;gap:6px;
    padding:10px 0;border-radius:12px;
    font-weight:700;font-size:.88rem;color:#fff;
    transition:opacity .2s;
  }
  .game-card:hover .card-play{opacity:.85;}
  .play-maths{background:linear-gradient(135deg,#FF6B00,#FFB800);}
  .play-english{background:linear-gradient(135deg,#00AEEF,#0080ff);}
  .play-science{background:linear-gradient(135deg,#00C853,#69F0AE);}
  .play-social{background:linear-gradient(135deg,#FF4081,#f953c6);}
  .play-hindi{background:linear-gradient(135deg,#FF6B00,#FF4757);}
  .play-computer{background:linear-gradient(135deg,#00ffff,#a855f7);}

  /* section headers */
  .section-header{
    position:relative;z-index:1;
    padding:8px clamp(16px,4vw,32px) 16px;
    max-width:1200px;margin:0 auto;
    display:flex;align-items:center;gap:12px;
  }
  .section-header h2{font-family:'Baloo 2',cursive;font-size:1.2rem;font-weight:700;color:#fff;}
  .section-line{flex:1;height:1px;background:rgba(255,255,255,.08);}
  .section-count{font-size:.75rem;color:rgba(255,255,255,.3);font-weight:700;}

  /* footer */
  footer{
    text-align:center;padding:24px;
    color:rgba(255,255,255,.2);font-size:.8rem;
    border-top:1px solid rgba(255,255,255,.06);
    position:relative;z-index:1;
  }
  footer strong{color:var(--gold);}
</style>
</head>
<body>

<div class="bg-glow">
  <div class="glow-orb" style="width:500px;height:500px;background:#FF6B00;top:-100px;left:-100px;animation-delay:0s;"></div>
  <div class="glow-orb" style="width:400px;height:400px;background:#00AEEF;bottom:-80px;right:-80px;animation-delay:3s;"></div>
  <div class="glow-orb" style="width:300px;height:300px;background:#FF4081;top:50%;left:60%;animation-delay:6s;"></div>
</div>

<nav class="topbar">
  <div class="logo">Gyan<span>Play</span></div>
  <div class="tag">PRE-NURSERY · AGES 2–4</div>
</nav>

<div class="hero">
  <div class="hero-emoji">🌱</div>
  <h1>Pre-Nursery<br/>Game Library</h1>
  <p>15 handcrafted educational games across 6 subjects. Tap any card to play instantly!</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num">15</div><div class="stat-label">Games</div></div>
    <div class="stat"><div class="stat-num">6</div><div class="stat-label">Subjects</div></div>
    <div class="stat"><div class="stat-num">Ages</div><div class="stat-num" style="font-size:1.4rem;">2–4</div></div>
    <div class="stat"><div class="stat-num">🔊</div><div class="stat-label">Voice Guided</div></div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all" onclick="filterGames('all')">🎮 All Games</button>
  <button class="filter-btn" data-filter="maths" onclick="filterGames('maths')">🔢 Maths</button>
  <button class="filter-btn" data-filter="english" onclick="filterGames('english')">📝 English</button>
  <button class="filter-btn" data-filter="science" onclick="filterGames('science')">🔬 Science</button>
  <button class="filter-btn" data-filter="social" onclick="filterGames('social')">🌏 Social</button>
  <button class="filter-btn" data-filter="hindi" onclick="filterGames('hindi')">🙏 Hindi</button>
  <button class="filter-btn" data-filter="computer" onclick="filterGames('computer')">💻 Computer</button>
</div>

<div class="games-grid" id="gamesGrid"></div>

<footer>
  <strong>GyanPlay</strong> Pre-Nursery Collection · All games work offline · Voice guidance built-in · Ages 2–4
</footer>

<script>
const GAMES=[
  {
    file:'maths-balloon-pop.html',
    subject:'maths',emoji:'🎈',
    title:'Balloon Pop Numbers',
    desc:'Pop the balloon with the right number 1–10. Builds number recognition!'
  },
  {
    file:'maths-shape-sorter.html',
    subject:'maths',emoji:'🔷',
    title:'Shape Sorter',
    desc:'Drag shapes into the matching holes. Circles, stars, hearts and more!'
  },
  {
    file:'maths-count-animals.html',
    subject:'maths',emoji:'🐾',
    title:'Count the Animals',
    desc:'Count animals on screen and tap the right number. Early counting skills!'
  },
  {
    file:'maths-big-small.html',
    subject:'maths',emoji:'🐘',
    title:'Big vs Small',
    desc:'Tap the bigger or smaller object. Teaches size comparison concepts!'
  },
  {
    file:'english-abc-bubble.html',
    subject:'english',emoji:'🫧',
    title:'ABC Bubble Bath',
    desc:'Pop bubbles with the right alphabet letter. Learn all 26 letters!'
  },
  {
    file:'english-animal-match.html',
    subject:'english',emoji:'🦁',
    title:'Animal Name Match',
    desc:'Match animals to their names. Learn animal sounds too!'
  },
  {
    file:'english-rhyme-time.html',
    subject:'english',emoji:'🎵',
    title:'Rhyme Time',
    desc:'Find words that rhyme! Cat-Hat, Moon-Spoon, Star-Car and more!'
  },
  {
    file:'science-plant-seed.html',
    subject:'science',emoji:'🌱',
    title:'Plant a Seed',
    desc:'Follow the steps to grow a flower! Learn how plants grow step by step.'
  },
  {
    file:'science-weather.html',
    subject:'science',emoji:'🌤️',
    title:'Weather Wizard',
    desc:'Identify different weather — sunny, rainy, snowy, stormy and more!'
  },
  {
    file:'science-living-nonliving.html',
    subject:'science',emoji:'🌿',
    title:'Living or Not Living?',
    desc:'Sort things into living and non-living! Plants, animals, rocks and chairs.'
  },
  {
    file:'social-my-family.html',
    subject:'social',emoji:'👨‍👩‍👧‍👦',
    title:'My Family',
    desc:'Tap the right family member! Grandpa, Grandma, Mama, Papa and more!'
  },
  {
    file:'social-good-habits.html',
    subject:'social',emoji:'✨',
    title:'Good Morning Habits',
    desc:'Arrange daily routines in the right order. Builds healthy habit awareness!'
  },
  {
    file:'hindi-swar-bubbles.html',
    subject:'hindi',emoji:'🫧',
    title:'हिंदी स्वर — Vowels',
    desc:'Pop bubbles with the right Hindi vowel. Learn all 11 Hindi vowels!'
  },
  {
    file:'hindi-fruits.html',
    subject:'hindi',emoji:'🍎',
    title:'फल — Fruits in Hindi',
    desc:'Learn fruit names in Hindi! आम, केला, सेब and 12 more fruits!'
  },
  {
    file:'hindi-body-parts.html',
    subject:'hindi',emoji:'👃',
    title:'नाक कहाँ है? Body Parts',
    desc:'Learn body part names in Hindi! नाक, आँख, कान, मुँह and more!'
  },
  {
    file:'computer-click-button.html',
    subject:'computer',emoji:'🖱️',
    title:'Click the Button!',
    desc:'Click the right colored/numbered button. Teaches mouse/touch interaction!'
  },
  {
    file:'computer-drag-drop.html',
    subject:'computer',emoji:'✋',
    title:'Drag & Drop Fun',
    desc:'Drag items to the right place! Stars to space, fish to ocean!'
  },
  {
    file:'computer-keyboard.html',
    subject:'computer',emoji:'⌨️',
    title:'Meet the Keyboard',
    desc:'Find and press the glowing letter on the keyboard. Builds typing basics!'
  },
];

function renderGames(filter='all'){
  const grid=document.getElementById('gamesGrid');
  grid.innerHTML='';
  const filtered=filter==='all'?GAMES:GAMES.filter(g=>g.subject===filter);

  filtered.forEach(game=>{
    const card=document.createElement('a');
    card.href=game.file;
    card.className='game-card';
    card.target='_blank';
    card.innerHTML=`
      <div class="card-thumb thumb-${game.subject}">${game.emoji}</div>
      <div class="card-body">
        <div class="card-subject subject-${game.subject}">${getSubjectLabel(game.subject)}</div>
        <div class="card-title">${game.title}</div>
        <div class="card-desc">${game.desc}</div>
        <div class="card-play play-${game.subject}">▶ Play Now</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function getSubjectLabel(subject){
  const labels={
    maths:'🔢 MATHS',english:'📝 ENGLISH',science:'🔬 SCIENCE',
    social:'🌏 SOCIAL STUDIES',hindi:'🙏 HINDI',computer:'💻 COMPUTER'
  };
  return labels[subject]||subject.toUpperCase();
}

function filterGames(filter){
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.filter===filter);
  });
  renderGames(filter);
}
window.filterGames=filterGames;

window.addEventListener('load',()=>renderGames('all'));
</script>
</body>
</html>
