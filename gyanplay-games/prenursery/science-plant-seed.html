<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plant a Seed 🌱</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Baloo 2',cursive;
    background:linear-gradient(180deg,#87CEEB 0%,#b8e4f9 40%,#c8f4a2 70%,#4a7c3e 100%);
    min-height:100vh;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
    user-select:none;
    transition:background .8s ease;
  }

  /* sun */
  .sun{
    position:fixed;top:clamp(60px,10vw,100px);right:clamp(20px,5vw,60px);
    font-size:clamp(3rem,10vw,5rem);z-index:1;
    animation:sunRise 1s ease-out both, sunFloat 4s 1s ease-in-out infinite;
  }
  @keyframes sunRise{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  @keyframes sunFloat{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(10deg);}}

  /* clouds */
  .cloud{position:fixed;font-size:2.5rem;z-index:1;animation:cloudDrift linear infinite;}
  @keyframes cloudDrift{from{transform:translateX(-100px);}to{transform:translateX(calc(100vw + 100px));}}

  .header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px;width:100%;}
  .title{font-size:clamp(1.4rem,5vw,2.2rem);color:#2d5016;text-shadow:0 2px 6px rgba(255,255,255,.4);}

  /* step indicator */
  .steps-bar{
    position:relative;z-index:10;
    display:flex;align-items:center;gap:0;
    background:rgba(255,255,255,.4);backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,.6);border-radius:50px;
    padding:6px 16px;margin-top:10px;
  }
  .step-item{
    display:flex;align-items:center;gap:6px;
    padding:4px 10px;border-radius:30px;
    font-size:clamp(.75rem,3vw,1rem);font-weight:700;
    color:rgba(45,80,22,.5);transition:all .4s;
  }
  .step-item.active{background:rgba(45,80,22,.15);color:#2d5016;}
  .step-item.done{color:#2d5016;opacity:.6;}
  .step-arrow{color:rgba(45,80,22,.3);font-size:.9rem;}

  /* stage */
  .stage{
    position:relative;z-index:5;
    flex:1;width:100%;max-width:500px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;
    gap:clamp(16px,4vw,28px);
  }

  /* scene */
  .scene{
    width:clamp(200px,70vw,320px);height:clamp(200px,50vw,280px);
    border-radius:24px;
    background:linear-gradient(180deg,#87CEEB 0%,#c8f4a2 60%,#7a5c2e 100%);
    border:4px solid rgba(255,255,255,.5);
    position:relative;overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,.2);
    transition:all .6s ease;
  }
  /* soil */
  .soil{
    position:absolute;bottom:0;left:0;right:0;height:35%;
    background:linear-gradient(180deg,#8B5E3C,#6B4226);
    border-radius:0 0 20px 20px;
  }

  /* items inside scene */
  .scene-item{
    position:absolute;
    font-size:clamp(2.5rem,10vw,4.5rem);
    transition:all .8s cubic-bezier(.34,1.56,.64,1);
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));
  }
  .seed{bottom:38%;left:50%;transform:translateX(-50%) scale(0);opacity:0;}
  .seed.visible{transform:translateX(-50%) scale(1);opacity:1;}
  .sprout{bottom:38%;left:50%;transform:translateX(-50%) translateY(30px);opacity:0;}
  .sprout.visible{transform:translateX(-50%) translateY(0);opacity:1;}
  .plant{bottom:40%;left:50%;transform:translateX(-50%) translateY(40px) scale(.5);opacity:0;}
  .plant.visible{transform:translateX(-50%) translateY(0) scale(1);opacity:1;}
  .flower{bottom:42%;left:50%;transform:translateX(-50%) translateY(60px) scale(.3);opacity:0;}
  .flower.visible{transform:translateX(-50%) translateY(0) scale(1);opacity:1;}
  .water-drops{
    position:absolute;top:10%;left:50%;transform:translateX(-50%);
    font-size:clamp(1.5rem,6vw,2.5rem);
    opacity:0;transition:opacity .3s;
  }
  .sun-rays{
    position:absolute;top:5%;right:10%;font-size:clamp(1.5rem,6vw,2.5rem);
    opacity:0;transition:opacity .3s;
  }

  /* action button */
  .action-btn{
    background:linear-gradient(135deg,#4CAF50,#8BC34A);
    color:#fff;border:none;border-radius:50px;
    padding:clamp(14px,4vw,20px) clamp(28px,8vw,52px);
    font-family:'Baloo 2',cursive;font-size:clamp(1.1rem,5vw,1.7rem);
    font-weight:800;cursor:pointer;
    box-shadow:0 6px 24px rgba(76,175,80,.4);
    transition:all .2s;
    display:flex;align-items:center;gap:10px;
  }
  .action-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(76,175,80,.5);}
  .action-btn:active{transform:scale(.96);}
  .action-btn .btn-emoji{font-size:clamp(1.5rem,6vw,2rem);}

  /* instruction */
  .instruction-box{
    background:rgba(255,255,255,.5);backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,.7);border-radius:20px;
    padding:12px 24px;text-align:center;
    font-size:clamp(1rem,4vw,1.4rem);color:#2d5016;font-weight:700;
    box-shadow:0 4px 16px rgba(0,0,0,.1);
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.02);}}

  /* particles */
  .particle{
    position:fixed;pointer-events:none;z-index:100;
    animation:particleFly .8s ease-out forwards;
  }
  @keyframes particleFly{0%{transform:scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}

  /* celebration */
  .celebration{
    position:fixed;inset:0;z-index:200;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,60,0,.7);backdrop-filter:blur(10px);animation:fadeIn .4s ease;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .celeb-emoji{font-size:clamp(4rem,15vw,7rem);animation:celebBounce .5s ease infinite alternate;}
  @keyframes celebBounce{from{transform:scale(1);}to{transform:scale(1.15);}}
  .celebration h2{color:#FFD700;font-size:clamp(2rem,8vw,3.5rem);text-align:center;margin:16px 0 8px;}
  .celebration p{color:#fff;font-size:clamp(1rem,4vw,1.4rem);margin-bottom:24px;text-align:center;padding:0 20px;}
  .next-btn{
    background:linear-gradient(135deg,#FF6B00,#FFB800);color:#fff;border:none;border-radius:50px;
    padding:14px 40px;font-family:'Baloo 2',cursive;font-size:clamp(1.1rem,4vw,1.5rem);font-weight:800;
    cursor:pointer;box-shadow:0 6px 24px rgba(255,107,0,.4);transition:transform .2s;
  }
  .next-btn:hover{transform:scale(1.05);}
  .confetti-piece{position:fixed;pointer-events:none;z-index:300;width:10px;height:10px;border-radius:2px;animation:confettiFall 1.4s ease-in forwards;}
  @keyframes confettiFall{0%{opacity:1;}100%{transform:translateY(400px) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<div class="sun">☀️</div>

<div class="header">
  <div class="title">🌱 Plant a Seed</div>
  <div class="steps-bar">
    <div class="step-item active" id="step0">🕳️ Dig</div>
    <div class="step-arrow">›</div>
    <div class="step-item" id="step1">🌰 Plant</div>
    <div class="step-arrow">›</div>
    <div class="step-item" id="step2">💧 Water</div>
    <div class="step-arrow">›</div>
    <div class="step-item" id="step3">☀️ Grow</div>
    <div class="step-arrow">›</div>
    <div class="step-item" id="step4">🌸 Bloom!</div>
  </div>
</div>

<div class="stage">
  <div class="scene" id="scene">
    <div class="soil"></div>
    <div class="scene-item seed" id="sceneSeed">🌰</div>
    <div class="scene-item sprout" id="sceneSprout">🌿</div>
    <div class="scene-item plant" id="scenePlant">🌳</div>
    <div class="scene-item flower" id="sceneFlower">🌸</div>
    <div class="water-drops" id="waterDrops">💧💧💧</div>
    <div class="sun-rays" id="sunRays">🌤️</div>
  </div>

  <div class="instruction-box" id="instructionBox">👆 Tap to dig the soil!</div>

  <button class="action-btn" id="actionBtn" onclick="doAction()">
    <span class="btn-emoji" id="btnEmoji">🛖</span>
    <span id="btnText">Dig!</span>
  </button>
</div>

<script>
const STEPS=[
  {
    id:0,
    instruction:'👆 Tap to dig a hole!',
    btnText:'Dig!',btnEmoji:'⛏️',
    sound:'dig',
    speak:'First, dig a hole in the soil!',
    action(){
      playSound('dig');
      spawnParticles('🟫',5);
      speak('Great! You dug a hole!');
    }
  },
  {
    id:1,
    instruction:'🌰 Drop the seed in!',
    btnText:'Plant!',btnEmoji:'🌰',
    sound:'plant',
    speak:'Now drop the seed into the hole!',
    action(){
      playSound('plant');
      document.getElementById('sceneSeed').classList.add('visible');
      spawnParticles('🌰',3);
      speak('The seed is in the ground!');
    }
  },
  {
    id:2,
    instruction:'💧 Water the seed!',
    btnText:'Water!',btnEmoji:'🚿',
    sound:'water',
    speak:'The seed needs water to grow! Water it!',
    action(){
      playSound('water');
      const wd=document.getElementById('waterDrops');
      wd.style.opacity='1';
      spawnParticles('💧',6);
      speak('Splash! The seed drinks the water!');
      setTimeout(()=>wd.style.opacity='0',1500);
    }
  },
  {
    id:3,
    instruction:'☀️ Give it sunlight!',
    btnText:'Sunlight!',btnEmoji:'☀️',
    sound:'grow',
    speak:'Now the sun helps it grow! Give it sunlight!',
    action(){
      playSound('grow');
      const sr=document.getElementById('sunRays');
      sr.style.opacity='1';
      document.getElementById('sceneSeed').classList.remove('visible');
      document.getElementById('sceneSprout').classList.add('visible');
      spawnParticles('✨',8);
      speak('Look! A sprout is coming up!');
      setTimeout(()=>sr.style.opacity='0',1800);
    }
  },
  {
    id:4,
    instruction:'🌸 Watch it bloom!',
    btnText:'Bloom!',btnEmoji:'🌸',
    sound:'bloom',
    speak:'The plant is growing! Let it bloom!',
    action(){
      playSound('bloom');
      document.getElementById('sceneSprout').classList.remove('visible');
      document.getElementById('scenePlant').classList.add('visible');
      setTimeout(()=>{
        document.getElementById('scenePlant').classList.remove('visible');
        document.getElementById('sceneFlower').classList.add('visible');
      },800);
      spawnParticles('🌸',10);
      spawnParticles('🌟',8);
      speak('Beautiful! The flower bloomed! You grew a flower!');
      setTimeout(showCelebration,2500);
    }
  }
];

let currentStep=0;
let audioCtx;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playSound(type){
  const ctx=getAudio();
  if(type==='dig'){
    // low thud
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(120,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+.2);
    g.gain.setValueAtTime(.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);
  } else if(type==='plant'){
    // soft plop
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(400,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+.15);
    g.gain.setValueAtTime(.25,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);
    o.start();o.stop(ctx.currentTime+.2);
  } else if(type==='water'){
    // ripple
    [600,800,1000,700,500].forEach((f,i)=>{
      setTimeout(()=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(.2,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);
        o.start();o.stop(ctx.currentTime+.15);
      },i*80);
    });
  } else if(type==='grow'){
    // rising whoosh
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(200,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1200,ctx.currentTime+.6);
    g.gain.setValueAtTime(.25,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.7);
    o.start();o.stop(ctx.currentTime+.7);
  } else if(type==='bloom'){
    // magical chime
    [523,659,784,1047,1319,1568].forEach((f,i)=>{
      setTimeout(()=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;o.type='sine';
        g.gain.setValueAtTime(.3,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
        o.start();o.stop(ctx.currentTime+.5);
      },i*100);
    });
  }
}

function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.85;u.pitch=1.3;
  window.speechSynthesis.speak(u);
}

function spawnParticles(emoji,count){
  const btn=document.getElementById('actionBtn');
  const rect=btn.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top;
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*Math.PI*2;
    const dist=80+Math.random()*100;
    p.style.cssText=`
      left:${cx}px;top:${cy}px;font-size:${1+Math.random()}rem;
      --tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist-60}px;
      animation-delay:${Math.random()*.2}s;
    `;
    p.textContent=emoji;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function updateUI(){
  const step=STEPS[currentStep];
  if(!step)return;
  document.getElementById('instructionBox').textContent=step.instruction;
  document.getElementById('btnText').textContent=step.btnText;
  document.getElementById('btnEmoji').textContent=step.btnEmoji;

  // update step bar
  STEPS.forEach((s,i)=>{
    const el=document.getElementById(`step${i}`);
    el.classList.remove('active','done');
    if(i<currentStep)el.classList.add('done');
    else if(i===currentStep)el.classList.add('active');
  });
}

function doAction(){
  const step=STEPS[currentStep];
  if(!step)return;
  step.action();
  if(currentStep<STEPS.length-1){
    currentStep++;
    setTimeout(()=>{
      updateUI();
      speak(STEPS[currentStep].speak);
    },1800);
  }
}
window.doAction=doAction;

function spawnConfetti(){
  const cols=['#FF4757','#FFD700','#2ed573','#1e90ff','#a55eea','#FF6B00'];
  for(let i=0;i<30;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.cssText=`left:${Math.random()*100}%;top:10%;background:${cols[i%cols.length]};animation-duration:${1+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

function showCelebration(){
  spawnConfetti();
  const ov=document.createElement('div');
  ov.className='celebration';
  ov.innerHTML=`
    <div class="celeb-emoji">🌸</div>
    <h2>You Grew a Flower!</h2>
    <p>You learned how plants grow:<br/>
    🕳️ Dig → 🌰 Plant → 💧 Water → ☀️ Sun → 🌸 Bloom!</p>
    <button class="next-btn" onclick="restartGame()">Grow Another! 🌱</button>
  `;
  document.body.appendChild(ov);
}

function restartGame(){
  document.querySelector('.celebration')?.remove();
  currentStep=0;
  ['sceneSeed','sceneSprout','scenePlant','sceneFlower'].forEach(id=>{
    document.getElementById(id).classList.remove('visible');
  });
  updateUI();
  speak('Let\'s plant another seed!');
}

window.addEventListener('load',()=>{
  window.speechSynthesis.getVoices();
  updateUI();
  setTimeout(()=>speak('Welcome! Let\'s plant a seed and watch it grow!'),500);
});
</script>
</body>
</html>
