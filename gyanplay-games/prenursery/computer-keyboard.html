<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meet the Keyboard ⌨️</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Baloo 2',cursive;
    background:linear-gradient(160deg,#0a0a1a,#1a1a3e,#0d1b6e);
    min-height:100vh;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
    user-select:none;
  }
  .glow-bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .glow-orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.2;animation:orbFloat 6s ease-in-out infinite;}
  @keyframes orbFloat{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-15px);}}

  .header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px;width:100%;}
  .title{font-size:clamp(1.4rem,5vw,2.2rem);color:#00ffff;text-shadow:0 0 20px rgba(0,255,255,.5);}
  .instruction{
    background:rgba(0,255,255,.08);backdrop-filter:blur(8px);
    border:2px solid rgba(0,255,255,.3);border-radius:50px;
    padding:12px 28px;font-size:clamp(1.1rem,4.5vw,1.7rem);color:#fff;
    margin-top:10px;display:inline-block;
    animation:glowPulse 2s ease-in-out infinite;
  }
  @keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(0,255,255,.2);}50%{box-shadow:0 0 25px rgba(0,255,255,.5);}}

  .score-bar{position:relative;z-index:10;display:flex;gap:16px;align-items:center;margin-top:8px;}
  .score-box{background:rgba(0,255,255,.1);border:2px solid rgba(0,255,255,.3);border-radius:20px;padding:6px 18px;color:#fff;font-size:1rem;}
  .score-box span{color:#00ffff;font-size:1.2rem;}

  .progress{position:relative;z-index:10;display:flex;gap:8px;margin-top:8px;}
  .dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s;}
  .dot.done{background:#00ffff;box-shadow:0 0 8px #00ffff;}
  .dot.active{background:#fff;transform:scale(1.3);}

  /* big letter display */
  .letter-display{
    position:relative;z-index:10;
    background:rgba(0,255,255,.06);backdrop-filter:blur(10px);
    border:3px solid rgba(0,255,255,.25);border-radius:24px;
    padding:clamp(14px,3vw,24px) clamp(24px,6vw,60px);
    margin:12px 20px;text-align:center;
    box-shadow:0 8px 32px rgba(0,255,255,.1);
    width:90%;max-width:500px;
  }
  .target-letter{
    font-size:clamp(5rem,20vw,10rem);line-height:1;
    color:#FFD700;
    text-shadow:0 0 40px rgba(255,215,0,.5);
    animation:letterGlow 1.5s ease-in-out infinite;
    display:block;
  }
  @keyframes letterGlow{0%,100%{text-shadow:0 0 20px rgba(255,215,0,.4);}50%{text-shadow:0 0 50px rgba(255,215,0,.8);}}
  .letter-word{color:rgba(255,255,255,.6);font-size:clamp(.9rem,3.5vw,1.3rem);font-weight:700;margin-top:4px;font-family:'Nunito',sans-serif;}

  /* keyboard */
  .keyboard{
    position:relative;z-index:10;
    display:flex;flex-direction:column;align-items:center;
    gap:clamp(4px,1.5vw,8px);
    padding:clamp(12px,3vw,20px);
    background:rgba(0,0,0,.4);
    border:2px solid rgba(0,255,255,.2);
    border-radius:20px;
    margin:8px 16px;
    width:calc(100% - 32px);max-width:680px;
    box-shadow:0 8px 40px rgba(0,0,0,.5);
  }
  .key-row{display:flex;gap:clamp(4px,1.2vw,7px);justify-content:center;}
  .key{
    width:clamp(30px,7.5vw,54px);
    height:clamp(30px,7.5vw,54px);
    border-radius:8px;
    border:2px solid rgba(0,255,255,.2);
    background:rgba(255,255,255,.06);
    color:rgba(255,255,255,.6);
    font-family:'Baloo 2',cursive;
    font-weight:800;
    font-size:clamp(.8rem,2.5vw,1.3rem);
    cursor:pointer;
    transition:all .15s;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 0 rgba(0,0,0,.5);
    position:relative;
  }
  .key:hover{
    border-color:rgba(0,255,255,.5);
    background:rgba(0,255,255,.1);
    color:#fff;
    transform:translateY(-2px);
    box-shadow:0 5px 0 rgba(0,0,0,.5),0 0 12px rgba(0,255,255,.3);
  }
  .key:active,.key.pressed{
    transform:translateY(2px);
    box-shadow:0 1px 0 rgba(0,0,0,.5);
    background:rgba(0,255,255,.15);
  }
  .key.target-key{
    border-color:#FFD700;
    background:rgba(255,215,0,.15);
    color:#FFD700;
    animation:keyPulse 1s ease-in-out infinite;
    box-shadow:0 3px 0 rgba(0,0,0,.5),0 0 15px rgba(255,215,0,.3);
  }
  @keyframes keyPulse{0%,100%{box-shadow:0 3px 0 rgba(0,0,0,.5),0 0 10px rgba(255,215,0,.3);}50%{box-shadow:0 3px 0 rgba(0,0,0,.5),0 0 25px rgba(255,215,0,.6);}}
  .key.correct-key{
    background:rgba(46,213,115,.4);
    border-color:#2ed573;
    color:#2ed573;
    animation:correctKeyPop .4s ease;
  }
  @keyframes correctKeyPop{0%{transform:scale(1);}50%{transform:scale(1.3) translateY(-4px);}100%{transform:scale(1);}}
  .key.wrong-key{
    background:rgba(255,71,87,.3);
    border-color:#FF4757;
    animation:wrongKeyShake .3s ease;
  }
  @keyframes wrongKeyShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

  /* big letter pop animation */
  .letter-pop{
    position:fixed;inset:0;z-index:150;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .pop-letter{
    font-size:clamp(8rem,30vw,15rem);
    color:#00ffff;
    text-shadow:0 0 60px rgba(0,255,255,.7);
    animation:popIn .5s ease both,popOut .3s .7s ease forwards;
    font-weight:800;
  }
  @keyframes popIn{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1);opacity:1;}}
  @keyframes popOut{to{transform:scale(2);opacity:0;}}

  .celebration{
    position:fixed;inset:0;z-index:200;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,20,.85);backdrop-filter:blur(10px);animation:fadeIn .4s ease;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .celeb-emoji{font-size:clamp(4rem,15vw,7rem);animation:celebBounce .5s ease infinite alternate;}
  @keyframes celebBounce{from{transform:scale(1);}to{transform:scale(1.15);}}
  .celebration h2{color:#00ffff;font-size:clamp(2rem,8vw,3.5rem);text-align:center;margin:16px 0 8px;}
  .celebration p{color:#fff;font-size:clamp(1rem,4vw,1.4rem);margin-bottom:24px;text-align:center;}
  .next-btn{
    background:linear-gradient(135deg,#00ffff,#a855f7);color:#000;border:none;border-radius:50px;
    padding:14px 40px;font-family:'Baloo 2',cursive;font-size:clamp(1.1rem,4vw,1.5rem);font-weight:800;
    cursor:pointer;box-shadow:0 6px 24px rgba(0,255,255,.4);transition:transform .2s;
  }
  .next-btn:hover{transform:scale(1.05);}
  .confetti-piece{position:fixed;pointer-events:none;z-index:300;width:10px;height:10px;border-radius:2px;animation:confettiFall 1.2s ease-in forwards;}
  @keyframes confettiFall{0%{opacity:1;}100%{transform:translateY(300px) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="glow-bg">
  <div class="glow-orb" style="width:300px;height:300px;background:#00ffff;top:10%;left:10%;animation-delay:0s;"></div>
  <div class="glow-orb" style="width:250px;height:250px;background:#a855f7;bottom:15%;right:10%;animation-delay:2s;"></div>
</div>

<div class="header">
  <div class="title">⌨️ Meet the Keyboard!</div>
  <div class="instruction">Find and press the letter <span id="targetDisplay" style="color:#FFD700;">A</span>!</div>
</div>
<div class="score-bar">
  <div class="score-box">⭐ Score: <span id="scoreVal">0</span></div>
  <div class="score-box">🎯 Round: <span id="roundVal">1</span>/10</div>
</div>
<div class="progress" id="progress"></div>

<div class="letter-display">
  <span class="target-letter" id="targetLetter">A</span>
  <div class="letter-word" id="letterWord">A for Apple 🍎</div>
</div>

<div class="keyboard" id="keyboard"></div>

<script>
const ROWS=['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
const LETTER_WORDS={
  A:'A for Apple 🍎',B:'B for Ball ⚽',C:'C for Cat 🐱',D:'D for Dog 🐶',
  E:'E for Elephant 🐘',F:'F for Fish 🐟',G:'G for Goat 🐐',H:'H for Hat 🎩',
  I:'I for Ice cream 🍦',J:'J for Jug 🫗',K:'K for Kite 🪁',L:'L for Lion 🦁',
  M:'M for Mango 🥭',N:'N for Nest 🪺',O:'O for Orange 🍊',P:'P for Parrot 🦜',
  Q:'Q for Queen 👸',R:'R for Rainbow 🌈',S:'S for Sun ☀️',T:'T for Tree 🌳',
  U:'U for Umbrella ☂️',V:'V for Violin 🎻',W:'W for Whale 🐳',X:'X for Xylophone 🎶',
  Y:'Y for Yacht ⛵',Z:'Z for Zebra 🦓'
};

let score=0,round=0,target='',answered=false;
const TOTAL=10;
let usedLetters=[];
let audioCtx;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playKeyPress(correct){
  const ctx=getAudio();
  // tactile click sound
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type='square';
  o.frequency.setValueAtTime(correct?1000:200,ctx.currentTime);
  if(correct) o.frequency.exponentialRampToValueAtTime(2000,ctx.currentTime+.05);
  g.gain.setValueAtTime(.15,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.1);
  o.start();o.stop(ctx.currentTime+.1);

  if(correct){
    setTimeout(()=>{
      [523,659,784,1047].forEach((f,i)=>{
        setTimeout(()=>{
          const o2=ctx.createOscillator(),g2=ctx.createGain();
          o2.connect(g2);g2.connect(ctx.destination);
          o2.frequency.value=f;o2.type='sine';
          g2.gain.setValueAtTime(.25,ctx.currentTime);
          g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.35);
          o2.start();o2.stop(ctx.currentTime+.35);
        },i*90);
      });
    },80);
  }
}

function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.85;u.pitch=1.3;
  window.speechSynthesis.speak(u);
}

function makeDots(){
  const p=document.getElementById('progress');p.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<round?' done':i===round?' active':'');
    p.appendChild(d);
  }
}

function spawnConfetti(){
  const cols=['#00ffff','#FFD700','#a855f7','#2ed573','#FF4757'];
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.cssText=`left:${Math.random()*100}%;top:20%;background:${cols[i%cols.length]};animation-duration:${.8+Math.random()*.6}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1400);
  }
}

function showLetterPop(letter){
  const el=document.createElement('div');
  el.className='letter-pop';
  el.innerHTML=`<div class="pop-letter">${letter}</div>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1100);
}

function buildKeyboard(){
  const kb=document.getElementById('keyboard');
  kb.innerHTML='';
  ROWS.forEach(row=>{
    const rowEl=document.createElement('div');
    rowEl.className='key-row';
    [...row].forEach(letter=>{
      const key=document.createElement('div');
      key.className='key'+(letter===target?' target-key':'');
      key.textContent=letter;
      key.id=`key_${letter}`;
      key.addEventListener('click',()=>pressKey(key,letter));
      key.addEventListener('touchstart',(e)=>{e.preventDefault();pressKey(key,letter);},{passive:false});
      rowEl.appendChild(key);
    });
    kb.appendChild(rowEl);
  });
}

// also listen to actual keyboard
document.addEventListener('keydown',(e)=>{
  const letter=e.key.toUpperCase();
  if(/^[A-Z]$/.test(letter)){
    const key=document.getElementById(`key_${letter}`);
    if(key){
      key.classList.add('pressed');
      setTimeout(()=>key.classList.remove('pressed'),150);
      pressKey(key,letter);
    }
  }
});

function pressKey(keyEl,letter){
  if(answered)return;
  if(letter===target){
    answered=true;
    keyEl.classList.remove('target-key');
    keyEl.classList.add('correct-key');
    playKeyPress(true);
    spawnConfetti();
    showLetterPop(letter);
    score+=10;
    document.getElementById('scoreVal').textContent=score;
    speak(`${letter}! ${LETTER_WORDS[letter]}! Brilliant!`);
    usedLetters.push(letter);
    round++;
    makeDots();
    setTimeout(()=>{
      keyEl.classList.remove('correct-key');
      newRound();
    },1600);
  } else {
    keyEl.classList.add('wrong-key');
    playKeyPress(false);
    speak(`That's ${letter}! Find ${target}! Look for it glowing!`);
    setTimeout(()=>keyEl.classList.remove('wrong-key'),500);
  }
}

function pickTarget(){
  const alphabet='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const remaining=alphabet.filter(l=>!usedLetters.includes(l));
  if(remaining.length===0){usedLetters=[];}
  const pool=alphabet.filter(l=>!usedLetters.includes(l));
  return pool[Math.floor(Math.random()*pool.length)];
}

function newRound(){
  if(round>=TOTAL){showCelebration();return;}
  answered=false;
  target=pickTarget();
  document.getElementById('roundVal').textContent=round+1;
  document.getElementById('targetLetter').textContent=target;
  document.getElementById('targetDisplay').textContent=target;
  document.getElementById('letterWord').textContent=LETTER_WORDS[target]||`${target} for...`;
  makeDots();
  buildKeyboard();
  setTimeout(()=>speak(`Find the letter ${target}! ${LETTER_WORDS[target]}. Press ${target}!`),300);
}

function showCelebration(){
  speak(`Incredible! You know the keyboard! You are a computer genius!`);
  const ov=document.createElement('div');
  ov.className='celebration';
  ov.innerHTML=`
    <div class="celeb-emoji">⌨️</div>
    <h2>Keyboard Master!</h2>
    <p>You found all the letters!<br/>Score: <span style="color:#00ffff;font-size:1.4em;">${score}</span> points!</p>
    <button class="next-btn" onclick="restartGame()">Play Again ⌨️</button>
  `;
  document.body.appendChild(ov);
}

function restartGame(){
  document.querySelector('.celebration')?.remove();
  score=0;round=0;usedLetters=[];
  document.getElementById('scoreVal').textContent=0;
  newRound();
}

window.addEventListener('load',()=>{
  window.speechSynthesis.getVoices();
  makeDots();
  setTimeout(()=>{
    speak('This is a keyboard! Find and press the glowing letter!');
    setTimeout(newRound,1500);
  },500);
});
</script>
</body>
</html>
