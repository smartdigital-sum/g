<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drag & Drop Fun! 🖱️</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Baloo 2',cursive;
    background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);
    min-height:100vh;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
    user-select:none;
  }
  /* matrix bg */
  .matrix-bg{position:fixed;inset:0;z-index:0;opacity:.04;}
  .matrix-col{
    position:absolute;top:0;
    font-family:'Courier New',monospace;
    font-size:.7rem;color:#00ff41;
    animation:matrixFall linear infinite;
    line-height:1.4;
  }
  @keyframes matrixFall{from{transform:translateY(-100%);}to{transform:translateY(100vh);}}

  .header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px;width:100%;}
  .title{font-size:clamp(1.4rem,5vw,2.2rem);color:#00ff41;text-shadow:0 0 20px rgba(0,255,65,.4);}
  .instruction{
    background:rgba(0,255,65,.08);backdrop-filter:blur(8px);
    border:2px solid rgba(0,255,65,.3);border-radius:50px;
    padding:12px 28px;font-size:clamp(1rem,4vw,1.4rem);color:#fff;
    margin-top:10px;display:inline-block;
    animation:glowPulse 2s ease-in-out infinite;
  }
  @keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(0,255,65,.2);}50%{box-shadow:0 0 25px rgba(0,255,65,.4);}}

  .score-bar{position:relative;z-index:10;display:flex;gap:16px;align-items:center;margin-top:8px;}
  .score-box{background:rgba(0,255,65,.1);border:2px solid rgba(0,255,65,.3);border-radius:20px;padding:6px 18px;color:#fff;font-size:1rem;}
  .score-box span{color:#00ff41;font-size:1.2rem;}

  .progress{position:relative;z-index:10;display:flex;gap:8px;margin-top:8px;}
  .dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s;}
  .dot.done{background:#00ff41;box-shadow:0 0 8px #00ff41;}
  .dot.active{background:#fff;transform:scale(1.3);}

  /* game scene */
  .scene{
    position:relative;z-index:5;
    flex:1;width:100%;max-width:700px;
    display:flex;flex-direction:column;align-items:center;
    padding:16px 20px;
    gap:clamp(12px,3vw,20px);
  }

  /* item to drag */
  .drag-item{
    width:clamp(90px,20vw,130px);
    height:clamp(90px,20vw,130px);
    border-radius:20px;
    background:rgba(255,255,255,.12);
    border:3px solid rgba(255,255,255,.3);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:clamp(3rem,12vw,5rem);
    cursor:grab;
    animation:itemFloat 2s ease-in-out infinite;
    touch-action:none;
    transition:transform .15s;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
    gap:4px;
  }
  .drag-item:active{cursor:grabbing;transform:scale(1.1) rotate(5deg);}
  .drag-item.dragging{animation:none;transform:scale(1.15) rotate(5deg);z-index:999;opacity:.9;}
  @keyframes itemFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  .drag-item-label{font-size:clamp(.7rem,2.5vw,.9rem);color:rgba(255,255,255,.7);font-weight:700;}

  /* drop zones row */
  .drop-zones{
    display:flex;gap:clamp(12px,4vw,24px);
    justify-content:center;flex-wrap:wrap;
  }
  .drop-zone{
    width:clamp(100px,22vw,140px);
    height:clamp(100px,22vw,140px);
    border-radius:20px;
    border:4px dashed rgba(255,255,255,.25);
    background:rgba(255,255,255,.05);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:clamp(2rem,8vw,3.5rem);
    color:rgba(255,255,255,.2);
    transition:all .3s;
    position:relative;
    gap:4px;
  }
  .drop-zone.highlight{
    border-color:#00ff41;border-style:solid;
    background:rgba(0,255,65,.12);
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(0,255,65,.3);
  }
  .drop-zone.correct{
    border-color:#00ff41;border-style:solid;
    background:rgba(0,255,65,.2);
    animation:correctPop .5s ease;
  }
  .drop-zone.wrong{
    border-color:#FF4757;border-style:solid;
    background:rgba(255,71,87,.15);
    animation:wrongShake .4s ease;
  }
  @keyframes correctPop{0%{transform:scale(1);}50%{transform:scale(1.12);}100%{transform:scale(1);}}
  @keyframes wrongShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}
  .drop-zone-label{font-size:clamp(.65rem,2vw,.85rem);color:rgba(255,255,255,.4);font-weight:700;text-align:center;}

  /* task text */
  .task-text{
    background:rgba(255,255,255,.08);backdrop-filter:blur(6px);
    border:2px solid rgba(255,255,255,.15);border-radius:16px;
    padding:10px 20px;color:#fff;
    font-size:clamp(.9rem,3.5vw,1.2rem);font-weight:700;
    text-align:center;
  }

  /* drop arrow hint */
  .drop-arrow{
    color:rgba(255,255,255,.3);
    font-size:clamp(1.5rem,5vw,2.5rem);
    animation:arrowBounce 1s ease-in-out infinite;
  }
  @keyframes arrowBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(8px);}}

  .celebration{
    position:fixed;inset:0;z-index:200;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,20,.85);backdrop-filter:blur(10px);animation:fadeIn .4s ease;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .celeb-emoji{font-size:clamp(4rem,15vw,7rem);animation:celebBounce .5s ease infinite alternate;}
  @keyframes celebBounce{from{transform:scale(1);}to{transform:scale(1.15);}}
  .celebration h2{color:#00ff41;font-size:clamp(2rem,8vw,3.5rem);text-align:center;margin:16px 0 8px;}
  .celebration p{color:#fff;font-size:clamp(1rem,4vw,1.4rem);margin-bottom:24px;text-align:center;}
  .next-btn{
    background:linear-gradient(135deg,#00ff41,#00b4d8);color:#000;border:none;border-radius:50px;
    padding:14px 40px;font-family:'Baloo 2',cursive;font-size:clamp(1.1rem,4vw,1.5rem);font-weight:800;
    cursor:pointer;box-shadow:0 6px 24px rgba(0,255,65,.4);transition:transform .2s;
  }
  .next-btn:hover{transform:scale(1.05);}
  .confetti-piece{position:fixed;pointer-events:none;z-index:300;width:10px;height:10px;border-radius:2px;animation:confettiFall 1.2s ease-in forwards;}
  @keyframes confettiFall{0%{opacity:1;}100%{transform:translateY(300px) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="matrix-bg" id="matrixBg"></div>

<div class="header">
  <div class="title">🖱️ Drag & Drop Fun!</div>
  <div class="instruction" id="instruction">Drag the item to the right place!</div>
</div>
<div class="score-bar">
  <div class="score-box">⭐ Score: <span id="scoreVal">0</span></div>
  <div class="score-box">🎯 Round: <span id="roundVal">1</span>/10</div>
</div>
<div class="progress" id="progress"></div>

<div class="scene" id="scene">
  <div class="drag-item" id="dragItem" draggable="true">
    <span id="dragEmoji">⭐</span>
    <span class="drag-item-label" id="dragLabel">Star</span>
  </div>
  <div class="drop-arrow">↓</div>
  <div class="task-text" id="taskText">Drop the star into its home!</div>
  <div class="drop-zones" id="dropZones"></div>
</div>

<script>
const TASKS=[
  {item:{emoji:'⭐',label:'Star'},zones:[{emoji:'🌌',label:'Space',correct:true},{emoji:'🌊',label:'Ocean',correct:false},{emoji:'🌲',label:'Forest',correct:false}],
   taskText:'Stars live in space! Drag the star to space!',correctMsg:'Stars belong in space! ✨'},
  {item:{emoji:'🐠',label:'Fish'},zones:[{emoji:'🌊',label:'Ocean',correct:true},{emoji:'🔥',label:'Fire',correct:false},{emoji:'🌙',label:'Moon',correct:false}],
   taskText:'Fish live in water! Drag the fish to the ocean!',correctMsg:'Fish love the ocean! 🌊'},
  {item:{emoji:'🍎',label:'Apple'},zones:[{emoji:'🛒',label:'Basket',correct:true},{emoji:'🚗',label:'Car',correct:false},{emoji:'🛁',label:'Bath',correct:false}],
   taskText:'Put the apple in the basket!',correctMsg:'Apples go in the basket! 🍎'},
  {item:{emoji:'📚',label:'Books'},zones:[{emoji:'🏫',label:'School',correct:true},{emoji:'🌋',label:'Volcano',correct:false},{emoji:'🌊',label:'Sea',correct:false}],
   taskText:'Books belong at school! Drag them there!',correctMsg:'Books help us learn at school! 📚'},
  {item:{emoji:'🌻',label:'Flower'},zones:[{emoji:'🌱',label:'Garden',correct:true},{emoji:'❄️',label:'Ice',correct:false},{emoji:'🏠',label:'House',correct:false}],
   taskText:'Flowers grow in gardens! Drag it there!',correctMsg:'Flowers bloom in the garden! 🌻'},
  {item:{emoji:'🐶',label:'Dog'},zones:[{emoji:'🏠',label:'Home',correct:true},{emoji:'🌊',label:'Sea',correct:false},{emoji:'🌋',label:'Volcano',correct:false}],
   taskText:'Dogs are home pets! Put the dog at home!',correctMsg:'Dogs are our home friends! 🏠'},
  {item:{emoji:'🌙',label:'Moon'},zones:[{emoji:'🌌',label:'Sky',correct:true},{emoji:'🛒',label:'Basket',correct:false},{emoji:'🌊',label:'Ocean',correct:false}],
   taskText:'The moon shines in the sky! Drag it up!',correctMsg:'The moon lives in the sky! 🌙'},
  {item:{emoji:'🐸',label:'Frog'},zones:[{emoji:'🌿',label:'Pond',correct:true},{emoji:'🔥',label:'Fire',correct:false},{emoji:'🏔️',label:'Mountain',correct:false}],
   taskText:'Frogs live near ponds! Drag the frog!',correctMsg:'Frogs love ponds and water! 🌿'},
  {item:{emoji:'🎈',label:'Balloon'},zones:[{emoji:'☁️',label:'Sky',correct:true},{emoji:'🕳️',label:'Hole',correct:false},{emoji:'🌊',label:'Sea',correct:false}],
   taskText:'Balloons float in the sky! Let it go!',correctMsg:'Balloons fly up high! 🎈'},
  {item:{emoji:'🍔',label:'Food'},zones:[{emoji:'🍽️',label:'Plate',correct:true},{emoji:'🛁',label:'Bath',correct:false},{emoji:'📚',label:'Book',correct:false}],
   taskText:'Food goes on a plate! Drag it there!',correctMsg:'We eat food on a plate! 🍽️'},
];

let score=0,round=0,answered=false;
let dragEl=null,dragOffX=0,dragOffY=0;
const TOTAL=10;
let audioCtx;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playDrop(correct){
  const ctx=getAudio();
  if(correct){
    [523,659,784,1047].forEach((f,i)=>{
      setTimeout(()=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;o.type='sine';
        g.gain.setValueAtTime(.3,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
        o.start();o.stop(ctx.currentTime+.4);
      },i*100);
    });
  } else {
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.value=200;
    g.gain.setValueAtTime(.2,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);
  }
}

function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.85;u.pitch=1.3;
  window.speechSynthesis.speak(u);
}

function makeDots(){
  const p=document.getElementById('progress');p.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<round?' done':i===round?' active':'');
    p.appendChild(d);
  }
}

function spawnConfetti(){
  const cols=['#00ff41','#00ffff','#FFD700','#a55eea','#FF4757'];
  for(let i=0;i<20;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.cssText=`left:${Math.random()*100}%;top:20%;background:${cols[i%cols.length]};animation-duration:${.8+Math.random()*.6}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1400);
  }
}

function newRound(){
  if(round>=TOTAL){showCelebration();return;}
  answered=false;
  document.getElementById('roundVal').textContent=round+1;
  makeDots();

  const task=TASKS[round%TASKS.length];
  document.getElementById('dragEmoji').textContent=task.item.emoji;
  document.getElementById('dragLabel').textContent=task.item.label;
  document.getElementById('taskText').textContent=task.taskText;
  document.getElementById('instruction').innerHTML=`Drag the <span style="color:#00ff41;">${task.item.label}</span> to the right place!`;

  const di=document.getElementById('dragItem');
  di.style.display='';di.style.position='';di.style.left='';di.style.top='';
  di.classList.remove('dragging');

  // build drop zones
  const zonesEl=document.getElementById('dropZones');
  zonesEl.innerHTML='';
  const shuffled=[...task.zones].sort(()=>Math.random()-.5);
  shuffled.forEach(zone=>{
    const el=document.createElement('div');
    el.className='drop-zone';
    el.dataset.correct=zone.correct?'1':'0';
    el.innerHTML=`${zone.emoji}<div class="drop-zone-label">${zone.label}</div>`;
    zonesEl.appendChild(el);
  });

  setupDrag(task);
  setTimeout(()=>speak(task.taskText),300);
}

function setupDrag(task){
  const di=document.getElementById('dragItem');
  di.addEventListener('mousedown',e=>{startDrag(e,task);},{once:true});
  di.addEventListener('touchstart',e=>{startTouchDrag(e,task);},{passive:false,once:true});
}

function startDrag(e,task){
  dragEl=document.getElementById('dragItem');
  const rect=dragEl.getBoundingClientRect();
  dragOffX=e.clientX-rect.left;
  dragOffY=e.clientY-rect.top;
  dragEl.classList.add('dragging');
  dragEl.style.position='fixed';
  dragEl.style.zIndex='999';
  moveDrag(e.clientX,e.clientY);
  document.addEventListener('mousemove',e2=>moveDrag(e2.clientX,e2.clientY));
  document.addEventListener('mouseup',e2=>endDrag(e2.clientX,e2.clientY,task),{once:true});
}

function startTouchDrag(e,task){
  e.preventDefault();
  dragEl=document.getElementById('dragItem');
  const t=e.touches[0];
  const rect=dragEl.getBoundingClientRect();
  dragOffX=t.clientX-rect.left;
  dragOffY=t.clientY-rect.top;
  dragEl.classList.add('dragging');
  dragEl.style.position='fixed';
  dragEl.style.zIndex='999';
  moveDrag(t.clientX,t.clientY);
  document.addEventListener('touchmove',e2=>{e2.preventDefault();const t2=e2.touches[0];moveDrag(t2.clientX,t2.clientY);},{passive:false});
  document.addEventListener('touchend',e2=>{const t2=e2.changedTouches[0];endDrag(t2.clientX,t2.clientY,task);},{once:true});
}

function moveDrag(cx,cy){
  if(!dragEl)return;
  dragEl.style.left=(cx-dragOffX)+'px';
  dragEl.style.top=(cy-dragOffY)+'px';
  document.querySelectorAll('.drop-zone').forEach(z=>{
    const r=z.getBoundingClientRect();
    z.classList.toggle('highlight',cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom);
  });
}

function endDrag(cx,cy,task){
  if(!dragEl)return;
  dragEl.classList.remove('dragging');
  document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('highlight'));
  let dropped=false;
  document.querySelectorAll('.drop-zone').forEach(z=>{
    const r=z.getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){
      dropped=true;
      if(z.dataset.correct==='1'){
        z.classList.add('correct');
        playDrop(true);
        spawnConfetti();
        score+=10;
        document.getElementById('scoreVal').textContent=score;
        speak(task.correctMsg);
        dragEl.style.display='none';
        round++;
        makeDots();
        setTimeout(()=>{z.classList.remove('correct');newRound();},1600);
      } else {
        z.classList.add('wrong');
        playDrop(false);
        speak(`Oops! Try another place!`);
        dragEl.style.position='';dragEl.style.left='';dragEl.style.top='';
        setTimeout(()=>{z.classList.remove('wrong');setupDrag(task);},600);
      }
    }
  });
  if(!dropped){
    dragEl.style.position='';dragEl.style.left='';dragEl.style.top='';
    setupDrag(task);
  }
}

function showCelebration(){
  speak(`You are a drag and drop master! Amazing computer skills!`);
  const ov=document.createElement('div');
  ov.className='celebration';
  ov.innerHTML=`
    <div class="celeb-emoji">🏆</div>
    <h2>Drag & Drop Master!</h2>
    <p>You can use a computer!<br/>Score: <span style="color:#00ff41;font-size:1.4em;">${score}</span> points!</p>
    <button class="next-btn" onclick="restartGame()">Play Again 🖱️</button>
  `;
  document.body.appendChild(ov);
}

function restartGame(){
  document.querySelector('.celebration')?.remove();
  score=0;round=0;
  document.getElementById('scoreVal').textContent=0;
  document.getElementById('dragItem').style.display='';
  newRound();
}

// Matrix effect
function makeMatrix(){
  const bg=document.getElementById('matrixBg');
  for(let i=0;i<10;i++){
    const col=document.createElement('div');
    col.className='matrix-col';
    col.style.cssText=`left:${i*10+2}%;animation-duration:${3+Math.random()*3}s;animation-delay:${Math.random()*2}s;`;
    col.textContent='01\n10\n01\n11\n00\n10\n01\n10\n01\n11\n00';
    bg.appendChild(col);
  }
}

window.addEventListener('load',()=>{
  makeMatrix();
  window.speechSynthesis.getVoices();
  makeDots();
  setTimeout(()=>{
    speak('Welcome! Drag and drop the items!');
    setTimeout(newRound,1200);
  },500);
});
</script>
</body>
</html>
