<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GyanPlay — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --saffron: #FF6B00;
      --gold:    #FFB800;
      --sky:     #00AEEF;
      --green:   #00C853;
      --pink:    #FF4081;
      --dark:    #1A1A2E;
      --dark2:   #16213E;
      --card:    #ffffff;
      --bg:      #F4F6FB;
      --text:    #1A1A2E;
      --muted:   #7a7a9a;
      --shadow:  0 4px 24px rgba(26,26,46,0.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0;
      z-index: 100;
      background: var(--dark);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
      gap: 12px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.65);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 6px 14px;
      border-radius: 30px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }
    .logo {
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--gold);
      text-decoration: none;
    }
    .logo span { color: var(--sky); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .lang-toggle {
      display: flex;
      gap: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 30px;
      padding: 3px;
    }
    .lang-toggle button {
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      padding: 3px 9px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-toggle button.active { background: var(--gold); color: var(--dark); }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 30px;
      padding: 4px 12px 4px 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .user-chip:hover { background: rgba(255,255,255,0.14); }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
    }
    .user-avatar-placeholder {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--saffron);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
      color: #fff;
      border: 2px solid var(--gold);
    }
    .user-name {
      font-weight: 700;
      font-size: 0.85rem;
      color: #fff;
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* dropdown */
    .user-dropdown {
      position: absolute;
      top: 68px; right: 1.5rem;
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 0.5rem;
      min-width: 180px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      display: none;
      z-index: 200;
    }
    .user-dropdown.open { display: block; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      transition: background 0.15s;
    }
    .dropdown-item:hover { background: rgba(255,255,255,0.08); }
    .dropdown-item.danger { color: #ff6b6b; }

    /* ── PAGE CONTENT ── */
    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── GREETING BANNER ── */
    .greeting-banner {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
      border-radius: 24px;
      padding: 2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    .greeting-banner::before {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255,184,0,0.12), transparent 70%);
      top: -80px; right: -60px;
      border-radius: 50%;
    }
    .greeting-text h2 {
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 1.6rem;
      color: #fff;
      margin-bottom: 0.3rem;
    }
    .greeting-text p { color: rgba(255,255,255,0.5); font-size: 0.9rem; }
    .greeting-text .highlight { color: var(--gold); }

    .banner-stats {
      display: flex;
      gap: 1.5rem;
    }
    .stat-box {
      text-align: center;
    }
    .stat-box .num {
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 1.8rem;
      color: var(--gold);
      line-height: 1;
    }
    .stat-box .label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .section-header h3 {
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--text);
    }
    .section-header span {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
    }

    /* ── MY CLASSES (owned) ── */
    .owned-section { margin-bottom: 2.5rem; }

    .empty-owned {
      background: var(--card);
      border-radius: 18px;
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      border: 2px dashed #dde;
    }
    .empty-owned .emoji { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .empty-owned p { font-size: 0.9rem; line-height: 1.6; }

    .owned-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .owned-card {
      background: var(--card);
      border-radius: 20px;
      padding: 1.25rem;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      border: 2px solid transparent;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .owned-card:hover { transform: translateY(-4px); border-color: var(--saffron); }

    .owned-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .owned-card .class-emoji { font-size: 2rem; }
    .active-badge {
      background: rgba(0,200,83,0.12);
      color: var(--green);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .expiring-badge {
      background: rgba(255,107,0,0.12);
      color: var(--saffron);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .owned-card .class-name {
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      font-size: 1rem;
    }
    .owned-card .expires {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .go-btn {
      margin-top: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--saffron);
      color: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 8px 0;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .owned-card:hover .go-btn { background: #e55a00; }

    /* ── ALL CLASSES GRID ── */
    .all-classes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 1rem;
    }

    .class-tile {
      background: var(--card);
      border-radius: 20px;
      padding: 1.25rem 1rem;
      box-shadow: var(--shadow);
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .class-tile:hover { transform: translateY(-5px); box-shadow: 0 12px 36px rgba(0,0,0,0.13); border-color: var(--sky); }
    .class-tile.locked { opacity: 0.85; }
    .class-tile.owned { border-color: var(--green); }

    .class-tile .emoji { font-size: 2.2rem; margin-bottom: 0.4rem; }
    .class-tile .name {
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--dark);
      margin-bottom: 0.3rem;
    }
    .class-tile .price {
      font-weight: 700;
      font-size: 0.9rem;
    }
    .free-price { color: var(--green); }
    .paid-price { color: var(--saffron); }
    .owned-price { color: var(--green); font-size: 0.78rem; }

    .lock-icon {
      position: absolute;
      top: 8px; right: 10px;
      font-size: 0.85rem;
      opacity: 0.4;
    }
    .check-icon {
      position: absolute;
      top: 8px; right: 10px;
      font-size: 0.85rem;
      color: var(--green);
    }

    /* ── LOADING SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, #e8e8f0 25%, #f4f4f8 50%, #e8e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 12px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── PAGE TRANSITION ── */
    body { animation: pageIn 0.35s ease; }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--dark);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <nav class="topbar">
    <a class="back-btn" href="" onclick="event.preventDefault();navTo('index.html')">
      ← <span data-lang="en">Home</span>
      <span data-lang="hi" style="display:none">Home</span>
      <span data-lang="as" style="display:none">Home</span>
    </a>
    <a class="logo" href="/index.html">Gyan<span>Play</span></a>
    <div class="topbar-right">
      <div class="lang-toggle">
        <button onclick="setLang('en')" id="lbEn">EN</button>
        <button onclick="setLang('hi')" id="lbHi">हि</button>
        <button onclick="setLang('as')" id="lbAs">অ</button>
      </div>
      <div class="user-chip" onclick="toggleDropdown()">
        <div class="user-avatar-placeholder" id="avatarPlaceholder">?</div>
        <img class="user-avatar" id="avatarImg" src="" alt="" style="display:none"/>
        <span class="user-name" id="userName">...</span>
      </div>
    </div>
  </nav>

  <!-- USER DROPDOWN -->
  <div class="user-dropdown" id="userDropdown">
    <div class="dropdown-item" id="dropdownHome" onclick="navTo('index.html')">🏠 Home</div>
    <div class="dropdown-item danger" id="dropdownLogout" onclick="handleLogout()">🚪 Logout</div>
  </div>

  <!-- PAGE -->
  <main class="page">

    <!-- GREETING BANNER -->
    <div class="greeting-banner">
      <div class="greeting-text">
        <h2 id="greetingText">Welcome back! 👋</h2>
        <p id="greetingSub">Your child's learning adventure continues on <span class="highlight">GyanPlay</span></p>
      </div>
      <div class="banner-stats">
        <div class="stat-box">
          <div class="num" id="statOwned">0</div>
          <div class="label" id="statOwnedLabel">Classes</div>
        </div>
        <div class="stat-box">
          <div class="num">6</div>
          <div class="label" id="statSubjectsLabel">Subjects</div>
        </div>
      </div>
    </div>

    <!-- MY CLASSES -->
    <div class="owned-section">
      <div class="section-header">
        <h3 id="myClassesTitle">📚 My Classes</h3>
      </div>
      <div id="ownedContainer">
        <div class="empty-owned">
          <div class="emoji">🎒</div>
          <p id="emptyOwnedMsg">You haven't unlocked any class yet.<br/>Browse below and get started!</p>
        </div>
      </div>
    </div>

    <!-- ALL CLASSES -->
    <div>
      <div class="section-header">
        <h3 id="allClassesTitle">🏫 All Classes</h3>
        <span id="clickUnlockHint">Click to explore</span>
      </div>
      <div class="all-classes-grid" id="allClassesGrid"></div>
    </div>

  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ── TRANSLATIONS ────────────────────────────────────────────────
    const DT = {
      en: {
        greeting: "Welcome back! 👋",
        greetingSub: (n) => `Hello, <span class="highlight">${n}</span>! Your child's learning adventure continues.`,
        myClasses: "📚 My Classes",
        allClasses: "🏫 All Classes",
        clickUnlock: "Click to explore",
        classesOwned: "Classes",
        subjects: "Subjects",
        emptyMsg: "You haven't unlocked any class yet.<br/>Browse below and get started!",
        openClass: "Open Class →",
        active: "✓ Active",
        expiringSoon: "⚠ Soon",
        alwaysFree: "Always free",
        expires: (d) => `Expires: ${d}`,
        owned: "✓ Owned",
        free: "FREE",
        logout: "Logout",
        home: "Home",
      },
      hi: {
        greeting: "वापस स्वागत है! 👋",
        greetingSub: (n) => `नमस्ते, <span class="highlight">${n}</span>! आपके बच्चे की learning adventure जारी है।`,
        myClasses: "📚 मेरी Classes",
        allClasses: "🏫 सभी Classes",
        clickUnlock: "explore करने के लिए click करें",
        classesOwned: "Classes",
        subjects: "विषय",
        emptyMsg: "आपने अभी तक कोई class unlock नहीं किया।<br/>नीचे देखें और शुरू करें!",
        openClass: "Class खोलें →",
        active: "✓ सक्रिय",
        expiringSoon: "⚠ जल्द समाप्त",
        alwaysFree: "हमेशा मुफ़्त",
        expires: (d) => `समाप्ति: ${d}`,
        owned: "✓ खरीदा",
        free: "मुफ़्त",
        logout: "Logout",
        home: "होम",
      },
      as: {
        greeting: "আপোনাক স্বাগতম! 👋",
        greetingSub: (n) => `নমস্কাৰ, <span class="highlight">${n}</span>! আপোনাৰ সন্তানৰ শিক্ষাৰ অভিযান চলি আছে।`,
        myClasses: "📚 মোৰ ক্লাছসমূহ",
        allClasses: "🏫 সকলো ক্লাছ",
        clickUnlock: "অন্বেষণ কৰিবলৈ ক্লিক কৰক",
        classesOwned: "ক্লাছ",
        subjects: "বিষয়",
        emptyMsg: "আপুনি এতিয়ালৈ কোনো ক্লাছ আনলক কৰা নাই।<br/>তলত চাওক আৰু আৰম্ভ কৰক!",
        openClass: "ক্লাছ খোলক →",
        active: "✓ সক্ৰিয়",
        expiringSoon: "⚠ শীঘ্ৰে শেষ",
        alwaysFree: "সদায় বিনামূলীয়া",
        expires: (d) => `মেয়াদ: ${d}`,
        owned: "✓ কিনা হৈছে",
        free: "বিনামূলীয়া",
        logout: "লগআউট",
        home: "হোম",
      }
    };

    let lang = localStorage.getItem('gyanplay_lang') || 'en';
    let CLASSES = [];
    let isAdmin = false;

    // ── LOAD CLASSES FROM games.json ────────────────────────────────
    async function loadClasses() {
      const res  = await fetch('data/games.json');
      const data = await res.json();
      CLASSES = data.classes.map(c => ({
        id:    c.id,
        name:  c.name,
        emoji: c.emoji,
        color: c.color,
        price: data.pricing[c.id] || 0,
        gameCount: c.games ? c.games.length : 0,
      }));
      return data.pricing;
    }

    // ── PURCHASES (Firestore — keyed by classId) ────────────────────
    // Populated by loadPurchasesFromFirestore() after auth resolves.
    let firestorePurchases = {}; // { classId: { expiresOn: Date|null } }

    function isAccessible(cls) {
      if (isAdmin) return true;
      if (cls.id === 'pre-nursery' || cls.price === 0) return true;
      const p = firestorePurchases[cls.id];
      if (!p) return false;
      // null expiresOn means "never expires" (e.g. free class)
      if (!p.expiresOn) return true;
      return p.expiresOn >= new Date();
    }

    function formatExpiry(classId) {
      const p = firestorePurchases[classId];
      if (!p || !p.expiresOn) return '';
      return p.expiresOn.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    }

    function isExpiringSoon(classId) {
      const p = firestorePurchases[classId];
      if (!p || !p.expiresOn) return false;
      const diff = (p.expiresOn - new Date()) / (1000*60*60*24);
      return diff > 0 && diff < 30;
    }

    // ── NAVIGATE WITH FADE ──────────────────────────────────────────
    function navTo(href) {
      document.body.style.transition = 'opacity 0.2s';
      document.body.style.opacity = '0';
      setTimeout(() => location.href = href, 210);
    }

    // ── RENDER OWNED ────────────────────────────────────────────────
    function renderOwned() {
      const t         = DT[lang];
      const container = document.getElementById('ownedContainer');
      const ownedList = CLASSES.filter(c => isAccessible(c));
      document.getElementById('statOwned').textContent = ownedList.length;

      if (!ownedList.length) {
        container.innerHTML = `<div class="empty-owned">
          <div class="emoji">🎒</div>
          <p>${t.emptyMsg}</p>
        </div>`;
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'owned-grid';
      ownedList.forEach(cls => {
        const soon     = isExpiringSoon(cls.id);
        const expiryStr= formatExpiry(cls.id);
        const expText  = expiryStr ? t.expires(expiryStr) : t.alwaysFree;
        const card = document.createElement('div');
        card.className = 'owned-card';
        card.style.cssText = `border-color:${cls.color}22;`;
        card.innerHTML = `
          <div class="owned-card-top">
            <span class="class-emoji">${cls.emoji}</span>
            <span class="${soon?'expiring-badge':'active-badge'}">${soon?t.expiringSoon:t.active}</span>
          </div>
          <div class="class-name">${cls.name[lang]||cls.name.en}</div>
          <div class="expires">${expText}</div>
          <div class="go-btn" style="background:${cls.color}">${t.openClass}</div>
        `;
        card.onclick = () => { localStorage.setItem('gyanplay_lastClass', cls.id); navTo(`classroom.html?class=${cls.id}`); };
        grid.appendChild(card);
      });
      container.innerHTML = '';
      container.appendChild(grid);
    }

    // ── RENDER ALL CLASSES ──────────────────────────────────────────
    function renderAllClasses() {
      const t    = DT[lang];
      const grid = document.getElementById('allClassesGrid');
      grid.innerHTML = '';

      CLASSES.forEach(cls => {
        const accessible = isAccessible(cls);
        const tile = document.createElement('div');
        tile.className = `class-tile ${accessible?'owned':'locked'}`;
        tile.style.setProperty('--tile-color', cls.color);

        let priceHTML;
        if (accessible) {
          priceHTML = `<div class="price owned-price">${t.owned}</div>`;
        } else if (cls.price === 0) {
          priceHTML = `<div class="price free-price">${t.free}</div>`;
        } else {
          priceHTML = `<div class="price paid-price">₹${cls.price.toLocaleString('en-IN')}</div>`;
        }

        tile.innerHTML = `
          ${accessible ? '<span class="check-icon">✓</span>' : '<span class="lock-icon">🔒</span>'}
          <div class="emoji">${cls.emoji}</div>
          <div class="name">${cls.name[lang]||cls.name.en}</div>
          <div style="font-size:.7rem;color:var(--muted);margin-bottom:2px">${cls.gameCount} games</div>
          ${priceHTML}
        `;
        tile.onclick = () => { localStorage.setItem('gyanplay_lastClass', cls.id); navTo(`classroom.html?class=${cls.id}`); };
        grid.appendChild(tile);
      });
    }

    // ── LANGUAGE ───────────────────────────────────────────────────
    function setLang(l) {
      lang = l;
      localStorage.setItem('gyanplay_lang', l);
      ['en','hi','as'].forEach(x => {
        document.getElementById(`lb${x.charAt(0).toUpperCase()+x.slice(1)}`).classList.toggle('active', x === l);
      });
      renderPage();
    }

    function renderPage() {
      const t    = DT[lang];
      const name = localStorage.getItem('gyanplay_user_name') || 'Parent';

      document.getElementById('greetingText').innerHTML  = t.greeting;
      document.getElementById('greetingSub').innerHTML   = t.greetingSub(name);
      document.getElementById('myClassesTitle').textContent   = t.myClasses;
      document.getElementById('allClassesTitle').textContent  = t.allClasses;
      document.getElementById('clickUnlockHint').textContent  = t.clickUnlock;
      document.getElementById('statSubjectsLabel').textContent= t.subjects;
      document.getElementById('statOwnedLabel').textContent   = t.classesOwned;
      document.getElementById('dropdownHome').textContent     = `🏠 ${t.home}`;
      document.getElementById('dropdownLogout').textContent   = `🚪 ${t.logout}`;

      if (CLASSES.length) {
        renderOwned();
        renderAllClasses();
      }
    }

    // ── INIT (called by auth module once user is confirmed) ────────
    window.initDashboard = async function (displayName, adminFlag, purchases) {
      isAdmin = !!adminFlag;
      firestorePurchases = purchases || {};

      ['en','hi','as'].forEach(x => {
        document.getElementById(`lb${x.charAt(0).toUpperCase()+x.slice(1)}`).classList.toggle('active', x === lang);
      });

      document.getElementById('userName').textContent = displayName.split(' ')[0];
      document.getElementById('avatarPlaceholder').textContent = displayName.charAt(0).toUpperCase();
      localStorage.setItem('gyanplay_user_name', displayName);

      await loadClasses();
      renderPage();
    };

    window.toggleDropdown = () => document.getElementById('userDropdown').classList.toggle('open');
    document.addEventListener('click', e => {
      if (!e.target.closest('.user-chip') && !e.target.closest('.user-dropdown'))
        document.getElementById('userDropdown').classList.remove('open');
    });
  </script>

  <!-- Auth module: requires login, pulls profile from Firestore -->
  <script type="module">
    import { requireAuth, getUserProfile, logOut } from "./src/auth.js";
    import { db } from "./src/firebase.js";
    import { doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    requireAuth(async (user) => {
      // Check if user is admin in Firestore
      let adminFlag = false;
      try {
        const adminSnap = await getDoc(doc(db, "admins", user.uid));
        if (adminSnap.exists()) adminFlag = true;
      } catch(e) { /* ignore */ }

      // Load purchases from Firestore
      const purchases = {};
      try {
        const pSnap = await getDocs(collection(db, "users", user.uid, "purchases"));
        pSnap.forEach(p => {
          const data = p.data();
          const expiresOn = data.expiresOn?.toDate ? data.expiresOn.toDate()
                          : data.expiresOn ? new Date(data.expiresOn) : null;
          purchases[p.id] = { expiresOn };
        });
      } catch(e) { console.error("Failed to load purchases:", e); }

      const profile     = await getUserProfile(user.uid);
      const displayName = profile?.studentName || profile?.name || user.displayName || 'Parent';
      window.initDashboard(displayName, adminFlag, purchases);
    });

    window.handleLogout = () => logOut();
  </script>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>

</body>
